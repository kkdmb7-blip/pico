<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 채팅 · FORTUNA</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: #1a120a; color: #f0e8d0; height: 100dvh; display: flex; flex-direction: column; }
#login-screen { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
#login-screen h1 { font-size: 20px; color: #c9a84c; }
#pw-input { padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(201,168,76,0.4); background: rgba(255,255,255,0.06); color: #f0e8d0; font-size: 15px; width: 260px; outline: none; }
#pw-btn { padding: 12px 28px; background: linear-gradient(135deg,#c9a84c,#7a5a10); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
#main { flex: 1; display: none; overflow: hidden; flex-direction: row; }
/* 좌: 사용자 목록 */
#user-list { width: 260px; border-right: 1px solid rgba(201,168,76,0.15); display: flex; flex-direction: column; overflow: hidden; }
#user-list h2 { padding: 16px; font-size: 13px; color: #c9a84c; border-bottom: 1px solid rgba(201,168,76,0.12); flex-shrink: 0; }
#users { flex: 1; overflow-y: auto; }
.user-item { padding: 13px 16px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.12s; }
.user-item:hover, .user-item.active { background: rgba(201,168,76,0.10); }
.user-item .uid { font-size: 12px; color: #c9a84c; font-weight: 700; }
.user-item .preview { font-size: 11px; color: rgba(240,232,208,0.55); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-item .meta { font-size: 10px; color: rgba(240,232,208,0.4); margin-top: 2px; display: flex; justify-content: space-between; }
.unread-dot { display: inline-block; width: 8px; height: 8px; background: #e53935; border-radius: 50%; margin-left: 6px; vertical-align: middle; }
/* 우: 채팅 */
#chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#chat-head { padding: 14px 18px; border-bottom: 1px solid rgba(201,168,76,0.12); font-size: 13px; color: #c9a84c; font-weight: 700; flex-shrink: 0; }
#chat-msgs { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
.cm { max-width: 75%; padding: 9px 13px; border-radius: 14px; font-size: 13px; line-height: 1.5; word-break: break-word; }
.cm.user { align-self: flex-start; background: rgba(255,255,255,0.08); color: #f0e8d0; border-bottom-left-radius: 4px; }
.cm.admin { align-self: flex-end; background: linear-gradient(135deg,#7a5a10,#c9a84c); color: #fff; border-bottom-right-radius: 4px; }
.cm time { display: block; font-size: 10px; opacity: 0.6; margin-top: 4px; }
#chat-foot { padding: 12px; border-top: 1px solid rgba(201,168,76,0.12); display: flex; gap: 8px; flex-shrink: 0; }
#reply-input { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(201,168,76,0.3); border-radius: 10px; padding: 10px 14px; color: #f0e8d0; font-size: 13px; font-family: inherit; resize: none; height: 42px; outline: none; }
#reply-input:focus { border-color: #c9a84c; }
#reply-btn { padding: 10px 16px; background: linear-gradient(135deg,#c9a84c,#7a5a10); color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 13px; }
#reply-btn:disabled { opacity: 0.5; cursor: not-allowed; }
#no-select { flex: 1; display: flex; align-items: center; justify-content: center; color: rgba(240,232,208,0.3); font-size: 13px; }
#refresh-btn { margin-left: auto; padding: 4px 12px; background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.25); border-radius: 8px; color: #c9a84c; font-size: 12px; cursor: pointer; }
</style>
</head>
<body>

<div id="login-screen">
  <h1>✦ 관리자 로그인</h1>
  <input type="password" id="pw-input" placeholder="비밀번호" onkeydown="if(event.key==='Enter')login()">
  <button id="pw-btn" onclick="login()">로그인</button>
</div>

<div id="main">
  <div id="user-list">
    <h2>💬 문의 사용자 <button id="refresh-btn" onclick="loadUsers()">새로고침</button></h2>
    <div id="users"></div>
  </div>
  <div id="chat-area">
    <div id="chat-head">사용자를 선택하세요</div>
    <div id="no-select">← 사용자를 선택하면 대화가 표시돼요</div>
    <div id="chat-msgs" style="display:none;"></div>
    <div id="chat-foot" style="display:none;">
      <textarea id="reply-input" placeholder="답변 입력 (Enter=전송, Shift+Enter=줄바꿈)"></textarea>
      <button id="reply-btn" onclick="sendReply()">전송</button>
    </div>
  </div>
</div>

<script>
var SB_URL = 'https://ymghmfkqctckxxysxkvy.supabase.co';
var SB_KEY = 'sb_publishable_3-9zobXqx6Nv36LzmNMBpA_fohZqA5x';
var ADMIN_PW = '99f9f77a';
var HEADERS = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };
var currentUid = null;
var autoTimer = null;

function login() {
  var pw = document.getElementById('pw-input').value.trim();
  if (pw !== ADMIN_PW) { alert('비밀번호가 틀렸어요.'); return; }
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main').style.display = 'flex';
  loadUsers();
  autoTimer = setInterval(function() {
    loadUsers();
    if (currentUid) loadChat(currentUid, false);
  }, 20000);
}

async function loadUsers() {
  var r = await fetch(SB_URL + '/rest/v1/support_messages?select=user_id,sender,content,created_at,read&order=created_at.desc', { headers: HEADERS });
  if (!r.ok) return;
  var msgs = await r.json();

  // 사용자별 마지막 메시지 + 읽지않음 집계
  var map = {};
  msgs.forEach(function(m) {
    if (!map[m.user_id]) map[m.user_id] = { uid: m.user_id, last: m, unread: 0 };
    if (m.sender === 'user' && !m.read) map[m.user_id].unread++;
  });

  var list = Object.values(map).sort(function(a, b) {
    return new Date(b.last.created_at) - new Date(a.last.created_at);
  });

  var el = document.getElementById('users');
  if (!list.length) { el.innerHTML = '<div style="padding:20px;font-size:12px;color:rgba(240,232,208,0.4);text-align:center;">문의가 없어요</div>'; return; }

  el.innerHTML = list.map(function(u) {
    var d = new Date(u.last.created_at);
    var t = (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
    var unreadDot = u.unread > 0 ? '<span class="unread-dot"></span>' : '';
    var preview = (u.last.sender === 'admin' ? '[나] ' : '') + escHtml(u.last.content).replace(/<br>/g,' ');
    return '<div class="user-item' + (currentUid === u.uid ? ' active' : '') + '" onclick="selectUser(\'' + u.uid + '\')">' +
      '<div class="uid">' + u.uid.replace('kakao_','') + unreadDot + '</div>' +
      '<div class="preview">' + preview.slice(0,40) + '</div>' +
      '<div class="meta"><span>' + t + '</span>' + (u.unread ? '<span style="color:#e53935;">미확인 ' + u.unread + '</span>' : '') + '</div>' +
      '</div>';
  }).join('');
}

async function selectUser(uid) {
  currentUid = uid;
  document.getElementById('chat-head').textContent = '💬 ' + uid.replace('kakao_','');
  document.getElementById('no-select').style.display = 'none';
  document.getElementById('chat-msgs').style.display = 'flex';
  document.getElementById('chat-foot').style.display = 'flex';
  await loadChat(uid, true);
  loadUsers();
}

async function loadChat(uid, scroll) {
  var r = await fetch(SB_URL + '/rest/v1/support_messages?user_id=eq.' + encodeURIComponent(uid) + '&order=created_at.asc&limit=200', { headers: HEADERS });
  if (!r.ok) return;
  var msgs = await r.json();
  var el = document.getElementById('chat-msgs');
  if (!msgs.length) { el.innerHTML = '<div style="text-align:center;padding:20px;font-size:12px;color:rgba(240,232,208,0.4);">대화 없음</div>'; return; }
  el.innerHTML = msgs.map(function(m) {
    var d = new Date(m.created_at);
    var t = (d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
    return '<div class="cm ' + m.sender + '">' + escHtml(m.content) + '<time>' + t + '</time></div>';
  }).join('');
  if (scroll) el.scrollTop = el.scrollHeight;
  // 읽음 처리 (user 메시지)
  await fetch(SB_URL + '/rest/v1/support_messages?user_id=eq.' + encodeURIComponent(uid) + '&sender=eq.user&read=eq.false', {
    method: 'PATCH', headers: Object.assign({}, HEADERS, {'Prefer':'return=minimal'}),
    body: JSON.stringify({ read: true })
  });
}

async function sendReply() {
  if (!currentUid) return;
  var input = document.getElementById('reply-input');
  var btn = document.getElementById('reply-btn');
  var text = (input.value || '').trim();
  if (!text) return;
  btn.disabled = true;
  input.value = '';
  var r = await fetch(SB_URL + '/rest/v1/support_messages', {
    method: 'POST', headers: Object.assign({}, HEADERS, {'Prefer':'return=minimal'}),
    body: JSON.stringify({ user_id: currentUid, sender: 'admin', content: text, read: false })
  });
  btn.disabled = false;
  if (r.ok) { await loadChat(currentUid, true); loadUsers(); }
}

document.addEventListener('keydown', function(e) {
  if (e.target.id === 'reply-input') {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
  }
});

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
</script>
</body>
</html>
