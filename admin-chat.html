<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사용자 문의 · FORTUNA ADMIN</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4ede0;
  --surface: #fcf7ea;
  --surface2: #ede4cf;
  --border-soft: rgba(60,40,20,0.22);
  --text: #1a120a;
  --text2: #4a3a2a;
  --muted: #5a4830;
  --gold: #8a6a15;
  --gold-deep: #6a4f0c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; }
nav {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 20px; height:52px;
  border-bottom:1px solid var(--border-soft);
  background:rgba(244,237,224,0.92);
  backdrop-filter:blur(12px);
  flex-shrink:0;
}
.logo-text { font-family:'Cinzel','Noto Serif KR',serif; font-weight:600; font-size:14px; letter-spacing:0.22em; color:var(--gold-deep); }
.back-btn { font-size:12px; color:var(--muted); text-decoration:none; background:none; border:none; cursor:pointer; padding:6px 10px; border-radius:8px; }
.back-btn:hover { background:var(--surface2); color:var(--text); }

#deny { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; color:var(--muted); font-size:13px; }
#deny a { color:var(--gold-deep); text-decoration:underline; }

#main { flex: 1; display: none; overflow: hidden; flex-direction: row; }
/* 좌: 사용자 목록 */
#user-list { width: 280px; border-right: 1px solid var(--border-soft); display: flex; flex-direction: column; overflow: hidden; background:var(--surface); }
#user-list h2 { padding: 14px 16px; font-size: 12px; color: var(--gold-deep); border-bottom: 1px solid var(--border-soft); flex-shrink: 0; display:flex; align-items:center; font-weight:700; letter-spacing:0.04em; }
#users { flex: 1; overflow-y: auto; }
.user-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border-soft); transition: background 0.12s; }
.user-item:hover, .user-item.active { background: var(--surface2); }
.user-item .uid { font-size: 12px; color: var(--gold-deep); font-weight: 700; }
.user-item .preview { font-size: 11px; color: var(--text2); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-item .meta { font-size: 10px; color: var(--muted); margin-top: 2px; display: flex; justify-content: space-between; }
.unread-dot { display: inline-block; width: 8px; height: 8px; background: #c94a3a; border-radius: 50%; margin-left: 6px; vertical-align: middle; }
/* 우: 채팅 */
#chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; background:var(--bg); }
#chat-head { padding: 14px 18px; border-bottom: 1px solid var(--border-soft); font-size: 13px; color: var(--gold-deep); font-weight: 700; flex-shrink: 0; background:var(--surface); }
#chat-msgs { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
.cm { max-width: 75%; padding: 9px 13px; border-radius: 14px; font-size: 13px; line-height: 1.5; word-break: break-word; }
.cm.user { align-self: flex-start; background: #fff; color: var(--text); border: 1px solid var(--border-soft); border-bottom-left-radius: 4px; }
.cm.admin { align-self: flex-end; background: linear-gradient(135deg, var(--gold-deep), var(--gold)); color: #fff; border-bottom-right-radius: 4px; }
.cm time { display: block; font-size: 10px; opacity: 0.6; margin-top: 4px; }
#chat-foot { padding: 12px; border-top: 1px solid var(--border-soft); display: flex; gap: 8px; flex-shrink: 0; background:var(--surface); }
#reply-input { flex: 1; background: #fff; border: 1px solid var(--border-soft); border-radius: 10px; padding: 10px 14px; color: var(--text); font-size: 13px; font-family: inherit; resize: none; height: 42px; outline: none; }
#reply-input:focus { border-color: var(--gold); }
#reply-btn { padding: 10px 16px; background: var(--gold-deep); color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 13px; }
#reply-btn:disabled { opacity: 0.5; cursor: not-allowed; }
#no-select { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; }
#refresh-btn { margin-left: auto; padding: 4px 10px; background:var(--surface2); border: 1px solid var(--border-soft); border-radius: 8px; color: var(--gold-deep); font-size: 11px; cursor: pointer; font-family:inherit; }
@media(max-width:640px){
  #user-list { width: 140px; }
  #user-list h2 span.title-txt { display:none; }
}
</style>
</head>
<body>

<nav>
  <span class="logo-text">FORTUNA · 사용자 문의</span>
  <a href="admin.html" class="back-btn">← 관리자 대시보드</a>
</nav>

<div id="deny">
  <div>권한을 확인하는 중...</div>
</div>

<div id="main">
  <div id="user-list">
    <h2><span class="title-txt">💬 문의 사용자</span><button id="refresh-btn" onclick="loadUsers()">새로고침</button></h2>
    <div id="users"></div>
  </div>
  <div id="chat-area">
    <div id="chat-head">사용자를 선택하세요</div>
    <div id="no-select">← 사용자를 선택하면 대화가 표시돼요</div>
    <div id="chat-msgs" style="display:none;"></div>
    <div id="chat-foot" style="display:none;">
      <textarea id="reply-input" placeholder="답변 입력 (Enter=전송, Shift+Enter=줄바꿈)"></textarea>
      <button id="reply-btn" onclick="sendReply()">전송</button>
    </div>
  </div>
</div>

<script>
var SB_URL = 'https://ymghmfkqctckxxysxkvy.supabase.co';
var SB_KEY = 'sb_publishable_3-9zobXqx6Nv36LzmNMBpA_fohZqA5x';
var ADMIN_UUID = '99f9f77a-2f2a-4055-ab44-421d1c070341';
var HEADERS = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };
var currentUid = null;
var autoTimer = null;

function checkAuth() {
  var pu = null;
  try { pu = JSON.parse(localStorage.getItem('pico_user') || 'null'); } catch(e) {}
  var savedAdmin = localStorage.getItem('pico_admin_uuid') || '';
  var puUuid = (pu && pu.uuid) ? pu.uuid : '';
  var isAdmin = (savedAdmin === ADMIN_UUID) || (puUuid === ADMIN_UUID);
  if (!isAdmin) {
    document.getElementById('deny').innerHTML =
      '<div>권한이 없어요.</div>' +
      '<div><a href="index.html?tab=mypage">← 마이페이지로</a></div>';
    return;
  }
  document.getElementById('deny').style.display = 'none';
  document.getElementById('main').style.display = 'flex';
  loadUsers();
  autoTimer = setInterval(function() {
    loadUsers();
    if (currentUid) loadChat(currentUid, false);
  }, 20000);
}

async function loadUsers() {
  var r = await fetch(SB_URL + '/rest/v1/support_messages?select=user_id,sender,content,created_at,read&order=created_at.desc', { headers: HEADERS });
  if (!r.ok) return;
  var msgs = await r.json();

  var map = {};
  msgs.forEach(function(m) {
    if (!map[m.user_id]) map[m.user_id] = { uid: m.user_id, last: m, unread: 0 };
    if (m.sender === 'user' && !m.read) map[m.user_id].unread++;
  });

  var list = Object.values(map).sort(function(a, b) {
    return new Date(b.last.created_at) - new Date(a.last.created_at);
  });

  var el = document.getElementById('users');
  if (!list.length) { el.innerHTML = '<div style="padding:20px;font-size:12px;color:var(--muted);text-align:center;">문의가 없어요</div>'; return; }

  el.innerHTML = list.map(function(u) {
    var d = new Date(u.last.created_at);
    var t = (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
    var unreadDot = u.unread > 0 ? '<span class="unread-dot"></span>' : '';
    var preview = (u.last.sender === 'admin' ? '[나] ' : '') + escHtml(u.last.content).replace(/<br>/g,' ');
    return '<div class="user-item' + (currentUid === u.uid ? ' active' : '') + '" onclick="selectUser(\'' + u.uid + '\')">' +
      '<div class="uid">' + u.uid.replace('kakao_','') + unreadDot + '</div>' +
      '<div class="preview">' + preview.slice(0,40) + '</div>' +
      '<div class="meta"><span>' + t + '</span>' + (u.unread ? '<span style="color:#c94a3a;">미확인 ' + u.unread + '</span>' : '') + '</div>' +
      '</div>';
  }).join('');
}

async function selectUser(uid) {
  currentUid = uid;
  document.getElementById('chat-head').textContent = '💬 ' + uid.replace('kakao_','');
  document.getElementById('no-select').style.display = 'none';
  document.getElementById('chat-msgs').style.display = 'flex';
  document.getElementById('chat-foot').style.display = 'flex';
  await loadChat(uid, true);
  loadUsers();
}

async function loadChat(uid, scroll) {
  var r = await fetch(SB_URL + '/rest/v1/support_messages?user_id=eq.' + encodeURIComponent(uid) + '&order=created_at.asc&limit=200', { headers: HEADERS });
  if (!r.ok) return;
  var msgs = await r.json();
  var el = document.getElementById('chat-msgs');
  if (!msgs.length) { el.innerHTML = '<div style="text-align:center;padding:20px;font-size:12px;color:var(--muted);">대화 없음</div>'; return; }
  el.innerHTML = msgs.map(function(m) {
    var d = new Date(m.created_at);
    var t = (d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
    return '<div class="cm ' + m.sender + '">' + escHtml(m.content) + '<time>' + t + '</time></div>';
  }).join('');
  if (scroll) el.scrollTop = el.scrollHeight;
  await fetch(SB_URL + '/rest/v1/support_messages?user_id=eq.' + encodeURIComponent(uid) + '&sender=eq.user&read=eq.false', {
    method: 'PATCH', headers: Object.assign({}, HEADERS, {'Prefer':'return=minimal'}),
    body: JSON.stringify({ read: true })
  });
}

async function sendReply() {
  if (!currentUid) return;
  var input = document.getElementById('reply-input');
  var btn = document.getElementById('reply-btn');
  var text = (input.value || '').trim();
  if (!text) return;
  btn.disabled = true;
  input.value = '';
  var r = await fetch(SB_URL + '/rest/v1/support_messages', {
    method: 'POST', headers: Object.assign({}, HEADERS, {'Prefer':'return=minimal'}),
    body: JSON.stringify({ user_id: currentUid, sender: 'admin', content: text, read: false })
  });
  btn.disabled = false;
  if (r.ok) { await loadChat(currentUid, true); loadUsers(); }
}

document.addEventListener('keydown', function(e) {
  if (e.target.id === 'reply-input') {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
  }
});

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

checkAuth();
</script>
</body>
</html>
