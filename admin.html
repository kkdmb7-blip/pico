<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피드백 관리 · FORTUNA</title>
<meta name="theme-color" content="#f5efe4">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4ede0;
  --surface: #fcf7ea;
  --surface2: #ede4cf;
  --border: #c9bc9d;
  --border-soft: rgba(80,55,30,0.10);
  --text: #1a120a;
  --text2: #4a3a2a;
  --muted: #7a6850;
  --gold: #9a7a26;
  --gold-deep: #7a5e1c;
  --ink: #241a10;
  --shadow-soft: 0 1px 2px rgba(60,40,20,0.05), 0 4px 16px rgba(60,40,20,0.04);
  --good: #4a7a3a;
  --bad: #a94a3a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;
  padding-bottom:40px;
  -webkit-text-size-adjust:100%;
}
nav {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 20px; height:52px;
  border-bottom:1px solid var(--border-soft);
  position:sticky; top:0; z-index:100;
  background:rgba(244,237,224,0.92);
  backdrop-filter:blur(12px);
}
.logo-text {
  font-family:'Playfair Display','Noto Serif KR',serif;
  font-weight:700; font-size:14px; letter-spacing:0.28em;
  color:var(--gold-deep);
}
.back-btn {
  font-size:12px; color:var(--muted); text-decoration:none;
  background:none; border:none; cursor:pointer;
  padding:6px 10px; border-radius:8px;
}
.back-btn:hover { background:var(--surface2); color:var(--text); }

.wrap { max-width:980px; margin:0 auto; padding:22px 16px 60px; }
h2 {
  font-family:'Noto Serif KR',serif;
  font-size:15px; font-weight:700; color:var(--gold-deep);
  margin:24px 0 12px; letter-spacing:-0.01em;
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  flex-wrap:wrap;
}
h2:first-child { margin-top:0; }

/* 관리자 인증 */
.gate {
  max-width:420px; margin:60px auto; padding:28px 24px;
  background:var(--surface); border:1px solid var(--border-soft); border-radius:16px;
  box-shadow:var(--shadow-soft);
  text-align:center;
}
.gate h1 {
  font-family:'Noto Serif KR',serif; color:var(--gold-deep);
  font-size:17px; margin-bottom:14px;
}
.gate input {
  width:100%; padding:12px; border-radius:10px;
  background:#fff; border:1px solid var(--border-soft);
  color:var(--text); font-size:13px; margin-bottom:10px;
  font-family:monospace;
}
.gate button {
  width:100%; padding:12px; border-radius:10px;
  background:var(--gold-deep); color:#fcf7ea;
  border:none; cursor:pointer; font-weight:700; font-size:13px;
  letter-spacing:0.02em;
}
.gate .hint { font-size:11px; color:var(--muted); margin-top:12px; }

/* 카드 */
.card {
  background:var(--surface); border:1px solid var(--border-soft);
  border-radius:14px; padding:16px; margin-bottom:12px;
  box-shadow:var(--shadow-soft);
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.card > .loading, .card > .empty {
  padding:26px; text-align:center; color:var(--muted); font-size:12px;
}

/* 요약 통계 */
.summary-grid {
  display:grid; grid-template-columns:repeat(2, 1fr);
  gap:10px; margin-bottom:16px;
}
@media(min-width:560px) { .summary-grid { grid-template-columns:repeat(4, 1fr); } }
.stat {
  background:var(--surface); border:1px solid var(--border-soft);
  border-radius:12px; padding:12px 14px;
  box-shadow:var(--shadow-soft);
  min-width:0;
}
.stat .label {
  font-size:10px; color:var(--muted); margin-bottom:6px;
  text-transform:uppercase; letter-spacing:0.1em;
  font-family:'Playfair Display',serif;
}
.stat .value {
  font-size:22px; font-weight:700; color:var(--gold-deep);
  font-family:'Playfair Display','Noto Serif KR',serif;
  font-variant-numeric:lining-nums;
  line-height:1.1;
}
.stat .sub { font-size:10.5px; color:var(--muted); margin-top:4px; }

/* 테이블 */
table {
  width:100%; border-collapse:collapse;
  font-size:11.5px;
  min-width:520px;
}
th, td {
  padding:9px 10px; text-align:left;
  border-bottom:1px solid var(--border-soft);
  vertical-align:top;
}
th {
  background:var(--surface2); color:var(--gold-deep);
  font-weight:700; font-size:10px;
  text-transform:uppercase; letter-spacing:0.08em;
  font-family:'Playfair Display',serif;
  white-space:nowrap;
}
tbody tr:hover { background:rgba(154,122,38,0.05); }
td.rating-up { color:var(--good); font-weight:700; }
td.rating-down { color:var(--bad); font-weight:700; }

.pill {
  display:inline-block; padding:3px 9px; border-radius:999px;
  font-size:10px; background:rgba(154,122,38,0.12); color:var(--gold-deep);
  border:1px solid rgba(154,122,38,0.28);
  white-space:nowrap;
}
.pill-chat { background:rgba(125,94,167,0.14); color:#6a4ea0; border-color:rgba(125,94,167,0.32); }
.pill-daily { background:rgba(74,122,58,0.14); color:var(--good); border-color:rgba(74,122,58,0.32); }

/* 필터 */
.filter {
  display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center;
}
.filter select, .filter button {
  padding:8px 12px; border-radius:10px;
  background:var(--surface); border:1px solid var(--border-soft);
  color:var(--text); font-size:12px; cursor:pointer;
  font-family:inherit;
}
.filter button.primary {
  background:var(--gold-deep); color:#fcf7ea;
  border-color:var(--gold-deep); font-weight:700;
  letter-spacing:0.02em;
}
.filter button:hover { opacity:0.88; }

/* 추이 막대 */
.daily-row {
  display:flex; align-items:center; gap:10px;
  font-size:11.5px; padding:4px 0;
}
.daily-row .day-label {
  width:78px; color:var(--muted); font-family:'Playfair Display',monospace;
  flex-shrink:0;
  font-variant-numeric:lining-nums;
}
.daily-row .bar {
  flex:1; height:16px; background:var(--surface2); border-radius:4px; overflow:hidden;
  display:flex; min-width:80px;
}
.daily-row .bar-up { background:var(--good); height:100%; }
.daily-row .bar-down { background:var(--bad); height:100%; }
.daily-row .count {
  width:96px; text-align:right; color:var(--muted); font-size:10.5px;
  flex-shrink:0;
  font-variant-numeric:lining-nums;
}

/* 코멘트 셀 */
td.comment {
  max-width:240px; min-width:140px; white-space:normal; word-break:break-word;
  color:var(--text2); line-height:1.5; font-size:11.5px;
}
td.reasons span {
  display:inline-block; padding:2px 7px; margin:1px;
  background:rgba(154,122,38,0.1); color:var(--gold-deep);
  border-radius:999px; font-size:10px;
}

.csv-btn {
  padding:6px 12px; border-radius:8px;
  background:var(--surface); border:1px solid var(--border-soft);
  color:var(--gold-deep); font-size:11.5px; cursor:pointer;
  font-family:inherit; font-weight:700;
}
.csv-btn:hover { background:var(--surface2); }

.del-btn {
  padding:4px 8px; border-radius:6px;
  background:rgba(169,74,58,0.1);
  border:1px solid rgba(169,74,58,0.35);
  color:var(--bad); font-size:10.5px; cursor:pointer;
  font-family:inherit; font-weight:600;
  white-space:nowrap;
}
.del-btn:hover { background:rgba(169,74,58,0.2); }

.time-cell { color:var(--muted); white-space:nowrap; font-size:10.5px; font-variant-numeric:lining-nums; }
.user-cell { color:var(--muted); font-family:monospace; font-size:10px; white-space:nowrap; }

.err-text { color:var(--bad); }
</style>
</head>
<body>

<nav>
  <span class="logo-text">FORTUNA · ADMIN</span>
  <a href="index.html?tab=mypage" class="back-btn">← 마이페이지</a>
</nav>

<div id="gateView" class="gate" style="display:none;">
  <h1>관리자 인증</h1>
  <input id="adminUuid" type="text" placeholder="관리자 UUID 입력" autocomplete="off">
  <button id="gateSubmit">접속</button>
  <div class="hint">권한이 없는 접근은 Worker에서 차단됩니다</div>
  <div id="gateError" class="err-text" style="font-size:11.5px; margin-top:10px;"></div>
</div>

<div id="mainView" class="wrap" style="display:none;">
  <h2>AI 피드백 대시보드</h2>

  <div id="summaryGrid" class="summary-grid"></div>

  <h2>소스 × 타입 집계</h2>
  <div id="statsTable" class="card"><div class="loading">불러오는 중...</div></div>

  <h2>일별 추이 (최근 30일)</h2>
  <div id="dailyTable" class="card"><div class="loading">불러오는 중...</div></div>

  <h2>
    <span>최근 피드백</span>
    <button class="csv-btn" id="csvBtn">CSV 내보내기</button>
  </h2>
  <div class="filter">
    <select id="fltSource">
      <option value="">전체 소스</option>
      <option value="report">report</option>
      <option value="chat">chat</option>
      <option value="daily_fortune">daily_fortune</option>
    </select>
    <select id="fltRating">
      <option value="">전체 평가</option>
      <option value="1">긍정</option>
      <option value="-1">부정</option>
    </select>
    <select id="fltLimit">
      <option value="50">50건</option>
      <option value="100" selected>100건</option>
      <option value="200">200건</option>
      <option value="500">500건</option>
    </select>
    <button class="primary" id="fltApply">새로고침</button>
  </div>
  <div id="recentTable" class="card"><div class="loading">불러오는 중...</div></div>
</div>

<script>
const API = 'https://fortuna.kkdmb7.workers.dev';
const LS_KEY = 'pico_admin_uuid';
let adminUuid = '';
let recentRows = [];

function qs(id){ return document.getElementById(id); }

async function fetchJson(path) {
  const res = await fetch(`${API}${path}${path.includes('?') ? '&' : '?'}admin=${encodeURIComponent(adminUuid)}`);
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
  return json;
}

function pillClass(source) {
  if (source === 'chat') return 'pill pill-chat';
  if (source === 'daily_fortune') return 'pill pill-daily';
  return 'pill';
}

function fmtDate(s) {
  if (!s) return '-';
  const d = new Date(s);
  return d.toLocaleString('ko-KR', { year:'2-digit', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
}

async function loadStats() {
  try {
    const { rows } = await fetchJson('/feedback-stats');
    if (!rows || !rows.length) {
      qs('statsTable').innerHTML = '<div class="empty">아직 피드백이 없어요</div>';
      qs('summaryGrid').innerHTML = '';
      return;
    }
    let totalUp = 0, totalDown = 0, sources = new Set();
    rows.forEach(r => { totalUp += (r.positive||0); totalDown += (r.negative||0); sources.add(r.source); });
    const total = totalUp + totalDown;
    const score = total ? Math.round((totalUp / total) * 100) : 0;
    qs('summaryGrid').innerHTML = `
      <div class="stat"><div class="label">Total</div><div class="value">${total.toLocaleString()}</div><div class="sub">소스 ${sources.size}종</div></div>
      <div class="stat"><div class="label">긍정</div><div class="value" style="color:var(--good);">${totalUp.toLocaleString()}</div></div>
      <div class="stat"><div class="label">부정</div><div class="value" style="color:var(--bad);">${totalDown.toLocaleString()}</div></div>
      <div class="stat"><div class="label">긍정률</div><div class="value">${score}%</div></div>
    `;
    const headers = ['소스','타입','긍정','부정','긍정률','최근'];
    const trs = rows.map(r => {
      const rate = r.positive_rate_pct != null ? Math.round(r.positive_rate_pct) : 0;
      return `<tr>
        <td><span class="${pillClass(r.source)}">${r.source}</span></td>
        <td>${r.source_type || '-'}</td>
        <td class="rating-up">${r.positive||0}</td>
        <td class="rating-down">${r.negative||0}</td>
        <td>${rate}%</td>
        <td class="time-cell">${fmtDate(r.last_at)}</td>
      </tr>`;
    }).join('');
    qs('statsTable').innerHTML = `<table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${trs}</tbody></table>`;
  } catch(e) {
    qs('statsTable').innerHTML = `<div class="empty err-text">오류: ${e.message}</div>`;
  }
}

async function loadDaily() {
  try {
    const { rows } = await fetchJson('/feedback-daily');
    if (!rows || !rows.length) {
      qs('dailyTable').innerHTML = '<div class="empty">추이 데이터 없음</div>';
      return;
    }
    const byDay = {};
    rows.forEach(r => {
      const d = String(r.day).slice(0, 10);
      if (!byDay[d]) byDay[d] = { up:0, down:0 };
      byDay[d].up += (r.positive||0);
      byDay[d].down += (r.negative||0);
    });
    const days = Object.keys(byDay).sort().reverse().slice(0, 30);
    const maxTotal = Math.max(1, ...days.map(d => byDay[d].up + byDay[d].down));
    const html = days.map(d => {
      const o = byDay[d];
      const upPct = (o.up / maxTotal) * 100;
      const dnPct = (o.down / maxTotal) * 100;
      return `<div class="daily-row">
        <div class="day-label">${d}</div>
        <div class="bar">
          <div class="bar-up" style="width:${upPct}%;"></div>
          <div class="bar-down" style="width:${dnPct}%;"></div>
        </div>
        <div class="count">↑${o.up} · ↓${o.down}</div>
      </div>`;
    }).join('');
    qs('dailyTable').innerHTML = html;
  } catch(e) {
    qs('dailyTable').innerHTML = `<div class="empty err-text">오류: ${e.message}</div>`;
  }
}

async function loadRecent() {
  try {
    const src = qs('fltSource').value;
    const rtg = qs('fltRating').value;
    const lim = qs('fltLimit').value;
    let q = `/feedback-recent?limit=${lim}`;
    if (src) q += `&source=${encodeURIComponent(src)}`;
    if (rtg) q += `&rating=${encodeURIComponent(rtg)}`;
    qs('recentTable').innerHTML = '<div class="loading">불러오는 중...</div>';
    const { rows } = await fetchJson(q);
    recentRows = rows || [];
    if (!rows || !rows.length) {
      qs('recentTable').innerHTML = '<div class="empty">조건에 맞는 피드백이 없어요</div>';
      return;
    }
    const trs = rows.map(r => {
      const rs = Array.isArray(r.reasons) ? r.reasons : [];
      const reasonsHtml = rs.map(x => `<span>${escapeHtml(x)}</span>`).join('');
      return `<tr data-id="${escapeHtml(r.id)}">
        <td class="time-cell">${fmtDate(r.created_at)}</td>
        <td><span class="${pillClass(r.source)}">${r.source}</span></td>
        <td>${r.source_type || '-'}</td>
        <td class="${r.rating === 1 ? 'rating-up' : 'rating-down'}">${r.rating === 1 ? '↑' : '↓'}</td>
        <td class="reasons">${reasonsHtml || '<span style="color:var(--muted); background:none; border:none; padding:0;">-</span>'}</td>
        <td class="comment">${escapeHtml(r.comment || '') || '<span style="color:var(--muted);">-</span>'}</td>
        <td class="user-cell">${(r.user_id||'').slice(0,16)}</td>
        <td><button class="del-btn" data-id="${escapeHtml(r.id)}">삭제</button></td>
      </tr>`;
    }).join('');
    qs('recentTable').innerHTML = `<table><thead><tr>
      <th>시각</th><th>소스</th><th>타입</th><th>평가</th><th>이유</th><th>코멘트</th><th>유저</th><th></th>
    </tr></thead><tbody>${trs}</tbody></table>`;
    qs('recentTable').querySelectorAll('.del-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('이 피드백을 삭제할까요?')) return;
        const id = btn.getAttribute('data-id');
        btn.disabled = true; btn.textContent = '삭제중...';
        try {
          const res = await fetch(`${API}/feedback-row?admin=${encodeURIComponent(adminUuid)}&id=${encodeURIComponent(id)}`, { method:'DELETE' });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || 'delete failed');
          btn.closest('tr').remove();
          loadStats(); loadDaily();
        } catch(e) {
          alert('삭제 실패: ' + e.message);
          btn.disabled = false; btn.textContent = '삭제';
        }
      });
    });
  } catch(e) {
    qs('recentTable').innerHTML = `<div class="empty err-text">오류: ${e.message}</div>`;
  }
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function exportCsv() {
  if (!recentRows.length) { alert('내보낼 데이터가 없어요'); return; }
  const headers = ['created_at','source','source_type','source_id','rating','reasons','comment','user_id','client'];
  const escape = v => {
    if (v == null) return '';
    const s = typeof v === 'object' ? JSON.stringify(v) : String(v);
    return '"' + s.replace(/"/g,'""') + '"';
  };
  const lines = [headers.join(',')].concat(
    recentRows.map(r => headers.map(h => escape(r[h])).join(','))
  );
  const blob = new Blob(['\uFEFF' + lines.join('\r\n')], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `feedback_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

async function boot() {
  adminUuid = localStorage.getItem(LS_KEY) || '';
  if (!adminUuid) {
    qs('gateView').style.display = 'block';
    return;
  }
  try {
    await fetchJson('/feedback-stats');
  } catch(e) {
    localStorage.removeItem(LS_KEY);
    adminUuid = '';
    qs('gateView').style.display = 'block';
    qs('gateError').textContent = '인증 실패: ' + e.message;
    return;
  }
  qs('mainView').style.display = 'block';
  loadStats();
  loadDaily();
  loadRecent();
}

qs('gateSubmit').addEventListener('click', async () => {
  const v = (qs('adminUuid').value || '').trim();
  if (!v) return;
  adminUuid = v;
  try {
    await fetchJson('/feedback-stats');
    localStorage.setItem(LS_KEY, adminUuid);
    qs('gateView').style.display = 'none';
    qs('mainView').style.display = 'block';
    loadStats(); loadDaily(); loadRecent();
  } catch(e) {
    qs('gateError').textContent = '인증 실패: ' + e.message;
    adminUuid = '';
  }
});
qs('adminUuid')?.addEventListener('keydown', e => { if (e.key === 'Enter') qs('gateSubmit').click(); });
qs('fltApply').addEventListener('click', loadRecent);
qs('csvBtn').addEventListener('click', exportCsv);

boot();
</script>
</body>
</html>
