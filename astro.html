<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서양 점성술 출생 차트 · PICO Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #7b5ea7;
    --accent2: #e8b86d;
    --text: #f0f0f5;
    --muted: #6b6b85;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }
  #starCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute; background: #fff; border-radius: 50%; opacity: 0;
    animation: twinkle var(--dur,3s) ease-in-out infinite;
    animation-delay: var(--delay,0s);
  }
  @keyframes twinkle {
    0%,100% { opacity:0; transform:scale(0.4); }
    50% { opacity:var(--max-op,0.7); transform:scale(1); }
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-family: 'Noto Serif KR', serif;
    font-weight: 700; font-size: 22px;
    letter-spacing: -0.5px; color: var(--text);
    text-decoration: none; display: flex; align-items: center; gap: 5px;
  }
  .logo-dot { color: var(--accent2); font-size: 10px; margin-bottom: 2px; }
  .nav-btn {
    padding: 8px 18px; border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    background: linear-gradient(135deg, var(--accent), #a07fd4);
    color: #fff; border: none; font-family: 'Noto Sans KR', sans-serif;
    text-decoration: none; transition: all 0.2s; white-space: nowrap;
  }
  .nav-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(123,94,167,0.4); }

  /* MAIN */
  .main {
    position: relative; z-index: 1;
    max-width: 860px; margin: 0 auto;
    padding: 40px 20px 80px;
  }
  .page-title {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 700; text-align: center;
    margin-bottom: 6px; letter-spacing: -0.5px;
  }
  .page-title em { font-style: normal; color: var(--accent2); }
  .page-sub { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 32px; }

  /* STATUS */
  .status-msg {
    text-align: center; padding: 48px 24px;
    color: var(--muted); font-size: 15px; display: none;
  }
  .status-msg.visible { display: block; }
  .status-msg.err { color: #FF1744; }
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SECTION CARD */
  .section-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px;
    margin-bottom: 16px; display: none;
  }
  .section-card.visible { display: block; }
  .section-label {
    font-size: 11px; color: var(--muted); letter-spacing: 0.5px;
    text-transform: uppercase; font-weight: 600; margin-bottom: 16px;
  }

  /* BIG 3 */
  .big3-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .big3-card {
    border-radius: 12px; padding: 16px 12px;
    display: flex; flex-direction: column; align-items: center;
    gap: 8px; border: 1.5px solid;
    text-align: center;
  }
  .big3-icon { font-size: 22px; }
  .big3-role { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
  .big3-sym { font-size: 28px; line-height: 1; }
  .big3-sign {
    font-family: 'Noto Serif KR', serif;
    font-size: 17px; font-weight: 700; line-height: 1.2;
  }
  .big3-deg { font-size: 11px; color: var(--muted); }

  /* PLANET TABLE */
  .planet-table { width: 100%; border-collapse: collapse; }
  .planet-table th {
    font-size: 10px; color: var(--muted); font-weight: 700;
    letter-spacing: 0.5px; text-transform: uppercase;
    text-align: left; padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .planet-table td {
    padding: 10px 12px; font-size: 14px;
    border-bottom: 1px solid rgba(42,42,61,0.5);
    vertical-align: middle;
  }
  .planet-table tr:last-child td { border-bottom: none; }
  .planet-name { display: flex; align-items: center; gap: 6px; font-weight: 600; }
  .sign-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 6px; font-size: 12px;
    font-weight: 700; border: 1px solid;
  }
  .retro-badge {
    font-size: 10px; color: #FF6D00;
    background: rgba(255,109,0,0.1); border: 1px solid rgba(255,109,0,0.3);
    padding: 1px 5px; border-radius: 4px;
  }

  /* ASPECTS */
  .aspect-list { display: flex; flex-direction: column; gap: 8px; }
  .aspect-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 10px;
    background: var(--surface2); font-size: 13px;
  }
  .aspect-benefic { border-left: 3px solid #00C853; }
  .aspect-malefic { border-left: 3px solid #FF6D00; }
  .aspect-type {
    font-size: 11px; font-weight: 700; padding: 2px 7px;
    border-radius: 5px; white-space: nowrap;
  }
  .asp-好 { background: rgba(0,200,83,0.12); color:#00C853; border:1px solid rgba(0,200,83,0.25); }
  .asp-凶 { background: rgba(255,109,0,0.12); color:#FF6D00; border:1px solid rgba(255,109,0,0.25); }
  .aspect-planets { flex: 1; font-weight: 600; }
  .aspect-orb { font-size: 11px; color: var(--muted); white-space: nowrap; }

  /* INTERPRETATION CARDS */
  .interp-tabs { display: flex; gap: 0; margin-bottom: 16px;
    background: var(--surface2); border-radius: 10px; padding: 4px;
    border: 1px solid var(--border); width: fit-content; flex-wrap: wrap; }
  .interp-tab {
    padding: 7px 16px; border-radius: 7px; border: none; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 600;
    background: transparent; color: var(--muted); transition: all 0.2s; white-space: nowrap;
  }
  .interp-tab.active {
    background: linear-gradient(135deg, var(--accent), #a07fd4);
    color: #fff; box-shadow: 0 2px 8px rgba(123,94,167,0.4);
  }
  .interp-tab:hover:not(.active) { color: var(--text); }
  .interp-panel { display: none; }
  .interp-panel.active { display: block; }
  .interp-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
  }
  .interp-sign-sym {
    font-size: 36px; line-height: 1; width: 56px; height: 56px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 12px; border: 1.5px solid; flex-shrink: 0;
  }
  .interp-sign-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px; font-weight: 700; margin-bottom: 2px;
  }
  .interp-sign-role { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .interp-text { font-size: 14px; color: var(--text); line-height: 1.8; }
  .interp-aspects { display: flex; flex-direction: column; gap: 10px; }
  .interp-asp-row {
    padding: 12px 14px; border-radius: 10px;
    background: var(--surface2); border-left: 3px solid;
    font-size: 13px; line-height: 1.7;
  }
  .interp-asp-title { font-weight: 700; margin-bottom: 4px; font-size: 14px; }

  /* PAID / ACTION */
  .paid-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap; opacity: 0.75; margin-bottom: 12px;
  }
  .paid-left { display: flex; flex-direction: column; gap: 4px; }
  .paid-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .paid-desc { font-size: 12px; color: var(--muted); }
  .btn-paid {
    display: inline-flex; flex-direction: column; align-items: center;
    padding: 10px 20px; border-radius: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; font-weight: 700; white-space: nowrap;
  }
  .btn-memox {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 13px 32px; border-radius: 14px;
    background: linear-gradient(135deg, var(--accent2), #c9914a);
    color: #000; border: none; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; font-weight: 700; text-decoration: none;
    transition: all 0.2s;
  }
  .btn-memox:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(232,184,109,0.35); }
  .action-row {
    display: none; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 8px;
  }
  .action-row.visible { display: flex; }

  /* ELEMENT COLORS */
  .el-화 { color:#FF6B6B; border-color:rgba(255,107,107,0.4); background:rgba(255,107,107,0.07); }
  .el-지 { color:#A8D5A2; border-color:rgba(168,213,162,0.4); background:rgba(168,213,162,0.07); }
  .el-풍 { color:#FFE66D; border-color:rgba(255,230,109,0.4); background:rgba(255,230,109,0.07); }
  .el-수 { color:#74B9FF; border-color:rgba(116,185,255,0.4); background:rgba(116,185,255,0.07); }

  @media (max-width: 600px) {
    .big3-grid { grid-template-columns: repeat(3,1fr); gap: 8px; }
    .big3-sign { font-size: 14px; }
    .big3-sym { font-size: 22px; }
    .planet-table td, .planet-table th { padding: 8px 8px; font-size: 12px; }
    .interp-tabs { gap: 0; }
    .interp-tab { padding: 6px 10px; font-size: 12px; }
  }
</style>
</head>
<body>
<div id="starCanvas"></div>

<nav>
  <a href="/" class="logo">PICO<span class="logo-dot">●</span>Lab</a>
  <a href="https://kkdmb7-blip.github.io/memox/?mode=astro" target="_blank" class="nav-btn">AI 점성 상담</a>
</nav>

<div id="profile-bar-root"></div>
<script src="profile-bar.js"></script>

<main class="main">
  <h1 class="page-title">서양 <em>점성술</em> 출생 차트</h1>
  <p class="page-sub" id="page-sub">생년월일을 기반으로 행성 배치를 분석합니다</p>

  <div class="status-msg" id="status"><span class="spinner"></span>출생 차트 계산 중…</div>

  <!-- BIG 3 -->
  <div class="section-card" id="card-big3">
    <div class="section-label">핵심 3요소</div>
    <div class="big3-grid" id="big3-grid"></div>
  </div>

  <!-- PLANET TABLE -->
  <div class="section-card" id="card-planets">
    <div class="section-label">전체 행성 배치</div>
    <table class="planet-table">
      <thead>
        <tr>
          <th>행성</th>
          <th>별자리</th>
          <th>도수</th>
          <th>하우스</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="planet-tbody"></tbody>
    </table>
  </div>

  <!-- ASPECTS -->
  <div class="section-card" id="card-aspects">
    <div class="section-label">주요 어스펙트</div>
    <div class="aspect-list" id="aspect-list"></div>
  </div>

  <!-- INTERPRETATION -->
  <div class="section-card" id="card-interp">
    <div class="section-label">현대어 해석</div>
    <div class="interp-tabs">
      <button class="interp-tab active" onclick="showInterpTab('sun')">☀️ 태양궁</button>
      <button class="interp-tab" onclick="showInterpTab('moon')">🌙 달궁</button>
      <button class="interp-tab" onclick="showInterpTab('asc')">↑ 상승궁</button>
      <button class="interp-tab" onclick="showInterpTab('asp')">⚡ 어스펙트</button>
    </div>
    <div id="interp-sun"  class="interp-panel active"></div>
    <div id="interp-moon" class="interp-panel"></div>
    <div id="interp-asc"  class="interp-panel"></div>
    <div id="interp-asp"  class="interp-panel"></div>
  </div>

  <!-- PAID + ACTION -->
  <div class="section-card" id="card-action">
    <div class="paid-card">
      <div class="paid-left">
        <div class="paid-title">🔒 AI 심층 분석</div>
        <div class="paid-desc">출생 차트 전체 해설 · 현재 운행 분석 · 미래 타이밍 · 맞춤 조언</div>
      </div>
      <button class="btn-paid" onclick="alert('AI 심층 분석은 곧 오픈됩니다! 🔮')">
        🔒 AI 정밀 해석 받기 🔮<br>
        <span style="font-size:10px;font-weight:400;opacity:0.7">질문권 1개 사용</span>
      </button>
    </div>
  </div>

  <div class="action-row" id="action-row">
    <a href="https://kkdmb7-blip.github.io/memox/?mode=astro" target="_blank" class="btn-memox">
      ✦ AI 점성 상담하기
    </a>
  </div>
</main>

<script>

// ── 12궁 해석 ─────────────────────────────────────────────
const SUN_INTERP = {
  Aries:'개척자 기질. 에너지 넘치는 선구자로 도전을 즐기고 행동이 빠릅니다. 순간 판단력이 탁월하며 주도권을 쥐는 것을 좋아합니다.',

const MOON_INTERP = {
  Aries:'감정이 즉각적이고 강렬합니다. 빠르게 불붙고 빠르게 식는 열정형. 화가 나도 금방 회복하는 회복탄력성이 강점입니다.',

function getAspectInterp(p1, p2, type) {
  const key = p1 + '_' + p2;
  const key2 = p2 + '_' + p1;
  const map = ASPECT_PLANET_INTERP[key] || ASPECT_PLANET_INTERP[key2];
  if (map && map[type]) return map[type];
  const generic = {
    Conjunction: '두 행성의 에너지가 강하게 융합되어 해당 영역에서 강렬한 힘을 발휘합니다.',
    Trine: '두 에너지가 자연스럽게 흐르며 재능과 행운을 가져다 줍니다.',
    Sextile: '부드러운 협력 에너지. 노력하면 좋은 결과를 얻을 수 있습니다.',
    Square: '긴장과 도전. 갈등을 극복하며 성장하는 과제를 안겨줍니다.',
    Opposition: '양극의 에너지 사이에서 균형을 요구합니다. 통합이 이뤄지면 강해집니다.'
  };
  return generic[type] || '';
}

// ── UI helpers ────────────────────────────────────────────
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}
function setVisible(id, v) {
  document.getElementById(id).classList.toggle('visible', v);
}
function elClass(sign) {
  return 'el-' + (SIGN_EL[sign] || '풍');
}

function showInterpTab(tab) {
  document.querySelectorAll('.interp-tab').forEach((b,i) => {
    const tabs = ['sun','moon','asc','asp'];
    b.classList.toggle('active', tabs[i] === tab);
  });
  ['sun','moon','asc','asp'].forEach(t => {
    document.getElementById('interp-' + t).classList.toggle('active', t === tab);
  });
}

// ── RENDER ────────────────────────────────────────────────
function renderBig3(planets) {
  const get = name => planets.find(p => p.name === name);
  const sun = get('Sun'), moon = get('Moon'), asc = get('Ascendant');
  const items = [
    { icon:'☀️', role:'태양궁', p: sun },
    { icon:'🌙', role:'달궁',   p: moon },
    { icon:'↑',  role:'상승궁', p: asc },
  ];
  const grid = document.getElementById('big3-grid');
  grid.innerHTML = '';
  items.forEach(({ icon, role, p }) => {
    if (!p) return;
    const ec = elClass(p.sign);
    const card = el('div', 'big3-card ' + ec);
    card.innerHTML =
      '<div class="big3-icon">' + icon + '</div>' +
      '<div class="big3-role">' + role + '</div>' +
      '<div class="big3-sym">' + (SIGN_SYM[p.sign] || '') + '</div>' +
      '<div class="big3-sign">' + (SIGN_KO[p.sign] || p.sign) + '</div>' +
      '<div class="big3-deg">' + p.normDegree.toFixed(1) + '°</div>';
    grid.appendChild(card);
  });
}

function renderPlanets(planets) {
  const tbody = document.getElementById('planet-tbody');
  tbody.innerHTML = '';
  const order = ['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Ascendant','Midheaven'];
  order.forEach(name => {
    const p = planets.find(x => x.name === name);
    if (!p) return;
    const ec = elClass(p.sign);
    const tr = el('tr');
    tr.innerHTML =
      '<td><span class="planet-name">' + (PLANET_ICON[name] || '') + ' ' + (PLANET_KO[name] || name) + '</span></td>' +
      '<td><span class="sign-chip ' + ec + '">' + (SIGN_SYM[p.sign]||'') + ' ' + (SIGN_KO[p.sign]||p.sign) + '</span></td>' +
      '<td>' + p.normDegree.toFixed(2) + '°</td>' +
      '<td>' + (p.house != null ? p.house + '하우스' : '—') + '</td>' +
      '<td>' + (p.isRetro === 'true' ? '<span class="retro-badge">역행 Rx</span>' : '') + '</td>';
    tbody.appendChild(tr);
  });
}

function renderAspects(aspects) {
  const list = document.getElementById('aspect-list');
  list.innerHTML = '';
  // 상위 12개만 표시 (orb 순)
  const sorted = [...aspects].sort((a,b) => a.orb - b.orb).slice(0,12);
  sorted.forEach(a => {
    const benefic = a.isBenefic;
    const row = el('div', 'aspect-row ' + (benefic ? 'aspect-benefic' : 'aspect-malefic'));
    row.innerHTML =
      '<span class="aspect-type ' + (benefic ? 'asp-好' : 'asp-凶') + '">' + (ASPECT_KO[a.type] || a.type) + '</span>' +
      '<span class="aspect-planets">' + (PLANET_KO[a.planet1]||a.planet1) + ' × ' + (PLANET_KO[a.planet2]||a.planet2) + '</span>' +
      '<span class="aspect-orb">orb ' + a.orb + '°</span>';
    list.appendChild(row);
  });
  if (sorted.length === 0) list.innerHTML = '<div style="color:var(--muted);font-size:14px;padding:12px">분석된 어스펙트가 없습니다.</div>';
}

function renderInterpPanel(id, sign, title, interps) {
  const panel = document.getElementById(id);
  const ec = elClass(sign);
  panel.innerHTML =
    '<div class="interp-header">' +
      '<div class="interp-sign-sym ' + ec + '">' + (SIGN_SYM[sign]||'✦') + '</div>' +
      '<div><div class="interp-sign-name">' + (SIGN_KO[sign]||sign) + '</div>' +
      '<div class="interp-sign-role">' + title + '</div></div>' +
    '</div>' +
    '<div class="interp-text">' + (interps[sign] || '해당 별자리 해석을 준비 중입니다.') + '</div>';
}

function renderInterpAspects(aspects, planets) {
  const panel = document.getElementById('interp-asp');
  const sorted = [...aspects].sort((a,b) => a.orb - b.orb).slice(0,6);
  if (sorted.length === 0) {
    panel.innerHTML = '<div style="color:var(--muted);font-size:14px">주요 어스펙트가 없습니다.</div>';
    return;
  }
  const rows = sorted.map(a => {
    const benefic = a.isBenefic;
    const text = getAspectInterp(a.planet1, a.planet2, a.type);
    return '<div class="interp-asp-row" style="border-color:' + (benefic ? '#00C853' : '#FF6D00') + '">' +
      '<div class="interp-asp-title">' + (ASPECT_KO[a.type]||a.type) + ' — ' +
      (PLANET_KO[a.planet1]||a.planet1) + ' × ' + (PLANET_KO[a.planet2]||a.planet2) +
      ' (orb ' + a.orb + '°)</div>' +
      '<div>' + text + '</div></div>';
  });
  panel.innerHTML = '<div class="interp-aspects">' + rows.join('') + '</div>';
}

// ── FETCH ─────────────────────────────────────────────────
async function loadChart(year, month, day, hour, min) {
  const status = document.getElementById('status');
  status.className = 'status-msg visible';
  status.innerHTML = '<span class="spinner"></span>출생 차트 계산 중…';

  const body = { year, month, day, hour, min, lat: 37.5665, lon: 126.978, tzone: 9.0 };
  const opts = {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  };

  try {
    const [planetsRes, aspectsRes] = await Promise.allSettled([
      fetch('https://fortuna.kkdmb7.workers.dev/astro', opts),
      fetch('https://fortuna.kkdmb7.workers.dev/astro/aspects', opts)
    ]);

    if (planetsRes.status === 'rejected' || !planetsRes.value.ok) throw new Error('행성 데이터 로드 실패');
    const planets = await planetsRes.value.json();

    let aspects = [];
    if (aspectsRes.status === 'fulfilled' && aspectsRes.value.ok) {
      try { aspects = await aspectsRes.value.json(); } catch(e) {}
    }

    status.className = 'status-msg';

    // render
    renderBig3(planets);
    setVisible('card-big3', true);
    renderPlanets(planets);
    setVisible('card-planets', true);
    renderAspects(aspects);
    setVisible('card-aspects', true);

    // interpretations
    const get = name => (planets.find(p => p.name === name) || {}).sign || '';
    const sunSign = get('Sun'), moonSign = get('Moon'), ascSign = get('Ascendant');
    renderInterpPanel('interp-sun', sunSign, '태양궁 · 핵심 성격', SUN_INTERP);
    renderInterpPanel('interp-moon', moonSign, '달궁 · 감정 패턴', MOON_INTERP);
    renderInterpPanel('interp-asc', ascSign, '상승궁 · 외적 인상', ASC_INTERP);
    renderInterpAspects(aspects, planets);
    setVisible('card-interp', true);

    setVisible('card-action', true);
    setVisible('action-row', true);

  } catch(e) {
    status.className = 'status-msg visible err';
    status.textContent = '차트 로드 오류: ' + e.message;
  }
}

// ── STARS ─────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('starCanvas');
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2 + 1;
    s.style.cssText = [
      'width:' + sz + 'px', 'height:' + sz + 'px',
      'left:' + (Math.random() * 100) + '%',
      'top:' + (Math.random() * 100) + '%',
      '--dur:' + (2 + Math.random() * 4) + 's',
      '--delay:' + (Math.random() * 5) + 's',
      '--max-op:' + (0.3 + Math.random() * 0.5)
    ].join(';');
    canvas.appendChild(s);
  }
})();

// ── INIT ──────────────────────────────────────────────────
(function() {
  const p = new URLSearchParams(location.search);
  const year   = parseInt(p.get('year'));
  const month  = parseInt(p.get('month'));
  const day    = parseInt(p.get('day'));
  const hourRaw = p.get('hour');
  const hour   = (hourRaw && hourRaw !== 'unknown') ? parseInt(hourRaw) : 12;
  const min    = parseInt(p.get('minute') || p.get('min') || '0');

  if (!year || !month || !day) {
    const s = document.getElementById('status');
    s.className = 'status-msg visible err';
    s.textContent = 'URL에 생년월일 파라미터가 없습니다. (year, month, day 필수)';
    return;
  }

  document.getElementById('page-sub').textContent =
    year + '년 ' + month + '월 ' + day + '일 ' +
    (hourRaw && hourRaw !== 'unknown' ? String(hour).padStart(2,'0') + ':' + String(min).padStart(2,'0') : '시간 미상') +
    ' 출생 차트';

  loadChart(year, month, day, hour, min);
})();
</script>
