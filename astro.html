<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서양 점성술 출생 차트 · FORTUNA</title>
<meta name="theme-color" content="#f5efe4">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<link rel="stylesheet" href="pico-icons.css">
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #f4ede0;
    --surface: #f9f1de;
    --surface2: #e8dcc0;
    --border: #9a8a60;
    --border-soft: rgba(60,40,20,0.22);
    --accent: #7a2418;
    --accent2: #2a1f1a;
    --text: #1a120a;
    --text2: #4a3a2a;
    --muted: #5a4830;
    --gold: #8a6a15;
    --gold-deep: #6a4f0c;
    --ink: #241a10;
    --orb: #5f8cb5;
    --orb-bg: rgba(122,196,255,0.12);
    --orb-border: rgba(95,140,181,0.30);
    --radius: 16px;
    --shadow-soft: 0 1px 3px rgba(60,40,20,0.08), 0 6px 20px rgba(60,40,20,0.07);
    --shadow-lift: 0 3px 8px rgba(60,40,20,0.12), 0 14px 36px rgba(60,40,20,0.14);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.25;
  }
  #starCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute; background: var(--gold); border-radius: 50%; opacity: 0;
    animation: twinkle var(--dur,3s) ease-in-out infinite;
    animation-delay: var(--delay,0s);
  }
  @keyframes twinkle {
    0%,100% { opacity:0; transform:scale(0.4); }
    50% { opacity:var(--max-op,0.7); transform:scale(1); }
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(252,247,234,0.88);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { display:flex; align-items:center; gap:8px; text-decoration:none; }
  .logo img { height:40px; object-fit:contain; filter:drop-shadow(0 2px 6px rgba(60,30,10,0.35)) brightness(0.78); }
  .logo-text { font-family:'Noto Serif KR',serif; font-weight:700; font-size:15px; letter-spacing:2px; color:var(--accent); }
  .nav-btn {
    padding: 8px 18px; border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    background: linear-gradient(135deg, var(--accent), #5a1810);
    color: #fcf7ea; border: none; font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif;
    text-decoration: none; transition: all 0.2s; white-space: nowrap;
  }
  .nav-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-lift); }

  /* MAIN */
  .main {
    position: relative; z-index: 1;
    max-width: 860px; margin: 0 auto;
    padding: 40px 20px 80px;
  }
  .page-title {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 700; text-align: center;
    margin-bottom: 6px; letter-spacing: -0.5px;
  }
  .page-title em { font-style: normal; color: var(--accent); }
  .page-sub { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 32px; }

  /* STATUS */
  .status-msg {
    text-align: center; padding: 48px 24px;
    color: var(--muted); font-size: 15px; display: none;
  }
  .status-msg.visible { display: block; }
  .status-msg.err { color: #b02a1a; }
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SECTION CARD */
  .section-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px;
    margin-bottom: 16px; display: none;
    box-shadow: var(--shadow-soft);
  }
  .section-card.visible { display: block; }
  .section-label {
    font-size: 11px; color: var(--muted); letter-spacing: 0.5px;
    text-transform: uppercase; font-weight: 600; margin-bottom: 16px;
  }

  /* BIG 3 */
  .big3-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .big3-card {
    border-radius: 12px; padding: 16px 12px;
    display: flex; flex-direction: column; align-items: center;
    gap: 8px; border: 1.5px solid;
    text-align: center;
  }
  .big3-icon { font-size: 22px; }
  .big3-role { font-size: 10px; color: var(--muted); font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
  .big3-sym { font-size: 28px; line-height: 1; }
  .big3-sign {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px; font-weight: 700; line-height: 1.2;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 100%;
  }
  .big3-deg { font-size: 11px; color: var(--muted); }

  /* PLANET TABLE */
  .planet-table { width: 100%; border-collapse: collapse; }
  .planet-table th {
    font-size: 10px; color: var(--muted); font-weight: 700;
    letter-spacing: 0.5px; text-transform: uppercase;
    text-align: left; padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .planet-table td {
    padding: 10px 12px; font-size: 14px;
    border-bottom: 1px solid rgba(80,55,30,0.10);
    vertical-align: middle; white-space: nowrap;
  }
  .planet-table tr:last-child td { border-bottom: none; }
  .planet-name { display: flex; align-items: center; gap: 6px; font-weight: 600; }
  .sign-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 6px; font-size: 12px;
    font-weight: 700; border: 1px solid; white-space: nowrap;
  }
  .retro-badge {
    font-size: 10px; color: #b55400;
    background: rgba(255,109,0,0.1); border: 1px solid rgba(255,109,0,0.3);
    padding: 1px 5px; border-radius: 4px;
  }

  /* ASPECTS */
  .aspect-list { display: flex; flex-direction: column; gap: 8px; }
  .aspect-row {
    display: grid;
    grid-template-columns: 46px 1fr 58px;
    align-items: center; gap: 8px;
    padding: 10px 14px; border-radius: 10px;
    background: var(--surface2); font-size: 13px;
  }
  .aspect-benefic { border-left: 3px solid #00C853; }
  .aspect-malefic { border-left: 3px solid #FF6D00; }
  .aspect-type {
    font-size: 11px; font-weight: 700; padding: 2px 7px;
    border-radius: 5px; white-space: nowrap; text-align: center;
  }
  .asp-好 { background: rgba(0,200,83,0.12); color:#067d2c; border:1px solid rgba(0,200,83,0.25); }
  .asp-凶 { background: rgba(255,109,0,0.12); color:#b55400; border:1px solid rgba(255,109,0,0.25); }
  .aspect-planets { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .aspect-orb { font-size: 11px; color: var(--muted); white-space: nowrap; text-align: right; }

  /* INTERPRETATION CARDS */
  .interp-tabs { display: flex; gap: 0; margin-bottom: 16px;
    background: var(--surface2); border-radius: 10px; padding: 4px;
    border: 1px solid var(--border); width: fit-content; flex-wrap: wrap; }
  .interp-tab {
    padding: 7px 16px; border-radius: 7px; border: none; cursor: pointer;
    font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif; font-size: 13px; font-weight: 600;
    background: transparent; color: var(--muted); transition: all 0.2s; white-space: nowrap;
  }
  .interp-tab.active {
    background: linear-gradient(135deg, var(--accent), #5a1810);
    color: #fcf7ea; box-shadow: 0 2px 8px rgba(122,36,24,0.28);
  }
  .interp-tab:hover:not(.active) { color: var(--text); }
  .interp-panel { display: none; }
  .interp-panel.active { display: block; }
  .interp-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
  }
  .interp-sign-sym {
    font-size: 36px; line-height: 1; width: 56px; height: 56px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 12px; border: 1.5px solid; flex-shrink: 0;
  }
  .interp-sign-name {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px; font-weight: 700; margin-bottom: 2px;
  }
  .interp-sign-role { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .interp-text { font-size: 14px; color: var(--text); line-height: 1.8; }
  .interp-aspects { display: flex; flex-direction: column; gap: 10px; }
  .interp-asp-row {
    padding: 12px 14px; border-radius: 10px;
    background: var(--surface2); border-left: 3px solid;
    font-size: 13px; line-height: 1.7;
  }
  .interp-asp-title { font-weight: 700; margin-bottom: 4px; font-size: 14px; }

  /* PAID / ACTION */
  .paid-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap; opacity: 0.75; margin-bottom: 12px;
  }
  .paid-left { display: flex; flex-direction: column; gap: 4px; }
  .paid-title { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .paid-desc { font-size: 12px; color: var(--muted); }
  .btn-paid {
    display: inline-flex; flex-direction: column; align-items: center;
    padding: 10px 20px; border-radius: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif;
    font-size: 13px; font-weight: 700; white-space: nowrap;
  }
  .btn-memox {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 13px 32px; border-radius: 14px;
    background: linear-gradient(135deg, var(--gold), var(--gold-deep));
    color: #fcf7ea; border: none; cursor: pointer;
    font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif;
    font-size: 14px; font-weight: 700; text-decoration: none;
    transition: all 0.2s;
  }
  .btn-memox:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(154,122,38,0.28); }
  .action-row {
    display: none; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 8px;
  }
  .action-row.visible { display: flex; }

  /* ELEMENT COLORS */
  .el-화 { color:#b01a1a; border-color:rgba(255,107,107,0.4); background:rgba(255,107,107,0.07); }
  .el-지 { color:#2d8659; border-color:rgba(168,213,162,0.4); background:rgba(168,213,162,0.07); }
  .el-풍 { color:#8a6a15; border-color:rgba(255,230,109,0.4); background:rgba(255,230,109,0.07); }
  .el-수 { color:#1565c0; border-color:rgba(116,185,255,0.4); background:rgba(116,185,255,0.07); }

  @media (max-width: 600px) {
    .big3-grid { grid-template-columns: repeat(3,1fr); gap: 8px; }
    .big3-sign { font-size: 12px; }
    .big3-sym { font-size: 22px; }
    .planet-table td, .planet-table th { padding: 8px 8px; font-size: 12px; }
    .interp-tabs { gap: 0; }
    .interp-tab { padding: 6px 10px; font-size: 12px; }
  }
</style>
</head>
<body>
<div id="starCanvas"></div>

<nav>
  <a href="/" class="logo"><img src="img/goddess.png" alt="FORTUNA"><span class="logo-text">FORTUNA</span></a>
  <a href="https://kkdmb7-blip.github.io/memox/?mode=astro" target="_blank" class="nav-btn">AI 점성 상담</a>
</nav>

<div id="profile-bar-root"></div>
<script src="profile-bar.js"></script>

<main class="main">
  <h1 class="page-title">서양 <em>점성술</em> 출생 차트</h1>
  <p class="page-sub" id="page-sub">생년월일을 기반으로 행성 배치를 분석합니다</p>

  <div class="status-msg" id="status"><span class="spinner"></span>출생 차트 계산 중…</div>

  <!-- BIG 3 -->
  <div class="section-card" id="card-big3">
    <div class="section-label">핵심 3요소</div>

  </div>

  <!-- PLANET TABLE -->
  <div class="section-card" id="card-planets">
    <div class="section-label">전체 행성 배치</div>
    <table class="planet-table">
      <thead>
        <tr>
          <th>행성</th>
          <th>별자리</th>
          <th>도수</th>
          <th>하우스</th>
        </tr>
      </thead>
      <tbody id="planet-tbody"></tbody>
    </table>
  </div>

  <!-- ASPECTS -->
  <div class="section-card" id="card-aspects">
    <div class="section-label">주요 어스펙트</div>
    <div class="aspect-list" id="aspect-list"></div>
  </div>

  <!-- INTERPRETATION -->
  <div class="section-card" id="card-interp">

    <div class="interp-tabs">

      <button class="interp-tab" onclick="showInterpTab('asc')">↑ 상승궁</button>
      <button class="interp-tab" onclick="showInterpTab('asp')"><i class="pi pi-bolt"></i> 어스펙트</button>
    </div>
    <div id="interp-sun"  class="interp-panel active"></div>
    <div id="interp-moon" class="interp-panel"></div>
    <div id="interp-asc"  class="interp-panel"></div>
    <div id="interp-asp"  class="interp-panel"></div>
  </div>

  <!-- 리포트 훅 -->
  <div id="astroReportHook" style="display:none;padding:0 20px 10px;max-width:440px;margin:0 auto;">
    <a href="report.html?type=astro_full" style="display:block;padding:16px 20px;background:linear-gradient(135deg,rgba(122,196,255,0.12),rgba(100,160,255,0.08));border:1px solid rgba(122,196,255,0.35);border-radius:14px;text-decoration:none;text-align:center;transition:all 0.3s;" onmouseover="this.style.borderColor='rgba(122,196,255,0.7)';this.style.background='linear-gradient(135deg,rgba(122,196,255,0.22),rgba(100,160,255,0.15))'" onmouseout="this.style.borderColor='rgba(122,196,255,0.35)';this.style.background='linear-gradient(135deg,rgba(122,196,255,0.12),rgba(100,160,255,0.08))'">
      <div style="font-size:15px;font-weight:700;color:#1565c0;margin-bottom:4px;"><i class="pi pi-star"></i> 별이 말하는 나의 운명 →</div>
      <div style="font-size:11px;color:var(--muted);opacity:0.8;">AI가 읽어주는 나만의 점성술 심층 리포트</div>
    </a>
  </div>

  <div id="astroShareBtnWrap" style="display:none;padding:0 20px 36px;flex-direction:column;gap:10px;max-width:440px;margin:0 auto;">
    <button id="astroKakaoBtn" onclick="shareAstroKakao()" style="display:flex;align-items:center;gap:14px;width:100%;padding:14px 16px;background:rgba(161,109,31,0.10);border:1px solid rgba(161,109,31,0.28);border-radius:14px;text-align:left;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.06);font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif;transition:all 0.2s;box-sizing:border-box;">
      <i class="pi pi-star" style="font-size:20px;color:#a16d1f;flex-shrink:0;width:24px;text-align:center;"></i>
      <div><div style="font-size:13px;font-weight:700;color:#a16d1f;margin-bottom:2px;">카카오톡 공유</div><div style="font-size:11px;color:rgba(161,109,31,0.65);">내 점성술 결과를 친구에게 보내기</div></div>
      <div style="margin-left:auto;font-size:16px;color:rgba(161,109,31,0.30);">›</div>
    </button>
    <a href="https://kkdmb7-blip.github.io/memox/?mode=astro" target="_blank" style="display:flex;align-items:center;gap:14px;width:100%;padding:14px 16px;background:rgba(107,63,160,0.10);border:1px solid rgba(107,63,160,0.28);border-radius:14px;text-decoration:none;box-shadow:0 1px 4px rgba(0,0,0,0.06);box-sizing:border-box;transition:all 0.2s;">
      <i class="pi pi-sparkle" style="font-size:20px;color:#6b3fa0;flex-shrink:0;width:24px;text-align:center;"></i>
      <div><div style="font-size:13px;font-weight:700;color:#6b3fa0;margin-bottom:2px;">AI 점성 상담</div><div style="font-size:11px;color:rgba(107,63,160,0.65);">대화로 풀어보는 나만의 별자리 이야기</div></div>
      <div style="margin-left:auto;font-size:16px;color:rgba(107,63,160,0.30);">›</div>
    </a>
    <a href="counselor.html" style="display:flex;align-items:center;gap:14px;width:100%;padding:14px 16px;background:rgba(29,111,164,0.10);border:1px solid rgba(29,111,164,0.28);border-radius:14px;text-decoration:none;box-shadow:0 1px 4px rgba(0,0,0,0.06);box-sizing:border-box;transition:all 0.2s;">

      <div><div style="font-size:13px;font-weight:700;color:#1d6fa4;margin-bottom:2px;">전문 상담사 연결</div><div style="font-size:11px;color:rgba(29,111,164,0.65);">점성술 전문가와 1:1 깊은 상담</div></div>
      <div style="margin-left:auto;font-size:16px;color:rgba(29,111,164,0.30);">›</div>
    </a>
  </div>
  <div class="action-row" id="action-row"></div>
</main>

<script>
// ── 데이터 ────────────────────────────────────────────────
const SIGN_KO = {
  Aries:'양자리', Taurus:'황소자리', Gemini:'쌍둥이자리', Cancer:'게자리',
  Leo:'사자자리', Virgo:'처녀자리', Libra:'천칭자리', Scorpio:'전갈자리',
  Sagittarius:'사수자리', Capricorn:'염소자리', Aquarius:'물병자리', Pisces:'물고기자리'
};
const SIGN_SYM = {
  Aries:'♈', Taurus:'♉', Gemini:'♊', Cancer:'♋', Leo:'♌', Virgo:'♍',
  Libra:'♎', Scorpio:'♏', Sagittarius:'♐', Capricorn:'♑', Aquarius:'♒', Pisces:'♓'
};
const SIGN_EL = {
  Aries:'화', Leo:'화', Sagittarius:'화',
  Taurus:'지', Virgo:'지', Capricorn:'지',
  Gemini:'풍', Libra:'풍', Aquarius:'풍',
  Cancer:'수', Scorpio:'수', Pisces:'수'
};
const PLANET_KO = {
  Sun:'태양', Moon:'달', Mercury:'수성', Venus:'금성', Mars:'화성',
  Jupiter:'목성', Saturn:'토성', Uranus:'천왕성', Neptune:'해왕성',
  Ascendant:'상승궁', Midheaven:'중천(MC)'
};
const PLANET_ICON = {
  Sun:'☀️', Moon:'<i class="pi pi-moon"></i>', Mercury:'☿', Venus:'♀', Mars:'♂',
  Jupiter:'♃', Saturn:'♄', Uranus:'♅', Neptune:'♆',
  Ascendant:'↑', Midheaven:'MC'
};
const ASPECT_KO = {
  Conjunction:'합', Sextile:'육분', Square:'사분',
  Trine:'삼분', Opposition:'대립'
};

function getAspectInterp(p1, p2, type) {
  const key = p1 + '_' + p2;
  const key2 = p2 + '_' + p1;
  const map = ASPECT_PLANET_INTERP[key] || ASPECT_PLANET_INTERP[key2];
  if (map && map[type]) return map[type];
  const generic = {
    Conjunction: '두 행성의 에너지가 강하게 융합되어 해당 영역에서 강렬한 힘을 발휘합니다.',
    Trine: '두 에너지가 자연스럽게 흐르며 재능과 행운을 가져다 줍니다.',
    Sextile: '부드러운 협력 에너지. 노력하면 좋은 결과를 얻을 수 있습니다.',
    Square: '긴장과 도전. 갈등을 극복하며 성장하는 과제를 안겨줍니다.',
    Opposition: '양극의 에너지 사이에서 균형을 요구합니다. 통합이 이뤄지면 강해집니다.'
  };
  return generic[type] || '';
}

// ── UI helpers ────────────────────────────────────────────
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}
function setVisible(id, v) {
  document.getElementById(id).classList.toggle('visible', v);
}
function elClass(sign) {
  return 'el-' + (SIGN_EL[sign] || '풍');
}

function showInterpTab(tab) {
  document.querySelectorAll('.interp-tab').forEach((b,i) => {
    const tabs = ['sun','moon','asc','asp'];
    b.classList.toggle('active', tabs[i] === tab);
  });
  ['sun','moon','asc','asp'].forEach(t => {
    document.getElementById('interp-' + t).classList.toggle('active', t === tab);
  });
}

function renderBig3(planets) {
  const get = name => planets.find(p => p.name === name);
  const sun = get('Sun'), moon = get('Moon'), asc = get('Ascendant');
  const items = [
    { icon:'☀️', role:'태양궁', p: sun },
    { icon:'<i class="pi pi-moon"></i>', role:'달궁',   p: moon },
    { icon:'↑',  role:'상승궁', p: asc },
  ];
  const grid = document.getElementById('big3-grid');
  grid.innerHTML = '';
  items.forEach(({ icon, role, p }) => {
    if (!p) return;
    const ec = elClass(p.sign);
    const card = el('div', 'big3-card ' + ec);
    card.innerHTML =
      '<div class="big3-icon">' + icon + '</div>' +
      '<div class="big3-role">' + role + '</div>' +
      '<div class="big3-sym">' + (SIGN_SYM[p.sign] || '') + '</div>' +
      '<div class="big3-sign">' + (SIGN_KO[p.sign] || p.sign) + '</div>' +
      '<div class="big3-deg">' + p.normDegree.toFixed(1) + '°</div>' +
      '<div style="font-size:10px;color:var(--muted);margin-top:2px">' + (BIG3_DESC[role] || '') + '</div>';
    grid.appendChild(card);
  });
}

function renderPlanets(planets) {
  const tbody = document.getElementById('planet-tbody');
  tbody.innerHTML = '';
  const order = ['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Uranus','Neptune','Ascendant','Midheaven'];
  order.forEach(name => {
    const p = planets.find(x => x.name === name);
    if (!p) return;
    const ec = elClass(p.sign);
    const tr = el('tr');
    tr.innerHTML =
      '<td><span class="planet-name" title="' + (PLANET_ROLE[name]||'') + '">' + (PLANET_ICON[name] || '') + ' ' + (PLANET_KO[name] || name) + (p.isRetro === 'true' ? ' <span class="retro-badge">Rx</span>' : '') + '</span></td>' +
      '<td><span class="sign-chip ' + ec + '">' + (SIGN_SYM[p.sign]||'') + ' ' + (SIGN_KO[p.sign]||p.sign) + '</span></td>' +
      '<td>' + p.normDegree.toFixed(2) + '°</td>' +
      '<td>' + (p.house != null ? p.house + '하우스' : '—') + '</td>';
    tbody.appendChild(tr);
  });
}

function renderAspects(aspects) {
  const list = document.getElementById('aspect-list');
  list.innerHTML = '';
  // 상위 12개만 표시 (orb 순)
  const sorted = [...aspects].sort((a,b) => a.orb - b.orb).slice(0,12);
  sorted.forEach(a => {
    const benefic = a.isBenefic;
    const row = el('div', 'aspect-row ' + (benefic ? 'aspect-benefic' : 'aspect-malefic'));
    row.innerHTML =
      '<span class="aspect-type ' + (benefic ? 'asp-好' : 'asp-凶') + '" title="' + (ASPECT_DESC_KO[a.type]||'') + '">' + (ASPECT_KO[a.type] || a.type) + '</span>' +
      '<span class="aspect-planets" title="' + (ASPECT_DESC_KO[a.type]||'') + '">' + (PLANET_KO[a.planet1]||a.planet1) + ' × ' + (PLANET_KO[a.planet2]||a.planet2) + '</span>' +
      '<span class="aspect-orb">orb ' + a.orb + '°</span>';
    list.appendChild(row);
  });
  if (sorted.length === 0) list.innerHTML = '<div style="color:var(--muted);font-size:14px;padding:12px">분석된 어스펙트가 없습니다.</div>';

function renderInterpAspects(aspects, planets) {
  const panel = document.getElementById('interp-asp');
  const sorted = [...aspects].sort((a,b) => a.orb - b.orb).slice(0,6);
  if (sorted.length === 0) {
    panel.innerHTML = '<div style="color:var(--muted);font-size:14px">주요 어스펙트가 없습니다.</div>';
    return;
  }
  const rows = sorted.map(a => {
    const benefic = a.isBenefic;
    const text = getAspectInterp(a.planet1, a.planet2, a.type);
    return '<div class="interp-asp-row" style="border-color:' + (benefic ? '#00C853' : '#FF6D00') + '">' +
      '<div class="interp-asp-title">' + (ASPECT_KO[a.type]||a.type) + ' — ' +
      (PLANET_KO[a.planet1]||a.planet1) + ' × ' + (PLANET_KO[a.planet2]||a.planet2) +
      ' (orb ' + a.orb + '°)</div>' +
      '<div>' + text + '</div></div>';
  });
  panel.innerHTML = '<div class="interp-aspects">' + rows.join('') + '</div>';
}

// ── FETCH ─────────────────────────────────────────────────
async function loadChart(year, month, day, hour, min) {
  const status = document.getElementById('status');
  status.className = 'status-msg visible';
  status.innerHTML = '<span class="spinner"></span>출생 차트 계산 중…';

  const _prof = (() => { try { return JSON.parse(localStorage.getItem('pico_profile')) || {}; } catch(e) { return {}; } })();
  const _lat = _prof.lat || 37.5665;
  const _lon = _prof.lon || 126.9780;
  const _tz  = _prof.tz  != null ? _prof.tz : 9;
  const body = { year, month, day, hour, min, lat: _lat, lon: _lon, tzone: _tz };
  const opts = {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  };

  try {
    const [planetsRes, aspectsRes] = await Promise.allSettled([
      fetch('https://fortuna.kkdmb7.workers.dev/astro', opts),
      fetch('https://fortuna.kkdmb7.workers.dev/astro/aspects', opts)
    ]);

    if (planetsRes.status === 'rejected' || !planetsRes.value.ok) throw new Error('행성 데이터 로드 실패');
    const planets = await planetsRes.value.json();

    let aspects = [];
    if (aspectsRes.status === 'fulfilled' && aspectsRes.value.ok) {
      try { aspects = await aspectsRes.value.json(); } catch(e) {}
    }

    status.className = 'status-msg';

    // render
    renderBig3(planets);
    setVisible('card-big3', true);
    renderPlanets(planets);
    setVisible('card-planets', true);
    renderAspects(aspects);
    setVisible('card-aspects', true);

    // interpretations
    const get = name => (planets.find(p => p.name === name) || {}).sign || '';
    const sunSign = get('Sun'), moonSign = get('Moon'), ascSign = get('Ascendant');
    renderInterpPanel('interp-sun', sunSign, '태양궁 · 핵심 성격', SUN_INTERP);
    renderInterpPanel('interp-moon', moonSign, '달궁 · 감정 패턴', MOON_INTERP);
    renderInterpPanel('interp-asc', ascSign, '상승궁 · 외적 인상', ASC_INTERP);
    renderInterpAspects(aspects, planets);
    setVisible('card-interp', true);


    window._astroData = { planets, aspects };
    var wrap = document.getElementById('astroShareBtnWrap');
    wrap.style.display = 'flex';
    document.getElementById('astroReportHook').style.display = 'block';

  } catch(e) {
    status.className = 'status-msg visible err';
    status.textContent = '차트 로드 오류: ' + e.message;
  }
}

// ── 공유 카드 ─────────────────────────────────────────────
function _astroShowToast(msg) {
  var t = document.getElementById('_astroToast');
  if (!t) {
    t = document.createElement('div'); t.id = '_astroToast';
    t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(30,30,50,0.95);color:#6a4aa0;padding:11px 22px;border-radius:22px;font-size:13px;font-weight:600;z-index:9999;pointer-events:none;transition:opacity 0.4s;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._tid); t._tid = setTimeout(function(){ t.style.opacity='0'; }, 2500);
}

function _drawAstroCard(cb) {
  var d = window._astroData;
  if (!d) { cb(null); return; }
  var planets = d.planets || [];
  var aspects = d.aspects || [];

  var SIGN_SYM = {'양자리':'♈','황소자리':'♉','쌍둥이자리':'♊','게자리':'♋','사자자리':'♌','처녀자리':'♍','천칭자리':'♎','전갈자리':'♏','사수자리':'♐','염소자리':'♑','물병자리':'♒','물고기자리':'♓'};
  var EL_COLOR = {'화':'#FF6B6B','지':'#7BC67A','풍':'#FFE66D','수':'#74B9FF'};
  var SIGN_EL  = {'양자리':'화','사자자리':'화','사수자리':'화','황소자리':'지','처녀자리':'지','염소자리':'지','쌍둥이자리':'풍','천칭자리':'풍','물병자리':'풍','게자리':'수','전갈자리':'수','물고기자리':'수'};
  var SIGN_KO_EN = {'양자리':'Aries','황소자리':'Taurus','쌍둥이자리':'Gemini','게자리':'Cancer','사자자리':'Leo','처녀자리':'Virgo','천칭자리':'Libra','전갈자리':'Scorpio','사수자리':'Sagittarius','염소자리':'Capricorn','물병자리':'Aquarius','물고기자리':'Pisces'};
  var ASPECT_KO   = {'Conjunction':'합','Sextile':'육합','Square':'스퀘어','Trine':'트라인','Opposition':'대립'};
  var PLANET_KO   = {'Sun':'태양','Moon':'달','Mercury':'수성','Venus':'금성','Mars':'화성','Jupiter':'목성','Saturn':'토성'};

  var today = new Date(Date.now()+9*3600000);
  var dateStr = today.getUTCFullYear()+'년 '+(today.getUTCMonth()+1)+'월 '+today.getUTCDate()+'일';

  var W=1080, H=1920;
  var PAD=60;
  var canvas=document.createElement('canvas'); canvas.width=W; canvas.height=H;
  var ctx=canvas.getContext('2d');

  // 배경 (아이보리)
  var bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#fcf7ea'); bg.addColorStop(0.5,'#f4ede0'); bg.addColorStop(1,'#ede4cf');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  [{cx:0.2,cy:0.1,r:0.5,c:'154,122,38,0.06'},{cx:0.8,cy:0.5,r:0.5,c:'122,36,24,0.05'},{cx:0.5,cy:0.9,r:0.4,c:'154,122,38,0.05'}].forEach(function(n){
    var g=ctx.createRadialGradient(n.cx*W,n.cy*H,0,n.cx*W,n.cy*H,n.r*W); g.addColorStop(0,'rgba('+n.c+')'); g.addColorStop(1,'transparent'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  });
  [[8,12,2],[20,35,1.5],[38,8,2.5],[55,22,1],[72,10,2],[85,28,1.5],[6,52,1],[18,68,2],[32,80,1.5],[50,60,1],[66,78,2],[82,48,1],[90,65,1.5],[14,90,2],[44,45,1],[78,35,2],[60,90,1],[25,15,2],[92,82,1.5],[48,30,1],[35,55,1.5],[15,42,2],[70,25,1.5]].forEach(function(s){
    ctx.beginPath(); ctx.arc(s[0]/100*W,s[1]/100*H,s[2],0,Math.PI*2); ctx.fillStyle='rgba(154,122,38,'+(0.18+((s[0]+s[1])%5)*0.08)+')'; ctx.fill();
  });

  ctx.textAlign='center';
  function drawLine(cy,w2,al,clr){ var lg=ctx.createLinearGradient(W/2-w2,0,W/2+w2,0); lg.addColorStop(0,'transparent'); lg.addColorStop(0.5,'rgba('+(clr||'154,122,38')+','+al+')'); lg.addColorStop(1,'transparent'); ctx.strokeStyle=lg; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(W/2-w2,cy); ctx.lineTo(W/2+w2,cy); ctx.stroke(); }
  function fRR(x,y,w,h,r){ ctx.beginPath(); if(ctx.roundRect){ctx.roundRect(x,y,w,h,r);}else{ctx.rect(x,y,w,h);} ctx.fill(); }
  function sRR(x,y,w,h,r){ ctx.beginPath(); if(ctx.roundRect){ctx.roundRect(x,y,w,h,r);}else{ctx.rect(x,y,w,h);} ctx.stroke(); }

  // 텍스트 줄바꿈 helper
  function fillWrapped(text, x, y, maxW, lineH, maxL) {
    var words=text.split(' '), line='', n=0;
    for(var i=0;i<words.length;i++){
      var test=line+(line?' ':'')+words[i];
      if(ctx.measureText(test).width>maxW && line){ ctx.fillText(line,x,y); y+=lineH; line=words[i]; if(++n>=maxL-1){line=line.slice(0,20)+'…';break;} }
      else line=test;
    }
    if(line) ctx.fillText(line,x,y);
    return y+lineH;
  }

  // ── 헤더
  var y=100;
  ctx.font='600 22px sans-serif'; ctx.fillStyle='rgba(122,36,24,0.7)'; ctx.letterSpacing='4px';
  ctx.fillText('✨  F O R T U N A  ✨',W/2,y); ctx.letterSpacing='0px';
  y+=44; ctx.font='700 52px "Noto Sans KR",sans-serif'; ctx.fillStyle='#1a120a'; ctx.fillText('나의 별자리 차트',W/2,y);
  y+=40; ctx.font='400 24px "Noto Sans KR",sans-serif'; ctx.fillStyle='rgba(74,58,42,0.7)'; ctx.fillText(dateStr,W/2,y);
  y+=36; drawLine(y,260,0.4);

  // ── BIG 3 — 세로 배치, 각 카드에 설명 포함
  var big3=[
    {emoji:'☀️', label:'태양궁', role:'핵심 자아 · 본질적 성격',
     sign:(planets.find(function(p){return p.name==='Sun';})||{}).sign||'',
     interp:SUN_INTERP},
    {emoji:'<i class="pi pi-moon"></i>', label:'달궁',  role:'감정 패턴 · 내면의 자아',
     sign:(planets.find(function(p){return p.name==='Moon';})||{}).sign||'',
     interp:MOON_INTERP},
    {emoji:'↑',  label:'상승궁', role:'외적 인상 · 첫인상',
     sign:(planets.find(function(p){return p.name==='Ascendant';})||{}).sign||'',
     interp:ASC_INTERP},
  ];

  var cH=360, cGap=24, cW=W-PAD*2;
  y+=46;
  big3.forEach(function(c){
    var ec=EL_COLOR[SIGN_EL[c.sign]]||'#8888ee';
    var sym=SIGN_SYM[c.sign]||'<i class="pi pi-sparkle"></i>';
    var enKey=SIGN_KO_EN[c.sign]||'';
    var desc=(c.interp&&enKey&&c.interp[enKey])||'';

    // 카드 배경
    var cg=ctx.createLinearGradient(PAD,y,PAD,y+cH); cg.addColorStop(0,'rgba(252,247,234,0.85)'); cg.addColorStop(1,'rgba(237,228,207,0.7)'); ctx.fillStyle=cg; fRR(PAD,y,cW,cH,20);
    // 상단 컬러바
    var tg=ctx.createLinearGradient(PAD,y,PAD+cW,y); tg.addColorStop(0,'transparent'); tg.addColorStop(0.3,ec); tg.addColorStop(0.7,ec); tg.addColorStop(1,'transparent'); ctx.fillStyle=tg; fRR(PAD,y,cW,4,2);
    // 테두리
    ctx.strokeStyle='rgba(80,55,30,0.18)'; ctx.lineWidth=1.5; sRR(PAD,y,cW,cH,20);

    // 이모지 + 라벨
    ctx.textAlign='left';
    ctx.font='700 22px "Noto Sans KR",sans-serif'; ctx.fillStyle='rgba(74,58,42,0.75)'; ctx.fillText(c.emoji+'  '+c.label+' · '+c.role, PAD+28, y+46);

    // 별자리 심볼 크게 (우측)
    ctx.textAlign='right'; ctx.font='80px serif'; ctx.fillStyle='rgba(80,55,30,0.12)'; ctx.fillText(sym, PAD+cW-28, y+120);

    // 별자리 이름
    ctx.textAlign='left'; ctx.font='700 62px "Noto Sans KR",sans-serif'; ctx.fillStyle=ec; ctx.fillText(c.sign||'—', PAD+28, y+132);

    // 설명 텍스트 (최대 4줄)
    ctx.font='400 22px "Noto Sans KR",sans-serif'; ctx.fillStyle='rgba(26,18,10,0.75)';
    if(desc){
      var words=desc.split(' '), line='', ty=y+172, maxW=cW-56, ln=0;
      for(var wi=0;wi<words.length;wi++){
        var test=line+(line?' ':'')+words[wi];
        if(ctx.measureText(test).width>maxW&&line){ ctx.fillText(line,PAD+28,ty); ty+=30; line=words[wi]; if(++ln>=3){ctx.fillText(line.slice(0,22)+'…',PAD+28,ty);line='';break;} }
        else line=test;
      }
      if(line&&ln<3) ctx.fillText(line,PAD+28,ty);
    }
    ctx.textAlign='center';
    y+=cH+cGap;
  });

  // ── 행성 배치 간결하게 (2열 compact)
  y+=10; drawLine(y,260,0.3);
  y+=40; ctx.font='600 24px "Noto Sans KR",sans-serif'; ctx.fillStyle='rgba(74,58,42,0.75)'; ctx.fillText('🌟 행성 배치',W/2,y); y+=32;
  var pNames=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn'];
  var pIcons={'Sun':'☀️','Moon':'<i class="pi pi-moon"></i>','Mercury':'☿','Venus':'♀','Mars':'♂','Jupiter':'♃','Saturn':'♄'};
  var colW2=(W-PAD*2-20)/2, gx=PAD, sy2=y;
  pNames.forEach(function(nm,idx){
    var p=planets.find(function(x){return x.name===nm;}); if(!p) return;
    var col=idx%2, row=Math.floor(idx/2);
    var px=gx+col*(colW2+20), py=sy2+row*46;
    var ec2=EL_COLOR[SIGN_EL[p.sign]]||'rgba(122,104,80,0.8)';
    ctx.textAlign='left'; ctx.font='400 19px "Noto Sans KR",sans-serif'; ctx.fillStyle='rgba(74,58,42,0.78)';
    ctx.fillText((pIcons[nm]||'')+'  '+(PLANET_KO[nm]||nm), px, py+24);
    ctx.textAlign='right'; ctx.font='600 19px "Noto Sans KR",sans-serif'; ctx.fillStyle=ec2;
    ctx.fillText((SIGN_SYM[p.sign]||'')+' '+(p.sign||''), px+colW2, py+24); ctx.textAlign='center';
  });
  y=sy2+4*46+16;

  // ── 푸터
  y=H-100; drawLine(y,200,0.3);
  y+=38; ctx.font='400 22px "Noto Sans KR",sans-serif'; ctx.fillStyle='rgba(80,55,30,0.45)'; ctx.fillText('picolab.kr',W/2,y);

  cb(canvas);
}

function doAstroShare() {
  var canvas = window._astroCanvas; if (!canvas) return;
  var pageUrl = 'https://picolab.kr?utm_source=share&utm_medium=kakao';
  var text = '🔮 FORTUNA 서양 점성술 차트\n\n나도 확인해봐 👇';
  try { navigator.clipboard && navigator.clipboard.writeText(pageUrl); } catch(e) {}
  var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  canvas.toBlob(function(blob){
    if(!blob){ _astroShowToast('이미지 생성 실패'); return; }
    var file=new File([blob],'fortuna_astro.png',{type:'image/png'});
    if(isMobile && navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:'FORTUNA 점성술'}).catch(function(){});
    } else if(isMobile && navigator.share){

      if (!Kakao.isInitialized()) { try { Kakao.init('2543c896dead8185e2edfa0976396f25'); } catch(e) {} }

    } else { _astroShowToast('<i class="pi pi-link"></i> 링크가 클립보드에 복사됐어요!'); }

}
