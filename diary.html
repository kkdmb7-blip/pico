<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#f5efe4">
<title>사주일기 · PICO Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<style>
:root {
  --bg:#f4ede0; --surface:#f9f1de; --surface2:#e8dcc0; --border:#c9bc9d;
  --border-soft:rgba(80,55,30,0.10);
  --accent:#7a2418; --accent2:#2a1f1a;
  --text:#1a120a; --text2:#4a3a2a; --muted:#7a6850;
  --gold:#9a7a26; --gold-deep:#7a5e1c; --ink:#241a10;
  --orb:#5f8cb5; --orb-bg:rgba(122,196,255,0.12); --orb-border:rgba(95,140,181,0.30);
  --shadow-soft:0 1px 2px rgba(60,40,20,0.05), 0 4px 16px rgba(60,40,20,0.04);
  --shadow-lift:0 2px 4px rgba(60,40,20,0.06), 0 10px 28px rgba(60,40,20,0.08);
  --radius:16px;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:var(--bg); color:var(--text); font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif; min-height:100vh; padding-bottom:80px; }

/* NAV */
nav{ position:sticky; top:0; z-index:100; background:rgba(244,237,224,0.92); backdrop-filter:blur(20px); border-bottom:1px solid var(--border-soft); padding:0 16px; height:56px; display:flex; align-items:center; gap:10px; }
.nav-back{ background:none; border:none; color:var(--muted); font-size:26px; cursor:pointer; padding:0 6px 0 0; line-height:1; }
.nav-title{ font-family:'Noto Serif KR',serif; font-weight:700; font-size:16px; color:var(--gold-deep); flex:1; }
.nav-tabs{ display:flex; gap:4px; }
.nav-tab{ background:none; border:none; cursor:pointer; font-size:12px; font-weight:600; color:var(--muted); padding:5px 10px; border-radius:20px; transition:all 0.2s; font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif; }
.nav-tab.active{ background:rgba(122,36,24,0.10); color:var(--accent); }

/* ILGAN CARD */
.ilgan-card{ margin:14px 16px 0; background:linear-gradient(135deg,rgba(122,36,24,0.06),rgba(154,122,38,0.05)); border:1px solid var(--border-soft); border-radius:var(--radius); padding:14px 16px; display:flex; align-items:center; gap:14px; box-shadow:var(--shadow-soft); }
.ilgan-pillar{ text-align:center; flex-shrink:0; width:44px; }
.ilgan-stem-h{ font-family:'Noto Serif KR',serif; font-size:22px; font-weight:700; line-height:1.1; color:var(--ink); }
.ilgan-branch-h{ font-family:'Noto Serif KR',serif; font-size:22px; font-weight:700; line-height:1.1; color:var(--ink); }
.ilgan-info{ flex:1; }
.ilgan-date{ font-size:11px; color:var(--muted); margin-bottom:2px; }
.ilgan-title{ font-size:14px; font-weight:600; margin-bottom:3px; color:var(--ink); }
.ilgan-desc{ font-size:12px; color:var(--muted); line-height:1.4; }

/* CARD */
.card{ margin:12px 16px 0; background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow-soft); }
.card-title{ font-size:14px; font-weight:700; color:var(--gold-deep); margin-bottom:3px; }
.card-sub{ font-size:12px; color:var(--muted); margin-bottom:14px; }

/* MOOD */
.mood-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.mood-btn{ background:var(--surface2); border:1.5px solid var(--border-soft); border-radius:12px; padding:12px 6px; text-align:center; cursor:pointer; transition:all 0.18s; display:flex; flex-direction:column; align-items:center; gap:4px; }
.mood-btn .emoji{ font-size:22px; color:var(--gold-deep); }
.mood-btn .label{ font-size:11px; color:var(--muted); font-weight:600; }
.mood-btn.selected{ background:rgba(212,175,90,0.14); border-color:var(--gold-deep); }
.mood-btn.selected .label{ color:#8a6b20; }

/* EVENTS */
.event-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
.event-btn{ background:var(--surface2); border:1.5px solid var(--border-soft); border-radius:10px; padding:10px 12px; cursor:pointer; transition:all 0.18s; display:flex; align-items:center; gap:7px; font-size:13px; font-weight:500; color:var(--muted); }
.event-btn.selected{ background:rgba(122,36,24,0.08); border-color:rgba(122,36,24,0.35); color:var(--accent); }

/* BUTTONS */
.btn-primary{ width:100%; padding:13px; background:linear-gradient(135deg,#7a2418,#5a1810); color:#fcf7ea; border:none; border-radius:12px; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s; margin-top:10px; font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif; box-shadow:var(--shadow-lift); }
.btn-primary:active{ transform:scale(0.98); }
.btn-ghost{ width:100%; padding:11px; background:none; color:var(--muted); border:1px solid var(--border-soft); border-radius:12px; font-size:13px; cursor:pointer; margin-top:8px; font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif; }

/* MEMO */
.memo-area{ width:100%; background:#fdfaf0; border:1px solid var(--border-soft); border-radius:10px; color:var(--text); font-size:14px; line-height:1.6; padding:12px; resize:none; outline:none; font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif; min-height:80px; }
.memo-area:focus{ border-color:var(--gold-deep); }

/* AI FEEDBACK */
.feedback-box{ background:rgba(154,122,38,0.06); border:1px solid rgba(154,122,38,0.22); border-radius:12px; padding:14px; font-size:14px; line-height:1.8; min-height:56px; color:var(--text); }

/* COMPLETED */
.completed-mood{ text-align:center; font-size:44px; margin:8px 0; color:var(--gold-deep); }
.ev-tags{ display:flex; flex-wrap:wrap; gap:6px; margin:10px 0; }
.ev-tag{ background:rgba(122,36,24,0.08); border:1px solid rgba(122,36,24,0.22); border-radius:20px; padding:4px 10px; font-size:12px; color:var(--accent); }

/* SPINNER */
.spinner{ width:24px; height:24px; margin:16px auto; border:2px solid rgba(122,36,24,0.22); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }

/* CALENDAR */
.cal-header{ display:flex; align-items:center; justify-content:space-between; margin:14px 16px 10px; }
.cal-month-title{ font-family:'Pretendard Variable',Pretendard,'Noto Sans KR',sans-serif; font-size:17px; font-weight:700; color:var(--gold-deep); }
.cal-nav-btn{ background:var(--surface); border:1px solid var(--border-soft); color:var(--muted); border-radius:8px; padding:5px 12px; cursor:pointer; font-size:14px; }
.cal-grid{ margin:0 16px; display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-day-label{ text-align:center; font-size:10px; color:var(--muted); padding:3px 0; font-weight:600; }
.cal-cell{ aspect-ratio:1; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; background:var(--surface2); border:1px solid transparent; transition:background 0.15s; }
.cal-cell.empty{ background:transparent; }
.cal-cell.today{ border-color:var(--gold-deep); }
.cal-cell.has-diary{ background:rgba(122,36,24,0.08); border-color:rgba(122,36,24,0.28); cursor:pointer; }
.cal-cell .cal-date{ font-size:10px; color:var(--muted); line-height:1; }
.cal-cell .cal-emoji{ font-size:15px; line-height:1; color:var(--gold-deep); }

/* DETAIL OVERLAY */
.overlay{ position:fixed; inset:0; background:rgba(40,28,16,0.55); z-index:300; display:flex; align-items:flex-end; justify-content:center; backdrop-filter:blur(4px); }
.sheet{ background:var(--surface); border-radius:20px 20px 0 0; padding:20px 20px 44px; width:100%; max-width:480px; max-height:72vh; overflow-y:auto; box-shadow:var(--shadow-lift); }
.sheet-handle{ width:36px; height:4px; border-radius:2px; background:var(--border); margin:0 auto 18px; }

/* STATS */
.stat-row{ display:flex; align-items:center; gap:8px; margin-bottom:9px; }
.stat-label{ font-size:12px; min-width:88px; color:var(--text); }
.stat-bar-wrap{ flex:1; background:var(--surface2); border-radius:4px; height:7px; overflow:hidden; }
.stat-bar-fill{ height:100%; border-radius:4px; background:linear-gradient(90deg,#7a2418,#9a7a26); transition:width 0.6s ease; }
.stat-count{ font-size:11px; color:var(--muted); min-width:26px; text-align:right; }
.accuracy-card{ background:rgba(154,122,38,0.06); border:1px solid rgba(154,122,38,0.22); border-radius:12px; padding:16px; margin-top:8px; text-align:center; }
.accuracy-pct{ font-size:38px; font-weight:800; color:var(--gold-deep); font-family:'Pretendard Variable',Pretendard,'Noto Sans KR',sans-serif; }

/* EMPTY */
.empty-state{ text-align:center; padding:52px 24px; color:var(--muted); }
.empty-state .ei{ font-size:36px; margin-bottom:10px; color:var(--gold-deep); }
.empty-state p{ font-size:13px; line-height:1.6; }

/* SAME ILGAN MOODS */
.ilgan-moods-card{ margin:12px 16px 0; background:var(--surface); border:1px solid var(--border-soft); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow-soft); }
.ilgan-moods-title{ font-size:12px; color:var(--muted); margin-bottom:10px; }
.mood-share-row{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
.mood-share-item{ display:flex; flex-direction:column; align-items:center; gap:3px; }
.mood-share-item .ms-emoji{ font-size:22px; line-height:1; color:var(--gold-deep); }
.mood-share-item .ms-info{ font-size:11px; color:var(--muted); }
</style>

</head>
<body>

<!-- NAV -->
<nav>
  <button class="nav-back" onclick="history.back()">‹</button>
  <div class="nav-title">사주일기 <i class="pi pi-book"></i></div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="navWrite"    onclick="setView('write')">오늘</button>
    <button class="nav-tab"        id="navCalendar" onclick="setView('calendar')">캘린더</button>
    <button class="nav-tab"        id="navMonthly"  onclick="setView('monthly')">통계</button>
  </div>
</nav>

<!-- 오늘 일진 -->
<div class="ilgan-card" id="ilganCard">
  <div class="ilgan-pillar">
    <div class="ilgan-stem-h"   id="ilganStemH">—</div>
    <div class="ilgan-branch-h" id="ilganBranchH">—</div>
  </div>
  <div class="ilgan-info">
    <div class="ilgan-date"  id="ilganDate"></div>
    <div class="ilgan-title" id="ilganTitle"></div>
    <div class="ilgan-desc"  id="ilganDesc"></div>
  </div>
</div>

<!-- 같은 일간 오늘의 기분 -->
<div id="sameIlganCard" class="ilgan-moods-card" style="display:none;">
  <div class="ilgan-moods-title" id="sameIlganTitle"></div>
  <div class="mood-share-row" id="sameIlganMoods"></div>
</div>

<!-- ═══ WRITE VIEW ═══ -->
<div id="viewWrite">

  <!-- 완료 상태 -->
  <div id="completedState" style="display:none;">
    <div class="card">
      <div class="card-title">오늘의 기록 ✓</div>
      <div class="card-sub" id="completedDateLabel"></div>
      <div class="completed-mood" id="completedMoodEmoji"></div>
      <div class="ev-tags" id="completedEventTags"></div>
      <div id="completedMemo" style="font-size:13px;color:var(--muted);margin-bottom:12px;font-style:italic;"></div>
      <div class="card-title" style="margin-bottom:6px;"><i class="pi pi-sparkle"></i> 우주의 코멘트</div>
      <div class="feedback-box" id="completedFeedback"></div>
      <button class="btn-ghost" style="margin-top:12px;" onclick="resetTodayDiary()">다시 기록하기</button>
    </div>
  </div>

  <!-- 작성 단계 -->
  <div id="writeSteps">

    <!-- STEP 1: 기분 -->
    <div class="card" id="step1">
      <div class="card-title">오늘 기분이 어때?</div>
      <div class="card-sub">하나만 골라봐</div>
      <div class="mood-grid">
        <div class="mood-btn" data-mood="good"      onclick="selectMood(this)"><span class="emoji"><i class="pi pi-smile"></i></span><span class="label">좋았어</span></div>
        <div class="mood-btn" data-mood="normal"    onclick="selectMood(this)"><span class="emoji"><i class="pi pi-neutral"></i></span><span class="label">평범했어</span></div>
        <div class="mood-btn" data-mood="bad"       onclick="selectMood(this)"><span class="emoji"><i class="pi pi-sad"></i></span><span class="label">힘들었어</span></div>
        <div class="mood-btn" data-mood="energetic" onclick="selectMood(this)"><span class="emoji"><i class="pi pi-fire"></i></span><span class="label">에너지 넘쳤어</span></div>
        <div class="mood-btn" data-mood="tired"     onclick="selectMood(this)"><span class="emoji"><i class="pi pi-sleep"></i></span><span class="label">지쳤어</span></div>
      </div>
      <button class="btn-primary" id="step1Next" onclick="showStep(2)" style="display:none;">다음 →</button>
    </div>

    <!-- STEP 2: 있었던 일 -->
    <div class="card" id="step2" style="display:none;">
      <div class="card-title">어떤 일이 있었어?</div>
      <div class="card-sub">여러 개 선택 가능해</div>
      <div class="event-grid">
        <div class="event-btn" data-event="돈/재물"   onclick="toggleEvent(this)"><i class="pi pi-coin"></i> 돈/재물</div>
        <div class="event-btn" data-event="일/커리어"  onclick="toggleEvent(this)"><i class="pi pi-briefcase"></i> 일/커리어</div>
        <div class="event-btn" data-event="연애/관계"  onclick="toggleEvent(this)"><i class="pi pi-heart"></i>️ 연애/관계</div>
        <div class="event-btn" data-event="가족"      onclick="toggleEvent(this)"><i class="pi pi-person"></i>‍<i class="pi pi-person"></i>‍<i class="pi pi-person"></i> 가족</div>
        <div class="event-btn" data-event="인간관계"   onclick="toggleEvent(this)"><i class="pi pi-people"></i> 인간관계</div>
        <div class="event-btn" data-event="건강"      onclick="toggleEvent(this)"><i class="pi pi-clover"></i> 건강</div>
        <div class="event-btn" data-event="공부"      onclick="toggleEvent(this)"><i class="pi pi-book"></i> 공부</div>
        <div class="event-btn" data-event="좋은 소식"  onclick="toggleEvent(this)"><i class="pi pi-gift"></i> 좋은 소식</div>
        <div class="event-btn" data-event="갈등"      onclick="toggleEvent(this)"><i class="pi pi-bolt"></i> 갈등</div>
        <div class="event-btn" data-event="변화/결정"  onclick="toggleEvent(this)"><i class="pi pi-refresh"></i> 변화/결정</div>
      </div>
      <button class="btn-primary" onclick="showStep(3)">다음 →</button>
      <button class="btn-ghost"   onclick="showStep(1)">← 이전</button>
    </div>

    <!-- STEP 3: 메모 -->
    <div class="card" id="step3" style="display:none;">
      <div class="card-title">한 줄 메모 (선택)</div>
      <div class="card-sub">오늘 기억하고 싶은 것</div>
      <textarea class="memo-area" id="memoInput" placeholder="오늘 있었던 일을 자유롭게 써봐..." maxlength="200"></textarea>
      <button class="btn-primary" onclick="submitDiary(false)">저장하고 AI 피드백 받기 <i class="pi pi-sparkle"></i></button>
      <button class="btn-ghost"   onclick="showStep(2)">← 이전</button>
      <button class="btn-ghost"   onclick="submitDiary(true)">건너뛰기</button>
    </div>

    <!-- STEP 4: AI 피드백 -->
    <div class="card" id="step4" style="display:none;">
      <div class="card-title"><i class="pi pi-sparkle"></i> 우주의 코멘트</div>
      <div class="card-sub">오늘 일진과 하루를 연결해서</div>
      <div id="feedbackContent"><div class="spinner"></div></div>
    </div>

  </div><!-- /writeSteps -->
</div><!-- /viewWrite -->

<!-- ═══ CALENDAR VIEW ═══ -->
<div id="viewCalendar" style="display:none;">
  <div class="cal-header">
    <button class="cal-nav-btn" onclick="calMove(-1)">‹</button>
    <div class="cal-month-title" id="calMonthTitle"></div>
    <button class="cal-nav-btn" onclick="calMove(1)">›</button>
  </div>
  <div class="cal-grid" id="calDayLabels">
    <div class="cal-day-label">일</div><div class="cal-day-label">월</div>
    <div class="cal-day-label">화</div><div class="cal-day-label">수</div>
    <div class="cal-day-label">목</div><div class="cal-day-label">금</div>
    <div class="cal-day-label">토</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- ═══ MONTHLY STATS VIEW ═══ -->
<div id="viewMonthly" style="display:none;">
  <div style="margin:14px 16px 0;">
    <div style="font-family:'Pretendard Variable',Pretendard,'Noto Sans KR',sans-serif;font-size:17px;font-weight:700;color:var(--gold-deep);" id="statsMonthTitle"></div>
    <div style="font-size:12px;color:var(--muted);margin-top:2px;" id="statsTotalDays"></div>
  </div>
  <div class="card">
    <div class="card-title">기분 분포</div>
    <div id="moodChart" style="margin-top:8px;"></div>
  </div>
  <div class="card">
    <div class="card-title">일진 적중률</div>
    <div class="card-sub">예측한 기운과 실제 하루가 얼마나 맞았나</div>
    <div class="accuracy-card">
      <div class="accuracy-pct" id="accuracyPct">—%</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px;" id="accuracyDesc"></div>
    </div>
    <div id="accuracyGrade" style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;"></div>
  </div>
</div>

<!-- 날짜 상세 시트 -->
<div id="detailOverlay" class="overlay" style="display:none;" onclick="closeDetail(event)">
  <div class="sheet" id="detailSheet">
    <div class="sheet-handle"></div>
    <div id="detailContent"></div>
  </div>
</div>

  오:'열정적이고 사교적인 기운',미:'예술적 감수성과 배려의 기운',
  신:'기민하고 실용적인 기운',유:'완벽을 추구하는 집중의 기운',
  술:'정의롭고 믿음직스러운 기운',해:'자유롭고 직관적인 기운'
};
var MOOD_EMOJI = {good:'<i class="pi pi-smile"></i>',normal:'<i class="pi pi-neutral"></i>',bad:'<i class="pi pi-sad"></i>',energetic:'<i class="pi pi-fire"></i>',tired:'<i class="pi pi-sleep"></i>'};
var MOOD_LABEL = {good:'좋았어',normal:'평범했어',bad:'힘들었어',energetic:'에너지 넘쳤어',tired:'지쳤어'};

// ── 일진 계산 (index.html과 동일 공식) ──────────────────────
function calcDayPillar(y, m, d) {
  var birthMs = Date.UTC(y, m-1, d);
  var di = (((Math.round((birthMs - Date.UTC(2024,1,10)) / 86400000)) + 40) % 60 + 60) % 60;
  var dSi = di % 10, dBi = di % 12;
  return { stem:STEMS[dSi], branch:BRANCHES[dBi], stemH:STEM_H[dSi], branchH:BRANCH_H[dBi], el:STEM_EL[dSi] };
}

function getTodayKST() {
  var d = new Date(Date.now() + 9*3600000);
  return { y:d.getUTCFullYear(), m:d.getUTCMonth()+1, d:d.getUTCDate() };
}
function dateStr(y, m, d) {
  return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
}

// ── 상태 ────────────────────────────────────────────────────
var _user = null, _currentMood = null, _selectedEvents = [];
var _calY, _calM, _calDiaries = {};
var _userYongshin = ''; // pico_push_subscriptions에서 로드
var _birthIlgan = '';   // 출생 일주의 일간

// ── 초기화 ──────────────────────────────────────────────────

  if (_user) {

      .then(function(r){ return r.json(); })
      .then(function(rows){

          _userYongshin = _toKoEl(rows[0].yongshin);

              fetch('https://fortuna.kkdmb7.workers.dev/saju-test',{
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({ birth:birth, gender:prof.gender||'M', calendar:'solar' })
              }).then(function(r2){ return r2.json(); })
                .then(function(sd){ _userYongshin = _toKoEl((sd.yongshin && sd.yongshin.primary) || ''); })
                .catch(function(){});
            }
          } catch(e) {}
        }
      })
      .catch(function(){});
  }

  // 출생 일간 계산 (pico_profile에서)
  try {
    var _prof = JSON.parse(localStorage.getItem('pico_profile')||'{}');

// ── 일진 카드 ────────────────────────────────────────────────
function renderIlganCard(y, m, d) {
  var t = getTodayKST();
  var p = calcDayPillar(y, m, d);
  var isToday = (y===t.y && m===t.m && d===t.d);
  var stemColor   = EL_COLOR[p.el] || '#7a5e1c';
  var branchEl    = BRANCH_EL[BRANCHES.indexOf(p.branch)] || p.el;
  var branchColor = EL_COLOR[branchEl] || '#7a5e1c';
  document.getElementById('ilganStemH').textContent        = p.stemH;
  document.getElementById('ilganStemH').style.color        = stemColor;
  document.getElementById('ilganTitle').style.color        = stemColor;
  document.getElementById('ilganBranchH').textContent      = p.branchH;
  document.getElementById('ilganBranchH').style.color      = branchColor;
  document.getElementById('ilganDate').textContent = (isToday ? '오늘 · ' : (m+'월 '+d+'일 · ')) + p.stem+p.branch+'일';
  document.getElementById('ilganTitle').innerHTML = EL_EMOJI[p.el] + ' ' + EL_DESC[p.el];
  document.getElementById('ilganDesc').textContent = BRANCH_DESC[p.branch] || '';
}

// ── 뷰 전환 ─────────────────────────────────────────────────
function setView(v, init) {
  ['write','calendar','monthly'].forEach(function(n) {
    var vEl = document.getElementById('view'+n.charAt(0).toUpperCase()+n.slice(1));
    var nEl = document.getElementById('nav'+n.charAt(0).toUpperCase()+n.slice(1));
    if (vEl) vEl.style.display = (v===n) ? '' : 'none';
    if (nEl) nEl.classList.toggle('active', v===n);
  });
  if (v==='write'    && _user) loadTodayDiary();
  if (v==='calendar')          loadCalendar();
  if (v==='monthly')           loadMonthlyStats();
}

// ── 같은 일간 오늘의 기분 ─────────────────────────────────────
async function loadSameIlganMoods() {
  if (!_birthIlgan) return;
  var t = getTodayKST();
  var ds = dateStr(t.y, t.m, t.d);
  try {
    // 같은 출생 일간 유저 목록 조회
    var subR = await fetch(SB_URL+'/rest/v1/pico_push_subscriptions?ilgan=eq.'+encodeURIComponent(_birthIlgan)+'&select=user_id', {headers:sbH});
    var subs = await subR.json();
    if (!Array.isArray(subs) || subs.length === 0) return;
    var ids = subs.map(function(s){return s.user_id;}).filter(Boolean);

    // 오늘 해당 유저들의 기분 조회
    var moodR = await fetch(SB_URL+'/rest/v1/saju_diary?date=eq.'+ds+'&user_id=in.('+ids.join(',')+')'+'&select=mood', {headers:sbH});
    var entries = await moodR.json();
    if (!Array.isArray(entries) || entries.length === 0) return;

    var mc={good:0,normal:0,bad:0,energetic:0,tired:0};
    entries.forEach(function(e){ if(mc[e.mood]!==undefined) mc[e.mood]++; });
    var total = entries.length;

    var html = '';
    ['energetic','good','normal','tired','bad'].forEach(function(k){
      if(mc[k]===0) return;
      var pct = Math.round(mc[k]/total*100);
      html += '<div class="mood-share-item"><span class="ms-emoji">'+MOOD_EMOJI[k]+'</span><span class="ms-info">'+mc[k]+'명 · '+pct+'%</span></div>';
    });

    var card = document.getElementById('sameIlganCard');
    document.getElementById('sameIlganTitle').textContent = _birthIlgan+'일간 친구들 오늘의 기분 · '+total+'명 기록';
    document.getElementById('sameIlganMoods').innerHTML = html;
    card.style.display = '';
  } catch(e) {}
}

// ── 저장 + AI 피드백 ─────────────────────────────────────────
async function submitDiary(skipMemo) {
  if (!_user || !_currentMood) return;
  var t = getTodayKST();
  var ds = dateStr(t.y, t.m, t.d);
  var p  = calcDayPillar(t.y, t.m, t.d);
  var pt = calcDayPillar(t.y, t.m, t.d+1); // 내일
  var memo = skipMemo ? '' : ((document.getElementById('memoInput').value||'').trim());

  showStep(4);

  // Supabase 저장
  try {
    var delRes = await fetch(SB_URL+'/rest/v1/saju_diary?user_id=eq.'+encodeURIComponent(_user.id)+'&date=eq.'+ds, { method:'DELETE', headers:sbH });
    console.log('[diary] DELETE status:', delRes.status);
    var insRes = await fetch(SB_URL+'/rest/v1/saju_diary', {
      method:'POST',
      headers:Object.assign({},sbH,{Prefer:'return=representation'}),
      body:JSON.stringify({ user_id:_user.id, date:ds, mood:_currentMood, events:_selectedEvents, memo:memo||null, ilgan:p.stem, ai_feedback:null })
    });
    var insBody = await insRes.json();
    console.log('[diary] INSERT status:', insRes.status, insBody);
  } catch(e) { console.warn('[diary save]',e); }

  // localStorage 캐시 (홈 CTA용)
  try { localStorage.setItem('pico_diary_'+ds, _currentMood); } catch(e) {}

  // 용신 펫 EXP 연동 (일기 저장 시 +20)
  try {
    var _ps = JSON.parse(localStorage.getItem('yongsin_pet') || '{}');
    if (_ps.element) {
      _ps.exp = (_ps.exp || 0) + 20;
      var _pn = (_ps.level || 1) * (_ps.level || 1) * 100;
      if (_ps.exp >= _pn) { _ps.exp -= _pn; _ps.level = (_ps.level || 1) + 1; }
      localStorage.setItem('yongsin_pet', JSON.stringify(_ps));
      if (window._refreshPetCard) window._refreshPetCard();
    }
    // 오늘의 미션 일기 완료 플래그
    localStorage.setItem('pet_mission_diary', new Date(Date.now() + 9*3600000).toISOString().slice(0,10));
  } catch(e) {}

  // 캘린더/통계 즉시 갱신 (AI 피드백 기다리지 않고 저장 직후 반영)
  _calDiaries[ds] = { date: ds, mood: _currentMood };
  renderCalendar();
  loadMonthlyStats();
  loadSameIlganMoods();

  // AI 피드백
  var feedback = '';
  try {
    var aiRes = await fetch('https://fortuna-silk.vercel.app/api/diary-feedback', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ ilgan:p.stem, tomorrow_ilgan:pt.stem, mood:_currentMood, events:_selectedEvents, memo:memo||null })
    });
    var aiData = await aiRes.json();
    feedback = aiData.feedback || '';
  } catch(e) { feedback = '피드백을 불러오지 못했어. 나중에 다시 확인해봐.'; }

  // 피드백 Supabase 업데이트
  if (feedback) {
    await fetch(SB_URL+'/rest/v1/saju_diary?user_id=eq.'+encodeURIComponent(_user.id)+'&date=eq.'+ds, {
      method:'PATCH', headers:Object.assign({},sbH,{Prefer:'return=minimal'}),
      body:JSON.stringify({ ai_feedback:feedback })
    }).catch(function(){});
  }

  document.getElementById('feedbackContent').innerHTML =
    '<div class="feedback-box">'+esc(feedback)+'</div>'
    +'<button class="btn-primary" style="margin-top:12px;" onclick="loadTodayDiary()">확인했어 ✓</button>';
}

async function loadCalendar() {
  if (!_user) { showLoginPromptInEl('calGrid',7); return; }
  document.getElementById('calMonthTitle').textContent = _calY+'년 '+_calM+'월';
  var lastDay = new Date(_calY,_calM,0).getDate();
  var sd = dateStr(_calY,_calM,1), ed = dateStr(_calY,_calM,lastDay);
  _calDiaries = {};
  try {
    var r = await fetch(SB_URL+'/rest/v1/saju_diary?user_id=eq.'+encodeURIComponent(_user.id)+'&date=gte.'+sd+'&date=lte.'+ed+'&select=date,mood',{ headers:sbH });
    var rows = await r.json();
    if (Array.isArray(rows)) rows.forEach(function(row){ _calDiaries[row.date]=row; });
  } catch(e) {}
  renderCalendar();
}

function renderCalendar() {
  var grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  var firstDay = new Date(_calY, _calM-1, 1).getDay();
  var days = new Date(_calY, _calM, 0).getDate();
  var t = getTodayKST();
  for (var i=0; i<firstDay; i++) {
    var em = document.createElement('div'); em.className='cal-cell empty'; grid.appendChild(em);
  }
  for (var d=1; d<=days; d++) {
    var cell = document.createElement('div'); cell.className='cal-cell';
    var ds = dateStr(_calY,_calM,d);
    if (_calY===t.y && _calM===t.m && d===t.d) cell.classList.add('today');
    if (_calDiaries[ds]) {
      cell.classList.add('has-diary');
      cell.innerHTML='<span class="cal-date">'+d+'</span><span class="cal-emoji">'+MOOD_EMOJI[_calDiaries[ds].mood]+'</span>';
      (function(s){ cell.addEventListener('click',function(){ showDetail(s); }); })(ds);
    } else {
      cell.innerHTML='<span class="cal-date" style="color:rgba(80,55,30,0.32);">'+d+'</span>';
    }
    grid.appendChild(cell);
  }
}

function calMove(dir) {
  _calM += dir;
  if (_calM<1){_calM=12;_calY--;} if(_calM>12){_calM=1;_calY++;}
  loadCalendar();
}

// ── 월별 통계 ────────────────────────────────────────────────
async function loadMonthlyStats() {
  if (!_user) { return; }
  document.getElementById('statsMonthTitle').textContent = _calY+'년 '+_calM+'월 통계';
  var lastDay = new Date(_calY,_calM,0).getDate();
  var sd = dateStr(_calY,_calM,1), ed = dateStr(_calY,_calM,lastDay);
  try {
    var r = await fetch(SB_URL+'/rest/v1/saju_diary?user_id=eq.'+encodeURIComponent(_user.id)+'&date=gte.'+sd+'&date=lte.'+ed+'&select=date,mood,ilgan',{ headers:sbH });
    var rows = await r.json();
    if (!Array.isArray(rows)||rows.length===0) {
      document.getElementById('statsTotalDays').textContent='이번 달 기록 없음';
      document.getElementById('moodChart').innerHTML='<div class="empty-state"><div class="ei"><i class="pi pi-book"></i></div><p>아직 기록이 없어.<br>오늘부터 써봐!</p></div>';
      document.getElementById('accuracyPct').textContent='—%';
      document.getElementById('accuracyDesc').textContent='';
      return;
    }
    document.getElementById('statsTotalDays').textContent='총 '+rows.length+'일 기록';
    // 기분 분포
    var mc={good:0,normal:0,bad:0,energetic:0,tired:0};
    rows.forEach(function(r){ if(mc[r.mood]!==undefined) mc[r.mood]++; });
    var chartHtml='';
    ['good','energetic','normal','tired','bad'].forEach(function(k){
      if(mc[k]===0) return;
      var pct=Math.round(mc[k]/rows.length*100);
      chartHtml+='<div class="stat-row"><div class="stat-label">'+MOOD_EMOJI[k]+' '+MOOD_LABEL[k]+'</div><div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:'+pct+'%"></div></div><div class="stat-count">'+mc[k]+'일</div></div>';
    });
    document.getElementById('moodChart').innerHTML=chartHtml;
    // 일진 적중률 — 5단계 점수제 (부분 점수 포함)
    var _STEL={'갑':'목','을':'목','병':'화','정':'화','무':'토','기':'토','경':'금','신':'금','임':'수','계':'수'};
    var _生={'목':'화','화':'토','토':'금','금':'수','수':'목'};
    var _克={'목':'토','화':'금','토':'수','금':'목','수':'화'};
    // 일진 등급 0~4: 흉(0) 약흉(1) 소길(2) 길(3) 최길(4)
    function _dayGrade(stemEl, ys) {
      if (!ys || !stemEl) return 2;
      if (stemEl===ys)           return 4; // 동일: 최길
      if (_生[stemEl]===ys)      return 3; // 일간이 용신 生: 길
      if (_生[ys]===stemEl)      return 2; // 용신이 일간 生: 소길
      if (_克[ys]===stemEl)      return 1; // 용신이 일간 克: 약흉
      if (_克[stemEl]===ys)      return 0; // 일간이 용신 克: 흉
      return 2;
    }
    var _MOOD_G={energetic:4,good:3,normal:2,tired:1,bad:0};
    var _GRADE_LABEL=['흉','약흉','소길','길','최길'];
    var _GRADE_COLOR=['#ef5350','#ff8a65','#9575cd','#66bb6a','#ffd54f'];
    var totalScore=0, perfectHit=0, nearHit=0, missHit=0;
    var gradeDist=[0,0,0,0,0]; // 일진 등급별 일수
    rows.forEach(function(row){
      var pts=row.date.split('-'),y2=parseInt(pts[0]),m2=parseInt(pts[1]),d2=parseInt(pts[2]);
      var p=calcDayPillar(y2,m2,d2);
      var stemEl=_STEL[p.stem]||'';
      var dg=_dayGrade(stemEl,_userYongshin);
      var mg=(_MOOD_G[row.mood]!==undefined)?_MOOD_G[row.mood]:2;
      gradeDist[dg]++;
      var diff=Math.abs(dg-mg);
      if(diff===0){ totalScore+=2; perfectHit++; }
      else if(diff===1){ totalScore+=1; nearHit++; }
      else { missHit++; }
    });
    var maxScore=rows.length*2;
    var pct=maxScore>0?Math.round(totalScore/maxScore*100):0;
    document.getElementById('accuracyPct').textContent= _userYongshin ? pct+'%' : '—%';
    document.getElementById('accuracyDesc').textContent= _userYongshin
      ? '완전 적중 '+perfectHit+'일 · 근접 '+nearHit+'일 · 빗나감 '+missHit+'일'
      : '사주 분석 후 이용 가능';
    // 등급 분포 뱃지
    var gradeHtml='';
    if (_userYongshin) {
      [4,3,2,1,0].forEach(function(g){
        if(gradeDist[g]>0) gradeHtml+='<span style="font-size:11px;padding:3px 8px;border-radius:20px;background:'+_GRADE_COLOR[g]+'22;color:'+_GRADE_COLOR[g]+';border:1px solid '+_GRADE_COLOR[g]+'44;">'+_GRADE_LABEL[g]+' '+gradeDist[g]+'일</span>';
      });
    }
    document.getElementById('accuracyGrade').innerHTML=gradeHtml;
  } catch(e) { document.getElementById('statsTotalDays').textContent='통계를 불러오지 못했어'; }
}
