<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>사주일기 · PICO Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c28; --border:#2a2a3d;
  --accent:#7b5ea7; --gold:#d4af37; --text:#f0f0f5; --muted:#8b8ba8; --radius:16px;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; padding-bottom:80px; }

/* NAV */
nav{ position:sticky; top:0; z-index:100; background:rgba(10,10,15,0.92); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:0 16px; height:56px; display:flex; align-items:center; gap:10px; }
.nav-back{ background:none; border:none; color:var(--muted); font-size:26px; cursor:pointer; padding:0 6px 0 0; line-height:1; }
.nav-title{ font-family:'Noto Serif KR',serif; font-weight:700; font-size:16px; color:var(--gold); flex:1; }
.nav-tabs{ display:flex; gap:4px; }
.nav-tab{ background:none; border:none; cursor:pointer; font-size:12px; font-weight:600; color:var(--muted); padding:5px 10px; border-radius:20px; transition:all 0.2s; font-family:'Noto Sans KR',sans-serif; }
.nav-tab.active{ background:rgba(123,94,167,0.2); color:#c4a7f0; }

/* ILGAN CARD */
.ilgan-card{ margin:14px 16px 0; background:linear-gradient(135deg,rgba(123,94,167,0.14),rgba(212,175,55,0.07)); border:1px solid rgba(123,94,167,0.28); border-radius:var(--radius); padding:14px 16px; display:flex; align-items:center; gap:14px; }
.ilgan-pillar{ text-align:center; flex-shrink:0; width:44px; }
.ilgan-stem-h{ font-family:'Noto Serif KR',serif; font-size:26px; font-weight:700; line-height:1.1; }
.ilgan-branch-h{ font-family:'Noto Serif KR',serif; font-size:18px; color:rgba(240,240,245,0.5); line-height:1.1; }
.ilgan-info{ flex:1; }
.ilgan-date{ font-size:11px; color:var(--muted); margin-bottom:2px; }
.ilgan-title{ font-size:14px; font-weight:600; margin-bottom:3px; }
.ilgan-desc{ font-size:12px; color:var(--muted); line-height:1.4; }

/* CARD */
.card{ margin:12px 16px 0; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; }
.card-title{ font-size:14px; font-weight:700; color:var(--gold); margin-bottom:3px; }
.card-sub{ font-size:12px; color:var(--muted); margin-bottom:14px; }

/* MOOD */
.mood-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.mood-btn{ background:var(--surface2); border:1.5px solid var(--border); border-radius:12px; padding:12px 6px; text-align:center; cursor:pointer; transition:all 0.18s; display:flex; flex-direction:column; align-items:center; gap:4px; }
.mood-btn .emoji{ font-size:22px; }
.mood-btn .label{ font-size:11px; color:var(--muted); font-weight:600; }
.mood-btn.selected{ background:rgba(212,175,55,0.1); border-color:var(--gold); }
.mood-btn.selected .label{ color:var(--gold); }

/* EVENTS */
.event-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
.event-btn{ background:var(--surface2); border:1.5px solid var(--border); border-radius:10px; padding:10px 12px; cursor:pointer; transition:all 0.18s; display:flex; align-items:center; gap:7px; font-size:13px; font-weight:500; color:var(--muted); }
.event-btn.selected{ background:rgba(123,94,167,0.14); border-color:rgba(123,94,167,0.45); color:var(--text); }

/* BUTTONS */
.btn-primary{ width:100%; padding:13px; background:linear-gradient(135deg,var(--accent),#a07fd4); color:#fff; border:none; border-radius:12px; font-size:14px; font-weight:700; cursor:pointer; transition:all 0.2s; margin-top:10px; font-family:'Noto Sans KR',sans-serif; }
.btn-primary:active{ transform:scale(0.98); }
.btn-ghost{ width:100%; padding:11px; background:none; color:var(--muted); border:1px solid var(--border); border-radius:12px; font-size:13px; cursor:pointer; margin-top:8px; font-family:'Noto Sans KR',sans-serif; }

/* MEMO */
.memo-area{ width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:14px; line-height:1.6; padding:12px; resize:none; outline:none; font-family:'Noto Sans KR',sans-serif; min-height:80px; }
.memo-area:focus{ border-color:rgba(123,94,167,0.45); }

/* AI FEEDBACK */
.feedback-box{ background:rgba(123,94,167,0.07); border:1px solid rgba(123,94,167,0.22); border-radius:12px; padding:14px; font-size:14px; line-height:1.8; min-height:56px; }

/* COMPLETED */
.completed-mood{ text-align:center; font-size:44px; margin:8px 0; }
.ev-tags{ display:flex; flex-wrap:wrap; gap:6px; margin:10px 0; }
.ev-tag{ background:rgba(123,94,167,0.12); border:1px solid rgba(123,94,167,0.25); border-radius:20px; padding:4px 10px; font-size:12px; color:#c4a7f0; }

/* SPINNER */
.spinner{ width:24px; height:24px; margin:16px auto; border:2px solid rgba(123,94,167,0.25); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }

/* CALENDAR */
.cal-header{ display:flex; align-items:center; justify-content:space-between; margin:14px 16px 10px; }
.cal-month-title{ font-family:'Noto Serif KR',serif; font-size:17px; font-weight:700; color:var(--gold); }
.cal-nav-btn{ background:none; border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:5px 12px; cursor:pointer; font-size:14px; }
.cal-grid{ margin:0 16px; display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-day-label{ text-align:center; font-size:10px; color:var(--muted); padding:3px 0; font-weight:600; }
.cal-cell{ aspect-ratio:1; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; background:var(--surface2); border:1px solid transparent; transition:background 0.15s; }
.cal-cell.empty{ background:transparent; }
.cal-cell.today{ border-color:rgba(212,175,55,0.45); }
.cal-cell.has-diary{ background:rgba(123,94,167,0.14); border-color:rgba(123,94,167,0.3); cursor:pointer; }
.cal-cell .cal-date{ font-size:10px; color:var(--muted); line-height:1; }
.cal-cell .cal-emoji{ font-size:15px; line-height:1; }

/* DETAIL OVERLAY */
.overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:300; display:flex; align-items:flex-end; justify-content:center; }
.sheet{ background:var(--surface); border-radius:20px 20px 0 0; padding:20px 20px 44px; width:100%; max-width:480px; max-height:72vh; overflow-y:auto; }
.sheet-handle{ width:36px; height:4px; border-radius:2px; background:var(--border); margin:0 auto 18px; }

/* STATS */
.stat-row{ display:flex; align-items:center; gap:8px; margin-bottom:9px; }
.stat-label{ font-size:12px; min-width:88px; }
.stat-bar-wrap{ flex:1; background:var(--surface2); border-radius:4px; height:7px; overflow:hidden; }
.stat-bar-fill{ height:100%; border-radius:4px; background:linear-gradient(90deg,var(--accent),#a07fd4); transition:width 0.6s ease; }
.stat-count{ font-size:11px; color:var(--muted); min-width:26px; text-align:right; }
.accuracy-card{ background:rgba(212,175,55,0.07); border:1px solid rgba(212,175,55,0.22); border-radius:12px; padding:16px; margin-top:8px; text-align:center; }
.accuracy-pct{ font-size:38px; font-weight:800; color:var(--gold); font-family:'Noto Serif KR',serif; }

/* EMPTY */
.empty-state{ text-align:center; padding:52px 24px; color:var(--muted); }
.empty-state .ei{ font-size:36px; margin-bottom:10px; }
.empty-state p{ font-size:13px; line-height:1.6; }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <button class="nav-back" onclick="history.back()">‹</button>
  <div class="nav-title">사주일기 📔</div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="navWrite"    onclick="setView('write')">오늘</button>
    <button class="nav-tab"        id="navCalendar" onclick="setView('calendar')">캘린더</button>
    <button class="nav-tab"        id="navMonthly"  onclick="setView('monthly')">통계</button>
  </div>
</nav>

<!-- 오늘 일진 -->
<div class="ilgan-card" id="ilganCard">
  <div class="ilgan-pillar">
    <div class="ilgan-stem-h"   id="ilganStemH">—</div>
    <div class="ilgan-branch-h" id="ilganBranchH">—</div>
  </div>
  <div class="ilgan-info">
    <div class="ilgan-date"  id="ilganDate"></div>
    <div class="ilgan-title" id="ilganTitle"></div>
    <div class="ilgan-desc"  id="ilganDesc"></div>
  </div>
</div>

<!-- ═══ WRITE VIEW ═══ -->
<div id="viewWrite">

  <!-- 완료 상태 -->
  <div id="completedState" style="display:none;">
    <div class="card">
      <div class="card-title">오늘의 기록 ✓</div>
      <div class="card-sub" id="completedDateLabel"></div>
      <div class="completed-mood" id="completedMoodEmoji"></div>
      <div class="ev-tags" id="completedEventTags"></div>
      <div id="completedMemo" style="font-size:13px;color:var(--muted);margin-bottom:12px;font-style:italic;"></div>
      <div class="card-title" style="margin-bottom:6px;">✦ 우주의 코멘트</div>
      <div class="feedback-box" id="completedFeedback"></div>
      <button class="btn-ghost" style="margin-top:12px;" onclick="resetTodayDiary()">다시 기록하기</button>
    </div>
  </div>

  <!-- 작성 단계 -->
  <div id="writeSteps">

    <!-- STEP 1: 기분 -->
    <div class="card" id="step1">
      <div class="card-title">오늘 기분이 어때?</div>
      <div class="card-sub">하나만 골라봐</div>
      <div class="mood-grid">
        <div class="mood-btn" data-mood="good"      onclick="selectMood(this)"><span class="emoji">😊</span><span class="label">좋았어</span></div>
        <div class="mood-btn" data-mood="normal"    onclick="selectMood(this)"><span class="emoji">😐</span><span class="label">평범했어</span></div>
        <div class="mood-btn" data-mood="bad"       onclick="selectMood(this)"><span class="emoji">😔</span><span class="label">힘들었어</span></div>
        <div class="mood-btn" data-mood="energetic" onclick="selectMood(this)"><span class="emoji">🔥</span><span class="label">에너지 넘쳤어</span></div>
        <div class="mood-btn" data-mood="tired"     onclick="selectMood(this)"><span class="emoji">💤</span><span class="label">지쳤어</span></div>
      </div>
      <button class="btn-primary" id="step1Next" onclick="showStep(2)" style="display:none;">다음 →</button>
    </div>

    <!-- STEP 2: 있었던 일 -->
    <div class="card" id="step2" style="display:none;">
      <div class="card-title">어떤 일이 있었어?</div>
      <div class="card-sub">여러 개 선택 가능해</div>
      <div class="event-grid">
        <div class="event-btn" data-event="돈/재물"   onclick="toggleEvent(this)">💰 돈/재물</div>
        <div class="event-btn" data-event="일/커리어"  onclick="toggleEvent(this)">💼 일/커리어</div>
        <div class="event-btn" data-event="연애/관계"  onclick="toggleEvent(this)">❤️ 연애/관계</div>
        <div class="event-btn" data-event="가족"      onclick="toggleEvent(this)">👨‍👩‍👧 가족</div>
        <div class="event-btn" data-event="인간관계"   onclick="toggleEvent(this)">🤝 인간관계</div>
        <div class="event-btn" data-event="건강"      onclick="toggleEvent(this)">🌿 건강</div>
        <div class="event-btn" data-event="공부"      onclick="toggleEvent(this)">📚 공부</div>
        <div class="event-btn" data-event="좋은 소식"  onclick="toggleEvent(this)">🎉 좋은 소식</div>
        <div class="event-btn" data-event="갈등"      onclick="toggleEvent(this)">😤 갈등</div>
        <div class="event-btn" data-event="변화/결정"  onclick="toggleEvent(this)">🌀 변화/결정</div>
      </div>
      <button class="btn-primary" onclick="showStep(3)">다음 →</button>
      <button class="btn-ghost"   onclick="showStep(1)">← 이전</button>
    </div>

    <!-- STEP 3: 메모 -->
    <div class="card" id="step3" style="display:none;">
      <div class="card-title">한 줄 메모 (선택)</div>
      <div class="card-sub">오늘 기억하고 싶은 것</div>
      <textarea class="memo-area" id="memoInput" placeholder="오늘 있었던 일을 자유롭게 써봐..." maxlength="200"></textarea>
      <button class="btn-primary" onclick="submitDiary(false)">저장하고 AI 피드백 받기 ✦</button>
      <button class="btn-ghost"   onclick="showStep(2)">← 이전</button>
      <button class="btn-ghost"   onclick="submitDiary(true)">건너뛰기</button>
    </div>

    <!-- STEP 4: AI 피드백 -->
    <div class="card" id="step4" style="display:none;">
      <div class="card-title">✦ 우주의 코멘트</div>
      <div class="card-sub">오늘 일진과 하루를 연결해서</div>
      <div id="feedbackContent"><div class="spinner"></div></div>
    </div>

  </div><!-- /writeSteps -->
</div><!-- /viewWrite -->

<!-- ═══ CALENDAR VIEW ═══ -->
<div id="viewCalendar" style="display:none;">
  <div class="cal-header">
    <button class="cal-nav-btn" onclick="calMove(-1)">‹</button>
    <div class="cal-month-title" id="calMonthTitle"></div>
    <button class="cal-nav-btn" onclick="calMove(1)">›</button>
  </div>
  <div class="cal-grid" id="calDayLabels">
    <div class="cal-day-label">일</div><div class="cal-day-label">월</div>
    <div class="cal-day-label">화</div><div class="cal-day-label">수</div>
    <div class="cal-day-label">목</div><div class="cal-day-label">금</div>
    <div class="cal-day-label">토</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- ═══ MONTHLY STATS VIEW ═══ -->
<div id="viewMonthly" style="display:none;">
  <div style="margin:14px 16px 0;">
    <div style="font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;color:var(--gold);" id="statsMonthTitle"></div>
    <div style="font-size:12px;color:var(--muted);margin-top:2px;" id="statsTotalDays"></div>
  </div>
  <div class="card">
    <div class="card-title">기분 분포</div>
    <div id="moodChart" style="margin-top:8px;"></div>
  </div>
  <div class="card">
    <div class="card-title">일진 적중률</div>
    <div class="card-sub">예측한 기운과 실제 하루가 얼마나 맞았나</div>
    <div class="accuracy-card">
      <div class="accuracy-pct" id="accuracyPct">—%</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px;" id="accuracyDesc"></div>
    </div>
  </div>
</div>

<!-- 날짜 상세 시트 -->
<div id="detailOverlay" class="overlay" style="display:none;" onclick="closeDetail(event)">
  <div class="sheet" id="detailSheet">
    <div class="sheet-handle"></div>
    <div id="detailContent"></div>
  </div>
</div>

<script>
var SB_URL = 'https://ymghmfkqctckxxysxkvy.supabase.co';
var SB_KEY = 'sb_publishable_3-9zobXqx6Nv36LzmNMBpA_fohZqA5x';
var sbH = { apikey:SB_KEY, Authorization:'Bearer '+SB_KEY, 'Content-Type':'application/json' };

// ── 사주 상수 ────────────────────────────────────────────────
var MONTH_STEM_BASE = [2,4,6,8,0];
var STEMS    = ['갑','을','병','정','무','기','경','신','임','계'];
var BRANCHES = ['자','축','인','묘','진','사','오','미','신','유','술','해'];
var STEM_H   = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
var BRANCH_H = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
var STEM_EL  = ['목','목','화','화','토','토','금','금','수','수'];
var EL_COLOR = {목:'#4caf50',화:'#ff5252',토:'#ffca28',금:'#bdbdbd',수:'#64b5f6'};
var EL_EMOJI = {목:'🌿',화:'🔥',토:'🌍',금:'⚡',수:'🌊'};
var EL_DESC  = {
  목:'새싹처럼 뻗어나가는 성장의 기운',화:'태양처럼 타오르는 열정의 기운',
  토:'대지처럼 안정되고 포용하는 기운',금:'칼날처럼 예리하고 결단력 있는 기운',
  수:'강물처럼 깊고 지혜로운 기운'
};
var BRANCH_DESC = {
  자:'직관이 예민해지는 밤의 기운',축:'묵묵히 견디는 인내의 기운',
  인:'용감하게 앞서가는 도전의 기운',묘:'섬세하고 감성적인 기운',
  진:'변화와 잠재력을 품은 기운',사:'통찰과 집중력이 깊어지는 기운',
  오:'열정적이고 사교적인 기운',미:'예술적 감수성과 배려의 기운',

};

var MOOD_LABEL = {good:'좋았어',normal:'평범했어',bad:'힘들었어',energetic:'에너지 넘쳤어',tired:'지쳤어'};

// ── 일진 계산 (index.html과 동일 공식) ──────────────────────
function calcDayPillar(y, m, d) {
  var birthMs = Date.UTC(y, m-1, d);
  var di = (((Math.round((birthMs - Date.UTC(2024,1,10)) / 86400000)) + 40) % 60 + 60) % 60;
  var dSi = di % 10, dBi = di % 12;
  return { stem:STEMS[dSi], branch:BRANCHES[dBi], stemH:STEM_H[dSi], branchH:BRANCH_H[dBi], el:STEM_EL[dSi] };
}

function getTodayKST() {
  var d = new Date(Date.now() + 9*3600000);
  return { y:d.getUTCFullYear(), m:d.getUTCMonth()+1, d:d.getUTCDate() };
}
function dateStr(y, m, d) {
  return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');
}

// ── 상태 ────────────────────────────────────────────────────
var _user = null, _currentMood = null, _selectedEvents = [];
var _calY, _calM, _calDiaries = {};
var _userYongshin = ''; // pico_push_subscriptions에서 로드

// ── 초기화 ──────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  try { _user = JSON.parse(localStorage.getItem('pico_user')); } catch(e) {}

  // 용신 로드: pico_push_subscriptions 우선 → 없으면 pico_profile로 /saju-test 호출
  if (_user) {
    fetch(SB_URL+'/rest/v1/pico_push_subscriptions?user_id=eq.'+encodeURIComponent(_user.id)+'&select=yongshin',{ headers:sbH })
      .then(function(r){ return r.json(); })
      .then(function(rows){
        if (Array.isArray(rows) && rows[0] && rows[0].yongshin) {
          _userYongshin = rows[0].yongshin;
        } else {
          // 푸시 미구독자 → pico_profile로 직접 계산
          try {
            var prof = JSON.parse(localStorage.getItem('pico_profile')||'{}');
            if (prof.year && prof.month && prof.day) {
              var birth = prof.year+'-'+(String(prof.month).padStart(2,'0'))+'-'+(String(prof.day).padStart(2,'0'))+(prof.hour!=null?'T'+(String(prof.hour).padStart(2,'0'))+':00':'');
              fetch('https://fortuna.kkdmb7.workers.dev/saju-test',{
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({ birth:birth, gender:prof.gender||'M', calendar:'solar' })
              }).then(function(r2){ return r2.json(); })
                .then(function(sd){ _userYongshin = (sd.yongshin && sd.yongshin.primary) || ''; })
                .catch(function(){});
            }
          } catch(e) {}
        }
      })
      .catch(function(){});
  }

  var t = getTodayKST();
  renderIlganCard(t.y, t.m, t.d);
  _calY = t.y; _calM = t.m;

  var params = new URLSearchParams(window.location.search);
  setView(params.get('view') || 'write', true);
});

// ── 일진 카드 ────────────────────────────────────────────────
function renderIlganCard(y, m, d) {
  var t = getTodayKST();
  var p = calcDayPillar(y, m, d);
  var isToday = (y===t.y && m===t.m && d===t.d);
  var stemColor = EL_COLOR[p.el] || '#c4a7f0';
  document.getElementById('ilganStemH').textContent = p.stemH;
  document.getElementById('ilganStemH').style.color = stemColor;
  document.getElementById('ilganBranchH').textContent = p.branchH;
  document.getElementById('ilganDate').textContent = (isToday ? '오늘 · ' : (m+'월 '+d+'일 · ')) + p.stem+p.branch+'일';
  document.getElementById('ilganTitle').textContent = EL_EMOJI[p.el] + ' ' + EL_DESC[p.el];
  document.getElementById('ilganDesc').textContent = BRANCH_DESC[p.branch] || '';
}

// ── 뷰 전환 ─────────────────────────────────────────────────
function setView(v, init) {
  ['write','calendar','monthly'].forEach(function(n) {
    var vEl = document.getElementById('view'+n.charAt(0).toUpperCase()+n.slice(1));
    var nEl = document.getElementById('nav'+n.charAt(0).toUpperCase()+n.slice(1));
    if (vEl) vEl.style.display = (v===n) ? '' : 'none';
    if (nEl) nEl.classList.toggle('active', v===n);
  });
  if (v==='write'    && _user) loadTodayDiary();
  if (v==='calendar')          loadCalendar();
  if (v==='monthly')           loadMonthlyStats();
}

// ── 오늘 일기 로드 ───────────────────────────────────────────
async function loadTodayDiary() {
  if (!_user) { showLoginPrompt('viewWrite'); return; }
  var t = getTodayKST();
  var ds = dateStr(t.y, t.m, t.d);
  try {
    var r = await fetch(SB_URL+'/rest/v1/saju_diary?user_id=eq.'+encodeURIComponent(_user.id)+'&date=eq.'+ds+'&select=*', { headers:sbH });
    var rows = await r.json();
    if (Array.isArray(rows) && rows.length > 0) { showCompletedState(rows[0]); return; }
  } catch(e) {}
  document.getElementById('completedState').style.display = 'none';
  document.getElementById('writeSteps').style.display = '';
  showStep(1);
}

// ── 완료 상태 ────────────────────────────────────────────────
function showCompletedState(row) {
  document.getElementById('completedState').style.display = '';
  document.getElementById('writeSteps').style.display = 'none';
  var t = getTodayKST();
  document.getElementById('completedDateLabel').textContent = t.m+'월 '+t.d+'일 기록 완료';
  document.getElementById('completedMoodEmoji').textContent = MOOD_EMOJI[row.mood] || '—';
  var tags = document.getElementById('completedEventTags');
  tags.innerHTML = (row.events||[]).map(function(ev){ return '<span class="ev-tag">'+ev+'</span>'; }).join('');
  var memoEl = document.getElementById('completedMemo');
  memoEl.textContent = row.memo ? '"'+row.memo+'"' : '';
  memoEl.style.display = row.memo ? '' : 'none';
  document.getElementById('completedFeedback').textContent = row.ai_feedback || '피드백 없음';
}

// ── 단계 ────────────────────────────────────────────────────
function showStep(n) {
  [1,2,3,4].forEach(function(i) {
    var el = document.getElementById('step'+i);
    if (el) el.style.display = (i===n) ? '' : 'none';
  });
}

function selectMood(btn) {
  document.querySelectorAll('.mood-btn').forEach(function(b){ b.classList.remove('selected'); });
  btn.classList.add('selected');
  _currentMood = btn.getAttribute('data-mood');
  document.getElementById('step1Next').style.display = '';
}

function toggleEvent(btn) {
  btn.classList.toggle('selected');
  var ev = btn.getAttribute('data-event');
  var idx = _selectedEvents.indexOf(ev);
  if (idx>=0) _selectedEvents.splice(idx,1); else _selectedEvents.push(ev);
}

// ── 저장 + AI 피드백 ─────────────────────────────────────────
async function submitDiary(skipMemo) {
  if (!_user || !_currentMood) return;
  var t = getTodayKST();
  var ds = dateStr(t.y, t.m, t.d);
  var p  = calcDayPillar(t.y, t.m, t.d);
  var pt = calcDayPillar(t.y, t.m, t.d+1); // 내일
  var memo = skipMemo ? '' : ((document.getElementById('memoInput').value||'').trim());

  showStep(4);

  // Supabase 저장
  try {
    var delRes = await fetch(SB_URL+'/rest/v1/saju_diary?user_id=eq.'+encodeURIComponent(_user.id)+'&date=eq.'+ds, { method:'DELETE', headers:sbH });
    console.log('[diary] DELETE status:', delRes.status);
    var insRes = await fetch(SB_URL+'/rest/v1/saju_diary', {
      method:'POST',
      headers:Object.assign({},sbH,{Prefer:'return=representation'}),
      body:JSON.stringify({ user_id:_user.id, date:ds, mood:_currentMood, events:_selectedEvents, memo:memo||null, ilgan:p.stem, ai_feedback:null })
    });
    var insBody = await insRes.json();
    console.log('[diary] INSERT status:', insRes.status, insBody);
  } catch(e) { console.warn('[diary save]',e); }

  // localStorage 캐시 (홈 CTA용)
  try { localStorage.setItem('pico_diary_'+ds, _currentMood); } catch(e) {}

  // 캘린더/통계 즉시 갱신 (AI 피드백 기다리지 않고 저장 직후 반영)
  _calDiaries[ds] = { date: ds, mood: _currentMood };
  renderCalendar();
  loadMonthlyStats();

  // AI 피드백
  var feedback = '';
  try {
    var aiRes = await fetch('https://fortuna-silk.vercel.app/api/diary-feedback', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ ilgan:p.stem, tomorrow_ilgan:pt.stem, mood:_currentMood, events:_selectedEvents, memo:memo||null })
    });
    var aiData = await aiRes.json();
    feedback = aiData.feedback || '';
  } catch(e) { feedback = '피드백을 불러오지 못했어. 나중에 다시 확인해봐.'; }

  // 피드백 Supabase 업데이트
  if (feedback) {
    await fetch(SB_URL+'/rest/v1/saju_diary?user_id=eq.'+encodeURIComponent(_user.id)+'&date=eq.'+ds, {
      method:'PATCH', headers:Object.assign({},sbH,{Prefer:'return=minimal'}),
      body:JSON.stringify({ ai_feedback:feedback })
    }).catch(function(){});
  }

  document.getElementById('feedbackContent').innerHTML =
    '<div class="feedback-box">'+esc(feedback)+'</div>'
    +'<button class="btn-primary" style="margin-top:12px;" onclick="loadTodayDiary()">확인했어 ✓</button>';
}

// ── 다시 기록 ────────────────────────────────────────────────
async function resetTodayDiary() {
  if (!_user) return;
  var t = getTodayKST(); var ds = dateStr(t.y,t.m,t.d);
  await fetch(SB_URL+'/rest/v1/saju_diary?user_id=eq.'+encodeURIComponent(_user.id)+'&date=eq.'+ds,{ method:'DELETE',headers:sbH }).catch(function(){});
  try { localStorage.removeItem('pico_diary_'+ds); } catch(e) {}
  _currentMood=null; _selectedEvents=[];
  document.querySelectorAll('.mood-btn,.event-btn').forEach(function(b){ b.classList.remove('selected'); });
  document.getElementById('memoInput').value='';
  document.getElementById('step1Next').style.display='none';
  document.getElementById('completedState').style.display='none';
  document.getElementById('writeSteps').style.display='';
  showStep(1);
}

// ── 캘린더 ──────────────────────────────────────────────────
async function loadCalendar() {
  if (!_user) { showLoginPromptInEl('calGrid',7); return; }
  document.getElementById('calMonthTitle').textContent = _calY+'년 '+_calM+'월';
  var lastDay = new Date(_calY,_calM,0).getDate();
  var sd = dateStr(_calY,_calM,1), ed = dateStr(_calY,_calM,lastDay);
  _calDiaries = {};
  try {
    var r = await fetch(SB_URL+'/rest/v1/saju_diary?user_id=eq.'+encodeURIComponent(_user.id)+'&date=gte.'+sd+'&date=lte.'+ed+'&select=date,mood',{ headers:sbH });
    var rows = await r.json();
    if (Array.isArray(rows)) rows.forEach(function(row){ _calDiaries[row.date]=row; });
  } catch(e) {}
  renderCalendar();
}

function renderCalendar() {
  var grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  var firstDay = new Date(_calY, _calM-1, 1).getDay();
  var days = new Date(_calY, _calM, 0).getDate();
  var t = getTodayKST();
  for (var i=0; i<firstDay; i++) {
    var em = document.createElement('div'); em.className='cal-cell empty'; grid.appendChild(em);
  }
  for (var d=1; d<=days; d++) {
    var cell = document.createElement('div'); cell.className='cal-cell';
    var ds = dateStr(_calY,_calM,d);
    if (_calY===t.y && _calM===t.m && d===t.d) cell.classList.add('today');
    if (_calDiaries[ds]) {
      cell.classList.add('has-diary');
      cell.innerHTML='<span class="cal-date">'+d+'</span><span class="cal-emoji">'+MOOD_EMOJI[_calDiaries[ds].mood]+'</span>';
      (function(s){ cell.addEventListener('click',function(){ showDetail(s); }); })(ds);
    } else {
      cell.innerHTML='<span class="cal-date" style="color:rgba(255,255,255,0.22);">'+d+'</span>';
    }
    grid.appendChild(cell);
  }
}

function calMove(dir) {
  _calM += dir;
  if (_calM<1){_calM=12;_calY--;} if(_calM>12){_calM=1;_calY++;}
  loadCalendar();
}

// ── 날짜 상세 ────────────────────────────────────────────────
async function showDetail(ds) {
  if (!_user) return;
  try {
    var r = await fetch(SB_URL+'/rest/v1/saju_diary?user_id=eq.'+encodeURIComponent(_user.id)+'&date=eq.'+ds+'&select=*',{ headers:sbH });
    var rows = await r.json();
    if (!Array.isArray(rows)||rows.length===0) return;
    var row = rows[0];
    var pts = ds.split('-'), y2=parseInt(pts[0]),m2=parseInt(pts[1]),d2=parseInt(pts[2]);
    var p = calcDayPillar(y2,m2,d2);
    document.getElementById('detailContent').innerHTML =
      '<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">'+m2+'월 '+d2+'일 · '+p.stem+p.branch+'일 '+EL_EMOJI[p.el]+'</div>'
      +'<div style="font-size:36px;margin:8px 0;">'+MOOD_EMOJI[row.mood]+'</div>'
      +'<div style="font-size:15px;font-weight:600;margin-bottom:10px;">'+MOOD_LABEL[row.mood]+'</div>'
      +'<div class="ev-tags" style="margin-bottom:10px;">'+(row.events||[]).map(function(ev){return '<span class="ev-tag">'+ev+'</span>';}).join('')+'</div>'
      +(row.memo?'<div style="font-size:13px;color:var(--muted);margin-bottom:12px;font-style:italic;">"'+esc(row.memo)+'"</div>':'')
      +'<div style="font-size:13px;color:var(--gold);margin-bottom:6px;">✦ 우주의 코멘트</div>'
      +'<div class="feedback-box" style="font-size:13px;">'+esc(row.ai_feedback||'기록 없음')+'</div>';
    document.getElementById('detailOverlay').style.display='flex';
  } catch(e) {}
}
function closeDetail(e){ if(e.target.id==='detailOverlay') document.getElementById('detailOverlay').style.display='none'; }

// ── 월별 통계 ────────────────────────────────────────────────
async function loadMonthlyStats() {
  if (!_user) { return; }
  document.getElementById('statsMonthTitle').textContent = _calY+'년 '+_calM+'월 통계';
  var lastDay = new Date(_calY,_calM,0).getDate();
  var sd = dateStr(_calY,_calM,1), ed = dateStr(_calY,_calM,lastDay);
  try {
    var r = await fetch(SB_URL+'/rest/v1/saju_diary?user_id=eq.'+encodeURIComponent(_user.id)+'&date=gte.'+sd+'&date=lte.'+ed+'&select=date,mood,ilgan',{ headers:sbH });
    var rows = await r.json();
    if (!Array.isArray(rows)||rows.length===0) {
      document.getElementById('statsTotalDays').textContent='이번 달 기록 없음';
      document.getElementById('moodChart').innerHTML='<div class="empty-state"><div class="ei">📔</div><p>아직 기록이 없어.<br>오늘부터 써봐!</p></div>';
      document.getElementById('accuracyPct').textContent='—%';
      document.getElementById('accuracyDesc').textContent='';
      return;
    }
    document.getElementById('statsTotalDays').textContent='총 '+rows.length+'일 기록';
    // 기분 분포
    var mc={good:0,normal:0,bad:0,energetic:0,tired:0};
    rows.forEach(function(r){ if(mc[r.mood]!==undefined) mc[r.mood]++; });
    var chartHtml='';
    ['good','energetic','normal','tired','bad'].forEach(function(k){
      if(mc[k]===0) return;
      var pct=Math.round(mc[k]/rows.length*100);
      chartHtml+='<div class="stat-row"><div class="stat-label">'+MOOD_EMOJI[k]+' '+MOOD_LABEL[k]+'</div><div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:'+pct+'%"></div></div><div class="stat-count">'+mc[k]+'일</div></div>';
    });
    document.getElementById('moodChart').innerHTML=chartHtml;
    // 일진 적중률 (오행 상생/상극 기반)
    var STEM_EL={'갑':'목','을':'목','병':'화','정':'화','무':'토','기':'토','경':'금','신':'금','임':'수','계':'수'};
    var 生Map={'목':'화','화':'토','토':'금','금':'수','수':'목'};
    var 克Map={'목':'토','화':'금','토':'수','금':'목','수':'화'};
    function getDayTone(stemEl, yongshin) {
      if (!yongshin || !stemEl) return 'neutral';
      if (stemEl===yongshin || 生Map[stemEl]===yongshin) return 'good';
      if (克Map[stemEl]===yongshin) return 'caution';
      return 'neutral';
    }
    var gDays=0,gHit=0,bDays=0,bHit=0,nDays=0;
    rows.forEach(function(row){
      var pts=row.date.split('-'),y2=parseInt(pts[0]),m2=parseInt(pts[1]),d2=parseInt(pts[2]);
      var p=calcDayPillar(y2,m2,d2);
      var stemEl=STEM_EL[p.stem]||'';
      var tone=getDayTone(stemEl,_userYongshin);
      var gMood=(row.mood==='good'||row.mood==='energetic');
      var bMood=(row.mood==='bad'||row.mood==='tired');
      if(tone==='good')   { gDays++; if(gMood) gHit++; }
      else if(tone==='caution') { bDays++; if(bMood) bHit++; }
      else nDays++;
    });
    var total=gDays+bDays, match=gHit+bHit;
    var pct=total>0?Math.round(match/total*100):0;
    document.getElementById('accuracyPct').textContent= _userYongshin ? pct+'%' : '—%';
    document.getElementById('accuracyDesc').textContent= _userYongshin
      ? '길일(용신상생)×좋은 하루 '+gHit+'/'+gDays+'  ·  흉일(용신상극)×힘든 하루 '+bHit+'/'+bDays
      : '사주 분석 후 이용 가능';
  } catch(e) { document.getElementById('statsTotalDays').textContent='통계를 불러오지 못했어'; }
}

// ── 유틸 ─────────────────────────────────────────────────────
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function showLoginPrompt(containerId) {
  document.getElementById(containerId).innerHTML =
    '<div class="empty-state"><div class="ei">🔐</div><p>로그인 후 사주일기를 쓸 수 있어</p>'
    +'<button class="btn-primary" style="width:auto;padding:12px 32px;margin:16px auto 0;display:block;" onclick="window.location.href=\'index.html\'">로그인하러 가기</button></div>';
}
function showLoginPromptInEl(elId, colSpan) {
  document.getElementById(elId).innerHTML =
    '<div style="grid-column:1/-1;"><div class="empty-state"><div class="ei">🔐</div><p>로그인 후 이용 가능해</p></div></div>';
}
