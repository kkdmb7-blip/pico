<style>
:root {
  --bg:#f4ede0;--surface:#f9f1de;--surface2:#e8dcc0;--border:#9a8a60;
  --border-soft:rgba(60,40,20,0.22);--accent:#7a2418;--accent2:#2a1f1a;
  --text:#1a120a;--text2:#4a3a2a;--muted:#5a4830;--gold:#8a6a15;
  --gold-deep:#6a4f0c;--ink:#241a10;--orb:#5f8cb5;
  --orb-bg:rgba(122,196,255,0.12);--orb-border:rgba(95,140,181,0.30);
  --radius:14px;
  --shadow-soft:0 1px 3px rgba(60,40,20,0.08),0 6px 20px rgba(60,40,20,0.07);
  --shadow-lift:0 3px 8px rgba(60,40,20,0.12),0 14px 36px rgba(60,40,20,0.14);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif;min-height:100vh;-webkit-text-size-adjust:100%;}
.wrap{max-width:480px;margin:0 auto;padding:0 0 80px;}

/* NAV */
nav{display:flex;align-items:center;padding:14px 16px 10px;gap:8px;border-bottom:1px solid var(--border-soft);background:var(--surface);}
.nav-back{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text);padding:4px;line-height:1;}
.nav-title{font-size:17px;font-weight:700;color:var(--ink);}
.nav-sub{font-size:11px;color:var(--muted);margin-left:auto;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);padding:18px 16px;margin:12px 12px 0;box-shadow:var(--shadow-soft);}
.card-title{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:0.09em;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:0.05em;}
.badge-a{background:rgba(122,36,24,0.12);color:var(--accent);}
.badge-b{background:rgba(95,140,181,0.15);color:var(--orb);}

/* FORM */
.f-label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;letter-spacing:0.04em;}
.f-input,.f-select{width:100%;background:rgba(252,247,234,0.85);border:1px solid rgba(80,55,30,0.18);border-radius:10px;color:var(--text);padding:11px 12px;font-size:14px;font-family:inherit;-webkit-appearance:none;appearance:none;}
.f-input:focus,.f-select:focus{outline:none;border-color:var(--accent);}
.f-select option{background:#fcf7ea;color:var(--text);}
.f-field{margin-bottom:12px;}
.f-row{display:flex;gap:6px;}
.f-row .f-select{flex:1;}
.g-row{display:flex;gap:8px;}
.g-btn{flex:1;padding:10px;border-radius:10px;font-size:14px;background:rgba(252,247,234,0.85);border:1.5px solid rgba(80,55,30,0.18);color:var(--muted);cursor:pointer;transition:all .2s;font-family:inherit;}
.g-btn.on{background:rgba(122,36,24,0.10);border-color:var(--accent);color:var(--accent);font-weight:700;}

/* BUTTONS */
.main-btn{display:block;width:calc(100% - 24px);margin:14px 12px 0;padding:15px;border-radius:12px;font-size:16px;font-weight:700;background:var(--ink);color:#fcf7ea;border:none;cursor:pointer;font-family:inherit;box-shadow:0 2px 12px rgba(0,0,0,0.18);letter-spacing:0.04em;text-align:center;}
.main-btn:disabled{opacity:.4;cursor:not-allowed;}
.sub-btn{background:var(--surface2);color:var(--ink);box-shadow:none;border:1px solid var(--border-soft);}
.orb-note{text-align:center;font-size:12px;color:var(--muted);margin:7px 12px 0;}

/* LOADING */
#loadSection{display:none;padding:70px 20px;text-align:center;}
.spin{width:44px;height:44px;border:3px solid rgba(80,55,30,0.15);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-text{font-size:14px;color:var(--muted);line-height:1.6;}
.load-steps{margin-top:16px;display:flex;flex-direction:column;gap:6px;}
.load-step{font-size:12px;color:var(--muted);opacity:.5;transition:opacity .4s;}
.load-step.active{opacity:1;color:var(--accent);font-weight:600;}
.load-step.done{opacity:.7;text-decoration:line-through;}

/* FREE RESULT */
#freeSection{display:none;}
.type-hero{text-align:center;padding:32px 20px 20px;}
.type-label{font-size:11px;font-weight:700;letter-spacing:0.12em;margin-bottom:10px;opacity:.65;}
.type-name{font-size:36px;font-weight:900;line-height:1.2;margin-bottom:14px;font-family:'Noto Serif KR',serif;}
.type-summary{font-size:15px;line-height:1.7;color:var(--text2);max-width:340px;margin:0 auto;word-break:keep-all;}
/* type colors */
.type-destiny .type-name{color:#8a6a15;}
.type-flame .type-name{color:#7a2418;}
.type-growth .type-name{color:#2a6a20;}
.type-karma .type-name{color:#5a3a8a;}
.type-clash .type-name{color:#8a5a10;}
.type-trial .type-name{color:#1a4a8a;}

/* ENGINE BARS */
.engine-bars{margin:4px 12px 0;background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);padding:16px;}
.engine-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.engine-row:last-child{margin-bottom:0;}
.engine-name{font-size:12px;color:var(--muted);width:50px;flex-shrink:0;}
.engine-bar-bg{flex:1;height:9px;background:var(--surface2);border-radius:5px;overflow:hidden;}
.engine-bar-fill{height:100%;border-radius:5px;width:0%;transition:width 1s ease;}
.bar-saju{background:linear-gradient(90deg,#7a2418,#b04832);}
.bar-astro{background:linear-gradient(90deg,#4a6aa0,#7a9cd0);}
.bar-vedic{background:linear-gradient(90deg,#8a6a15,#c09a30);}
.engine-score-val{font-size:13px;font-weight:700;color:var(--ink);width:28px;text-align:right;flex-shrink:0;}

/* PREMIUM TEASER */
.prem-teaser{margin:12px 12px 0;background:linear-gradient(135deg,rgba(138,106,21,0.10),rgba(122,36,24,0.07));border:1px solid rgba(138,106,21,0.30);border-radius:var(--radius);padding:20px 18px;}
.prem-title{font-size:14px;font-weight:700;color:var(--gold-deep);margin-bottom:10px;}
.prem-list{list-style:none;margin-bottom:16px;}
.prem-list li{font-size:13px;color:var(--text2);padding:3px 0;display:flex;align-items:center;gap:7px;}
.prem-list li::before{content:'✦';font-size:9px;color:var(--gold);flex-shrink:0;}
.prem-btn{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:700;background:linear-gradient(135deg,#8a6a15,#6a4f0c);color:#fcf7ea;border:none;cursor:pointer;font-family:inherit;letter-spacing:0.04em;}
.prem-btn:disabled{opacity:.4;cursor:not-allowed;}
.orb-cost{font-size:12px;font-weight:400;opacity:.85;margin-left:6px;}

/* PREMIUM RESULT */
#premSection{display:none;}
.radar-wrap{padding:20px 12px 8px;display:flex;justify-content:center;background:var(--surface);margin:12px 12px 0;border-radius:var(--radius);border:1px solid var(--border-soft);}
.analysis-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);padding:16px 16px;margin:10px 12px 0;box-shadow:var(--shadow-soft);}
.analysis-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.08em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.analysis-text{font-size:14px;color:var(--text2);line-height:1.75;word-break:keep-all;}
.analysis-text strong{color:var(--ink);font-weight:700;}
.streaming-cursor::after{content:'▎';animation:blink .7s infinite;color:var(--accent);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* SHARE */
.share-wrap{margin:18px 12px 0;display:flex;flex-direction:column;gap:10px;}
.share-btn{width:100%;padding:15px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:0.02em;}
.btn-kakao{background:#fee500;color:#3c1e1e;}
.btn-img-save{background:var(--surface2);color:var(--ink);border:1px solid var(--border-soft);}

/* ERR / TOAST */
.err-box{display:none;background:rgba(255,23,68,0.10);border:1px solid rgba(255,23,68,0.25);border-radius:10px;padding:12px 14px;font-size:13px;color:#b01a1a;margin:10px 12px 0;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(26,18,10,0.90);color:#fcf7ea;padding:10px 22px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* CANVAS */
.canvas-hidden{position:absolute;left:-9999px;top:-9999px;}

@media(max-width:400px){
  .type-name{font-size:30px;}
  .card,.engine-bars,.prem-teaser,.analysis-card,.share-wrap,.err-box,.main-btn{margin-left:8px;margin-right:8px;}
  .main-btn{width:calc(100% - 16px);}
}
</style>
</head>

      o.value = y; o.textContent = y + '년'; if (y === 1990) o.selected = true;
      ys.appendChild(o);
    }
    var ms = document.getElementById(p + '_m');
    for (var m = 1; m <= 12; m++) {
      var o = document.createElement('option');
      o.value = m; o.textContent = m + '월'; if (m === 1) o.selected = true;
      ms.appendChild(o);
    }
    rebuildDays(p);
    var hs = document.getElementById(p + '_h');
    var unk = document.createElement('option'); unk.value = 'unknown'; unk.textContent = '시 모름';
    hs.appendChild(unk);
    for (var h = 0; h <= 23; h++) {
      var o = document.createElement('option');
      o.value = h; o.textContent = h + '시'; if (h === 12) o.selected = true;
      hs.appendChild(o);
    }
    var mins = document.getElementById(p + '_min');
    [0,5,10,15,20,25,30,35,40,45,50,55].forEach(function(mn) {
      var o = document.createElement('option');
      o.value = mn; o.textContent = (mn < 10 ? '0' : '') + mn + '분'; if (mn === 0) o.selected = true;
      mins.appendChild(o);
    });
    document.getElementById(p + '_y').addEventListener('change', function() { rebuildDays(p); });
    document.getElementById(p + '_m').addEventListener('change', function() { rebuildDays(p); });
  });
}

function rebuildDays(p) {
  var y = parseInt(document.getElementById(p + '_y').value) || 1990;
  var m = parseInt(document.getElementById(p + '_m').value) || 1;
  var ds = document.getElementById(p + '_d');
  var cur = parseInt(ds.value) || 1;
  ds.innerHTML = '';
  var days = new Date(y, m, 0).getDate();
  for (var d = 1; d <= days; d++) {
    var o = document.createElement('option');
    o.value = d; o.textContent = d + '일';
    if (d === Math.min(cur, days)) o.selected = true;
    ds.appendChild(o);
  }
}

// ── AI COMPATIBILITY SCORING ───────────────────────────────────
function buildDataSummary(a, b, sA, sB, aA, aB, vA, vB) {
  function safeGet(obj, keys, def) {
    var cur = obj;
    for (var i = 0; i < keys.length; i++) {
      if (!cur || typeof cur !== 'object') return def;
      cur = cur[keys[i]];
    }
    return cur !== undefined && cur !== null ? cur : def;
  }
  var lines = [];
  lines.push('=== ' + a.name + ' (' + (a.gender === 'M' ? '남' : '여') + ') ===');
  lines.push('생년월일: ' + a.birth);
  if (sA) {
    var pA = safeGet(sA, ['summary','pillars'], {});
    lines.push('사주기둥: ' + JSON.stringify(pA));
    lines.push('오행: ' + JSON.stringify(safeGet(sA, ['five_count'], {})));
    lines.push('용신: ' + safeGet(sA, ['yongshin','primary'], '?'));
    lines.push('일간: ' + safeGet(sA, ['summary','pillars','day','stem'], '?'));
  }
  if (aA && aA.planets) {
    lines.push('태양궁: ' + safeGet(aA, ['planets','Sun','sign'], '?'));
    lines.push('달궁: '  + safeGet(aA, ['planets','Moon','sign'], '?'));
    lines.push('금성궁: '+ safeGet(aA, ['planets','Venus','sign'], '?'));
    lines.push('화성궁: '+ safeGet(aA, ['planets','Mars','sign'], '?'));
  }
  if (vA) {
    lines.push('베딕달자리: ' + (vA.moon_sign || vA.moonSign || '?'));
    lines.push('나크샤트라: ' + (vA.nakshatra || vA.moon_nakshatra || '?'));
  }
  lines.push('');
  lines.push('=== ' + b.name + ' (' + (b.gender === 'M' ? '남' : '여') + ') ===');
  lines.push('생년월일: ' + b.birth);
  if (sB) {
    var pB = safeGet(sB, ['summary','pillars'], {});
    lines.push('사주기둥: ' + JSON.stringify(pB));
    lines.push('오행: ' + JSON.stringify(safeGet(sB, ['five_count'], {})));
    lines.push('용신: ' + safeGet(sB, ['yongshin','primary'], '?'));
    lines.push('일간: ' + safeGet(sB, ['summary','pillars','day','stem'], '?'));
  }
  if (aB && aB.planets) {
    lines.push('태양궁: ' + safeGet(aB, ['planets','Sun','sign'], '?'));
    lines.push('달궁: '  + safeGet(aB, ['planets','Moon','sign'], '?'));
    lines.push('금성궁: '+ safeGet(aB, ['planets','Venus','sign'], '?'));
    lines.push('화성궁: '+ safeGet(aB, ['planets','Mars','sign'], '?'));
  }
  if (vB) {
    lines.push('베딕달자리: ' + (vB.moon_sign || vB.moonSign || '?'));
    lines.push('나크샤트라: ' + (vB.nakshatra || vB.moon_nakshatra || '?'));
  }
  return lines.join('\n');
}

async function analyzeCompatibility(a, b, sA, sB, aA, aB, vA, vB) {
  var sysPrompt = '당신은 동서양 운명 궁합 전문가입니다. 두 사람의 사주·서양점성·베딕 데이터를 정밀 분석해 JSON만 반환하세요. 코드블록(\`\`\`) 없이 순수 JSON만.\n\n반환 형식:\n{"saju_score":정수0~100,"astro_score":정수0~100,"vedic_score":정수0~100,"total_score":세점수평균정수,"type":"운명의 실|불꽃 인연|상생의 파트너|카르마 연결|대립과 성장|수련의 인연","summary":"두 사람의 궁합을 소름 돋도록 구체적으로 50자 이내 한 문장"}\n\n점수 기준: 90이상=운명의 실, 80~89=불꽃 인연, 70~79=상생의 파트너, 60~69=카르마 연결, 50~59=대립과 성장, 49이하=수련의 인연\n\n사주: 일간합·충·오행균형·용신 관계 분석\n서양점성: 태양·달·금성·화성 각도 및 원소 궁합\n베딕: 나크샤트라 쿠타(Kuta) 8항목 종합';
  var userMsg = buildDataSummary(a, b, sA, sB, aA, aB, vA, vB);

  var res = await fetch(CHAT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: _user ? _user.id : 'anonymous', skip_orb: true, system_prompt: sysPrompt, messages: [{ role: 'user', content: userMsg }] })
  });
  if (!res.ok) throw new Error('AI 분석 오류 (' + res.status + ')');
  var data = await res.json();
  var text = (data.content || data.message || data.text || '').trim();
  var match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('AI 응답 파싱 오류');
  var parsed = JSON.parse(match[0]);
  if (!parsed.total_score) parsed.total_score = Math.round(((parsed.saju_score||50)+(parsed.astro_score||50)+(parsed.vedic_score||50))/3);
  if (!parsed.type) parsed.type = getTypeByScore(parsed.total_score);
  return parsed;
}

function getTypeByScore(s) {
  if (s >= 90) return '운명의 실';
  if (s >= 80) return '불꽃 인연';
  if (s >= 70) return '상생의 파트너';
  if (s >= 60) return '카르마 연결';
  if (s >= 50) return '대립과 성장';
  return '수련의 인연';
}

async function deductOrb(cost) {
  var sb = getSb();
  var resp = await sb.from('orb_balance').select('balance,free_balance,paid_balance').eq('user_id', _user.id).single();
  if (resp.error || !resp.data) { showErr('errBox2', 'Orb 잔액 조회 실패'); return false; }
  var bal = resp.data;
  var total = bal.balance || 0;
  if (total < cost) { showErr('errBox2', 'Orb가 부족합니다. (보유: ' + total + ' / 필요: ' + cost + ')'); return false; }
  var free = bal.free_balance || 0;
  var paid = bal.paid_balance || 0;
  var rem = cost;
  var newFree = free, newPaid = paid;
  if (free >= rem) { newFree = free - rem; rem = 0; }
  else { rem -= free; newFree = 0; newPaid = Math.max(0, paid - rem); }
  var newBal = newFree + newPaid;
  var upRes = await sb.from('orb_balance').update({ balance: newBal, free_balance: newFree, paid_balance: newPaid }).eq('user_id', _user.id);
  if (upRes.error) throw new Error('Orb 차감 실패: ' + upRes.error.message);
  await sb.from('orb_transactions').insert({ user_id: _user.id, amount: -cost, type: 'use', description: '궁합 2.0 상세 분석', balance_after: newBal });
  return true;
}

  var W = 900, H = 600;
  canvas.width = W; canvas.height = H;

  var imgSrc = CARD_IMAGES[r.type] || CARD_IMAGES['상생의 파트너'];
  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function() {
    ctx.drawImage(img, 0, 0, W, H);

    // Dark overlay
    var ov = ctx.createLinearGradient(0, 0, 0, H);
    ov.addColorStop(0, 'rgba(0,0,0,0.35)');
    ov.addColorStop(0.5, 'rgba(0,0,0,0.15)');
    ov.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = ov; ctx.fillRect(0, 0, W, H);

    // Brand
    ctx.textAlign = 'center';
    ctx.font = '600 15px Cinzel, serif'; ctx.fillStyle = 'rgba(255,255,255,0.70)';
    ctx.fillText('FORTUNA', W/2, 36);

    // Type name
    ctx.font = '900 48px "Noto Serif KR", serif'; ctx.fillStyle = '#ffffff';
    ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 12;
    ctx.fillText(r.type || '', W/2, H/2 - 40);

    // Summary
    ctx.font = '400 19px "Pretendard Variable", sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.shadowBlur = 8;
    wrapTextCenter(ctx, r.summary || '', W/2, H/2 + 18, W - 120, 30);

    // Names
    ctx.shadowBlur = 0;
    ctx.font = '600 20px "Pretendard Variable", sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.80)';
    ctx.fillText(r.nameA + ' ♥ ' + r.nameB, W/2, H - 60);

    // Footer
    ctx.font = '400 13px Cinzel, serif'; ctx.fillStyle = 'rgba(255,255,255,0.40)';
    ctx.fillText('picolab.kr', W/2, H - 28);

    ctx.shadowBlur = 0;
    if (cb) cb();
  };
  img.onerror = function() {
    // Fallback: dark gradient background
    var g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#1a120a'); g.addColorStop(1, '#2d1e10');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.font = '900 48px "Noto Serif KR", serif'; ctx.fillStyle = '#f4ede0';
    ctx.fillText(r.type || '', W/2, H/2 - 30);
    ctx.font = '400 18px "Pretendard Variable", sans-serif'; ctx.fillStyle = 'rgba(244,237,224,0.8)';
    wrapTextCenter(ctx, r.summary || '', W/2, H/2 + 20, W - 120, 28);
    ctx.font = '600 18px "Pretendard Variable", sans-serif'; ctx.fillStyle = 'rgba(244,237,224,0.7)';
    ctx.fillText(r.nameA + ' ♥ ' + r.nameB, W/2, H - 60);
    ctx.font = '400 12px Cinzel, serif'; ctx.fillStyle = 'rgba(244,237,224,0.35)';
    ctx.fillText('picolab.kr', W/2, H - 28);
    if (cb) cb();
  };
  img.src = imgSrc;
}

function wrapTextCenter(ctx, text, x, y, maxW, lh) {
  if (!text) return;
  var words = text.split(' '); var line = '';
  for (var i = 0; i < words.length; i++) {
    var test = line + words[i] + ' ';
    if (ctx.measureText(test).width > maxW && i > 0) {
      ctx.fillText(line.trim(), x, y); line = words[i] + ' '; y += lh;
    } else { line = test; }
  }
  ctx.fillText(line.trim(), x, y);
}

function saveCard() {
  drawShareCard(function() {
    var canvas = document.getElementById('shareCanvas');
    var a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'gunghap_' + Date.now() + '.png';
    a.click();
    showToast('이미지가 저장되었습니다.');
  });
}

// ── KAKAO SHARE ────────────────────────────────────────────────
function shareKakao() {
  var r = _freeResult;
  if (!r) return;
  var text = '[FORTUNA 궁합 2.0]\n' + r.nameA + ' ♥ ' + r.nameB + '\n' + r.type + '\n\n' + (r.summary || '');
  var url = 'https://picolab.kr/gunghap2.html';
  if (window.Kakao && window.Kakao.Share) {
    if (!Kakao.isInitialized()) try { Kakao.init(KAKAO_JS_KEY); } catch(e) {}
    try {
      Kakao.Share.sendDefault({ objectType: 'text', text: text, link: { mobileWebUrl: url, webUrl: url }, buttons: [{ title: '무료로 확인하기', link: { mobileWebUrl: url, webUrl: url } }] });
      return;
    } catch(e) {}
  }
  if (navigator.share) {
    navigator.share({ title: '궁합 2.0 · FORTUNA', text: text, url: url });
  } else {
    try { navigator.clipboard.writeText(text + '\n' + url); } catch(e) {}
    showToast('링크가 복사되었습니다.');
  }
}

// ── RESET ──────────────────────────────────────────────────────
function resetForm() {
  document.getElementById('freeSection').style.display = 'none';
  document.getElementById('premSection').style.display = 'none';
  document.getElementById('formSection').style.display = 'block';
  document.getElementById('analyzeBtn').disabled = false;
  hideErr('errBox'); hideErr('errBox2'); hideErr('errBox3');
  window.scrollTo(0, 0);
}
</script>
