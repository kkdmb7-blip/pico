<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PICO · 미니앱 디렉토리</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #7b5ea7;
    --accent2: #e8b86d;
    --text: #f0f0f5;
    --muted: #6b6b85;
    --card-hover: #1f1f2e;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ─── NAV ─── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo span { color: var(--accent2); }

  .nav-right { display: flex; align-items: center; gap: 12px; }

  .btn {
    padding: 8px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface); color: var(--text); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #9370c4; transform: translateY(-1px); }

  .btn-kakao {
    background: #FEE500;
    color: #191919;
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
  }
  .btn-kakao:hover { background: #f5db00; transform: translateY(-1px); }

  .user-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    overflow: hidden;
  }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

  /* ─── HERO ─── */
  .hero {
    position: relative;
    padding: 80px 24px 60px;
    text-align: center;
    overflow: hidden;
  }

  .hero-glow {
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(123,94,167,0.25) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 16px;
    position: relative;
  }

  .hero h1 em {
    font-style: normal;
    color: var(--accent2);
  }

  .hero p {
    color: var(--muted);
    font-size: 17px;
    margin-bottom: 40px;
    position: relative;
  }

  /* ─── SEARCH ─── */
  .search-wrap {
    max-width: 560px;
    margin: 0 auto 48px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    padding: 16px 56px 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--accent); }

  .search-icon {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 18px;
    pointer-events: none;
  }

  /* ─── CATEGORIES ─── */
  .categories {
    display: flex;
    gap: 8px;
    padding: 0 24px 32px;
    overflow-x: auto;
    scrollbar-width: none;
    max-width: 1200px;
    margin: 0 auto;
  }
  .categories::-webkit-scrollbar { display: none; }

  .cat-btn {
    padding: 8px 16px;
    border-radius: 100px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .cat-btn:hover { background: var(--surface2); color: var(--text); }
  .cat-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ─── TOOLBAR ─── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .result-count { font-size: 13px; color: var(--muted); }

  .sort-wrap { display: flex; gap: 8px; }
  .sort-btn {
    padding: 6px 14px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }
  .sort-btn.active { background: var(--surface2); color: var(--text); border-color: var(--accent); }

  /* ─── GRID ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    padding: 0 24px 80px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .app-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .app-card:hover {
    background: var(--card-hover);
    border-color: var(--accent);
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(123,94,167,0.3);
  }

  .card-thumb {
    width: 100%;
    height: 160px;
    background: linear-gradient(135deg, var(--surface2), var(--bg));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    position: relative;
    overflow: hidden;
  }

  .card-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .card-body { padding: 16px; }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .card-cat {
    font-size: 11px;
    color: var(--accent2);
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .card-stars {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: var(--accent2);
  }
  .card-stars span { color: var(--muted); font-size: 12px; }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .card-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-author { font-size: 12px; color: var(--muted); }

  .card-link {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .card-link:hover { color: #9370c4; }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 600px;
    max-height: 85vh;
    overflow-y: auto;
    transform: translateY(20px);
    transition: transform 0.25s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    padding: 24px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .modal-close {
    background: var(--surface2);
    border: none;
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .modal-close:hover { background: var(--border); color: var(--text); }

  .modal-body { padding: 20px 24px 24px; }

  .modal-thumb {
    width: 72px;
    height: 72px;
    border-radius: 16px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .modal-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 8px;
  }

  .modal-desc {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
  }

  .btn-visit {
    flex: 1;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    text-decoration: none;
    text-align: center;
    transition: background 0.2s;
  }
  .btn-visit:hover { background: #9370c4; }

  /* Star Rating */
  .rating-section { margin-bottom: 24px; }
  .rating-label { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--muted); }

  .stars-input { display: flex; gap: 6px; }
  .star-btn {
    font-size: 28px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--border);
    transition: color 0.15s, transform 0.1s;
    line-height: 1;
  }
  .star-btn.active { color: var(--accent2); }
  .star-btn:hover { transform: scale(1.15); }

  /* Comments */
  .comments-section { }
  .comments-label {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .comments-count {
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 11px;
    color: var(--muted);
  }

  .comment-form { margin-bottom: 20px; }
  .comment-form textarea {
    width: 100%;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    resize: none;
    outline: none;
    height: 80px;
    transition: border-color 0.2s;
    margin-bottom: 8px;
  }
  .comment-form textarea:focus { border-color: var(--accent); }

  .comment-submit {
    padding: 8px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .comment-submit:hover { background: #9370c4; }

  .login-prompt {
    padding: 16px;
    background: var(--surface2);
    border-radius: 12px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .login-prompt a {
    color: var(--accent2);
    cursor: pointer;
    font-weight: 600;
    text-decoration: none;
  }

  .comment-list { display: flex; flex-direction: column; gap: 12px; }

  .comment-item {
    background: var(--surface2);
    border-radius: 12px;
    padding: 12px 14px;
  }

  .comment-author {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent2);
    margin-bottom: 4px;
  }
  .comment-text { font-size: 13px; color: var(--text); line-height: 1.6; }
  .comment-date { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Submit App Modal */
  .submit-form { display: flex; flex-direction: column; gap: 14px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: var(--surface2); }
  .form-group textarea { height: 90px; resize: none; }

  /* Empty state */
  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 15px; }

  /* Loading */
  .loading {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px;
    color: var(--muted);
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 14px;
    z-index: 999;
    transition: transform 0.3s;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .hero h1 { font-size: 32px; }
    .grid { grid-template-columns: 1fr; }
    .modal { border-radius: 20px 20px 0 0; }
    .modal-overlay { align-items: flex-end; padding: 0; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo">PICO</div>
  <div class="nav-right">
    <button class="btn btn-ghost" onclick="openSubmitModal()" id="submitBtn" style="display:none">+ 앱 등록</button>
    <div id="authArea">
      <button class="btn btn-kakao" onclick="kakaoLogin()">
        <svg width="16" height="15" viewBox="0 0 16 15" fill="none"><path d="M8 0C3.582 0 0 2.82 0 6.3c0 2.24 1.49 4.21 3.75 5.33l-.96 3.57 4.17-2.77c.33.05.67.07 1.04.07 4.418 0 8-2.82 8-6.3S12.418 0 8 0z" fill="#191919"/></svg>
        카카오 로그인
      </button>
    </div>
    <div id="userArea" style="display:none; align-items:center; gap:10px;">
      <div class="user-avatar" id="userAvatar">U</div>
      <button class="btn btn-ghost" onclick="logout()">로그아웃</button>
    </div>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-glow"></div>
  <h1>작지만 강한 앱들<br><em>피코에서 발견하세요</em></h1>
  <p>개발자가 직접 만든 미니 웹앱 디렉토리</p>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="앱 이름이나 설명으로 검색..." oninput="handleSearch()">
    <span class="search-icon">🔍</span>
  </div>
</div>

<!-- CATEGORIES -->
<div class="categories" id="categoryBar">
  <button class="cat-btn active" onclick="filterCategory('')" data-cat="">전체</button>
  <button class="cat-btn" onclick="filterCategory('운세/사주')" data-cat="운세/사주">🔮 운세/사주</button>
  <button class="cat-btn" onclick="filterCategory('유틸')" data-cat="유틸">🛠️ 유틸</button>
  <button class="cat-btn" onclick="filterCategory('게임')" data-cat="게임">🎮 게임</button>
  <button class="cat-btn" onclick="filterCategory('데이터/시각화')" data-cat="데이터/시각화">📊 데이터/시각화</button>
  <button class="cat-btn" onclick="filterCategory('크리에이티브')" data-cat="크리에이티브">🎨 크리에이티브</button>
  <button class="cat-btn" onclick="filterCategory('소통')" data-cat="소통">💬 소통</button>
  <button class="cat-btn" onclick="filterCategory('기타')" data-cat="기타">기타</button>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <span class="result-count" id="resultCount">로딩 중...</span>
  <div class="sort-wrap">
    <button class="sort-btn active" onclick="setSort('rating')" id="sort-rating">⭐ 별점순</button>
    <button class="sort-btn" onclick="setSort('created_at')" id="sort-created_at">🕐 최신순</button>
  </div>
</div>

<!-- GRID -->
<div class="grid" id="appGrid">
  <div class="loading"><div class="spinner"></div><p>앱 불러오는 중...</p></div>
</div>

<!-- APP DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <div></div>
      <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-thumb" id="modalThumb">🚀</div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;">
        <div class="modal-title" id="modalTitle"></div>
        <div class="card-stars" id="modalStars" style="font-size:15px;"></div>
      </div>
      <div class="card-cat" id="modalCat" style="margin-bottom:10px;"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-actions">
        <a id="modalLink" href="#" target="_blank" class="btn-visit">앱 열기 →</a>
      </div>

      <!-- Star Rating -->
      <div class="rating-section" id="ratingSection">
        <div class="rating-label">별점 남기기</div>
        <div class="stars-input" id="starsInput">
          <button class="star-btn" data-val="1" onclick="selectStar(1)">★</button>
          <button class="star-btn" data-val="2" onclick="selectStar(2)">★</button>
          <button class="star-btn" data-val="3" onclick="selectStar(3)">★</button>
          <button class="star-btn" data-val="4" onclick="selectStar(4)">★</button>
          <button class="star-btn" data-val="5" onclick="selectStar(5)">★</button>
        </div>
      </div>

      <!-- Comments -->
      <div class="comments-section">
        <div class="comments-label">
          댓글 <span class="comments-count" id="commentsCount">0</span>
        </div>
        <div id="commentFormArea"></div>
        <div class="comment-list" id="commentList"></div>
      </div>
    </div>
  </div>
</div>

<!-- SUBMIT MODAL -->
<div class="modal-overlay" id="submitModal">
  <div class="modal">
    <div class="modal-header">
      <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;">앱 등록하기</div>
      <button class="modal-close" onclick="closeModal('submitModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="submit-form">
        <div class="form-group">
          <label>앱 이름 *</label>
          <input type="text" id="f-name" placeholder="ex. 오늘의 타로">
        </div>
        <div class="form-group">
          <label>앱 설명 *</label>
          <textarea id="f-desc" placeholder="앱을 간단히 소개해 주세요"></textarea>
        </div>
        <div class="form-group">
          <label>앱 URL *</label>
          <input type="url" id="f-url" placeholder="https://...">
        </div>
        <div class="form-group">
          <label>카테고리 *</label>
          <select id="f-cat">
            <option value="">선택하세요</option>
            <option value="운세/사주">🔮 운세/사주</option>
            <option value="유틸">🛠️ 유틸</option>
            <option value="게임">🎮 게임</option>
            <option value="데이터/시각화">📊 데이터/시각화</option>
            <option value="크리에이티브">🎨 크리에이티브</option>
            <option value="소통">💬 소통</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="form-group">
          <label>아이콘 이모지</label>
          <input type="text" id="f-icon" placeholder="🚀 (이모지 하나)">
        </div>
        <button class="btn btn-primary" style="width:100%;padding:14px;font-size:15px;" onclick="submitApp()">등록하기</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const SUPABASE_URL = 'https://afktkixkbcirsknahbmx.supabase.co'
const SUPABASE_KEY = 'sb_publishable_zlR9CE2qi5cK2ap4_Bxyqw_LU-Zgr11'
const KAKAO_REST_KEY = '51b4f87ad9cfd6312c176ad34eb62025'
const SITE_URL = window.location.origin

// ── INIT ────────────────────────────────────────────────
const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_KEY)

let currentUser = null
let currentApp = null
let allApps = []
let selectedStar = 0
let sortBy = 'rating'
let filterCat = ''
let searchQuery = ''

// ── AUTH ────────────────────────────────────────────────
async function checkAuth() {
  const stored = localStorage.getItem('pico_user')
  if (stored) {
    currentUser = JSON.parse(stored)
    updateAuthUI()
  }

  // Kakao callback 처리
  const params = new URLSearchParams(window.location.search)
  const code = params.get('code')
  if (code) {
    history.replaceState({}, '', window.location.pathname)
    await handleKakaoCallback(code)
  }
}

function kakaoLogin() {
  const redirect = encodeURIComponent(SITE_URL)
  window.location.href = `https://kauth.kakao.com/oauth/authorize?client_id=${KAKAO_REST_KEY}&redirect_uri=${redirect}&response_type=code`
}

async function handleKakaoCallback(code) {
  try {
    // Cloudflare Worker로 토큰 교환
    const res = await fetch('https://fortuna.kkdmb7.workers.dev/kakao-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, redirect_uri: SITE_URL })
    })
    const data = await res.json()
    if (data.access_token) {
      const profileRes = await fetch('https://kapi.kakao.com/v2/user/me', {
        headers: { Authorization: `Bearer ${data.access_token}` }
      })
      const profile = await profileRes.json()
      currentUser = {
        id: 'kakao_' + profile.id,
        name: profile.kakao_account?.profile?.nickname || '카카오 사용자',
        avatar: profile.kakao_account?.profile?.profile_image_url || null
      }
      localStorage.setItem('pico_user', JSON.stringify(currentUser))
      updateAuthUI()
      showToast('로그인 됐어요! 👋')
    }
  } catch(e) {
    // Worker 연동 전 임시 처리
    currentUser = { id: 'kakao_guest_' + Date.now(), name: '카카오 사용자', avatar: null }
    localStorage.setItem('pico_user', JSON.stringify(currentUser))
    updateAuthUI()
    showToast('로그인 됐어요! 👋')
  }
}

function logout() {
  currentUser = null
  localStorage.removeItem('pico_user')
  updateAuthUI()
  showToast('로그아웃 됐어요')
}

function updateAuthUI() {
  const authArea = document.getElementById('authArea')
  const userArea = document.getElementById('userArea')
  const submitBtn = document.getElementById('submitBtn')
  const avatar = document.getElementById('userAvatar')

  if (currentUser) {
    authArea.style.display = 'none'
    userArea.style.display = 'flex'
    submitBtn.style.display = 'block'
    avatar.textContent = currentUser.name?.[0] || 'U'
    if (currentUser.avatar) {
      avatar.innerHTML = `<img src="${currentUser.avatar}" alt="">`
    }
  } else {
    authArea.style.display = 'block'
    userArea.style.display = 'none'
    submitBtn.style.display = 'none'
  }
}

// ── APPS ────────────────────────────────────────────────
async function loadApps() {
  document.getElementById('appGrid').innerHTML = `<div class="loading"><div class="spinner"></div><p>불러오는 중...</p></div>`
  try {
    let query = db.from('picoapp_apps').select('*')
    if (filterCat) query = query.eq('category', filterCat)
    if (searchQuery) query = query.or(`name.ilike.%${searchQuery}%,description.ilike.%${searchQuery}%`)
    if (sortBy === 'rating') query = query.order('rating', { ascending: false })
    else query = query.order('created_at', { ascending: false })

    const { data, error } = await query
    if (error) throw error
    allApps = data || []
    renderApps(allApps)
  } catch(e) {
    console.error(e)
    document.getElementById('appGrid').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>앱을 불러오지 못했어요</p></div>`
  }
}

function renderApps(apps) {
  const grid = document.getElementById('appGrid')
  const count = document.getElementById('resultCount')
  count.textContent = `앱 ${apps.length}개`

  if (!apps.length) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>검색 결과가 없어요</p></div>`
    return
  }

  grid.innerHTML = apps.map((app, i) => `
    <div class="app-card" style="animation-delay:${i*0.05}s" onclick="openApp(${app.id})">
      <div class="card-thumb">
        ${app.thumbnail_url ? `<img src="${app.thumbnail_url}" alt="" onerror="this.parentElement.innerHTML='<span>${app.icon||'🚀'}</span>'">` : `<span>${app.icon || '🚀'}</span>`}
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="card-cat">${app.category}</span>
          <div class="card-stars">
            ★ ${app.rating > 0 ? Number(app.rating).toFixed(1) : '—'}
            <span>(${app.review_count || 0})</span>
          </div>
        </div>
        <div class="card-title">${app.name}</div>
        <div class="card-desc">${app.description}</div>
      </div>
      <div class="card-footer">
        <span class="card-author">by ${app.author_name || '익명'}</span>
        <a href="${app.url}" target="_blank" class="card-link" onclick="event.stopPropagation()">열기 →</a>
      </div>
    </div>
  `).join('')
}

async function openApp(id) {
  const app = allApps.find(a => a.id === id)
  if (!app) return

  currentApp = app
  selectedStar = 0

  document.getElementById('modalTitle').textContent = app.name
  document.getElementById('modalDesc').textContent = app.description
  document.getElementById('modalCat').textContent = app.category
  document.getElementById('modalLink').href = app.url
  document.getElementById('modalThumb').innerHTML = app.thumbnail_url
    ? `<img src="${app.thumbnail_url}" alt="" onerror="this.parentElement.textContent='${app.icon||'🚀'}'">` 
    : app.icon || '🚀'
  document.getElementById('modalStars').innerHTML =
    `★ ${app.rating > 0 ? Number(app.rating).toFixed(1) : '—'} <span style="color:var(--muted);font-size:12px">(${app.review_count || 0})</span>`

  document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('active'))

  const formArea = document.getElementById('commentFormArea')
  if (currentUser) {
    formArea.innerHTML = `
      <div class="comment-form">
        <textarea id="commentText" placeholder="이 앱 어떠셨나요?"></textarea>
        <button class="comment-submit" onclick="submitComment()">댓글 남기기</button>
      </div>
    `
    document.getElementById('ratingSection').style.display = 'block'
  } else {
    formArea.innerHTML = `
      <div class="login-prompt">
        <a onclick="kakaoLogin()">카카오 로그인</a> 후 댓글과 별점을 남길 수 있어요
      </div>
    `
    document.getElementById('ratingSection').style.display = 'none'
  }

  await loadComments(id)
  openModal('detailModal')
}

// ── RATING ──────────────────────────────────────────────
function selectStar(val) {
  if (!currentUser) { kakaoLogin(); return; }
  selectedStar = val
  document.querySelectorAll('.star-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.val) <= val)
  })
  submitRating(val)
}

async function submitRating(val) {
  try {
    const { error } = await db.from('picoapp_ratings').upsert({
      app_id: currentApp.id,
      user_id: currentUser.id,
      rating: val
    }, { onConflict: 'app_id,user_id' })
    if (error) throw error
    showToast(`별점 ${val}점을 남겼어요 ⭐`)
    // 모달 별점 새로고침
    const { data } = await db.from('picoapp_apps').select('rating,review_count').eq('id', currentApp.id).single()
    if (data) {
      currentApp.rating = data.rating
      currentApp.review_count = data.review_count
      document.getElementById('modalStars').innerHTML =
        `★ ${Number(data.rating).toFixed(1)} <span style="color:var(--muted);font-size:12px">(${data.review_count})</span>`
    }
  } catch(e) {
    showToast('별점 저장 중 오류가 났어요')
    console.error(e)
  }
}

// ── COMMENTS ────────────────────────────────────────────
async function loadComments(appId) {
  try {
    const { data, error } = await db
      .from('picoapp_comments')
      .select('*')
      .eq('app_id', appId)
      .order('created_at', { ascending: false })
    if (error) throw error

    const comments = data || []
    document.getElementById('commentsCount').textContent = comments.length
    const list = document.getElementById('commentList')

    if (!comments.length) {
      list.innerHTML = `<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px;">첫 댓글을 남겨보세요!</div>`
      return
    }

    list.innerHTML = comments.map(c => `
      <div class="comment-item">
        <div class="comment-author">${c.author_name || '익명'}</div>
        <div class="comment-text">${c.text}</div>
        <div class="comment-date">${new Date(c.created_at).toLocaleDateString('ko-KR')}</div>
      </div>
    `).join('')
  } catch(e) {
    console.error(e)
  }
}

async function submitComment() {
  const textEl = document.getElementById('commentText')
  const text = textEl?.value.trim()
  if (!text) return showToast('댓글을 입력해 주세요')
  if (!currentUser) return kakaoLogin()

  try {
    const { error } = await db.from('picoapp_comments').insert({
      app_id: currentApp.id,
      user_id: currentUser.id,
      author_name: currentUser.name,
      author_avatar: currentUser.avatar,
      text
    })
    if (error) throw error
    showToast('댓글이 등록됐어요!')
    textEl.value = ''
    await loadComments(currentApp.id)
  } catch(e) {
    showToast('댓글 등록 중 오류가 났어요')
    console.error(e)
  }
}

// ── SUBMIT APP ───────────────────────────────────────────
function openSubmitModal() {
  if (!currentUser) return kakaoLogin()
  openModal('submitModal')
}

async function submitApp() {
  const name = document.getElementById('f-name').value.trim()
  const desc = document.getElementById('f-desc').value.trim()
  const url = document.getElementById('f-url').value.trim()
  const cat = document.getElementById('f-cat').value
  const icon = document.getElementById('f-icon').value.trim() || '🚀'

  if (!name || !desc || !url || !cat) return showToast('모든 필드를 입력해 주세요')

  try {
    const { error } = await db.from('picoapp_apps').insert({
      name, description: desc, url, category: cat, icon,
      author_id: currentUser.id,
      author_name: currentUser.name
    })
    if (error) throw error
    showToast('피코에 등록됐어요! 🎉')
    closeModal('submitModal')
    // 폼 초기화
    document.getElementById('f-name').value = ''
    document.getElementById('f-desc').value = ''
    document.getElementById('f-url').value = ''
    document.getElementById('f-cat').value = ''
    document.getElementById('f-icon').value = ''
    await loadApps()
  } catch(e) {
    showToast('등록 중 오류가 났어요')
    console.error(e)
  }
}

// ── FILTER / SEARCH ──────────────────────────────────────
function filterCategory(cat) {
  filterCat = cat
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat)
  })
  loadApps()
}

let searchTimer
function handleSearch() {
  clearTimeout(searchTimer)
  searchTimer = setTimeout(() => {
    searchQuery = document.getElementById('searchInput').value.trim()
    loadApps()
  }, 300)
}

function setSort(by) {
  sortBy = by
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'))
  document.getElementById(`sort-${by}`).classList.add('active')
  loadApps()
}

// ── MODAL ────────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('open')
  document.body.style.overflow = 'hidden'
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open')
  document.body.style.overflow = ''
}

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) closeModal(el.id)
  })
})

// ── TOAST ────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2500)
}

// ── START ────────────────────────────────────────────────
checkAuth()
loadApps()
</script>
</body>
</html>
