<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>마이페이지 · FORTUNA</title>
<meta name="theme-color" content="#0a0a0f">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="pico-icons.css">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c28;
  --border: #2a2a3d;
  --accent: #7b5ea7;
  --accent-light: #a07fd4;
  --text: #f0f0f5;
  --muted: #6b6b85;
  --orb: #7ac4ff;
  --gold: #e8b86d;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;
}
nav {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px;
  border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
  background:rgba(10,10,15,0.95);
  backdrop-filter:blur(12px);
}
.logo { display:flex; align-items:center; gap:8px; text-decoration:none; }
.logo img { height:56px; object-fit:contain; }
.logo-text { font-family:'Noto Serif KR',serif; font-weight:700; font-size:15px; letter-spacing:2px; color:#e8b86d; }
.back-btn {
  font-size:13px; color:var(--muted); text-decoration:none;
  display:flex; align-items:center; gap:4px;
  background:none; border:none; cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
}
.wrap { max-width:480px; margin:0 auto; padding:24px 20px 60px; }

/* 프로필 카드 */
.profile-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:28px 24px;
  display:flex; align-items:center; gap:18px;
  margin-bottom:16px;
}
.profile-avatar {
  width:64px; height:64px; border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent-light));
  display:flex; align-items:center; justify-content:center;
  font-size:28px; flex-shrink:0; overflow:hidden;
}
.profile-avatar img { width:100%; height:100%; object-fit:cover; }
.profile-info { flex:1; min-width:0; }
.profile-name {
  font-size:20px; font-weight:700;
  font-family:'Noto Serif KR',serif;
  margin-bottom:4px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.profile-sub { font-size:12px; color:var(--muted); }

/* Orb 카드 */
.orb-card {
  background:linear-gradient(135deg,rgba(122,196,255,0.08),rgba(122,196,255,0.03));
  border:1px solid rgba(122,196,255,0.2);
  border-radius:20px;
  padding:24px;
  margin-bottom:16px;
}
.orb-label { font-size:12px; color:var(--muted); margin-bottom:8px; letter-spacing:0.5px; text-transform:uppercase; }
.orb-amount {
  font-size:36px; font-weight:800;
  color:var(--orb); display:flex; align-items:baseline; gap:8px;
  margin-bottom:20px;
}
.orb-amount .orb-unit { font-size:16px; font-weight:500; }
.orb-charge-btn {
  width:100%; padding:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent-light));
  border:none; border-radius:12px;
  color:#fff; font-size:15px; font-weight:700;
  font-family:'Noto Sans KR',sans-serif;
  cursor:pointer; transition:opacity 0.15s;
}
.orb-charge-btn:active { opacity:0.8; }

/* 사주 프로필 카드 */
.section-title {
  font-size:13px; font-weight:600; color:var(--muted);
  margin-bottom:10px; letter-spacing:0.3px;
  text-transform:uppercase;
}
.profile-list { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
.profile-item {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px 18px;
  display:flex; align-items:center; justify-content:space-between;
}
.profile-item-name { font-size:15px; font-weight:600; margin-bottom:3px; }
.profile-item-sub { font-size:12px; color:var(--muted); }
.profile-badge {
  font-size:10px; font-weight:700;
  background:rgba(123,94,167,0.2); color:var(--accent-light);
  border:1px solid rgba(123,94,167,0.3);
  border-radius:6px; padding:3px 8px;
}

/* 로그아웃 */
.logout-btn {
  width:100%; padding:14px;
  background:rgba(224,92,106,0.08);
  border:1px solid rgba(224,92,106,0.2);
  border-radius:12px;
  color:#e05c6a; font-size:14px; font-weight:600;
  font-family:'Noto Sans KR',sans-serif;
  cursor:pointer; margin-top:8px;
  transition:background 0.15s;
}
.logout-btn:active { background:rgba(224,92,106,0.15); }

/* 로그인 안 된 상태 */
.login-prompt {
  text-align:center; padding:60px 20px;
}
.login-prompt p { color:var(--muted); font-size:14px; margin-bottom:24px; }
.kakao-btn {
  display:inline-flex; align-items:center; gap:8px;
  background:#fee500; color:#191919;
  border:none; border-radius:12px;
  padding:14px 28px; font-size:15px; font-weight:700;
  font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;
}
</style>
</head>
<body>

<nav>
  <a class="logo" href="/"><img src="img/goddess.png" alt="FORTUNA"><span class="logo-text">FORTUNA</span></a>
  <button class="back-btn" onclick="history.back()">← 돌아가기</button>
</nav>

<div class="wrap">
  <div id="loginPrompt" class="login-prompt" style="display:none;">
    <p>로그인 후 마이페이지를 이용할 수 있어요.</p>
    <button class="kakao-btn" onclick="kakaoLogin()">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="none"><path d="M8 1C4.134 1 1 3.582 1 6.757c0 1.904 1.178 3.584 2.98 4.624L3.2 14.2a.25.25 0 00.363.28l3.49-2.29c.31.03.622.047.947.047 3.866 0 7-2.582 7-5.48C15 3.582 11.866 1 8 1z" fill="#191919"/></svg>
      카카오로 시작하기
    </button>
  </div>

  <div id="myContent" style="display:none;">
    <!-- 프로필 -->
    <div class="profile-card">
      <div class="profile-avatar" id="avatarWrap"><i class="pi pi-person"></i></div>
      <div class="profile-info">
        <div class="profile-name" id="myName">-</div>
        <div class="profile-sub" id="myId">-</div>
      </div>
    </div>

    <!-- Orb 잔액 -->
    <div class="orb-card">
      <div class="orb-label"><i class="pi pi-sparkle"></i> Orb 잔액</div>
      <div class="orb-amount">
        <span id="myOrbBalance">-</span>
        <span class="orb-unit">Orb</span>
      </div>
      <button class="orb-charge-btn" onclick="location.href='charge.html'"><i class="pi pi-sparkle"></i> Orb 충전하기</button>
    </div>

    <!-- 사주 프로필 -->
    <div id="profileSection" style="display:none;">
      <div class="section-title">저장된 프로필</div>
      <div class="profile-list" id="profileList"></div>
    </div>

    <!-- 로그아웃 -->
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </div>
</div>

<script>
var SB_URL = 'https://ymghmfkqctckxxysxkvy.supabase.co';
var SB_KEY = 'sb_publishable_3-9zobXqx6Nv36LzmNMBpA_fohZqA5x';
var sb = window.supabase.createClient(SB_URL, SB_KEY);
var currentUser = null;

function kakaoLogin() {
  var KAKAO_REST_KEY = '0c8f16db31d8b01ae2fc9cc2c7c56ea7';
  var redirectUri = encodeURIComponent('https://picolab.kr/mypage.html');
  location.href = 'https://kauth.kakao.com/oauth/authorize?client_id=' + KAKAO_REST_KEY
    + '&redirect_uri=' + redirectUri + '&response_type=code';
}

async function init() {
  // 카카오 콜백 처리
  var params = new URLSearchParams(location.search);
  var code = params.get('code');
  if (code) {
    history.replaceState({}, '', '/mypage.html');
    try {
      var r = await fetch('https://fortuna.kkdmb7.workers.dev/kakao-token', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ code: code, redirect_uri: 'https://picolab.kr/mypage.html' })
      });
      var data = await r.json();
      if (data.access_token) {
        var pr = await fetch('https://kapi.kakao.com/v2/user/me', {
          headers:{ Authorization: 'Bearer ' + data.access_token }
        });
        var profile = await pr.json();
        currentUser = {
          id: 'kakao_' + profile.id,
          name: (profile.kakao_account && profile.kakao_account.profile && profile.kakao_account.profile.nickname) || '사용자',
          avatar: (profile.kakao_account && profile.kakao_account.profile && profile.kakao_account.profile.profile_image_url) || ''
        };
        localStorage.setItem('pico_user', JSON.stringify(currentUser));
      }
    } catch(e) {}
  }

  // localStorage에서 유저 로드
  if (!currentUser) {
    try {
      var stored = localStorage.getItem('pico_user');
      if (stored) currentUser = JSON.parse(stored);
    } catch(e) {}
  }

  if (!currentUser) {
    document.getElementById('loginPrompt').style.display = 'block';
    return;
  }

  document.getElementById('myContent').style.display = 'block';
  renderUser();
  fetchOrb();
  renderProfiles();
}

function renderUser() {
  document.getElementById('myName').textContent = currentUser.name || '사용자';
  document.getElementById('myId').textContent = currentUser.id || '';
  var avatarWrap = document.getElementById('avatarWrap');
  if (currentUser.avatar) {
    avatarWrap.innerHTML = '<img src="' + currentUser.avatar + '" alt="">';
  }
}

async function fetchOrb() {
  try {
    var res = await sb.from('orb_balance').select('balance').eq('user_id', currentUser.id).maybeSingle();
    var bal = (res.data && res.data.balance != null) ? res.data.balance : 0;
    document.getElementById('myOrbBalance').textContent = bal.toLocaleString();
  } catch(e) {
    document.getElementById('myOrbBalance').textContent = '0';
  }
}

function renderProfiles() {
  var profiles = [];
  try {
    var me = JSON.parse(localStorage.getItem('pico_profile'));
    var others = JSON.parse(localStorage.getItem('pico_profiles')) || [];
    if (me) profiles.push({ ...me, _isMe: true });
    profiles = profiles.concat(others.filter(function(p) { return !p.isMe; }));
  } catch(e) {}

  if (profiles.length === 0) return;
  var section = document.getElementById('profileSection');
  var list = document.getElementById('profileList');
  section.style.display = 'block';

  profiles.forEach(function(p) {
    var name = p.name || '이름없음';
    var date = '';
    if (p.year) date = p.year + '.' + String(p.month).padStart(2,'0') + '.' + String(p.day).padStart(2,'0');
    else if (p.birth_date) date = p.birth_date.replace(/-/g,'.');
    var gender = (p.gender === 'M' || p.gender === 'male') ? '남성' : '여성';

    var item = document.createElement('div');
    item.className = 'profile-item';
    item.innerHTML = '<div>'
      + '<div class="profile-item-name">' + name + '</div>'
      + '<div class="profile-item-sub">' + date + ' · ' + gender + '</div>'
      + '</div>'
      + (p._isMe ? '<span class="profile-badge">내 정보</span>' : '');
    list.appendChild(item);
  });
}

function doLogout() {
  localStorage.removeItem('pico_user');
  location.href = '/';
}

init();
</script>
</body>
</html>
