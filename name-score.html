<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이름 점수 확인 - 포르투나</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --void: #0a0a1a;
  --gold: #d4af37;
  --gold-dim: rgba(212,175,55,0.15);
  --gold-border: rgba(212,175,55,0.25);
  --text: #ede6f8;
  --text-dim: #9b8fb0;
  --card: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.07);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--void);
  color: var(--text);
  font-family: 'Noto Serif KR', serif;
  min-height: 100vh;
  overflow-x: hidden;
}
.bg { position:fixed; inset:0; z-index:0; pointer-events:none; }
.bg-nebula {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 20%, rgba(60,20,100,0.5) 0%, transparent 65%),
    radial-gradient(ellipse 50% 70% at 85% 80%, rgba(20,8,50,0.65) 0%, transparent 65%);
}
.star { position:absolute; border-radius:50%; background:#fff; animation:twinkle var(--d,3s) ease-in-out infinite; }
@keyframes twinkle { 0%,100%{opacity:var(--o,0.3)}50%{opacity:calc(var(--o,0.3)*0.2)} }
nav {
  position: fixed; top:0; left:0; right:0; z-index:100;
  padding: 14px 20px;
  display: flex; align-items:center; justify-content:space-between;
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(212,175,55,0.07);
}
.nav-brand {
  display:flex; align-items:center; gap:8px;
  text-decoration:none; color:var(--gold);
  font-size:14px; letter-spacing:0.2em; font-weight:700;
  font-family:'Noto Serif KR',serif;
}
.nav-brand img { height:44px; object-fit:contain; flex-shrink:0; }
.nav-back {
  font-size:11px; color:var(--text-dim); text-decoration:none;
  letter-spacing:0.1em; transition:color 0.2s; cursor:pointer;
  background:none; border:none; font-family:inherit;
}
.nav-back:hover { color:var(--gold); }
.wrap {
  position:relative; z-index:1;
  max-width: 480px; margin:0 auto;
  padding: 90px 20px 80px;
}
.section-label {
  font-size:10px; letter-spacing:0.4em; color:var(--gold);
  text-transform:uppercase; margin-bottom:20px; opacity:0.7;
}
.mode-tabs {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:6px; margin-bottom:18px;
}
.mode-tab {
  background: var(--card); border:1px solid var(--border);
  border-radius:10px; padding:10px 6px;
  text-align:center; cursor:pointer;
  font-family:'Noto Serif KR',serif; font-size:12px;
  color:var(--text-dim); transition:all 0.22s; letter-spacing:0.04em;
}
.mode-tab:hover { border-color:var(--gold-border); color:var(--text); }
.mode-tab.active { background:var(--gold-dim); border-color:var(--gold); color:var(--gold); }
.input-card {
  background: var(--card); border:1px solid var(--border);
  border-radius:18px; padding:24px; margin-bottom:14px;
  backdrop-filter:blur(10px);
}
.name-row { display:grid; grid-template-columns:1fr 2fr; gap:12px; margin-bottom:18px; }
.field-label { font-size:11px; color:var(--text-dim); margin-bottom:8px; letter-spacing:0.08em; display:block; }
.name-input {
  width:100%; background:rgba(255,255,255,0.04);
  border:1px solid var(--gold-border); border-radius:10px;
  padding:12px 14px; color:var(--text);
  font-family:'Noto Serif KR',serif; font-size:16px;
  outline:none; transition:border-color 0.25s; -webkit-appearance:none;
}
.name-input:focus { border-color:var(--gold); background:rgba(212,175,55,0.04); }
.hanja-section { margin-bottom:16px; }
.hanja-section-label { font-size:11px; color:var(--text-dim); letter-spacing:0.08em; margin-bottom:8px; display:block; }
.hanja-btns { display:flex; flex-wrap:wrap; gap:7px; }
.hanja-btn {
  background:rgba(255,255,255,0.04); border:1px solid var(--gold-border);
  border-radius:10px; padding:8px 12px; cursor:pointer;
  font-family:'Noto Serif KR',serif; text-align:center;
  transition:all 0.2s; min-width:60px;
}
.hanja-btn:hover { border-color:var(--gold); background:var(--gold-dim); }
.hanja-btn.selected { background:var(--gold); border-color:var(--gold); color:#06020f; }
.hanja-btn .hb-char { font-size:22px; display:block; line-height:1.2; }
.hanja-btn .hb-info { font-size:10px; color:var(--text-dim); margin-top:3px; }
.hanja-btn.selected .hb-info { color:rgba(6,2,15,0.6); }
.hanja-manual-row { display:flex; align-items:center; gap:10px; margin-top:8px; }
.hanja-manual-label { font-size:11px; color:var(--text-dim); flex:1; }
.stroke-grid { display:grid; gap:10px; }
.stroke-row { display:flex; align-items:center; gap:10px; }
.stroke-char { font-size:20px; color:var(--gold); min-width:28px; text-align:center; }
.stroke-label { font-size:11px; color:var(--text-dim); flex:1; }
.stroke-spin { display:flex; align-items:center; gap:6px; }
.spin-btn {
  width:30px; height:30px; border-radius:8px;
  background:var(--gold-dim); border:1px solid var(--gold-border);
  color:var(--gold); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background 0.2s;
}
.spin-btn:hover { background:rgba(212,175,55,0.25); }
.spin-val {
  width:36px; text-align:center; font-size:15px;
  background:rgba(255,255,255,0.04); border:1px solid var(--border);
  border-radius:8px; padding:4px 0; color:var(--text);
  font-family:'Noto Serif KR',serif;
}
.btn-gold {
  width:100%; padding:15px;
  background:linear-gradient(135deg,#d4af37 0%,#f0d060 50%,#d4af37 100%);
  background-size:200% 200%;
  border:none; border-radius:12px;
  color:#06020f; font-family:'Noto Serif KR',serif;
  font-size:14px; font-weight:600; letter-spacing:0.1em;
  cursor:pointer; transition:all 0.3s;
  animation:shimmer 3s ease infinite;
}
.btn-gold:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(212,175,55,0.35); }
.btn-gold:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
@keyframes shimmer { 0%,100%{background-position:0% 50%}50%{background-position:100% 50%} }
.result-area { display:none; margin-top:24px; }
.result-area.show { display:block; animation:fadeUp 0.5s ease; }
.score-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
.score-card {
  background:var(--card); border-radius:16px; padding:18px 14px;
  text-align:center; border:1px solid var(--border); backdrop-filter:blur(10px);
}
.score-gye { font-size:10px; color:var(--text-dim); letter-spacing:0.15em; margin-bottom:6px; }
.score-num { font-size:40px; font-weight:300; line-height:1; margin-bottom:8px; }
.score-badge {
  display:inline-block; font-size:11px; font-weight:600;
  padding:3px 10px; border-radius:20px; margin-bottom:6px; letter-spacing:0.06em;
}
.score-name { font-size:11px; color:var(--text-dim); }
.grade-대길 { color:#d4af37; border:1px solid rgba(212,175,55,0.5); background:rgba(212,175,55,0.12); }
.score-card.grade-대길 .score-num { color:#d4af37; }
.grade-길 { color:#4caf7a; border:1px solid rgba(76,175,122,0.5); background:rgba(76,175,122,0.12); }
.score-card.grade-길 .score-num { color:#4caf7a; }
.grade-반길 { color:#ff9800; border:1px solid rgba(255,152,0,0.5); background:rgba(255,152,0,0.12); }
.score-card.grade-반길 .score-num { color:#ff9800; }
.grade-흉 { color:#f44336; border:1px solid rgba(244,67,54,0.4); background:rgba(244,67,54,0.1); }
.score-card.grade-흉 .score-num { color:#f44336; }
.grade-대흉 { color:#e91e63; border:1px solid rgba(233,30,99,0.4); background:rgba(233,30,99,0.1); }
.score-card.grade-대흉 .score-num { color:#e91e63; }
.analysis-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:20px; margin-bottom:16px;
}
.analysis-title {
  font-size:10px; letter-spacing:0.3em; color:var(--gold);
  margin-bottom:16px; opacity:0.7; text-transform:uppercase;
}
.ohaeng-flow {
  display:flex; align-items:center; justify-content:center;
  gap:8px; margin-bottom:14px; flex-wrap:wrap;
}
.oh-node { text-align:center; }
.oh-char { font-size:18px; color:var(--text); display:block; margin-bottom:4px; }
.oh-badge {
  display:inline-block; font-size:11px; font-weight:600;
  padding:3px 10px; border-radius:20px; letter-spacing:0.06em;
}
.oh-badge.木 { color:#4caf7a; border:1px solid rgba(76,175,122,0.5); background:rgba(76,175,122,0.12); }
.oh-badge.火 { color:#f44336; border:1px solid rgba(244,67,54,0.4); background:rgba(244,67,54,0.1); }
.oh-badge.土 { color:#ff9800; border:1px solid rgba(255,152,0,0.5); background:rgba(255,152,0,0.12); }
.oh-badge.金 { color:#d4af37; border:1px solid rgba(212,175,55,0.5); background:rgba(212,175,55,0.12); }
.oh-badge.水 { color:#2196f3; border:1px solid rgba(33,150,243,0.5); background:rgba(33,150,243,0.12); }
.oh-arrow { font-size:16px; color:var(--text-dim); line-height:1; margin-top:8px; }
.oh-arrow.상생 { color:#4caf7a; }
.oh-arrow.상극 { color:#f44336; }
.oh-result {
  text-align:center; font-size:12px; padding:8px 14px;
  border-radius:10px; letter-spacing:0.04em; line-height:1.6;
}
.oh-result.all-good { background:rgba(76,175,122,0.1); color:#4caf7a; border:1px solid rgba(76,175,122,0.3); }
.oh-result.has-bad { background:rgba(244,67,54,0.08); color:#f44336; border:1px solid rgba(244,67,54,0.25); }
.oh-result.mixed { background:rgba(255,152,0,0.08); color:#ff9800; border:1px solid rgba(255,152,0,0.25); }
.eumyang-row { display:flex; gap:8px; justify-content:center; margin-bottom:14px; }
.ey-node { text-align:center; flex:1; }
.ey-char { font-size:16px; color:var(--text); display:block; margin-bottom:4px; }
.ey-badge {
  display:inline-block; font-size:11px; font-weight:600;
  padding:4px 6px; border-radius:20px; letter-spacing:0.04em; width:100%;
}
.ey-badge.양 { color:#f44336; border:1px solid rgba(244,67,54,0.4); background:rgba(244,67,54,0.08); }
.ey-badge.음 { color:#2196f3; border:1px solid rgba(33,150,243,0.5); background:rgba(33,150,243,0.1); }
.jawon-row { display:flex; gap:8px; justify-content:center; margin-bottom:8px; }
.jw-node { text-align:center; flex:1; }
.jw-hanja { font-size:24px; color:var(--gold); display:block; margin-bottom:6px; }
.jawon-notice { font-size:11px; color:var(--text-dim); line-height:1.7; margin-bottom:12px; padding:8px 10px; background:rgba(255,255,255,0.03); border-radius:8px; border-left:2px solid rgba(212,175,55,0.3); }
.summary-card {
  background:var(--gold-dim); border:1px solid var(--gold-border);
  border-radius:14px; padding:18px 16px; margin-bottom:20px;
  font-size:13px; line-height:1.9; color:var(--text);
}
.total-score-card {
  background: rgba(212,175,55,0.08);
  border: 1px solid rgba(212,175,55,0.3);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  margin-bottom: 16px;
}
.total-score-label {
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.total-score-num {
  font-size: 56px;
  font-weight: 700;
  color: #d4af37;
  line-height: 1;
}
.total-score-max {
  font-size: 14px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 12px;
}
.total-score-bar {
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  margin: 12px 0;
  overflow: hidden;
}
.total-score-fill {
  height: 100%;
  background: linear-gradient(90deg, #d4af37, #f5d87a);
  border-radius: 3px;
  transition: width 0.8s ease;
}
.total-score-comment {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  line-height: 1.5;
}
.interpret-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:22px 18px; margin-bottom:16px;
  font-size:13px; line-height:2; color:var(--text);
}
.interpret-section { margin-bottom:14px; }
.interpret-section:last-child { margin-bottom:0; }
.interpret-label {
  font-size:10px; letter-spacing:0.25em; color:var(--gold);
  margin-bottom:6px; display:block; opacity:0.8;
}
.toast {
  position:fixed; top:20px; left:50%;
  transform:translateX(-50%) translateY(-80px);
  background:rgba(212,175,55,0.12); border:1px solid var(--gold);
  border-radius:50px; padding:11px 24px;
  color:var(--gold); font-size:12px; z-index:9999;
  transition:transform 0.3s; backdrop-filter:blur(10px);
  white-space:nowrap; letter-spacing:0.06em;
}
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.error { border-color:#f44336; color:#f44336; background:rgba(244,67,54,0.1); }
.score-desc {
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  line-height: 1.4;
  margin-top: 4px;
  text-align: center;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)} }
.yongsin-match-box {
  border:1px solid var(--gold); background:rgba(212,175,55,0.08);
  border-radius:16px; padding:20px; margin-top:16px;
  font-size:13px; line-height:1.9; color:var(--text);
}
.yongsin-match-title {
  font-size:10px; letter-spacing:0.3em; color:var(--gold);
  margin-bottom:16px; opacity:0.7; text-transform:uppercase;
}
.yongsin-match-item { margin-bottom:6px; }
.yongsin-ok  { color:#4caf7a; }
.yongsin-warn { color:#ff9800; }
.yongsin-bad  { color:#f44336; }
.yongsin-login-banner {
  text-align:center; padding:10px 0 4px;
  color:var(--text-dim); font-size:13px; line-height:1.9;
}
.btn-login-small {
  display:inline-block; margin-top:10px; padding:10px 24px;
  background:var(--gold-dim); border:1px solid var(--gold-border);
  border-radius:10px; color:var(--gold); font-size:12px;
  font-family:'Noto Serif KR',serif; cursor:pointer;
  letter-spacing:0.08em; text-decoration:none;
}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-nebula"></div>
  <div id="bgStars"></div>
</div>
<div class="toast" id="toast"></div>

<nav>
  <a href="https://picolab.kr" class="nav-brand">
    <img src="https://raw.githubusercontent.com/kkdmb7-blip/pico/main/img/goddess.png" alt="FORTUNA">
    FORTUNA
  </a>
  <a href="/" class="nav-back">← 메인으로</a>
</nav>

<div class="wrap">
  <div class="mode-tabs">
    <div class="mode-tab active" id="tabAuto" onclick="setMode('auto')">한글 자동</div>
    <div class="mode-tab" id="tabSelect" onclick="setMode('select')">한자 선택</div>
    <div class="mode-tab" id="tabManual" onclick="setMode('manual')">한자 수동</div>
  </div>

  <div class="input-card">
    <div class="name-row">
      <div>
        <label class="field-label">성(姓)</label>
        <input class="name-input" id="inputSur" type="text" maxlength="3" placeholder="김" oninput="onNameInput()">
      </div>
      <div>
        <label class="field-label">이름</label>
        <input class="name-input" id="inputName" type="text" maxlength="4" placeholder="민준" oninput="onNameInput()">
      </div>
    </div>
    <div id="hanjaArea" style="display:none; margin-bottom:18px;">
      <div id="hanjaGrid"></div>
    </div>
    <div id="strokeArea" style="display:none; margin-bottom:18px;">
      <div class="stroke-grid" id="strokeGrid"></div>
    </div>
    <button class="btn-gold" id="btnCalc" onclick="calcScore()">점수 확인</button>
  </div>

  <div class="result-area" id="resultArea">
    <div class="section-label">4격 수리 결과</div>
    <div class="score-grid" id="scoreGrid"></div>
    <div class="total-score-card" id="totalScoreCard"></div>
    <div class="summary-card" id="summaryCard"></div>

    <div class="analysis-card">
      <div class="analysis-title">음오행 · 발음 흐름</div>
      <div class="ohaeng-flow" id="ohaengFlow"></div>
      <div class="oh-result" id="ohaengResult"></div>
    </div>

    <div class="analysis-card">
      <div class="analysis-title">음양 배합</div>
      <div class="eumyang-row" id="eumyangRow"></div>
      <div class="oh-result" id="eumyangResult"></div>
    </div>

    <div class="analysis-card" id="jawonCard" style="display:none;">
      <div class="analysis-title" id="jawonTitle">자원오행 · 한자 기운</div>
      <div class="jawon-notice" id="jawonNotice"></div>
      <div class="jawon-row" id="jawonRow"></div>
    </div>

    <div class="interpret-card" id="interpretCard"></div>
    <div id="yongsinMatchBox"></div>
  </div>
</div>

<script>
(function() {
  var c = document.getElementById('bgStars');
  for (var i = 0; i < 60; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var size = Math.random() * 1.8 + 0.4;
    s.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;--o:'+(Math.random()*0.25+0.05)+';--d:'+(Math.random()*4+2)+'s;';
    c.appendChild(s);
  }
})();

var GRADE_SCORE = { '대길': 100, '길': 75, '반길': 50, '흉': 25, '대흉': 0 };

function getScoreComment(score) {
  if (score >= 90) return '매우 좋은 이름입니다. 강한 길운을 가진 이름이에요.';
  if (score >= 75) return '좋은 이름입니다. 전반적으로 길한 기운이 흐릅니다.';
  if (score >= 60) return '무난한 이름입니다. 일부 보완이 도움될 수 있어요.';
  if (score >= 40) return '주의가 필요한 이름입니다. 개명을 고려해볼 수 있어요.';
  return '흉한 기운이 강한 이름입니다. 전문 작명가 상담을 권장합니다.';
}

var SURI_TABLE = {
  1:"대길",2:"흉",3:"길",4:"대흉",5:"길",6:"길",7:"길",8:"길",9:"흉",10:"흉",
  11:"길",12:"흉",13:"길",14:"흉",15:"대길",16:"길",17:"길",18:"길",19:"흉",20:"흉",
  21:"대길",22:"흉",23:"길",24:"길",25:"길",26:"반길",27:"흉",28:"흉",29:"길",30:"반길",
  31:"대길",32:"길",33:"길",34:"대흉",35:"길",36:"흉",37:"길",38:"반길",39:"길",40:"흉",
  41:"대길",42:"흉",43:"흉",44:"대흉",45:"길",46:"흉",47:"길",48:"길",49:"반길",50:"흉",
  51:"반길",52:"길",53:"흉",54:"흉",55:"반길",56:"흉",57:"길",58:"길",59:"흉",60:"대흉",
  61:"길",62:"흉",63:"길",64:"흉",65:"길",66:"흉",67:"길",68:"길",69:"흉",70:"흉",
  71:"반길",72:"흉",73:"반길",74:"흉",75:"반길",76:"반길",77:"반길",78:"반길",79:"흉",80:"흉",
  81:"대길"
};

var SURI_NAME = {

function charStrokes(ch) {
  var code = ch.charCodeAt(0);
  if (code < 0xAC00 || code > 0xD7A3) return 0;
  var idx = code - 0xAC00;
  var jong = JONG_LIST[idx % 28];
  var jung = JUNG_LIST[Math.floor((idx % (28*21)) / 28)];
  var cho  = CHO_LIST[Math.floor(idx / (28*21))];
  return (CHO[cho]||0) + (JUNG[jung]||0) + (JONG[jong]||0);
}

function normalize81(n) {
  if (n <= 0) return 0;
  if (n <= 81) return n;
  var r = n % 81;
  return r === 0 ? 81 : r;
}

function calcGyek(A, B, C) {
  return {
    won:  normalize81(B + C),
    hyun: normalize81(A + B),
    yi:   normalize81(C > 0 ? A + C : A + B),
    jung: normalize81(A + B + C)
  };
}

// ── 입력 모드 ─────────────────────────────────────────────────────
var currentMode = 'auto';
var manualStrokes = {};
var hanjaSelected = {};
var hanjaManual   = {};

function setMode(m) {
  currentMode = m;
  ['auto','select','manual'].forEach(function(id) {
    var el = document.getElementById('tab' + id.charAt(0).toUpperCase() + id.slice(1));
    if (el) el.classList.toggle('active', id === m);
  });
  document.getElementById('hanjaArea').style.display  = (m === 'select') ? 'block' : 'none';
  document.getElementById('strokeArea').style.display = (m === 'manual') ? 'block' : 'none';
  if (m === 'select') renderHanjaSelect();
  if (m === 'manual') renderStrokeArea();
}

function onNameInput() {
  if (currentMode === 'select') renderHanjaSelect();
  else if (currentMode === 'manual') renderStrokeArea();
}

function renderHanjaSelect() {
  var surVal  = document.getElementById('inputSur').value.trim();
  var nameVal = document.getElementById('inputName').value.trim();
  var grid = document.getElementById('hanjaGrid');
  grid.innerHTML = '';

  var surSec = document.createElement('div');
  surSec.className = 'hanja-section';
  surSec.innerHTML = '<span class="hanja-section-label">성(姓) 한자 선택</span>';
  var surBtns = document.createElement('div');
  surBtns.className = 'hanja-btns';

  var surList = surVal ? SURNAME_HANJA[surVal] : null;
  if (surList && surList.length > 0) {
    surList.forEach(function(item) {
      var hj = item[0], st = item[1], oh = item[2] || '';
      var btn = document.createElement('button');
      btn.className = 'hanja-btn' + (hanjaSelected['sur'] === st && hanjaSelected['sur_hj'] === hj ? ' selected' : '');
      btn.innerHTML = '<span class="hb-char">'+hj+'</span><span class="hb-info">'+st+'획 · '+oh+'</span>';
      btn.onclick = function() {
        hanjaSelected['sur'] = st; hanjaSelected['sur_hj'] = hj; hanjaSelected['sur_oh'] = oh;
        renderHanjaSelect(); tryAutoCalcHanja(nameVal);
      };
      surBtns.appendChild(btn);
    });
  } else if (surVal) {
    surSec.innerHTML += '<span style="font-size:11px;color:var(--text-dim);">이 성씨는 목록에 없습니다. 직접 입력해주세요.</span>';
    surSec.appendChild(makeHanjaManualRow('sur', surVal));
    surBtns = null;
  } else {
    surBtns.innerHTML = '<span style="font-size:11px;color:var(--text-dim);">성(姓)을 입력하면 한자 목록이 표시됩니다</span>';
  }
  if (surBtns) surSec.appendChild(surBtns);
  grid.appendChild(surSec);

  if (nameVal) {
    nameVal.split('').forEach(function(ch, idx) {
      var key = 'name' + idx;
      var sec = document.createElement('div');
      sec.className = 'hanja-section';
      sec.innerHTML = '<span class="hanja-section-label">'+ch+' 한자 선택</span>';
      var btns = document.createElement('div');
      btns.className = 'hanja-btns';
      var list = NAME_HANJA[ch];
      if (list && list.length > 0) {
        list.forEach(function(item) {
          var hj = item[0], st = item[1], meaning = item[2]||'', oh = item[3]||'';
          var btn = document.createElement('button');
          var isSel = hanjaSelected[key] === st && hanjaSelected[key+'_hj'] === hj;
          btn.className = 'hanja-btn' + (isSel ? ' selected' : '');
          btn.innerHTML = '<span class="hb-char">'+hj+'</span><span class="hb-info">'+st+'획 '+meaning+' · '+oh+'</span>';
          btn.onclick = function() {
            hanjaSelected[key] = st; hanjaSelected[key+'_hj'] = hj; hanjaSelected[key+'_oh'] = oh;
            renderHanjaSelect(); tryAutoCalcHanja(nameVal);
          };
          btns.appendChild(btn);
        });
        sec.appendChild(btns);
      } else {
        sec.innerHTML += '<span style="font-size:11px;color:var(--text-dim);">\''+ch+'\'는 목록에 없습니다.</span>';
        sec.appendChild(makeHanjaManualRow(key, ch));
      }
      grid.appendChild(sec);
    });
  }
}

function makeHanjaManualRow(key, ch) {
  if (!(key in hanjaManual)) hanjaManual[key] = charStrokes(ch) || 1;
  hanjaSelected[key] = hanjaManual[key];
  var row = document.createElement('div');
  row.className = 'hanja-manual-row';
  row.innerHTML =
    '<span class="hanja-manual-label">획수 직접 입력</span>' +
    '<div class="stroke-spin">' +
      '<button class="spin-btn" onclick="adjustHanjaManual(\''+key+'\',-1)">−</button>' +
      '<div class="spin-val" id="hjm_'+key+'">'+hanjaManual[key]+'</div>' +
      '<button class="spin-btn" onclick="adjustHanjaManual(\''+key+'\',1)">+</button>' +
    '</div>';
  return row;
}

function adjustHanjaManual(key, delta) {
  hanjaManual[key] = Math.max(1, (hanjaManual[key]||1) + delta);
  hanjaSelected[key] = hanjaManual[key];
  var el = document.getElementById('hjm_'+key);
  if (el) el.textContent = hanjaManual[key];
}

function tryAutoCalcHanja(nameVal) {
  var nameChars = (nameVal||'').split('').filter(Boolean);
  var surOk  = hanjaSelected['sur'] !== undefined;
  var nameOk = nameChars.every(function(_,i){ return hanjaSelected['name'+i] !== undefined; });
  if (surOk && nameOk && nameChars.length > 0) calcScore();
}

function renderStrokeArea() {
  var surVal  = document.getElementById('inputSur').value.trim();
  var nameVal = document.getElementById('inputName').value.trim();
  var grid = document.getElementById('strokeGrid');
  grid.innerHTML = '';
  function makeRow(key, label, ch, def) {
    if (!(key in manualStrokes)) manualStrokes[key] = def;
    var row = document.createElement('div');
    row.className = 'stroke-row';
    row.innerHTML =
      '<span class="stroke-char">'+(ch||'？')+'</span>' +
      '<span class="stroke-label">'+label+'</span>' +
      '<div class="stroke-spin">' +
        '<button class="spin-btn" onclick="adjustStroke(\''+key+'\',-1)">−</button>' +
        '<div class="spin-val" id="sv_'+key+'">'+manualStrokes[key]+'</div>' +
        '<button class="spin-btn" onclick="adjustStroke(\''+key+'\',1)">+</button>' +
      '</div>';
    grid.appendChild(row);
  }
  (surVal||'').split('').forEach(function(ch,i){ makeRow('sur'+i,'성 획수',ch,charStrokes(ch)||1); });
  (nameVal||'').split('').forEach(function(ch,i){ makeRow('name'+i,'이름 '+(i+1)+'번째',ch,charStrokes(ch)||1); });
}

function adjustStroke(key, delta) {
  manualStrokes[key] = Math.max(1, (manualStrokes[key]||1) + delta);
  var el = document.getElementById('sv_'+key);
  if (el) el.textContent = manualStrokes[key];
}

function getStrokesFor(prefix, chars) {
  return chars.map(function(ch, i) {
    var key = prefix + i;
    if (currentMode === 'auto') return charStrokes(ch)||0;
    if (currentMode === 'select') {
      var sk = (prefix==='sur') ? 'sur' : key;
      return hanjaSelected[sk] !== undefined ? hanjaSelected[sk] : (charStrokes(ch)||0);
    }
    return manualStrokes[key] || charStrokes(ch) || 1;
  });
}

function getJawonOhaeng(prefix, chars) {
  return chars.map(function(ch, i) {
    if (currentMode === 'select') {
      var sk = (prefix==='sur') ? 'sur' : (prefix+i);
      return hanjaSelected[sk+'_oh'] || getEumOhaeng(ch);
    }
    return getEumOhaeng(ch);
  });
}

function getSelectedHanja(prefix, chars) {
  if (currentMode !== 'select') return chars.slice();
  return chars.map(function(ch, i) {
    var sk = (prefix==='sur') ? 'sur' : (prefix+i);
    return hanjaSelected[sk+'_hj'] || ch;
  });
}

var lastScores = null, lastName = '';
var _yongsin = null, _geokguk = null;

function getYongsinOhaeng(yongsin) {
  if (!yongsin) return null;
  if (yongsin.includes('목') || yongsin.includes('木')) return '목';
  if (yongsin.includes('화') || yongsin.includes('火')) return '화';
  if (yongsin.includes('토') || yongsin.includes('土')) return '토';
  if (yongsin.includes('금') || yongsin.includes('金')) return '금';
  if (yongsin.includes('수') || yongsin.includes('水')) return '수';
  return null;
}

function loadSajuData() {
  var user = null;
  try { user = JSON.parse(localStorage.getItem('pico_user')); } catch(e) {}
  if (!user) return;
  var profile = null;
  try { profile = JSON.parse(localStorage.getItem('pico_profile')); } catch(e) {}
  if (!profile) return;
  fetch('https://fortuna.kkdmb7.workers.dev/saju-report', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      name: profile.name,
      gender: profile.gender,
      year: profile.year,
      month: profile.month,
      day: profile.day,
      hour: profile.hour !== undefined ? profile.hour : -1
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    _yongsin = data.yongshin || data.yongsin || null;
    _geokguk = data.geokguk || null;
  })
  .catch(function(){});
}

function renderYongsinMatch(allChars, allJawon, allEumOh) {
  var box = document.getElementById('yongsinMatchBox');
  if (!box) return;
  var user = null;
  try { user = JSON.parse(localStorage.getItem('pico_user')); } catch(e) {}
  if (!user) {
    box.innerHTML =
      '<div class="yongsin-match-box">' +
        '<div class="yongsin-match-title">용신 매칭 분석</div>' +
        '<div class="yongsin-login-banner">로그인하면 내 사주 용신과 이름 오행 매칭을 확인할 수 있어요' +
          '<br><a class="btn-login-small" href="https://picolab.kr">로그인하러 가기</a>' +
        '</div>' +
      '</div>';
    return;
  }
  if (!_yongsin) { box.innerHTML = ''; return; }
  var yongsinOh = getYongsinOhaeng(_yongsin);
  if (!yongsinOh) { box.innerHTML = ''; return; }
  var KO_OH   = {'목':'木','화':'火','토':'土','금':'金','수':'水'};
  var HAN_OH  = {'木':'목','火':'화','土':'토','金':'금','水':'수'};
  var KIJIN   = {'木':'金','火':'水','土':'木','金':'火','水':'土'};
  var yongsinHan = KO_OH[yongsinOh];
  var kijinHan   = KIJIN[yongsinHan];
  var ohaengList = (currentMode === 'select') ? allJawon : allEumOh;
  var matchChars = [], kijinChars = [];
  allChars.forEach(function(ch, i) {
    var oh = ohaengList[i];
    if (oh === yongsinHan) matchChars.push(ch);
    else if (oh === kijinHan) kijinChars.push(ch);
  });
  var charDesc = allChars.map(function(ch, i) {
    var oh = ohaengList[i];
    return ch + '=' + (HAN_OH[oh] || oh || '?') + '오행';
  }).join(', ');
  var matchCount = matchChars.length;
  var overall = matchCount >= 2
    ? '이름의 오행이 용신과 잘 맞습니다. 운을 보완하는 좋은 이름입니다.'
    : matchCount === 1
    ? '부분적으로 용신 오행이 반영되어 있습니다.'
    : '이름 오행이 용신과 다릅니다. 개명 시 용신 오행 반영을 권장합니다.';
  var recList = [];
  if (NAME_HANJA) {
    Object.keys(NAME_HANJA).forEach(function(key) {
      NAME_HANJA[key].forEach(function(item) {
        if (item[3] === yongsinHan) recList.push(item[0] + '(' + key + ')');
      });
    });
  }
  var recText = recList.slice(0, 8).join(' ');
  var html = '<div class="yongsin-match-box">';
  html += '<div class="yongsin-match-title">용신 매칭 분석</div>';
  html += '<div class="yongsin-match-item">당신의 용신은 <b>' + _yongsin + '(' + yongsinOh + ')</b>입니다.' + (_geokguk ? '&nbsp; 격국: ' + _geokguk : '') + '</div>';
  html += '<div class="yongsin-match-item">이름 ' + allChars.join('') + '의 오행 구성: ' + charDesc + '</div>';
  if (matchChars.length > 0)
    html += '<div class="yongsin-match-item yongsin-ok">✅ 용신 일치: ' + matchChars.join(', ') + '</div>';
  if (kijinChars.length > 0)
    html += '<div class="yongsin-match-item yongsin-warn">⚠️ 기신 주의: ' + kijinChars.join(', ') + '</div>';
  html += '<div class="yongsin-match-item" style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(212,175,55,0.2);">' + overall + '</div>';
  if (recText)
    html += '<div class="yongsin-match-item" style="margin-top:8px;font-size:12px;color:var(--text-dim);">용신 오행(' + yongsinOh + ') 추천 한자: ' + recText + '</div>';
  html += '</div>';
  box.innerHTML = html;
}

function calcScore() {
  var sur  = document.getElementById('inputSur').value.trim();
  var name = document.getElementById('inputName').value.trim();
  if (!sur || !name) { showToast('성과 이름을 모두 입력해주세요', true); return; }

  var surChars  = sur.split('');
  var nameChars = name.split('');
  var surSt  = getStrokesFor('sur', surChars);
  var nameSt = getStrokesFor('name', nameChars);

  var A = surSt.reduce(function(a,b){return a+b;},0);
  var B = nameSt[0]||0, C = nameSt[1]||0;
  var gyek = calcGyek(A, B, C);
  lastScores = gyek; lastName = sur + name;

  var allChars   = surChars.concat(nameChars);
  var allStrokes = surSt.concat(nameSt);
  var allJawon   = getJawonOhaeng('sur',surChars).concat(getJawonOhaeng('name',nameChars));
  var allHanja   = getSelectedHanja('sur',surChars).concat(getSelectedHanja('name',nameChars));

  renderResult(gyek, allChars, allStrokes, allJawon, allHanja);
}

function renderResult(gyek, allChars, allStrokes, allJawon, allHanja) {
  // 4격 카드
  var cards = [
    {label:'정격',val:gyek.jung,desc:'전체운'},
    {label:'형격',val:gyek.hyun,desc:'사회운'},
    {label:'원격',val:gyek.won, desc:'내면·재능'},
    {label:'이격',val:gyek.yi,  desc:'가정·말년'},
  ];
  var grid = document.getElementById('scoreGrid');
  grid.innerHTML = '';
  cards.forEach(function(c) {
    var g = SURI_TABLE[c.val]||'흉', sn = SURI_NAME[c.val]||'';
    var el = document.createElement('div');
    el.className = 'score-card grade-'+g;
    el.innerHTML =
      '<div class="score-gye">'+c.label+' · '+c.desc+'</div>' +
      '<div class="score-num">'+c.val+'</div>' +
      '<span class="score-badge grade-'+g+'">'+g+'</span>' +
      '<div class="score-name">'+sn+'</div>' +
      '<div class="score-desc">'+(SURI_DESC[c.val]||'')+'</div>';
    grid.appendChild(el);
  });

  var grades = [gyek.jung,gyek.hyun,gyek.won,gyek.yi].map(function(v){return SURI_TABLE[v]||'흉';});
  var goodCnt = grades.filter(function(g){return g==='대길'||g==='길';}).length;
  var badCnt  = grades.filter(function(g){return g==='대흉'||g==='흉';}).length;
  var jg = SURI_TABLE[gyek.jung]||'흉';
  var sumText = goodCnt>=3 ? '전반적으로 좋은 수리 배합입니다. 정격('+gyek.jung+'·'+jg+')이 이름 전체의 운을 이끕니다.'
    : badCnt>=3 ? '수리 배합에 주의가 필요합니다. 정격('+gyek.jung+'·'+jg+')을 중심으로 검토하세요.'
    : '길흉이 혼재합니다. 정격('+gyek.jung+'·'+jg+')이 핵심 운의 방향을 결정합니다.';
  document.getElementById('summaryCard').textContent = sumText;

  // 종합 점수 카드
  var scores = grades.map(function(g){ return GRADE_SCORE[g] || 0; });
  var totalScore = Math.round(scores.reduce(function(a,b){return a+b;},0) / 4);
  document.getElementById('totalScoreCard').innerHTML =
    '<div class="total-score-label">이름 종합 점수</div>' +
    '<div class="total-score-num">' + totalScore + '</div>' +
    '<div class="total-score-max">/ 100점</div>' +
    '<div class="total-score-bar"><div class="total-score-fill" style="width:0%;" id="totalScoreFill"></div></div>' +
    '<div class="total-score-comment">' + getScoreComment(totalScore) + '</div>';
  setTimeout(function(){ var f=document.getElementById('totalScoreFill'); if(f) f.style.width=totalScore+'%'; }, 50);

  // 음오행
  var allEumOh = allChars.map(function(ch){ return getEumOhaeng(ch); });
  var flowEl = document.getElementById('ohaengFlow');
  flowEl.innerHTML = '';
  allChars.forEach(function(ch, i) {
    var oh = allEumOh[i];
    var node = document.createElement('div');
    node.className = 'oh-node';
    node.innerHTML = '<span class="oh-char">'+ch+'</span><span class="oh-badge '+(oh||'')+'">'+( oh||'?' )+'</span>';
    flowEl.appendChild(node);
    if (i < allChars.length - 1) {
      var rel = checkRelation(allEumOh[i], allEumOh[i+1]);
      var arr = document.createElement('div');
      arr.className = 'oh-arrow ' + rel;
      arr.textContent = rel==='상생' ? '▶' : rel==='상극' ? '✕' : '→';
      flowEl.appendChild(arr);
    }
  });

  var rels = [];
  for (var j=0; j<allEumOh.length-1; j++) rels.push(checkRelation(allEumOh[j], allEumOh[j+1]));
  var hasGeuk  = rels.some(function(r){return r==='상극';});
  var allSaeng = rels.every(function(r){return r==='상생'||r==='비화';});
  var ohResEl = document.getElementById('ohaengResult');
  if (allSaeng) { ohResEl.className='oh-result all-good'; ohResEl.textContent='발음 오행이 상생하여 기운이 원활하게 흐릅니다'; }
  else if (hasGeuk) { ohResEl.className='oh-result has-bad'; ohResEl.textContent='발음 오행에 상극 관계가 있습니다 — 기운의 충돌이 발생합니다'; }
  else { ohResEl.className='oh-result mixed'; ohResEl.textContent='발음 오행 흐름이 중화적입니다'; }

  // 음양
  var eyRow = document.getElementById('eumyangRow');
  eyRow.innerHTML = '';
  var eyPat = [];
  allChars.forEach(function(ch, i) {
    var st = allStrokes[i], ey = getEumyang(st);
    eyPat.push(ey);
    var node = document.createElement('div');
    node.className = 'ey-node';
    node.innerHTML = '<span class="ey-char">'+ch+'</span><span class="ey-badge '+ey+'">'+ey+' ('+st+'획)</span>';
    eyRow.appendChild(node);
  });
  var allYang = eyPat.every(function(e){return e==='양';});
  var allEum  = eyPat.every(function(e){return e==='음';});
  var yangCnt = eyPat.filter(function(e){return e==='양';}).length;
  var eyResEl = document.getElementById('eumyangResult');
  if (allYang||allEum) { eyResEl.className='oh-result has-bad'; eyResEl.textContent=(allYang?'양':'음')+'으로 편중 — 균형 조정이 필요합니다'; }
  else if (Math.abs(yangCnt-(eyPat.length-yangCnt))<=1) { eyResEl.className='oh-result all-good'; eyResEl.textContent='음양이 균형 있게 배합되어 있습니다'; }
  else { eyResEl.className='oh-result mixed'; eyResEl.textContent='음양 배합이 다소 치우쳐 있습니다'; }

  // 자원오행 / 음오행 카드 (항상 표시)
  var jwCard = document.getElementById('jawonCard');
  jwCard.style.display = '';
  var jwTitle = document.getElementById('jawonTitle');
  var jwNotice = document.getElementById('jawonNotice');
  var jwRow = document.getElementById('jawonRow');
  if (currentMode === 'select') {
    jwTitle.textContent = '자원오행 · 한자 기운';
    jwNotice.textContent = '자원오행은 한자의 부수(部首) 기준입니다. 학파에 따라 해석이 다를 수 있으며 참고용으로 활용하세요.';
  } else {
    jwTitle.textContent = '음오행 · 자음 오행';
    jwNotice.textContent = '한글 자동 모드는 음오행(音五行) 기준입니다. 정확한 작명은 한자 기준을 권장합니다.';
  }
  jwRow.innerHTML = '';
  allChars.forEach(function(ch, i) {
    var hj = allHanja[i]||ch, oh = allJawon[i]||'?';
    var node = document.createElement('div');
    node.className = 'jw-node';
    node.innerHTML = '<span class="jw-hanja">'+hj+'</span><span class="jw-badge oh-badge '+oh+'">'+oh+'</span>';
    jwRow.appendChild(node);
  });

  // 종합 해석
  renderInterpret(gyek, grades, rels, eyPat, allJawon, hasGeuk, allSaeng, allYang, allEum, yangCnt);
  renderYongsinMatch(allChars, allJawon, allEumOh);
  document.getElementById('resultArea').classList.add('show');
}

function renderInterpret(gyek, grades, rels, eyPat, jawon, hasGeuk, allSaeng, allYang, allEum, yangCnt) {
  var el = document.getElementById('interpretCard');
  var jg = SURI_TABLE[gyek.jung]||'흉';
  var goodCnt = grades.filter(function(g){return g==='대길'||g==='길';}).length;
  var badCnt  = grades.filter(function(g){return g==='대흉'||g==='흉';}).length;

  var suriText =
    jg==='대길' ? '정격 '+gyek.jung+'수(대길) — 전체 운기가 매우 강합니다. 사회적으로 인정받고 리더십이 발휘되는 이름입니다.'
    : jg==='길' ? '정격 '+gyek.jung+'수(길) — 안정적인 운기를 갖추고 있습니다. 꾸준한 성장과 성취가 기대됩니다.'
    : jg==='반길' ? '정격 '+gyek.jung+'수(반길) — 길흉이 공존합니다. 전반적으로 무난하나 특정 시기 주의가 필요합니다.'
    : jg==='대흉' ? '정격 '+gyek.jung+'수(대흉) — 전체 운기에 강한 주의가 필요합니다. 개명 또는 보완책을 적극 검토하세요.'
    : '정격 '+gyek.jung+'수(흉) — 운기 보완이 필요합니다.';
  if (goodCnt>=3) suriText += ' 4격 중 '+goodCnt+'개가 길수로 전반 균형이 좋습니다.';
  else if (badCnt>=3) suriText += ' 4격 중 '+badCnt+'개가 흉수로 수리 조정이 필요합니다.';

  var ohText = allSaeng
    ? '발음 흐름이 상생으로 이어집니다. 이름을 부를 때마다 좋은 기운이 증폭됩니다.'
    : hasGeuk
    ? '상극 관계('+rels.filter(function(r){return r==='상극';}).length+'곳)가 있어 기운 충돌이 발생합니다. 이름을 자주 불릴수록 누적됩니다.'
    : '발음 오행이 중화적으로 흘러 안정적입니다.';

  var eyText = allYang ? '전체 양(陽) 편중 — 과잉 양기는 급함·충동성으로 발현될 수 있습니다.'
    : allEum ? '전체 음(陰) 편중 — 과잉 음기는 소극성·우유부단함으로 나타날 수 있습니다.'
    : Math.abs(yangCnt-(eyPat.length-yangCnt))<=1
    ? '음양 배합(양 '+yangCnt+'·음 '+(eyPat.length-yangCnt)+') 균형 — 강함과 부드러움이 조화롭습니다.'
    : '양 '+yangCnt+'·음 '+(eyPat.length-yangCnt)+'로 다소 치우쳐 있지만 큰 문제는 아닙니다.';

  var jawonText = '';
  if (jawon.some(function(o){return o;})) {
    var ohs = jawon.filter(Boolean);
    var ohCnt = {};
    ohs.forEach(function(o){ohCnt[o]=(ohCnt[o]||0)+1;});
    var dom = Object.keys(ohCnt).sort(function(a,b){return ohCnt[b]-ohCnt[a];})[0];
    var label = (currentMode==='select') ? '한자 자원오행' : '음오행';
    jawonText = label+' '+ohs.join('·')+' — '+dom+'의 기운이 가장 강하게 작용합니다.';
  }

  var score = 0;
  if (jg==='대길') score+=3; else if (jg==='길') score+=2; else if (jg==='반길') score+=1;
  else if (jg==='흉') score-=1; else if (jg==='대흉') score-=3;
  if (allSaeng) score+=2; else if (hasGeuk) score-=1;
  if (!allYang && !allEum && Math.abs(yangCnt-(eyPat.length-yangCnt))<=1) score+=1;
  else if (allYang||allEum) score-=1;

  var overall = score>=5 ? '매우 뛰어난 이름입니다. 수리·음오행·음양 세 축이 고루 조화를 이루고 있습니다.'
    : score>=3 ? '전반적으로 좋은 이름입니다. 강점을 살리면서 약한 부분을 보완하면 더욱 이상적입니다.'
    : score>=1 ? '보통 수준입니다. 몇 가지 보완 요소가 있으며 검토 후 조정을 고려해볼 수 있습니다.'
    : '여러 면에서 보완이 필요합니다. 전문 작명가와의 상담을 권합니다.';

  var html = '<div class="interpret-section"><span class="interpret-label">수리 해석</span>'+suriText+'</div>';
  html += '<div class="interpret-section"><span class="interpret-label">음오행 해석</span>'+ohText+'</div>';
  html += '<div class="interpret-section"><span class="interpret-label">음양 해석</span>'+eyText+'</div>';
  if (jawonText) html += '<div class="interpret-section"><span class="interpret-label">자원오행 해석</span>'+jawonText+'</div>';
  html += '<div class="interpret-section" style="border-top:1px solid var(--border);padding-top:14px;margin-top:4px;"><span class="interpret-label">종합 판단</span>'+overall+'</div>';
  el.innerHTML = html;
}

var toastTimer = null;
function showToast(msg, isError) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '');
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

loadSajuData();

(function() {
  var p = new URLSearchParams(window.location.search);
  var sur = p.get('sur'), nm = p.get('name');
  if (!sur && !nm) return;
  setMode('auto');
  if (sur) document.getElementById('inputSur').value = sur;
  if (nm)  document.getElementById('inputName').value = nm;
  if (sur && nm) setTimeout(calcScore, 150);
})();
</script>
