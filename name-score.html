<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이름 점수 확인 - 포르투나</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d14;
  --surface: #13131a;
  --surface2: #1c1c28;
  --border: #2a2a3d;
  --text: #e8e0f0;
  --muted: #6b6b85;
  --gold: #d4af37;
  --gold-dim: rgba(212,175,55,0.12);
  --gold-border: rgba(212,175,55,0.3);
  --text-dim: #6b6b85;
  --card: #13131a;
  --void: #0d0d14;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif KR', serif;
  min-height: 100vh;
  overflow-x: hidden;
}
nav {
  position: sticky; top:0; left:0; right:0; z-index:100;
  background: rgba(13,13,20,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px; height:56px;
  display: flex; align-items:center; justify-content:space-between;
}
.nav-brand {
  display:flex; align-items:center; gap:8px;
  text-decoration:none; color:var(--gold);
  font-size:14px; letter-spacing:0.2em; font-weight:700;
  font-family:'Noto Serif KR',serif;
}
.nav-brand img { height:40px; object-fit:contain; flex-shrink:0; }
.nav-back {
  font-size:13px; color:var(--muted); text-decoration:none;
  transition:color 0.2s; cursor:pointer;
  background:none; border:none; font-family:inherit;
}
.nav-back:hover { color:var(--gold); }
.wrap {
  position:relative; z-index:1;
  max-width: 480px; margin:0 auto;
  padding: 20px 16px 60px;
}
.page-header {
  margin-bottom: 16px; padding: 0 4px;
}
.page-header-tag {
  font-size:10px; letter-spacing:0.15em; color:var(--muted);
  text-transform:uppercase; margin-bottom:4px;
}
.page-header-title {
  font-size:22px; font-weight:700; color:var(--text);
  margin:0 0 4px; font-family:'Noto Serif KR',serif;
}
.page-header-sub {
  font-size:12px; color:var(--muted);
}
.section-label {
  font-size:10px; letter-spacing:0.15em; color:var(--muted);
  text-transform:uppercase; margin-bottom:12px;
}
.mode-tabs {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:6px; margin-bottom:14px;
}
.mode-tab {
  background: var(--surface2); border:1px solid var(--border);
  border-radius:10px; padding:10px 4px;
  text-align:center; cursor:pointer;
  font-family:'Noto Serif KR',serif; font-size:12px;
  color:var(--muted); transition:all 0.22s;
}
.mode-tab:hover { border-color:var(--gold-border); color:var(--text); }
.mode-tab.active { background:var(--gold-dim); border-color:var(--gold); color:var(--gold); }
.input-card {
  background: var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:20px; margin-bottom:14px;
}
.name-row { display:grid; grid-template-columns:1fr 2fr; gap:12px; margin-bottom:18px; }
.field-label { font-size:11px; color:var(--text-dim); margin-bottom:8px; letter-spacing:0.08em; display:block; }
.name-input {
  width:100%; background:rgba(255,255,255,0.04);
  border:1px solid var(--gold-border); border-radius:10px;
  padding:12px 14px; color:var(--text);
  font-family:'Noto Serif KR',serif; font-size:16px;
  outline:none; transition:border-color 0.25s; -webkit-appearance:none;
}
.name-input:focus { border-color:var(--gold); background:rgba(212,175,55,0.04); }
.rec-sel {
  width:100%; background:#1c1c28;
  border:1px solid var(--gold-border); border-radius:10px;
  padding:11px 10px; color:#e8e0f0 !important;
  font-family:'Noto Serif KR',serif; font-size:13px;
  outline:none; -webkit-appearance:none; appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%23d4af37' d='M0 0l5 6 5-6z'/></svg>");
  background-repeat:no-repeat; background-position:right 10px center;
  padding-right:26px;
}
.rec-sel:focus { border-color:var(--gold); }
.rec-sel option { background:#1c1c28; color:#e8e0f0; }
.hanja-section { margin-bottom:16px; }
.hanja-section-label { font-size:11px; color:var(--text-dim); letter-spacing:0.08em; margin-bottom:8px; display:block; }
.hanja-btns { display:flex; flex-wrap:wrap; gap:7px; }
.hanja-btn {
  background:rgba(255,255,255,0.04); border:1px solid var(--gold-border);
  border-radius:10px; padding:8px 12px; cursor:pointer;
  font-family:'Noto Serif KR',serif; text-align:center;
  transition:all 0.2s; min-width:60px;
}
.hanja-btn:hover { border-color:var(--gold); background:var(--gold-dim); }
.hanja-btn.selected { background:linear-gradient(135deg, rgba(212,175,55,0.18), rgba(123,94,167,0.12)); border-color:var(--gold); color:var(--gold); box-shadow:0 0 20px rgba(212,175,55,0.2); }
.hanja-btn .hb-char { font-size:22px; display:block; line-height:1.2; }
.hanja-btn .hb-info { font-size:10px; color:var(--text-dim); margin-top:3px; }
.hanja-btn.selected .hb-info { color:rgba(212,175,55,0.7); }
.hanja-manual-row { display:flex; align-items:center; gap:10px; margin-top:8px; }
.hanja-manual-label { font-size:11px; color:var(--text-dim); flex:1; }
.stroke-grid { display:grid; gap:10px; }
.stroke-row { display:flex; align-items:center; gap:10px; }
.stroke-char { font-size:20px; color:var(--gold); min-width:28px; text-align:center; }
.stroke-label { font-size:11px; color:var(--text-dim); flex:1; }
.stroke-spin { display:flex; align-items:center; gap:6px; }
.spin-btn {
  width:30px; height:30px; border-radius:8px;
  background:var(--gold-dim); border:1px solid var(--gold-border);
  color:var(--gold); font-size:16px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background 0.2s;
}
.spin-btn:hover { background:rgba(212,175,55,0.25); }
.spin-val {
  width:36px; text-align:center; font-size:15px;
  background:rgba(255,255,255,0.04); border:1px solid var(--border);
  border-radius:8px; padding:4px 0; color:var(--text);
  font-family:'Noto Serif KR',serif;
}
.btn-gold {
  display:block; width:100%; padding:14px;
  background:linear-gradient(135deg, rgba(212,175,55,0.08), rgba(123,94,167,0.06));
  color:var(--gold);
  border:1.5px solid rgba(212,175,55,0.5);
  border-radius:12px;
  font-family:'Noto Serif KR',serif;
  font-size:15px; font-weight:700; letter-spacing:0.08em;
  cursor:pointer; text-align:center;
  transition:border-color 0.3s, box-shadow 0.3s, transform 0.2s;
  box-shadow:0 0 20px rgba(212,175,55,0.08);
  position:relative; overflow:hidden;
}
.btn-gold:hover { transform:translateY(-1px); border-color:rgba(212,175,55,0.85); box-shadow:0 0 30px rgba(212,175,55,0.18); }
.btn-gold:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
.orb-hint { font-size:11px; color:rgba(255,255,255,0.4); margin-top:6px; text-align:center; }
#aiAnalysisResult { margin-top:16px; padding:16px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid var(--border); font-size:14px; line-height:1.8; white-space:pre-wrap; display:none; }
.result-area { display:none; margin-top:24px; }
.result-area.show { display:block; animation:fadeUp 0.5s ease; }
.score-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
.score-card {
  background:var(--card); border-radius:16px; padding:18px 14px;
  text-align:center; border:1px solid var(--border); backdrop-filter:blur(10px);
}
.score-gye { font-size:10px; color:var(--text-dim); letter-spacing:0.15em; margin-bottom:6px; }
.score-num { font-size:40px; font-weight:300; line-height:1; margin-bottom:8px; }
.score-badge {
  display:inline-block; font-size:11px; font-weight:600;
  padding:3px 10px; border-radius:20px; margin-bottom:6px; letter-spacing:0.06em;
}
.score-name { font-size:11px; color:var(--text-dim); }
.grade-대길 { color:#d4af37; border:1px solid rgba(212,175,55,0.5); background:rgba(212,175,55,0.12); }
.score-card.grade-대길 .score-num { color:#d4af37; }
.grade-길 { color:#4caf7a; border:1px solid rgba(76,175,122,0.5); background:rgba(76,175,122,0.12); }
.score-card.grade-길 .score-num { color:#4caf7a; }
.grade-반길 { color:#ff9800; border:1px solid rgba(255,152,0,0.5); background:rgba(255,152,0,0.12); }
.score-card.grade-반길 .score-num { color:#ff9800; }
.grade-흉 { color:#f44336; border:1px solid rgba(244,67,54,0.4); background:rgba(244,67,54,0.1); }
.score-card.grade-흉 .score-num { color:#f44336; }
.grade-대흉 { color:#e91e63; border:1px solid rgba(233,30,99,0.4); background:rgba(233,30,99,0.1); }
.score-card.grade-대흉 .score-num { color:#e91e63; }
.analysis-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:20px; margin-bottom:16px;
}
.analysis-title {
  font-size:10px; letter-spacing:0.3em; color:var(--gold);
  margin-bottom:16px; opacity:0.7; text-transform:uppercase;
}
.ohaeng-flow {
  display:flex; align-items:center; justify-content:center;
  gap:8px; margin-bottom:14px; flex-wrap:wrap;
}
.oh-node { text-align:center; }
.oh-char { font-size:18px; color:var(--text); display:block; margin-bottom:4px; }
.oh-badge {
  display:inline-block; font-size:11px; font-weight:600;
  padding:3px 10px; border-radius:20px; letter-spacing:0.06em;
}
.oh-badge.木 { color:#4caf7a; border:1px solid rgba(76,175,122,0.5); background:rgba(76,175,122,0.12); }
.oh-badge.火 { color:#f44336; border:1px solid rgba(244,67,54,0.4); background:rgba(244,67,54,0.1); }
.oh-badge.土 { color:#ff9800; border:1px solid rgba(255,152,0,0.5); background:rgba(255,152,0,0.12); }
.oh-badge.金 { color:#d4af37; border:1px solid rgba(212,175,55,0.5); background:rgba(212,175,55,0.12); }
.oh-badge.水 { color:#2196f3; border:1px solid rgba(33,150,243,0.5); background:rgba(33,150,243,0.12); }
.oh-arrow { font-size:16px; color:var(--text-dim); line-height:1; margin-top:8px; }
.oh-arrow.상생 { color:#4caf7a; }
.oh-arrow.상극 { color:#f44336; }
.oh-result {
  text-align:center; font-size:12px; padding:8px 14px;
  border-radius:10px; letter-spacing:0.04em; line-height:1.6;
}
.oh-result.all-good { background:rgba(76,175,122,0.1); color:#4caf7a; border:1px solid rgba(76,175,122,0.3); }
.oh-result.has-bad { background:rgba(244,67,54,0.08); color:#f44336; border:1px solid rgba(244,67,54,0.25); }
.oh-result.mixed { background:rgba(255,152,0,0.08); color:#ff9800; border:1px solid rgba(255,152,0,0.25); }
.eumyang-row { display:flex; gap:8px; justify-content:center; margin-bottom:14px; }
.ey-node { text-align:center; flex:1; }
.ey-char { font-size:16px; color:var(--text); display:block; margin-bottom:4px; }
.ey-badge {
  display:inline-block; font-size:11px; font-weight:600;
  padding:4px 6px; border-radius:20px; letter-spacing:0.04em; width:100%;
}
.ey-badge.양 { color:#f44336; border:1px solid rgba(244,67,54,0.4); background:rgba(244,67,54,0.08); }
.ey-badge.음 { color:#2196f3; border:1px solid rgba(33,150,243,0.5); background:rgba(33,150,243,0.1); }
.jawon-row { display:flex; gap:8px; justify-content:center; margin-bottom:8px; }
.jw-node { text-align:center; flex:1; }
.jw-hanja { font-size:24px; color:var(--gold); display:block; margin-bottom:6px; }
.jawon-notice { font-size:11px; color:var(--text-dim); line-height:1.7; margin-bottom:12px; padding:8px 10px; background:rgba(255,255,255,0.03); border-radius:8px; border-left:2px solid rgba(212,175,55,0.3); }
.summary-card {
  background:var(--gold-dim); border:1px solid var(--gold-border);
  border-radius:14px; padding:18px 16px; margin-bottom:20px;
  font-size:13px; line-height:1.9; color:var(--text);
}
.total-score-card {
  background: rgba(212,175,55,0.08);
  border: 1px solid rgba(212,175,55,0.3);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  margin-bottom: 16px;
}
.total-score-label {
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.total-score-num {
  font-size: 56px;
  font-weight: 700;
  color: #d4af37;
  line-height: 1;
}
.total-score-max {
  font-size: 14px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 12px;
}
.total-score-bar {
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  margin: 12px 0;
  overflow: hidden;
}
.total-score-fill {
  height: 100%;
  background: linear-gradient(90deg, #d4af37, #f5d87a);
  border-radius: 3px;
  transition: width 0.8s ease;
}
.total-score-comment {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  line-height: 1.5;
}
.interpret-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; padding:22px 18px; margin-bottom:16px;
  font-size:13px; line-height:2; color:var(--text);
}
.interpret-section { margin-bottom:14px; }
.interpret-section:last-child { margin-bottom:0; }
.interpret-label {
  font-size:10px; letter-spacing:0.25em; color:var(--gold);
  margin-bottom:6px; display:block; opacity:0.8;
}
.toast {
  position:fixed; top:20px; left:50%;
  transform:translateX(-50%) translateY(-80px);
  background:rgba(212,175,55,0.12); border:1px solid var(--gold);
  border-radius:50px; padding:11px 24px;
  color:var(--gold); font-size:12px; z-index:9999;
  transition:transform 0.3s; backdrop-filter:blur(10px);
  white-space:nowrap; letter-spacing:0.06em;
}
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.error { border-color:#f44336; color:#f44336; background:rgba(244,67,54,0.1); }
.score-desc {
  font-size: 11px;
  color: rgba(255,255,255,0.55);
  line-height: 1.4;
  margin-top: 4px;
  text-align: center;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)} }
.yongsin-match-box {
  border:1px solid var(--gold); background:rgba(212,175,55,0.08);
  border-radius:16px; padding:20px; margin-top:16px;
  font-size:13px; line-height:1.9; color:var(--text);
}
.yongsin-match-title {
  font-size:10px; letter-spacing:0.3em; color:var(--gold);
  margin-bottom:16px; opacity:0.7; text-transform:uppercase;
}
.yongsin-match-item { margin-bottom:6px; }
.yongsin-ok  { color:#4caf7a; }
.yongsin-warn { color:#ff9800; }
.yongsin-bad  { color:#f44336; }
.yongsin-login-banner {
  text-align:center; padding:10px 0 4px;
  color:var(--text-dim); font-size:13px; line-height:1.9;
}
.btn-login-small {
  display:inline-block; margin-top:10px; padding:10px 24px;
  background:var(--gold-dim); border:1px solid var(--gold-border);
  border-radius:10px; color:var(--gold); font-size:12px;
  font-family:'Noto Serif KR',serif; cursor:pointer;
  letter-spacing:0.08em; text-decoration:none;
}
</style>

</head>
<body>

<div class="toast" id="toast"></div>

<nav>
  <a href="https://picolab.kr" class="nav-brand">
    <img src="https://raw.githubusercontent.com/kkdmb7-blip/pico/main/img/goddess.png" alt="FORTUNA">
    FORTUNA
  </a>
  <a onclick="history.back()" class="nav-back" style="cursor:pointer;">← 돌아가기</a>
</nav>

<div class="wrap">
  <div class="page-header">
    <div class="page-header-tag">NAME · 성명학</div>
    <h1 class="page-header-title">내 이름은 몇 점일까?</h1>
    <div class="page-header-sub">81수리 · 음오행 · 음양 배합 · 용신 매칭</div>
  </div>

  <div class="mode-tabs">
    <div class="mode-tab active" id="tabAuto" onclick="setMode('auto')">한글 자동</div>
    <div class="mode-tab" id="tabSelect" onclick="setMode('select')">한자 선택</div>
    <div class="mode-tab" id="tabManual" onclick="setMode('manual')">한자 수동</div>
    <div class="mode-tab" id="tabRecommend" onclick="setMode('recommend')">이름 추천</div>
  </div>

  <div class="input-card" id="inputCardMain">
    <div class="name-row">
      <div>
        <label class="field-label">성(姓)</label>
        <input class="name-input" id="inputSur" type="text" maxlength="3" placeholder="김" oninput="onNameInput()">
      </div>
      <div>
        <label class="field-label">이름</label>
        <input class="name-input" id="inputName" type="text" maxlength="4" placeholder="민준" oninput="onNameInput()">
      </div>
    </div>
    <div id="hanjaArea" style="display:none; margin-bottom:18px;">
      <div id="hanjaGrid"></div>
    </div>
    <div id="strokeArea" style="display:none; margin-bottom:18px;">
      <div class="stroke-grid" id="strokeGrid"></div>
    </div>
    <button class="btn-gold" id="btnCalc" onclick="calcScore()">점수 확인</button>
  </div>

  <div class="input-card" id="recommendCard" style="display:none;">
    <div style="margin-bottom:14px;">
      <label class="field-label">성씨</label>
      <input class="name-input" id="recSur" type="text" maxlength="3" placeholder="김">
    </div>

    <div style="margin-bottom:14px;padding:12px;background:rgba(123,94,167,0.06);border:1px solid rgba(212,175,55,0.2);border-radius:10px;">
      <div style="font-size:11px;font-weight:700;color:var(--gold);letter-spacing:0.1em;margin-bottom:10px;">누구의 이름인가요?</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;">
        <button type="button" class="mode-tab active" id="recTargetSelf" onclick="setRecTarget('self')">내 프로필 기준</button>
        <button type="button" class="mode-tab" id="recTargetOther" onclick="setRecTarget('other')">다른 사람 입력</button>
      </div>
      <div id="recTargetForm" style="display:none;">
        <label class="field-label">생년월일</label>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px;">
          <select id="recTargetYear" class="rec-sel"><option value="">년</option></select>
          <select id="recTargetMonth" class="rec-sel"><option value="">월</option></select>
          <select id="recTargetDay" class="rec-sel"><option value="">일</option></select>
        </div>
        <label class="field-label">태어난 시간 (선택)</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;">
          <select id="recTargetHour" class="rec-sel">
            <option value="">시 모름</option>
            <option value="0">0시 (자시)</option>
            <option value="1">1시</option><option value="2">2시</option><option value="3">3시</option>
            <option value="4">4시</option><option value="5">5시</option><option value="6">6시</option>
            <option value="7">7시</option><option value="8">8시</option><option value="9">9시</option>
            <option value="10">10시</option><option value="11">11시</option><option value="12">12시</option>
            <option value="13">13시</option><option value="14">14시</option><option value="15">15시</option>
            <option value="16">16시</option><option value="17">17시</option><option value="18">18시</option>
            <option value="19">19시</option><option value="20">20시</option><option value="21">21시</option>
            <option value="22">22시</option><option value="23">23시</option>
          </select>
          <select id="recTargetMin" class="rec-sel"><option value="0">0분</option></select>
        </div>
        <div style="font-size:10px;color:var(--text-dim);margin-top:4px;line-height:1.5;">
          ※ 한국 표준시 기준으로 입력 — 사주 계산 시 <b style="color:var(--gold);">진태양시</b>로 자동 보정됩니다
        </div>
      </div>

function charStrokes(ch) {
  var code = ch.charCodeAt(0);
  if (code < 0xAC00 || code > 0xD7A3) return 0;
  var idx = code - 0xAC00;
  var jong = JONG_LIST[idx % 28];
  var jung = JUNG_LIST[Math.floor((idx % (28*21)) / 28)];
  var cho  = CHO_LIST[Math.floor(idx / (28*21))];
  return (CHO[cho]||0) + (JUNG[jung]||0) + (JONG[jong]||0);
}

function normalize81(n) {
  if (n <= 0) return 0;
  if (n <= 81) return n;
  var r = n % 81;
  return r === 0 ? 81 : r;
}

function calcGyek(A, B, C) {
  return {
    won:  normalize81(B + C),
    hyun: normalize81(A + B),
    yi:   normalize81(C > 0 ? A + C : A + B),
    jung: normalize81(A + B + C)
  };
}

var currentMode = 'auto';
var manualStrokes = {};
var hanjaSelected = {};
var hanjaManual   = {};

function setMode(m) {
  currentMode = m;
  ['auto','select','manual','recommend'].forEach(function(id) {
    var el = document.getElementById('tab' + id.charAt(0).toUpperCase() + id.slice(1));
    if (el) el.classList.toggle('active', id === m);
  });
  var isRec = (m === 'recommend');
  document.getElementById('inputCardMain').style.display = isRec ? 'none' : 'block';
  document.getElementById('recommendCard').style.display = isRec ? 'block' : 'none';
  document.getElementById('resultArea').classList.toggle('show', !isRec && lastScores);
  document.getElementById('recommendResult').style.display = isRec ? 'block' : 'none';
  if (!isRec) {
    document.getElementById('hanjaArea').style.display  = (m === 'select') ? 'block' : 'none';
    document.getElementById('strokeArea').style.display = (m === 'manual') ? 'block' : 'none';
    if (m === 'select') renderHanjaSelect();
    if (m === 'manual') renderStrokeArea();
  } else {
    prefillRecommend();
  }
}

var recGender = 'all';
function setRecGender(g) {
  recGender = g;
  var map = { 'all': 'recGenderAll', 'M': 'recGenderM', 'F': 'recGenderF' };
  Object.keys(map).forEach(function(k){
    var el = document.getElementById(map[k]);
    if (el) el.classList.toggle('active', k === g);
  });
}

var recTarget = 'self'; // 'self' | 'other'
var _targetYongsin = null; // 직접 입력 모드에서 받은 용신
function _populateRecSelect(selId, type) {
  var el = document.getElementById(selId);
  if (!el || el.options.length > 1) return;
  if (type === 'year') {
    for (var y = new Date().getFullYear(); y >= 1930; y--) {
      var o = document.createElement('option'); o.value = y; o.textContent = y + '년'; el.appendChild(o);
    }
  } else if (type === 'month') {
    for (var m = 1; m <= 12; m++) {
      var o = document.createElement('option'); o.value = m; o.textContent = m + '월'; el.appendChild(o);
    }
  } else if (type === 'day') {
    for (var d = 1; d <= 31; d++) {
      var o = document.createElement('option'); o.value = d; o.textContent = d + '일'; el.appendChild(o);
    }
  } else if (type === 'min') {
    el.innerHTML = '';
    for (var mi = 0; mi < 60; mi++) {
      var o = document.createElement('option'); o.value = mi; o.textContent = mi + '분'; el.appendChild(o);
    }
  }
}
function setRecTarget(t) {
  recTarget = t;
  document.getElementById('recTargetSelf').classList.toggle('active', t === 'self');
  document.getElementById('recTargetOther').classList.toggle('active', t === 'other');
  document.getElementById('recTargetForm').style.display = (t === 'other') ? 'block' : 'none';
  if (t === 'other') {
    _populateRecSelect('recTargetYear','year');
    _populateRecSelect('recTargetMonth','month');
    _populateRecSelect('recTargetDay','day');
    _populateRecSelect('recTargetMin','min');
  }
  _targetYongsin = null;
  updateTargetHint();
}
function updateTargetHint() {
  var hint = document.getElementById('recYongsinHint');
  if (recTarget === 'other') {
    if (_targetYongsin) {
      var ys = getYongsinOhaeng(_targetYongsin);
      hint.innerHTML = '입력한 사주의 용신: <b style="color:var(--gold);">' + _targetYongsin + '</b> (' + ys + '오행) — 이 오행을 우선 추천합니다.';
    } else {
      hint.innerHTML = '생년월일을 입력하면 해당 사주의 용신을 기준으로 추천합니다.';
    }
  } else {
    if (_yongsin) {
      var ys = getYongsinOhaeng(_yongsin);
      hint.innerHTML = '내 용신: <b style="color:var(--gold);">' + _yongsin + '</b> (' + ys + '오행) — 이 오행을 가진 한자를 우선 추천합니다.';
    } else {
      var user = null;
      try { user = JSON.parse(localStorage.getItem('pico_user')); } catch(e) {}
      hint.innerHTML = user
        ? '프로필 등록 시 내 사주 용신과 매칭되는 이름을 우선 추천해드립니다.'
        : '로그인 후 프로필을 등록하시면 내 사주 용신과 매칭되는 이름을 우선 추천해드립니다.';
    }
  }
}
function fetchTargetYongsin(cb) {
  var y = parseInt(document.getElementById('recTargetYear').value);
  var m = parseInt(document.getElementById('recTargetMonth').value);
  var d = parseInt(document.getElementById('recTargetDay').value);
  var hRaw = document.getElementById('recTargetHour').value;
  var h = hRaw === '' ? -1 : parseInt(hRaw);
  var minEl = document.getElementById('recTargetMin');
  var minute = minEl ? (parseInt(minEl.value) || 0) : 0;
  if (!y || !m || !d) { showToast('생년월일을 모두 입력해주세요', true); return; }
  var g = recGender === 'F' ? 'F' : 'M';
  fetch('https://fortuna.kkdmb7.workers.dev/saju-report', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ name: '대상', gender: g, year: y, month: m, day: d, hour: h, minute: minute })
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    _targetYongsin = data.yongshin || data.yongsin || null;
    updateTargetHint();
    if (cb) cb();
  })
  .catch(function(){
    showToast('사주 계산 실패. 다시 시도해주세요', true);
    if (cb) cb();
  });
}

function prefillRecommend() {
  var curSur = document.getElementById('inputSur').value.trim();
  var recSur = document.getElementById('recSur');
  if (curSur && !recSur.value) recSur.value = curSur;
  updateTargetHint();
}

// 여아/남아 선호 의미 키워드 (중립 키워드는 양쪽에서 제외)
var MALE_PREF_MEAN = ['굳세다','강하다','크다','높다','세우다','건강하다','이루다','용','뛰어나다','임금','장수','나라','무예','준마','의롭다','명예','온전하다','건장하다','받들다','공경하다'];
var FEMALE_PREF_MEAN = ['아름답다','예쁘다','상서롭다','맑다','꽃답다','옥','향기롭다','꽃','연꽃','난초','기쁘다','편안하다','착하다','부드럽다','은혜','우아하다','구슬','보배','사랑'];

function scoreGenderFit(meaning, gender) {
  if (gender === 'all' || !meaning) return 0;
  var list = gender === 'M' ? MALE_PREF_MEAN : FEMALE_PREF_MEAN;
  for (var i=0; i<list.length; i++) if (meaning.indexOf(list[i]) >= 0) return 3;
  return 0;
}

var REC_ORB_COST = 100;
var _recPaid = false;
function runRecommend() {
  var sur = document.getElementById('recSur').value.trim();
  if (!sur) { showToast('성(姓)을 입력해주세요', true); return; }
  var surList = SURNAME_HANJA[sur];
  if (!surList || !surList.length) { showToast('등록된 성씨가 아닙니다', true); return; }
  // 직접 입력 모드인데 아직 용신 미계산이면 먼저 fetch
  if (recTarget === 'other' && !_targetYongsin) {
    var y = parseInt(document.getElementById('recTargetYear').value);
    var m = parseInt(document.getElementById('recTargetMonth').value);
    var d = parseInt(document.getElementById('recTargetDay').value);
    if (y && m && d) {
      showToast('사주 계산 중...');
      fetchTargetYongsin(function(){ runRecommend(); });
      return;
    }
  }

  // Orb 결제 (최초 1회만)
  if (!_recPaid) {
    var user = null;
    try { user = JSON.parse(localStorage.getItem('pico_user')); } catch(e) {}
    if (!user) { showToast('로그인이 필요합니다', true); return; }
    getOrbBalance(user.id).then(function(bal) {
      if (bal < REC_ORB_COST) {
        showToast('Orb가 부족합니다 (현재 ' + bal + ' Orb / 필요 ' + REC_ORB_COST + ' Orb)', true);
        return;
      }
      if (!confirm('이름 추천을 실행합니다. ' + REC_ORB_COST + ' Orb가 차감됩니다.\n현재 잔액: ' + bal + ' Orb')) return;
      deductOrbRec(user.id, REC_ORB_COST).then(function() {
        _recPaid = true;
        runRecommend();
      }).catch(function(e) {
        showToast(e.message || '차감 중 오류가 발생했습니다', true);
      });
    }).catch(function() {
      showToast('잔액 조회 중 오류가 발생했습니다', true);
    });
    return;
  }

  var surItem = surList[0]; // [hanja, strokes, oheng]
  var surHanja = surItem[0], surSt = surItem[1];
  var yongsinHan = null;
  var activeYongsin = (recTarget === 'other') ? _targetYongsin : _yongsin;
  if (activeYongsin) {
    var yoh = getYongsinOhaeng(activeYongsin);
    var KO_OH = {'목':'木','화':'火','토':'土','금':'金','수':'水'};
    yongsinHan = KO_OH[yoh];
  }

  // 모든 이름 한자 flatten
  var all = [];
  Object.keys(NAME_HANJA).forEach(function(sy) {
    NAME_HANJA[sy].forEach(function(item) {
      all.push({ syl: sy, hj: item[0], st: item[1], mean: item[2], oh: item[3] });
    });
  });

  // 외자 2자 조합에 대해 점수 계산
  var cands = [];
  for (var i=0; i<all.length; i++) {
    for (var j=0; j<all.length; j++) {
      if (i === j) continue;
      var a = all[i], b = all[j];
      if (a.syl === b.syl) continue; // 동일 음절 배제
      var A = surSt, B = a.st, C = b.st;
      var won = normalize81(B + C);
      var hyun = normalize81(A + B);
      var yi = normalize81(A + C);
      var jung = normalize81(A + B + C);
      var grades = [SURI_TABLE[won], SURI_TABLE[hyun], SURI_TABLE[yi], SURI_TABLE[jung]];
      var sumScoreRaw = grades.reduce(function(acc,g){ return acc + (GRADE_SCORE[g]||0); }, 0) / 4;
      if (sumScoreRaw < 95) continue; // 평균 95점 이상만 (사실상 4격 전부 대길)

      // 음오행 상극 배제
      var allChars = sur.split('').concat([a.syl, b.syl]);
      var eumOhs = allChars.map(function(c){ return getEumOhaeng(c); });
      var hasGeuk = false;
      for (var k=0; k<eumOhs.length-1; k++) {
        if (checkRelation(eumOhs[k], eumOhs[k+1]) === '상극') { hasGeuk = true; break; }
      }
      if (hasGeuk) continue;

      // 점수: 4격 + 용신 + 성별
      var sumScore = sumScoreRaw;
      var ysBonus = 0;
      if (yongsinHan) {
        if (a.oh === yongsinHan) ysBonus += 15;
        if (b.oh === yongsinHan) ysBonus += 15;
      }
      var gBonus = scoreGenderFit(a.mean, recGender) + scoreGenderFit(b.mean, recGender);
      cands.push({
        name: a.syl + b.syl,
        hanja: a.hj + b.hj,
        strokes: [surSt, a.st, b.st],
        ohs: [surItem[2], a.oh, b.oh],
        means: [a.mean, b.mean],
        gyek: { won: won, hyun: hyun, yi: yi, jung: jung },
        grades: grades,
        total: Math.round(sumScore + ysBonus + gBonus),
        baseTotal: Math.round(sumScore),
        ysMatch: yongsinHan ? (a.oh === yongsinHan ? 1 : 0) + (b.oh === yongsinHan ? 1 : 0) : 0
      });
    }
  }

  cands.sort(function(x,y){ return y.total - x.total; });

  // 중복(같은 이름) 제거
  var seen = {}, top = [];
  for (var n=0; n<cands.length && top.length<5; n++) {
    var key = cands[n].name;
    if (seen[key]) continue;
    seen[key] = 1;
    top.push(cands[n]);
  }

  renderRecommend(sur, surHanja, top);
  _recPaid = false; // 다음 추천 시 다시 결제
}

    return;
  }
  var html = '<div class="section-label">' + sur + '씨 추천 이름 TOP ' + top.length + ' · 95점 이상</div>';

    var h0 = c.hanja[0], h1 = c.hanja[1] || '';

    var coloredHanja  = _colorHanja(surHanja, surOh) + _colorHanja(h0, oh0) + (h1 ? _colorHanja(h1, oh1) : '');

    html += '<div class="analysis-card" style="margin-bottom:12px;">';
    html += '<div style="display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; gap:10px;">';
    html += '<div><div style="font-size:11px; color:var(--gold); letter-spacing:0.15em; margin-bottom:4px;">#' + (idx+1) + '</div>';
    html += '<div style="font-size:22px; font-weight:700; line-height:1.2; font-family:\'Noto Serif KR\',serif;">' + coloredHangul + '</div>';
    html += '<div style="font-size:15px; margin-top:4px; font-family:\'Noto Serif KR\',serif;">(' + coloredHanja + ')</div></div>';
    html += '<div style="text-align:right; flex-shrink:0;"><div style="font-size:10px; color:var(--text-dim); letter-spacing:0.1em;">TOTAL</div><div style="font-size:28px; color:var(--gold); font-weight:700; line-height:1;">' + c.baseTotal + '</div><div style="font-size:10px; color:var(--text-dim);">/100</div></div>';
    html += '</div>';

    // 4격 카드 (사용자 친화)
    html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;">';
    var gyekLabels = [
      { k:'원격', easy:'청소년·20대', v:c.gyek.won,  g:c.grades[0] },
      { k:'형격', easy:'30~50대',    v:c.gyek.hyun, g:c.grades[1] },
      { k:'이격', easy:'인간관계',   v:c.gyek.yi,   g:c.grades[2] },
      { k:'정격', easy:'인생 전체',  v:c.gyek.jung, g:c.grades[3] }
    ];
    gyekLabels.forEach(function(gy) {
      var col = _GRADE_COL[gy.g]||'#8b8ba8';
      var bg  = _GRADE_BG[gy.g]||'rgba(255,255,255,0.03)';
      var bd  = _GRADE_BORDER[gy.g]||'var(--border)';
      var easy = _SIMPLE_GRADE[gy.g] || gy.g;
      html += '<div title="'+gy.k+' '+gy.v+' · '+gy.g+'" style="background:'+bg+';border:1px solid '+bd+';border-radius:10px;padding:8px 4px;text-align:center;">';
      html += '<div style="font-size:10px;color:var(--text-dim);margin-bottom:3px;line-height:1.2;">'+gy.easy+'</div>';
      html += '<div style="font-size:12px;font-weight:700;color:'+col+';">'+easy+'</div>';
      html += '</div>';
    });
    html += '</div>';

    // 한자 의미 (색상 적용)
    html += '<div style="font-size:12px; color:var(--text-dim); line-height:1.9; padding:10px 12px; background:rgba(255,255,255,0.02); border-radius:8px;">';
    html += '<div style="font-size:10px; color:var(--gold); letter-spacing:0.1em; margin-bottom:4px;">한자 의미</div>';
    var meanArr = c.means.map(function(m, i){
      var hjChar = c.hanja[i], ohEl = c.ohs[i+1];
      return _colorHanja(hjChar, ohEl) + ' ' + m;
    });
    html += meanArr.join(' · ');
    if (c.ysMatch > 0) html += '<br><span style="color:#4caf7a;margin-top:4px;display:inline-block;"><i class="pi pi-check"></i> 용신 오행 ' + c.ysMatch + '자 일치</span>';
    html += '</div>';

    // AI 한줄평 슬롯
    html += '<div id="nameBlurb-'+idx+'" style="font-size:12px;color:var(--text);margin-top:10px;padding:9px 11px;background:rgba(212,175,55,0.06);border-left:2px solid var(--gold);border-radius:4px;line-height:1.55;">';
    html += '<span style="color:var(--text-dim);"><i class="pi pi-sparkle"></i> AI 한줄평 생성 중...</span>';
    html += '</div>';

    // 액션
    html += '<div style="margin-top:12px;">';
    html += '<button class="mode-tab" style="width:100%; cursor:pointer; padding:11px;" onclick="applyRecommend(\'' + sur + '\',\'' + c.name + '\')">이 이름 상세보기 →</button>';
    html += '</div>';
    html += '</div>';
  });
  el.innerHTML = html;

  // AI 한줄평 + reports 저장
  var activeYs = (recTarget === 'other') ? _targetYongsin : _yongsin;
  fetchNameBlurbs(sur, top, activeYs);
}

function fetchNameBlurbs(sur, top, activeYs) {
  var ysOh = activeYs ? getYongsinOhaeng(activeYs) : '';
  var namesList = top.map(function(c, i){
    return (i+1)+'. '+sur+c.name+' ('+c.hanja.join('')+') 오행['+c.ohs.slice(1).join('')+'] 용신매칭'+c.ysMatch+'자';
  }).join('\n');
  var ysLine = activeYs ? '대상 용신: '+activeYs+' ('+ysOh+'오행)\n' : '대상 사주 정보 없음\n';

  var prompt = '다음 추천 이름 5개에 대해 각각 "왜 이 이름이 이 사주에 좋은지" 한 줄(40자 이내)로 평해줘.\n' +
    ysLine + '\n' + namesList + '\n\n' +
    '반드시 JSON 배열로만 응답. 예: ["한줄평1","한줄평2","한줄평3","한줄평4","한줄평5"]. 다른 설명·마크다운·코드펜스 금지.';

  var fullText = '';
  fetch('https://fortuna-silk.vercel.app/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: [{ role: 'user', content: prompt }],
      system: '너는 수리성명학+사주 전문가다. 간결하고 JSON 배열만 출력한다. 다른 말 절대 금지.',
      max_tokens: 600,
      stream: true
    })
  }).then(function(r){
    if (!r.ok) throw new Error('API');
    var reader = r.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';
    function read() {
      reader.read().then(function(chunk){
        if (chunk.done) { finish(); return; }
        buffer += decoder.decode(chunk.value, { stream: true });
        var lines = buffer.split('\n'); buffer = lines.pop();
        lines.forEach(function(line){
          if (!line.startsWith('data:')) return;
          var d = line.slice(5).trim();
          if (d === '[DONE]') return;
          try {
            var j = JSON.parse(d);
            var delta = j.delta && j.delta.text ? j.delta.text
              : j.choices && j.choices[0] && j.choices[0].delta && j.choices[0].delta.content
              ? j.choices[0].delta.content : '';
            if (delta) fullText += delta;
          } catch(e){}
        });
        read();
      }).catch(function(){ finish(); });
    }
    read();
  }).catch(function(){ finish(); });

  function finish() {
    var blurbs = [];
    try {
      var m = fullText.match(/\[[\s\S]*\]/);
      if (m) blurbs = JSON.parse(m[0]);
    } catch(e) {}
    top.forEach(function(_, i){
      var slot = document.getElementById('nameBlurb-'+i);
      if (!slot) return;
      if (blurbs[i]) {
        slot.innerHTML = '<i class="pi pi-sparkle" style="color:var(--gold);"></i> ' + blurbs[i];
      } else {
        slot.style.display = 'none';
      }
    });
    saveRecommendReport(sur, top, activeYs, blurbs);
  }
}

function saveRecommendReport(sur, top, activeYs, blurbs) {
  var user = null;
  try { user = JSON.parse(localStorage.getItem('pico_user')); } catch(e){}
  if (!user) return;
  var lines = top.map(function(c, i){
    var base = '#'+(i+1)+' '+sur+c.name+' ('+c.hanja.join('')+') — '+c.baseTotal+'점 · 용신매칭 '+c.ysMatch+'자';
    var blurb = blurbs && blurbs[i] ? '\n   → '+blurbs[i] : '';
    return base + blurb;
  }).join('\n\n');
  var content = [
    '【이름 추천 결과】 ' + sur + '씨',
    '기준 용신: ' + (activeYs || '없음'),
    lines,
    '생성일: ' + new Date().toLocaleString('ko-KR')
  ];
  fetch(SB_URL + '/rest/v1/reports', {
    method: 'POST',
    headers: {
      'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json', 'Prefer': 'return=minimal'
    },
    body: JSON.stringify({
      user_id: user.id, report_type: 'name_rec',
      content: content, orb_spent: REC_ORB_COST,
      created_at: new Date().toISOString()
    })
  }).then(function(){ showToast('추천 결과가 저장되었습니다'); }).catch(function(){});
}

function applyRecommend(sur, name) {
  setMode('auto');
  document.getElementById('inputSur').value = sur;
  document.getElementById('inputName').value = name;
  calcScore();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function onNameInput() {

  else if (currentMode === 'manual') renderStrokeArea();
}

  var nameVal = document.getElementById('inputName').value.trim();
  var grid = document.getElementById('hanjaGrid');
  grid.innerHTML = '';

  var surSec = document.createElement('div');

  var surBtns = document.createElement('div');
  surBtns.className = 'hanja-btns';

  var surList = surVal ? SURNAME_HANJA[surVal] : null;
  if (surList && surList.length > 0) {
    surList.forEach(function(item) {
      var hj = item[0], st = item[1], oh = item[2] || '';
      var btn = document.createElement('button');
      btn.className = 'hanja-btn' + (hanjaSelected['sur'] === st && hanjaSelected['sur_hj'] === hj ? ' selected' : '');
      btn.innerHTML = '<span class="hb-char">'+hj+'</span><span class="hb-info">'+st+'획 · '+oh+'</span>';
      btn.onclick = function() {
        hanjaSelected['sur'] = st; hanjaSelected['sur_hj'] = hj; hanjaSelected['sur_oh'] = oh;
        renderHanjaSelect(); tryAutoCalcHanja(nameVal);
      };
      surBtns.appendChild(btn);
    });
  } else if (surVal) {
    surSec.innerHTML += '<span style="font-size:11px;color:var(--text-dim);">이 성씨는 목록에 없습니다. 직접 입력해주세요.</span>';
    surSec.appendChild(makeHanjaManualRow('sur', surVal));
    surBtns = null;
  } else {
    surBtns.innerHTML = '<span style="font-size:11px;color:var(--text-dim);">성(姓)을 입력하면 한자 목록이 표시됩니다</span>';
  }
  if (surBtns) surSec.appendChild(surBtns);
  grid.appendChild(surSec);

  if (nameVal) {
    nameVal.split('').forEach(function(ch, idx) {
      var key = 'name' + idx;
      var sec = document.createElement('div');
      sec.className = 'hanja-section';
      sec.innerHTML = '<span class="hanja-section-label">'+ch+' 한자 선택</span>';
      var btns = document.createElement('div');
      btns.className = 'hanja-btns';
      var list = NAME_HANJA[ch];
      if (list && list.length > 0) {
        list.forEach(function(item) {
          var hj = item[0], st = item[1], meaning = item[2]||'', oh = item[3]||'';
          var btn = document.createElement('button');
          var isSel = hanjaSelected[key] === st && hanjaSelected[key+'_hj'] === hj;
          btn.className = 'hanja-btn' + (isSel ? ' selected' : '');
          btn.innerHTML = '<span class="hb-char">'+hj+'</span><span class="hb-info">'+st+'획 '+meaning+' · '+oh+'</span>';
          btn.onclick = function() {
            hanjaSelected[key] = st; hanjaSelected[key+'_hj'] = hj; hanjaSelected[key+'_oh'] = oh;
            renderHanjaSelect(); tryAutoCalcHanja(nameVal);
          };
          btns.appendChild(btn);
        });
        sec.appendChild(btns);

        sec.innerHTML += '<span style="font-size:11px;color:var(--text-dim);">\''+ch+'\'는 목록에 없습니다.</span>';

}

function makeHanjaManualRow(key, ch) {
  if (!(key in hanjaManual)) hanjaManual[key] = charStrokes(ch) || 1;
  hanjaSelected[key] = hanjaManual[key];
  var row = document.createElement('div');
  row.className = 'hanja-manual-row';
  row.innerHTML =
    '<span class="hanja-manual-label">획수 직접 입력</span>' +
    '<div class="stroke-spin">' +
      '<button class="spin-btn" onclick="adjustHanjaManual(\''+key+'\',-1)">−</button>' +
      '<div class="spin-val" id="hjm_'+key+'">'+hanjaManual[key]+'</div>' +
      '<button class="spin-btn" onclick="adjustHanjaManual(\''+key+'\',1)">+</button>' +
    '</div>';
  return row;
}

function adjustHanjaManual(key, delta) {
  hanjaManual[key] = Math.max(1, (hanjaManual[key]||1) + delta);
  hanjaSelected[key] = hanjaManual[key];
  var el = document.getElementById('hjm_'+key);
  if (el) el.textContent = hanjaManual[key];
}

function tryAutoCalcHanja(nameVal) {
  var nameChars = (nameVal||'').split('').filter(Boolean);
  var surOk  = hanjaSelected['sur'] !== undefined;
  var nameOk = nameChars.every(function(_,i){ return hanjaSelected['name'+i] !== undefined; });
  if (surOk && nameOk && nameChars.length > 0) calcScore();
}

function renderStrokeArea() {
  var surVal  = document.getElementById('inputSur').value.trim();
  var nameVal = document.getElementById('inputName').value.trim();
  var grid = document.getElementById('strokeGrid');
  grid.innerHTML = '';
  function makeRow(key, label, ch, def) {
    if (!(key in manualStrokes)) manualStrokes[key] = def;
    var row = document.createElement('div');
    row.className = 'stroke-row';
    row.innerHTML =
      '<span class="stroke-char">'+(ch||'？')+'</span>' +
      '<span class="stroke-label">'+label+'</span>' +
      '<div class="stroke-spin">' +
        '<button class="spin-btn" onclick="adjustStroke(\''+key+'\',-1)">−</button>' +
        '<div class="spin-val" id="sv_'+key+'">'+manualStrokes[key]+'</div>' +
        '<button class="spin-btn" onclick="adjustStroke(\''+key+'\',1)">+</button>' +
      '</div>';
    grid.appendChild(row);
  }
  (surVal||'').split('').forEach(function(ch,i){ makeRow('sur'+i,'성 획수',ch,charStrokes(ch)||1); });
  (nameVal||'').split('').forEach(function(ch,i){ makeRow('name'+i,'이름 '+(i+1)+'번째',ch,charStrokes(ch)||1); });
}

function adjustStroke(key, delta) {
  manualStrokes[key] = Math.max(1, (manualStrokes[key]||1) + delta);
  var el = document.getElementById('sv_'+key);
  if (el) el.textContent = manualStrokes[key];
}

function getStrokesFor(prefix, chars) {
  return chars.map(function(ch, i) {
    var key = prefix + i;
    if (currentMode === 'auto') return charStrokes(ch)||0;
    if (currentMode === 'select') {
      var sk = (prefix==='sur') ? 'sur' : key;
      return hanjaSelected[sk] !== undefined ? hanjaSelected[sk] : (charStrokes(ch)||0);
    }
    return manualStrokes[key] || charStrokes(ch) || 1;
  });
}

function getJawonOhaeng(prefix, chars) {
  return chars.map(function(ch, i) {
    if (currentMode === 'select') {
      var sk = (prefix==='sur') ? 'sur' : (prefix+i);
      return hanjaSelected[sk+'_oh'] || getEumOhaeng(ch);
    }
    return getEumOhaeng(ch);
  });
}

function getSelectedHanja(prefix, chars) {
  if (currentMode !== 'select') return chars.slice();
  return chars.map(function(ch, i) {
    var sk = (prefix==='sur') ? 'sur' : (prefix+i);
    return hanjaSelected[sk+'_hj'] || ch;
  });
}

var lastScores = null, lastName = '';
var _yongsin = null, _geokguk = null;

function getYongsinOhaeng(yongsin) {
  if (!yongsin) return null;
  if (yongsin.includes('목') || yongsin.includes('木')) return '목';
  if (yongsin.includes('화') || yongsin.includes('火')) return '화';
  if (yongsin.includes('토') || yongsin.includes('土')) return '토';
  if (yongsin.includes('금') || yongsin.includes('金')) return '금';
  if (yongsin.includes('수') || yongsin.includes('水')) return '수';
  return null;
}

function loadSajuData() {
  var user = null;
  try { user = JSON.parse(localStorage.getItem('pico_user')); } catch(e) {}
  if (!user) return;
  var profile = null;
  try { profile = JSON.parse(localStorage.getItem('pico_profile')); } catch(e) {}
  if (!profile) return;
  fetch('https://fortuna.kkdmb7.workers.dev/saju-report', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      name: profile.name,
      gender: profile.gender,
      year: profile.year,
      month: profile.month,
      day: profile.day,
      hour: profile.hour !== undefined ? profile.hour : -1
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    _yongsin = data.yongshin || data.yongsin || null;
    _geokguk = data.geokguk || null;
  })
  .catch(function(){});
}

function renderYongsinMatch(allChars, allJawon, allEumOh) {
  var box = document.getElementById('yongsinMatchBox');
  if (!box) return;
  var user = null;
  try { user = JSON.parse(localStorage.getItem('pico_user')); } catch(e) {}
  if (!user) {
    box.innerHTML =
      '<div class="yongsin-match-box">' +
        '<div class="yongsin-match-title">용신 매칭 분석</div>' +
        '<div class="yongsin-login-banner">로그인하면 내 사주 용신과 이름 오행 매칭을 확인할 수 있어요' +
          '<br><a class="btn-login-small" href="https://picolab.kr">로그인하러 가기</a>' +
        '</div>' +
      '</div>';
    return;
  }
  if (!_yongsin) { box.innerHTML = ''; return; }
  var yongsinOh = getYongsinOhaeng(_yongsin);
  if (!yongsinOh) { box.innerHTML = ''; return; }
  var KO_OH   = {'목':'木','화':'火','토':'土','금':'金','수':'水'};
  var HAN_OH  = {'木':'목','火':'화','土':'토','金':'금','水':'수'};
  var KIJIN   = {'木':'金','火':'水','土':'木','金':'火','水':'土'};
  var yongsinHan = KO_OH[yongsinOh];
  var kijinHan   = KIJIN[yongsinHan];
  var ohaengList = (currentMode === 'select' || currentMode === 'manual') ? allJawon : allEumOh;
  var matchChars = [], kijinChars = [];
  allChars.forEach(function(ch, i) {
    var oh = ohaengList[i];
    if (oh === yongsinHan) matchChars.push({ch:ch, oh:oh});
    else if (oh === kijinHan) kijinChars.push({ch:ch, oh:oh});
  });
  var charDesc = allChars.map(function(ch, i) {
    var oh = ohaengList[i];
    var col = oh ? _OHENG_COLOR[oh] : '#d4af37';
    return '<span style="color:'+col+';font-weight:700;">'+ch+'</span>='+_colorize(oh)+'오행';
  }).join(', ');
  var matchCount = matchChars.length;
  var overall = matchCount >= 2
    ? '이름의 오행이 용신과 잘 맞습니다. 운을 보완하는 좋은 이름입니다.'
    : matchCount === 1
    ? '부분적으로 용신 오행이 반영되어 있습니다.'
    : '이름 오행이 용신과 다릅니다. 개명 시 용신 오행 반영을 권장합니다.';
  var recList = [];
  if (NAME_HANJA) {
    Object.keys(NAME_HANJA).forEach(function(key) {
      NAME_HANJA[key].forEach(function(item) {
        if (item[3] === yongsinHan) recList.push(item[0] + '(' + key + ')');
      });
    });
  }
  var recText = recList.slice(0, 8).map(function(s){
    // 예: "旻(민)" → 한자만 금색
    var m = s.match(/^(.)\((.+)\)$/);
    if (m) return _colorHanja(m[1], yongsinHan) + '(' + m[2] + ')';
    return s;
  }).join(' ');
  var html = '<div class="yongsin-match-box">';
  html += '<div class="yongsin-match-title">용신 매칭 분석</div>';
  html += '<div class="yongsin-match-item">당신의 용신은 <b>' + _yongsin + '(' + _colorize(yongsinHan) + ')</b>입니다.' + (_geokguk ? '&nbsp; 격국: ' + _geokguk : '') + '</div>';
  html += '<div class="yongsin-match-item">이름 오행 구성: ' + charDesc + '</div>';
  if (matchChars.length > 0)
    html += '<div class="yongsin-match-item yongsin-ok"><i class="pi pi-check"></i> 용신 일치: ' + matchChars.map(function(o){return _colorHanja(o.ch, o.oh);}).join(', ') + '</div>';
  if (kijinChars.length > 0)
    html += '<div class="yongsin-match-item yongsin-warn"><i class="pi pi-warning"></i>️ 기신 주의: ' + kijinChars.map(function(o){return _colorHanja(o.ch, o.oh);}).join(', ') + '</div>';
  html += '<div class="yongsin-match-item" style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(212,175,55,0.2);">' + overall + '</div>';
  if (recText)
    html += '<div class="yongsin-match-item" style="margin-top:8px;font-size:12px;color:var(--text-dim);">용신(' + _colorize(yongsinHan) + ') 추천 한자: ' + recText + '</div>';
  html += '</div>';
  box.innerHTML = html;
}

function calcScore() {
  var sur  = document.getElementById('inputSur').value.trim();
  var name = document.getElementById('inputName').value.trim();
  if (!sur || !name) { showToast('성과 이름을 모두 입력해주세요', true); return; }

  var surChars  = sur.split('');
  var nameChars = name.split('');
  var surSt  = getStrokesFor('sur', surChars);
  var nameSt = getStrokesFor('name', nameChars);

  var A = surSt.reduce(function(a,b){return a+b;},0);
  var B = nameSt[0]||0, C = nameSt[1]||0;
  var gyek = calcGyek(A, B, C);
  lastScores = gyek; lastName = sur + name;

  var allChars   = surChars.concat(nameChars);
  var allStrokes = surSt.concat(nameSt);
  var allJawon   = getJawonOhaeng('sur',surChars).concat(getJawonOhaeng('name',nameChars));
  var allHanja   = getSelectedHanja('sur',surChars).concat(getSelectedHanja('name',nameChars));

  renderResult(gyek, allChars, allStrokes, allJawon, allHanja);
}

// ── 공용 상수 (사용자 친화 redesign) ──

var _OHENG_BG    = { '木':'rgba(0,200,83,0.18)', '火':'rgba(255,23,68,0.18)', '土':'rgba(255,214,0,0.18)', '金':'rgba(224,224,224,0.18)', '水':'rgba(21,101,192,0.25)' };
var _SIMPLE_LABEL = {
  '원격': { title: '청소년·20대',   sub: '재능 · 초년 흐름' },
  '형격': { title: '30~50대',       sub: '사회 · 커리어 기운' },
  '이격': { title: '인간관계',      sub: '가족 · 주변 사람' },

};

var _REL_SIMPLE = {
  '상생': { simple:'받침',   color:'#4caf7a' },
  '상극': { simple:'부딪힘', color:'#f44336' },
  '비화': { simple:'같음',   color:'#8b8ba8' },
  '중화': { simple:'무난',   color:'#8ba0c0' }
};
var _GRADE_COL    = { '대길':'#d4af37','길':'#4caf7a','반길':'#ff9800','흉':'#f44336','대흉':'#e91e63' };
var _GRADE_BG     = { '대길':'rgba(212,175,55,0.1)','길':'rgba(76,175,122,0.1)','반길':'rgba(255,152,0,0.1)','흉':'rgba(244,67,54,0.08)','대흉':'rgba(233,30,99,0.08)' };
var _GRADE_BORDER = { '대길':'rgba(212,175,55,0.35)','길':'rgba(76,175,122,0.35)','반길':'rgba(255,152,0,0.35)','흉':'rgba(244,67,54,0.3)','대흉':'rgba(233,30,99,0.3)' };
function _colorize(el) { return el ? '<span style="color:'+_OHENG_COLOR[el]+';font-weight:800;">'+el+'</span>' : ''; }

  var col = _OHENG_COLOR[el] || '#d4af37';

}

function renderResult(gyek, allChars, allStrokes, allJawon, allHanja) {
  // ── 4격 카드 (사용자 친화) ──
  var cards = [
    {label:'정격',val:gyek.jung},
    {label:'형격',val:gyek.hyun},
    {label:'원격',val:gyek.won},
    {label:'이격',val:gyek.yi}
  ];
  var grid = document.getElementById('scoreGrid');
  grid.innerHTML = '';
  cards.forEach(function(c) {
    var g = SURI_TABLE[c.val]||'흉';
    var sn = SURI_NAME[c.val]||'';
    var col = _GRADE_COL[g]||'#8b8ba8';
    var lbl = _SIMPLE_LABEL[c.label];
    var easy = _SIMPLE_GRADE[g] || g;
    var tip = c.label + ' (' + c.val + ') · ' + sn + ' — ' + (SURI_DESC[c.val]||'');
    var el = document.createElement('div');
    el.style.cssText = 'background:'+_GRADE_BG[g]+';border:1px solid '+_GRADE_BORDER[g]+';border-radius:14px;padding:14px 12px;text-align:center;';
    el.title = tip;
    el.innerHTML =
      '<div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;">'+lbl.title+'</div>' +
      '<div style="font-size:10px;color:var(--text-dim);margin-bottom:10px;">'+lbl.sub+'</div>' +
      '<div style="display:inline-block;font-size:16px;font-weight:700;color:'+col+';background:'+_GRADE_BG[g]+';border:1.5px solid '+_GRADE_BORDER[g]+';border-radius:20px;padding:6px 16px;margin-bottom:6px;letter-spacing:0.06em;">'+easy+'</div>' +
      '<div style="font-size:10px;color:var(--text-dim);margin-top:4px;">수리 '+c.val+'</div>';
    grid.appendChild(el);
  });

  var grades = [gyek.jung,gyek.hyun,gyek.won,gyek.yi].map(function(v){return SURI_TABLE[v]||'흉';});
  var goodCnt = grades.filter(function(g){return g==='대길'||g==='길';}).length;
  var badCnt  = grades.filter(function(g){return g==='대흉'||g==='흉';}).length;
  var sumText = goodCnt>=3 ? '전반적으로 좋은 수리 배합입니다. 인생 전체 흐름이 이름 전체의 운을 이끕니다.'
    : badCnt>=3 ? '수리 배합에 주의가 필요합니다. 인생 전체 흐름을 중심으로 검토하세요.'
    : '길흉이 혼재합니다. 인생 전체 흐름이 핵심 운의 방향을 결정합니다.';
  document.getElementById('summaryCard').textContent = sumText;

  // ── 종합 점수 ──
  var scores = grades.map(function(g){ return GRADE_SCORE[g] || 0; });
  var totalScore = Math.round(scores.reduce(function(a,b){return a+b;},0) / 4);
  document.getElementById('totalScoreCard').innerHTML =
    '<div class="total-score-label">이름 종합 점수</div>' +
    '<div class="total-score-num">' + totalScore + '</div>' +
    '<div class="total-score-max">/ 100점</div>' +
    '<div class="total-score-bar"><div class="total-score-fill" style="width:0%;" id="totalScoreFill"></div></div>' +
    '<div class="total-score-comment">' + getScoreComment(totalScore) + '</div>';
  setTimeout(function(){ var f=document.getElementById('totalScoreFill'); if(f) f.style.width=totalScore+'%'; }, 50);

  // ── 음오행 · 발음 흐름 (원형 노드 + 색상) ──
  var allEumOh = allChars.map(function(ch){ return getEumOhaeng(ch); });
  var flowEl = document.getElementById('ohaengFlow');
  flowEl.innerHTML = '';
  flowEl.style.cssText = 'display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:12px;flex-wrap:wrap;';
  allChars.forEach(function(ch, i) {
    var oh = allEumOh[i];
    var col = oh ? _OHENG_COLOR[oh] : '#555';
    var bg  = oh ? _OHENG_BG[oh] : 'rgba(255,255,255,0.05)';
    var node = document.createElement('div');
    node.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:4px;';
    node.innerHTML =
      '<div style="width:44px;height:44px;border-radius:50%;background:'+bg+';border:1.5px solid '+col+';display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--text);font-family:\'Noto Serif KR\',serif;">'+ch+'</div>' +
      '<div style="font-size:11px;font-weight:700;color:'+col+';">'+(oh||'-')+'</div>';
    flowEl.appendChild(node);
    if (i < allChars.length - 1) {
      var rel = checkRelation(allEumOh[i], allEumOh[i+1]);
      var r = _REL_SIMPLE[rel] || {simple:rel, color:'#8b8ba8'};
      var arr = document.createElement('div');
      arr.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:2px;padding-top:4px;';
      arr.title = rel;
      arr.innerHTML =
        '<div style="font-size:16px;color:'+r.color+';line-height:1;">→</div>' +
        '<div style="font-size:9px;color:'+r.color+';font-weight:700;white-space:nowrap;">'+r.simple+'</div>';
      flowEl.appendChild(arr);
    }
  });

  var rels = [];
  for (var j=0; j<allEumOh.length-1; j++) rels.push(checkRelation(allEumOh[j], allEumOh[j+1]));
  var hasGeuk  = rels.some(function(r){return r==='상극';});
  var allSaeng = rels.every(function(r){return r==='상생'||r==='비화';});
  var ohResEl = document.getElementById('ohaengResult');
  if (allSaeng) { ohResEl.className='oh-result all-good'; ohResEl.textContent='발음 오행이 받쳐주어 기운이 원활하게 흐릅니다'; }
  else if (hasGeuk) { ohResEl.className='oh-result has-bad'; ohResEl.textContent='발음 오행에 부딪히는 관계가 있습니다 — 기운의 충돌이 발생합니다'; }
  else { ohResEl.className='oh-result mixed'; ohResEl.textContent='발음 오행 흐름이 무난합니다'; }

  // ── 음양 ──
  var eyRow = document.getElementById('eumyangRow');
  eyRow.innerHTML = '';
  var eyPat = [];
  allChars.forEach(function(ch, i) {
    var st = allStrokes[i], ey = getEumyang(st);
    eyPat.push(ey);
    var node = document.createElement('div');
    node.className = 'ey-node';
    node.innerHTML = '<span class="ey-char">'+ch+'</span><span class="ey-badge '+ey+'">'+ey+' ('+st+'획)</span>';
    eyRow.appendChild(node);
  });
  var allYang = eyPat.every(function(e){return e==='양';});
  var allEum  = eyPat.every(function(e){return e==='음';});
  var yangCnt = eyPat.filter(function(e){return e==='양';}).length;
  var eyResEl = document.getElementById('eumyangResult');
  if (allYang||allEum) { eyResEl.className='oh-result has-bad'; eyResEl.textContent=(allYang?'양':'음')+'으로 편중 — 균형 조정이 필요합니다'; }
  else if (Math.abs(yangCnt-(eyPat.length-yangCnt))<=1) { eyResEl.className='oh-result all-good'; eyResEl.textContent='음양이 균형 있게 배합되어 있습니다'; }
  else { eyResEl.className='oh-result mixed'; eyResEl.textContent='음양 배합이 다소 치우쳐 있습니다'; }

  // ── 자원오행 / 음오행 카드 (한자 색상) ──
  var jwCard = document.getElementById('jawonCard');
  jwCard.style.display = '';
  var jwTitle = document.getElementById('jawonTitle');
  var jwNotice = document.getElementById('jawonNotice');
  var jwRow = document.getElementById('jawonRow');
  if (currentMode === 'select' || currentMode === 'manual') {
    jwTitle.textContent = '한자 기운 · 자원오행';
    jwNotice.textContent = '자원오행은 한자의 부수(部首) 기준입니다. 참고용으로 활용하세요.';
  } else {
    jwTitle.textContent = '자음 오행 · 음오행';
    jwNotice.textContent = '한글 자동 모드는 음오행(音五行) 기준입니다. 정확한 작명은 한자 기준을 권장합니다.';
  }
  jwRow.innerHTML = '';
  allChars.forEach(function(ch, i) {
    var hj = allHanja[i]||ch, oh = allJawon[i]||null;
    var col = oh ? _OHENG_COLOR[oh] : '#d4af37';
    var node = document.createElement('div');
    node.className = 'jw-node';
    node.innerHTML =
      '<span class="jw-hanja" style="color:'+col+';font-weight:700;">'+hj+'</span>' +
      '<span class="jw-badge oh-badge '+(oh||'')+'">'+(oh||'?')+'</span>';
    jwRow.appendChild(node);
  });

  // ── 해석 / 용신 매칭 / 훅 ──
  renderInterpret(gyek, grades, rels, eyPat, allJawon, hasGeuk, allSaeng, allYang, allEum, yangCnt);
  renderYongsinMatch(allChars, allJawon, allEumOh);
  renderHook(totalScore, allEumOh, allJawon);

  document.getElementById('aiAnalysisWrap').style.display = 'block';
  document.getElementById('aiAnalysisResult').style.display = 'none';
  document.getElementById('aiAnalysisResult').textContent = '';
  document.getElementById('resultArea').classList.add('show');
}

function renderHook(totalScore, allEumOh, allJawon) {
  var hookEl = document.getElementById('hookCard');
  if (!hookEl) return;
  var hookTitle, hookSub;
  if (totalScore >= 85) {
    hookTitle = '운이 따르는 이름이에요';
    hookSub = '하지만 이 이름의 <b style="color:#d4af37;">진짜 힘</b>은 언제, 어떻게 쓰이는지가 더 중요해요';
  } else if (totalScore >= 65) {
    hookTitle = '빛과 그림자가 섞인 이름';
    hookSub = '<b style="color:#d4af37;">언제 빛나고 언제 주의</b>해야 하는지, 타이밍이 핵심이에요';
  } else {
    hookTitle = '흐름을 되짚어볼 이름';
    hookSub = '개명하기 전에 <b style="color:#d4af37;">반드시 확인</b>해야 할 것들이 있어요';
  }

  var hookPoints = [{
    icon:'<i class="pi pi-clock"></i>',
    head:'인생 단계별 운의 흐름',
    body:'초년 · 청년 · 장년 · 말년 — 이 이름이 <b>언제 가장 빛나는지</b>'
  }];

  if (_yongsin) {
    var KO_OH = {'목':'木','화':'火','토':'土','금':'金','수':'水'};
    var ysOh = getYongsinOhaeng(_yongsin);
    var yongsinHan = KO_OH[ysOh];
    var SGK = {'木':'土','火':'金','土':'水','金':'木','水':'火'};
    var kijinHan = SGK[yongsinHan];
    var ohList = (currentMode === 'select' || currentMode === 'manual') ? allJawon : allEumOh;
    var hasYs = yongsinHan && ohList.indexOf(yongsinHan) !== -1;
    var hasKi = kijinHan && ohList.indexOf(kijinHan) !== -1;
    if (hasYs) {
      hookPoints.push({ icon:'<i class="pi pi-check"></i>', head:'내 사주 기운을 받쳐주는 이름', body:'이 궁합을 <b>어떻게 더 강하게</b> 끌어올릴 수 있는지' });
    } else if (hasKi) {
      hookPoints.push({ icon:'<i class="pi pi-warning"></i>', head:'사주를 누르는 오행이 섞여있어요', body:'개명 없이 <b>이름 에너지를 돌리는 방법</b>이 있어요' });

function renderInterpret(gyek, grades, rels, eyPat, jawon, hasGeuk, allSaeng, allYang, allEum, yangCnt) {
  var el = document.getElementById('interpretCard');
  var jg = SURI_TABLE[gyek.jung]||'흉';
  var goodCnt = grades.filter(function(g){return g==='대길'||g==='길';}).length;
  var badCnt  = grades.filter(function(g){return g==='대흉'||g==='흉';}).length;

  var suriText =
    jg==='대길' ? '정격 '+gyek.jung+'수(대길) — 전체 운기가 매우 강합니다. 사회적으로 인정받고 리더십이 발휘되는 이름입니다.'
    : jg==='길' ? '정격 '+gyek.jung+'수(길) — 안정적인 운기를 갖추고 있습니다. 꾸준한 성장과 성취가 기대됩니다.'
    : jg==='반길' ? '정격 '+gyek.jung+'수(반길) — 길흉이 공존합니다. 전반적으로 무난하나 특정 시기 주의가 필요합니다.'
    : jg==='대흉' ? '정격 '+gyek.jung+'수(대흉) — 전체 운기에 강한 주의가 필요합니다. 개명 또는 보완책을 적극 검토하세요.'
    : '정격 '+gyek.jung+'수(흉) — 운기 보완이 필요합니다.';
  if (goodCnt>=3) suriText += ' 4격 중 '+goodCnt+'개가 길수로 전반 균형이 좋습니다.';
  else if (badCnt>=3) suriText += ' 4격 중 '+badCnt+'개가 흉수로 수리 조정이 필요합니다.';

  var ohText = allSaeng
    ? '발음 흐름이 상생으로 이어집니다. 이름을 부를 때마다 좋은 기운이 증폭됩니다.'
    : hasGeuk
    ? '상극 관계('+rels.filter(function(r){return r==='상극';}).length+'곳)가 있어 기운 충돌이 발생합니다. 이름을 자주 불릴수록 누적됩니다.'
    : '발음 오행이 중화적으로 흘러 안정적입니다.';

  var eyText = allYang ? '전체 양(陽) 편중 — 과잉 양기는 급함·충동성으로 발현될 수 있습니다.'
    : allEum ? '전체 음(陰) 편중 — 과잉 음기는 소극성·우유부단함으로 나타날 수 있습니다.'
    : Math.abs(yangCnt-(eyPat.length-yangCnt))<=1
    ? '음양 배합(양 '+yangCnt+'·음 '+(eyPat.length-yangCnt)+') 균형 — 강함과 부드러움이 조화롭습니다.'
    : '양 '+yangCnt+'·음 '+(eyPat.length-yangCnt)+'로 다소 치우쳐 있지만 큰 문제는 아닙니다.';

  var jawonText = '';
  if (jawon.some(function(o){return o;})) {
    var ohs = jawon.filter(Boolean);
    var ohCnt = {};
    ohs.forEach(function(o){ohCnt[o]=(ohCnt[o]||0)+1;});
    var dom = Object.keys(ohCnt).sort(function(a,b){return ohCnt[b]-ohCnt[a];})[0];
    var label = (currentMode==='select'||currentMode==='manual') ? '한자 자원오행' : '음오행';
    jawonText = label+' '+ohs.map(_colorize).join('·')+' — '+_colorize(dom)+'의 기운이 가장 강하게 작용합니다.';
  }

  var score = 0;
  if (jg==='대길') score+=3; else if (jg==='길') score+=2; else if (jg==='반길') score+=1;
  else if (jg==='흉') score-=1; else if (jg==='대흉') score-=3;
  if (allSaeng) score+=2; else if (hasGeuk) score-=1;
  if (!allYang && !allEum && Math.abs(yangCnt-(eyPat.length-yangCnt))<=1) score+=1;
  else if (allYang||allEum) score-=1;

  var overall = score>=5 ? '매우 뛰어난 이름입니다. 수리·음오행·음양 세 축이 고루 조화를 이루고 있습니다.'
    : score>=3 ? '전반적으로 좋은 이름입니다. 강점을 살리면서 약한 부분을 보완하면 더욱 이상적입니다.'
    : score>=1 ? '보통 수준입니다. 몇 가지 보완 요소가 있으며 검토 후 조정을 고려해볼 수 있습니다.'
    : '여러 면에서 보완이 필요합니다. 전문 작명가와의 상담을 권합니다.';

  var html = '<div class="interpret-section"><span class="interpret-label">수리 해석</span>'+suriText+'</div>';
  html += '<div class="interpret-section"><span class="interpret-label">음오행 해석</span>'+ohText+'</div>';
  html += '<div class="interpret-section"><span class="interpret-label">음양 해석</span>'+eyText+'</div>';
  if (jawonText) html += '<div class="interpret-section"><span class="interpret-label">자원오행 해석</span>'+jawonText+'</div>';
  html += '<div class="interpret-section" style="border-top:1px solid var(--border);padding-top:14px;margin-top:4px;"><span class="interpret-label">종합 판단</span>'+overall+'</div>';
  el.innerHTML = html;
}

function getOrbBalance(userId) {
  return fetch(SB_URL + '/rest/v1/orb_balance?user_id=eq.' + encodeURIComponent(userId) + '&select=balance', {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  })
  .then(function(r){ return r.json(); })
  .then(function(rows) {
    if (!rows || !rows.length) return 0;
    return (rows[0] && rows[0].balance != null) ? rows[0].balance : 0;
  });
}

function deductOrb(userId, amount) {
  return getOrbBalance(userId).then(function(bal) {
    if (bal < amount) return Promise.reject(new Error('잔액 부족'));
    return fetch(SB_URL + '/rest/v1/orb_balance?user_id=eq.' + encodeURIComponent(userId), {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ balance: bal - amount })
    }).then(function() {
      return fetch(SB_URL + '/rest/v1/orb_transactions', {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ user_id: userId, amount: -amount, type: 'use', desc: '이름 AI 심층분석' })

  });
}

function runAiAnalysis() {

  resultEl.style.display = 'block';
  resultEl.textContent = '';

  var sur = document.getElementById('inputSur').value.trim();
  var name = document.getElementById('inputName').value.trim();
  var scores = lastScores;
  var grades = [scores.jung, scores.hyun, scores.won, scores.yi].map(function(v){ return (SURI_TABLE[v]||'흉') + '(' + v + ')'; });
  var totalScore = Math.round(
    [scores.jung, scores.hyun, scores.won, scores.yi]
      .map(function(v){ return GRADE_SCORE[SURI_TABLE[v]||'흉']||0; })
      .reduce(function(a,b){return a+b;},0) / 4
  );

  var profile = null;
  try { profile = JSON.parse(localStorage.getItem('pico_profile')); } catch(e) {}
  var profileText = profile
    ? '생년월일: ' + profile.year + '년 ' + profile.month + '월 ' + profile.day + '일, 성별: ' + (profile.gender === 'M' ? '남' : '여')
    : '';
  var yongsinText = _yongsin ? '용신: ' + _yongsin : '';
  var geokgukText = _geokguk ? '격국: ' + _geokguk : '';

  var prompt = '이름 "' + sur + name + '"의 수리성명학 심층분석을 해주세요.\n\n' +
    '【수리 4격】\n' +
    '정격(인생 전체): ' + grades[0] + '\n' +
    '형격(30~50대·사회운): ' + grades[1] + '\n' +
    '원격(청소년·20대·재능): ' + grades[2] + '\n' +
    '이격(인간관계·가정): ' + grades[3] + '\n' +
    '종합 점수: ' + totalScore + '/100점\n' +
    (profileText ? '\n【사주 정보】\n' + profileText + '\n' : '') +
    (yongsinText ? yongsinText + '\n' : '') +
    (geokgukText ? geokgukText + '\n' : '') +
    '\n다음 3가지 축을 순서대로 각 300자 내외로 분석해주세요 (총 900자 내외):\n\n' +
    '━━ 1. 인생 단계별 운의 흐름 ━━\n' +
    '청소년·20대(원격), 30~50대(형격), 인간관계(이격), 인생 전체(정격) 4격 등급을 바탕으로 이 이름이 각 시기에 어떻게 작용하는지 언제 가장 빛나고 언제 주의해야 하는지 구체적으로 설명해주세요.\n\n' +
    (yongsinText ? '━━ 2. 내 사주와 이름의 궁합 ━━\n용신 오행과 이름 오행(음오행/자원오행)의 실제 매칭 상태, 강화·약화 작용을 구체적으로 분석해주세요.\n\n' : '━━ 2. 음오행 흐름 해석 ━━\n이름의 발음 오행(자음 오행) 흐름이 이 사람의 기운에 미치는 실제 영향을 설명해주세요.\n\n') +
    '━━ 3. 돈·사람·일 3방향 분석 ━━\n이 이름이 끌어당기는 재물운, 관계운, 직업운을 각각 실질적으로 설명해주세요.\n\n' +
    '출력 형식: 반드시 위 3개 섹션 구분선(━━)을 그대로 유지. 친근하고 따뜻한 전문가 톤. #헤더/표/볼드(*) 금지. 중요한 단어는 「」로 강조.';

  fetch('https://fortuna-silk.vercel.app/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: [{ role: 'user', content: prompt }],
      system: '당신은 수리성명학 전문가입니다. 이름의 수리 에너지를 깊이 분석하여 실질적인 조언을 제공합니다.',
      max_tokens: 1200,
      stream: true
    })
  })
  .then(function(r) {
    if (!r.ok) throw new Error('API 오류');
    var reader = r.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';
    function read() {
      reader.read().then(function(chunk) {
        if (chunk.done) {
          btn.textContent = 'AI 심층분석 완료';
          btn.disabled = false;
          saveAiAnalysisReport(sur, name, grades, totalScore, resultEl.textContent);
          return;
        }
        buffer += decoder.decode(chunk.value, { stream: true });
        var lines = buffer.split('\n');
        buffer = lines.pop();
        lines.forEach(function(line) {
          if (!line.startsWith('data:')) return;
          var d = line.slice(5).trim();
          if (d === '[DONE]') return;
          try {
            var j = JSON.parse(d);
            var delta = j.delta && j.delta.text ? j.delta.text
              : j.choices && j.choices[0] && j.choices[0].delta && j.choices[0].delta.content
              ? j.choices[0].delta.content : '';
            if (delta) resultEl.textContent += delta;
          } catch(e) {}
        });
        read();
      }).catch(function() { btn.disabled = false; });
    }
    read();
  })
  .catch(function() {
    showToast('분석 중 오류가 발생했습니다', true);
    btn.textContent = 'AI 심층분석 · 500 Orb';
    btn.disabled = false;
  });
}

var toastTimer = null;
function showToast(msg, isError) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '');
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2500);
}
