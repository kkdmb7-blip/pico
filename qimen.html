<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기문둔갑 포국반 · FORTUNA</title>
<meta name="description" content="기문둔갑 시가·일가 포국반. 날짜와 시각을 입력하면 9궁 포국 결과를 즉시 확인할 수 있습니다.">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #7b5ea7;
    --accent2: #e8b86d;
    --text: #f0f0f5;
    --muted: #6b6b85;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }
  #starCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    opacity: 0;
    animation: twinkle var(--dur, 3s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.4); }
    50% { opacity: var(--max-op, 0.7); transform: scale(1); }
  }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-family: 'Noto Serif KR', serif;
    font-weight: 700; font-size: 22px;
    letter-spacing: -0.5px; color: var(--text);
    display: flex; align-items: center; gap: 5px;
    text-decoration: none;
  }
  .logo-dot { color: var(--accent2); font-size: 10px; margin-bottom: 2px; }
  .nav-btn {
    padding: 8px 18px; border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    background: linear-gradient(135deg, var(--accent), #a07fd4);
    color: #fff; border: none;
    font-family: 'Noto Sans KR', sans-serif;
    text-decoration: none; transition: all 0.2s; white-space: nowrap;
  }
  .nav-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(123,94,167,0.4); }

  /* ── MAIN ── */
  .main {
    position: relative; z-index: 1;
    max-width: 860px; margin: 0 auto;
    padding: 48px 20px 80px;
  }
  .page-title {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700; text-align: center;
    margin-bottom: 8px; letter-spacing: -0.5px;
  }
  .page-title em { font-style: normal; color: var(--accent2); }
  .page-sub {
    text-align: center; color: var(--muted);
    font-size: 14px; margin-bottom: 36px;
  }

  /* ── INPUT FORM ── */
  .form-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px;
    margin-bottom: 20px;
  }
  .form-row {
    display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;
  }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label {
    font-size: 11px; color: var(--muted); font-weight: 600;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .form-group input {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: 'Noto Sans KR', sans-serif; font-size: 15px;
    padding: 9px 12px; width: 80px;
    transition: border-color 0.2s;
  }
  .form-group input.w-sm { width: 64px; }
  .form-group input:focus { outline: none; border-color: var(--accent); }
  .form-group input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .btn-fetch {
    padding: 10px 24px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #a07fd4);
    color: #fff; border: none; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; font-weight: 700;
    transition: all 0.2s; white-space: nowrap;
    align-self: flex-end; height: 40px;
  }
  .btn-fetch:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(123,94,167,0.4); }
  .btn-fetch:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .type-toggle {
    display: flex; gap: 0; margin-top: 16px;
    background: var(--surface2); border-radius: 10px;
    padding: 4px; width: fit-content;
    border: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .type-btn {
    padding: 7px 18px; border-radius: 7px;
    border: none; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; font-weight: 600;
    transition: all 0.2s;
    background: transparent; color: var(--muted);
    white-space: nowrap;
  }
  .type-btn.active {
    background: linear-gradient(135deg, var(--accent), #a07fd4);
    color: #fff;
    box-shadow: 0 2px 8px rgba(123,94,167,0.4);
  }
  .type-btn:hover:not(.active) { color: var(--text); }

  /* ── META BAR ── */
  .meta-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 24px;
    display: none; gap: 8px 24px; flex-wrap: wrap;
    align-items: center; margin-bottom: 16px;
  }
  .meta-bar.visible { display: flex; }
  .meta-item { display: flex; flex-direction: column; gap: 3px; }
  .meta-label { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
  .meta-value {
    font-size: 16px; font-weight: 700; color: var(--text);
    font-family: 'Noto Serif KR', serif;
  }
  .meta-value.yang { color: #FF1744; }
  .meta-value.eum  { color: #64b5f6; }
  .meta-divider { width: 1px; height: 36px; background: var(--border); }

  /* ── 9궁 GRID ── */
  .grid-wrap {
    display: none;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    margin-bottom: 16px;
  }
  .grid-wrap.visible { display: block; }
  .grid-title {
    padding: 12px 20px 10px;
    font-size: 12px; color: var(--muted); letter-spacing: 0.5px;
    text-transform: uppercase; border-bottom: 1px solid var(--border);
  }
  .qm-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    border-left: 1px solid var(--border);
    border-top: 1px solid var(--border);
  }
  .palace {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 14px 10px 10px;
    display: flex; flex-direction: column;
    align-items: center; gap: 5px;
    min-height: 140px; position: relative;
    transition: background 0.2s;
  }
  .palace.zhifu {
    background: rgba(123,94,167,0.07);
  }
  .palace-num {
    position: absolute; top: 8px; left: 10px;
    font-size: 10px; color: var(--muted);
    font-weight: 600;
  }
  .zhifu-badge {
    position: absolute; top: 20px; right: 8px;
    font-size: 10px; color: var(--accent2);
    font-weight: 700; letter-spacing: 0;
  }
  .palace-dir {
    position: absolute; top: 7px; right: 8px;
    font-size: 9px; color: var(--muted); font-weight: 600;
    pointer-events: none;
  }
  .palace-star {
    display: flex; gap: 2px; justify-content: center;
    text-align: center; margin-top: 8px;
  }
  .palace-shen {
    display: flex; gap: 2px; justify-content: center;
    text-align: center;
  }
  .palace-stem {
    font-family: 'Noto Serif KR', serif;
    font-size: 28px; font-weight: 700;
    line-height: 1; text-align: center;
    padding: 5px 12px; border-radius: 8px;
    border: 1.5px solid currentColor;
    margin: 2px 0;
  }
  .stem-목 { color: #00C853; background: rgba(0,200,83,0.08); }
  .stem-화 { color: #FF1744; background: rgba(255,23,68,0.08); }
  .stem-토 { color: #FFD600; background: rgba(255,214,0,0.08); }
  .stem-금 { color: #e8e8e8; background: rgba(232,232,232,0.06); }
  .stem-수 { color: #64b5f6; background: rgba(100,181,246,0.08); }
  .stem-unknown { color: var(--muted); background: rgba(107,107,133,0.08); }
  .palace-door {
    display: flex; gap: 2px; justify-content: center;
    text-align: center;
  }

  /* ── 직부 BAR ── */
  .zhifu-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 24px;
    display: none; gap: 24px; flex-wrap: wrap; align-items: center;
    margin-bottom: 24px;
  }
  .zhifu-bar.visible { display: flex; }
  .zhifu-item { display: flex; gap: 8px; align-items: center; }
  .zhifu-label { font-size: 12px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
  .zhifu-val {
    font-size: 15px; font-weight: 700;
    color: var(--accent2); font-family: 'Noto Serif KR', serif;
  }

  /* ── 해석 카드 ── */
  .interp-wrap {
    display: none; margin-bottom: 20px;
  }
  .interp-wrap.visible { display: block; }
  .interp-section-title {
    font-size: 11px; color: var(--muted); letter-spacing: 0.5px;
    text-transform: uppercase; font-weight: 600;
    margin-bottom: 12px;
  }
  .interp-free {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 24px;
    margin-bottom: 12px;
  }
  .interp-rows { display: flex; flex-direction: column; gap: 14px; }
  .interp-row { display: flex; gap: 12px; align-items: flex-start; }
  .interp-key {
    font-size: 11px; color: var(--muted); font-weight: 700;
    letter-spacing: 0.5px; text-transform: uppercase;
    min-width: 68px; padding-top: 1px;
  }
  .interp-val { font-size: 14px; color: var(--text); line-height: 1.6; flex: 1; }
  .interp-summary {
    margin-top: 16px; padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 15px; color: var(--text);
    font-family: 'Noto Serif KR', serif;
    font-weight: 400; line-height: 1.8;
  }
  .interp-geok-badge {
    display: inline-block; font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 5px; margin-right: 6px;
    vertical-align: middle;
  }
  .badge-대길 { background: rgba(255,215,0,0.15); color: #FFD700; border: 1px solid rgba(255,215,0,0.3); }
  .badge-길   { background: rgba(0,200,83,0.12);  color: #00C853; border: 1px solid rgba(0,200,83,0.25); }
  .badge-흉   { background: rgba(255,109,0,0.12); color: #FF6D00; border: 1px solid rgba(255,109,0,0.25); }
  .badge-대흉 { background: rgba(255,23,68,0.12); color: #FF1744; border: 1px solid rgba(255,23,68,0.25); }
  .interp-paid {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
    opacity: 0.7;
  }
  .interp-paid-left { display: flex; flex-direction: column; gap: 4px; }
  .interp-paid-title {
    font-size: 15px; font-weight: 700; color: var(--text);
    display: flex; align-items: center; gap: 6px;
  }
  .lock-icon { font-size: 14px; opacity: 0.8; }
  .interp-paid-desc { font-size: 12px; color: var(--muted); }
  .btn-paid {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 22px; border-radius: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); cursor: not-allowed;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px; font-weight: 700;
    white-space: nowrap;
  }

  /* ── AI BUTTON ── */
  .action-row {
    display: none; justify-content: center; gap: 12px;
    flex-wrap: wrap;
  }
  .action-row.visible { display: flex; }
  .btn-ai {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 13px 32px; border-radius: 14px;
    background: linear-gradient(135deg, var(--accent2), #c9914a);
    color: #000; border: none; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; font-weight: 700;
    transition: all 0.2s; text-decoration: none;
  }
  .btn-ai:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(232,184,109,0.35); }

  /* ── STATUS ── */
  .status-msg {
    text-align: center; padding: 36px;
    color: var(--muted); font-size: 15px;
    display: none;
  }
  .status-msg.visible { display: block; }
  .status-msg.err { color: #FF1744; }
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 최길 방향 박스 ── */
  .bestdir-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 20px;
    display: none; margin-bottom: 16px;
  }
  .bestdir-box.visible { display: block; }
  .bestdir-title {
    font-size: 11px; color: var(--muted); letter-spacing: 0.5px;
    text-transform: uppercase; margin-bottom: 10px; font-weight: 600;
  }
  .bestdir-rows { display: flex; flex-wrap: wrap; gap: 8px; }
  .bestdir-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px;
  }
  .bestdir-chip.travel { border-left: 2px solid var(--accent); }
  .bestdir-dir {
    font-size: 14px; font-weight: 700;
    font-family: 'Noto Serif KR', serif;
  }
  .bestdir-chip:not(.travel) .bestdir-dir { color: #FFD700; }
  .bestdir-chip.travel .bestdir-dir { color: var(--accent); }
  .bestdir-info { font-size: 11px; color: var(--muted); }

  /* ── 사주 8자 바 ── */
  .saju-bar {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 24px;
    display: none; margin-bottom: 16px;
  }
  .saju-bar.visible { display: block; }
  .saju-bar-title {
    font-size: 11px; color: var(--muted); letter-spacing: 0.5px;
    text-transform: uppercase; margin-bottom: 14px; font-weight: 600;
  }
  .saju-pillars {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
  }
  .saju-pillar {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    flex: 1; min-width: 64px; max-width: 96px;
  }
  .saju-pillar-label {
    font-size: 11px; color: var(--muted); font-weight: 600;
    letter-spacing: 0.3px;
  }
  .saju-pillar-chars {
    display: flex; flex-direction: column; gap: 4px; align-items: center;
  }
  .saju-pillar-chars span {
    width: 34px !important; height: 34px !important; font-size: 18px !important;
    border-radius: 8px !important;
  }

  /* ── 시간대별 운표 ── */
  .hourly-yun-section {
    margin-top: 32px;
    position: relative;
    z-index: 1;
  }
  .hourly-yun-title {
    font-size: 11px; color: var(--muted); letter-spacing: 0.5px;
    text-transform: uppercase; font-weight: 600; margin-bottom: 14px;
  }
  .yun-list { display: flex; flex-direction: column; gap: 8px; }
  .yun-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
  }
  .yun-row.current-shi {
    border: 2px solid #7c3aed;
    background: rgba(124,58,237,0.1);
  }
  .yun-row.past-shi { opacity: 0.4; }
  .yun-shi {
    font-family: 'Noto Serif KR', serif;
    font-size: 15px; font-weight: 700; min-width: 36px;
  }
  .yun-range { font-size: 11px; color: var(--muted); min-width: 80px; }
  .yun-grade { font-size: 12px; font-weight: 700; min-width: 40px; text-align: center; }
  .yun-grade-대길 { color: #FFD700; }
  .yun-grade-길   { color: #00C853; }
  .yun-grade-평   { color: var(--muted); }
  .yun-grade-흉   { color: #FF6D00; }
  .yun-grade-대흉 { color: #FF1744; }
  .yun-keyword { font-size: 13px; color: var(--text); flex: 1; }
  .yun-current-badge {
    font-size: 10px; font-weight: 700; color: #7c3aed;
    background: rgba(124,58,237,0.15);
    border-radius: 100px; padding: 2px 8px; white-space: nowrap;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .palace { min-height: 118px; padding: 12px 4px 8px; gap: 3px; }
    .palace-stem { font-size: 22px; padding: 4px 8px; }
    .palace-star span, .palace-shen span, .palace-door span {
      width: 18px !important; height: 18px !important; font-size: 11px !important;
    }
    .form-group input { font-size: 14px; }
    .meta-divider { display: none; }
  }
</style>
</head>
<body>
<div id="starCanvas"></div>

<nav>
  <a href="/" class="logo"><span class="logo-dot">●</span>FORTUNA</a>
  <a href="https://kkdmb7-blip.github.io/memox/" target="_blank" class="nav-btn">AI 운세 상담</a>
</nav>

<div id="profile-bar-root"></div>
<script src="profile-bar.js"></script>

<main class="main">
  <h1 class="page-title">기문둔갑 <em>포국반</em></h1>
  <p class="page-sub">날짜와 시각을 입력하면 시가·일가 기문둔갑 포국을 즉시 확인합니다.</p>

  <div class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label>연도</label>
        <input type="number" id="inp-year" placeholder="2024">
      </div>
      <div class="form-group">
        <label>월</label>
        <input type="number" id="inp-month" placeholder="1" min="1" max="12" class="w-sm">
      </div>
      <div class="form-group">
        <label>일</label>
        <input type="number" id="inp-day" placeholder="1" min="1" max="31" class="w-sm">
      </div>
      <div class="form-group">
        <label>시</label>
        <input type="number" id="inp-hour" placeholder="0" min="0" max="23" class="w-sm" value="0">
      </div>
      <div class="form-group">
        <label>분</label>
        <input type="number" id="inp-minute" placeholder="0" min="0" max="59" class="w-sm" value="0">
      </div>
      <button class="btn-fetch" id="btn-fetch" onclick="doFetch()">포국 보기</button>
    </div>
    <div class="type-toggle">
      <button class="type-btn"        id="btn-wonmyong" onclick="setType('wonmyong')">원명국</button>
      <button class="type-btn active" id="btn-siga"     onclick="setType('siga')">시가기문</button>
      <button class="type-btn"        id="btn-ilga"     onclick="setType('ilga')">일가기문</button>
      <button class="type-btn"        id="btn-wolga"    onclick="setType('wolga')">월가기문</button>
      <button class="type-btn"        id="btn-nyeonga"  onclick="setType('nyeonga')">연가기문</button>
    </div>
  </div>

  <div class="status-msg" id="status"></div>

  <div id="wonmyong-notice" style="display:none;background:rgba(123,94,167,0.1);border:1px solid rgba(123,94,167,0.3);border-radius:12px;padding:12px 20px;margin-bottom:16px;">
    <div id="wonmyong-date-label" style="font-size:13px;font-weight:700;color:var(--accent2);">📅 원명국</div>
    <div style="font-size:12px;color:var(--muted);margin-top:4px;">이 판은 태어난 순간의 고정된 기운입니다.</div>
  </div>

  <div class="meta-bar" id="meta-bar">
    <div class="meta-item">
      <div class="meta-label">음양둔</div>

<script>
// 낙서 배치: 행×열
const LAKSHO = [[4,9,2],[3,5,7],[8,1,6]];

// 오행 분류 (六儀 + 三奇)
const STEM_OHAENG = {
  '甲':'목','乙':'목','丙':'화','丁':'화',
  '戊':'토','己':'토','庚':'금','辛':'금',
  '壬':'수','癸':'수'
};

// 궁 → 방위
const GONG_DIR = {
  1:'북', 2:'남서', 3:'동', 4:'남동', 5:'중앙', 6:'북서', 7:'서', 8:'북동', 9:'남'
};

// 구성(九星) 의미
const STAR_DESC = {
  '天蓬':'수(水) · 주군·지도자 기운','天芮':'토(土) · 질병·장애 기운','天衝':'목(木) · 투쟁·활동 기운',
  '天輔':'목(木) · 문창·지혜 길성','天禽':'토(土) · 중앙·균형','天心':'금(金) · 의술·길성',
  '天柱':'금(金) · 파괴·절손 기운','天任':'토(土) · 안정·길성','天英':'화(火) · 허영·소모 기운'
};
// 팔신(八神) 의미
const SHEN_DESC = {
  '値符':'천간 직부·보호 에너지','螣蛇':'불안·놀람·기이한 사건','太陰':'음모·은밀·여성 에너지',
  '六合':'합작·파트너십·행운','白虎':'살기·사고·충돌','玄武':'사기·절도·어둠',
  '九地':'잠복·대기·안정','九天':'성취·소원·비상'
};
// 팔문(八門) 의미
const DOOR_DESC = {
  '生':'生門 · 새로운 시작·생기·길문','開':'開門 · 왕성한 활동·개운·길문',
  '休':'休門 · 안정·휴식·길문','景':'景門 · 밝은 기운·문서','傷':'傷門 · 주의·손상·흉문',
  '杜':'杜門 · 막힘·정체','驚':'驚門 · 긴장·놀람','死':'死門 · 침체·소멸·흉문'
};
// 팔문 → 길흉 색상
const DOOR_COLOR = {
  '生':'#FFD700', '開':'#FFD700',
  '休':'#00C853', '景':'#00C853',
  '傷':'#FF6D00', '杜':'#FF6D00', '驚':'#FF6D00',
  '死':'#FF1744'
};

// 오행별 글자 색상·배경
const EL_COLOR = {목:'#00C853',화:'#FF5252',토:'#FFD740',금:'#d4d4d4',수:'#64b5f6'};
const EL_BG    = {목:'rgba(0,200,83,0.12)',화:'rgba(255,23,68,0.12)',토:'rgba(255,214,0,0.12)',금:'rgba(212,212,212,0.08)',수:'rgba(100,181,246,0.12)'};
// 구성·팔신·팔문 오행
const STAR_EL = {'天蓬':'수','天芮':'토','天衝':'목','天輔':'목','天禽':'토','天心':'금','天柱':'금','天任':'토','天英':'화'};
const SHEN_EL = {'値符':'토','螣蛇':'화','太陰':'금','六合':'목','白虎':'금','玄武':'수','九地':'토','九天':'금'};
const DOOR_EL = {'生':'목','傷':'목','杜':'목','景':'화','死':'토','開':'금','驚':'금','休':'수'};

function charBox(ch, el) {
  const c = EL_COLOR[el] || 'rgba(255,255,255,0.5)';
  const b = EL_BG[el]    || 'rgba(255,255,255,0.04)';
  return '<span style="display:inline-flex;align-items:center;justify-content:center;' +
    'width:22px;height:22px;border-radius:5px;font-size:13px;font-weight:700;' +
    'font-family:\'Noto Serif KR\',serif;color:' + c + ';background:' + b +
    ';border:1px solid ' + c + ';margin:0 1px">' + ch + '</span>';
}
function charBoxes(str, el) {
  if (!str) return '';
  return [...str].map(ch => charBox(ch, el)).join('');
}

let currentType = 'siga';
let hasResult = false;
let _birthDateParams = null;

function setType(t, silent) {
  currentType = t;
  ['wonmyong','siga','ilga','wolga','nyeonga'].forEach(id => {
    document.getElementById('btn-' + id).classList.toggle('active', t === id);
  });
  // 원명국 전환: 공지 표시 + 폼에 생년월일 채우기
  const notice = document.getElementById('wonmyong-notice');
  if (t === 'wonmyong' && _birthDateParams) {
    const bp = _birthDateParams;
    const hStr = (bp.hour != null && bp.hour !== '')
      ? ' ' + String(bp.hour).padStart(2,'0') + ':' + String(bp.minute||0).padStart(2,'0') : '';
    document.getElementById('wonmyong-date-label').textContent =
      '📅 원명국 · ' + bp.year + '.' + String(bp.month).padStart(2,'0') + '.' + String(bp.day).padStart(2,'0') + hStr;
    document.getElementById('inp-year').value   = bp.year   || '';
    document.getElementById('inp-month').value  = bp.month  || '';
    document.getElementById('inp-day').value    = bp.day    || '';
    document.getElementById('inp-hour').value   = bp.hour   || 0;
    document.getElementById('inp-minute').value = bp.minute || 0;
    notice.style.display = 'block';
  } else {
    notice.style.display = 'none';
  }
  if (!silent && hasResult) doFetch();
}

function showStatus(msg, isErr) {
  const el = document.getElementById('status');
  el.innerHTML = isErr ? msg : '<span class="spinner"></span>' + msg;
  el.className = 'status-msg visible' + (isErr ? ' err' : '');
}
function hideStatus() {
  document.getElementById('status').className = 'status-msg';
}
function setVisible(id, v) {
  document.getElementById(id).classList.toggle('visible', v);
}
function hideResults() {
  setVisible('meta-bar', false);
  setVisible('saju-bar', false);
  setVisible('grid-wrap', false);
  setVisible('bestdir-box', false);
  setVisible('zhifu-bar', false);
  setVisible('interp-wrap', false);
  setVisible('action-row', false);
  hasResult = false;
}

// ── 사주 8자 ─────────────────────────────────────────────
const KOR_STEM   = {갑:'甲',을:'乙',병:'丙',정:'丁',무:'戊',기:'己',경:'庚',신:'辛',임:'壬',계:'癸'};
const KOR_BRANCH = {자:'子',축:'丑',인:'寅',묘:'卯',진:'辰',사:'巳',오:'午',미:'未',신:'申',유:'酉',술:'戌',해:'亥'};
const BRANCH_EL  = {子:'수',丑:'토',寅:'목',卯:'목',辰:'토',巳:'화',午:'화',未:'토',申:'금',酉:'금',戌:'토',亥:'수'};

function korPillarToHan(s) {
  if (!s || s.length < 2) return { stem: '?', branch: '?' };
  return { stem: KOR_STEM[s[0]] || s[0], branch: KOR_BRANCH[s[1]] || s[1] };
}

async function fetchSaju(year, month, day, hour, minute) {
  try {
    const sp = new URLSearchParams({ year, month, day, hour: hour||0, minute: minute||0, gender: 'male' });
    const res = await fetch('https://fortuna.kkdmb7.workers.dev/saju-test?' + sp.toString());
    if (!res.ok) return;
    const data = await res.json();
    const pillars = data.summary?.pillars;
    if (!pillars) return;

    const order = [
      { label: '시주', key: 'hour' },
      { label: '일주', key: 'day' },
      { label: '월주', key: 'month' },
      { label: '년주', key: 'year' },
    ];
    const container = document.getElementById('saju-pillars');
    container.innerHTML = '';
    order.forEach(({ label, key }) => {
      const { stem, branch } = korPillarToHan(pillars[key]);
      const stemEl   = charBox(stem,   STEM_OHAENG[stem]   || '');
      const branchEl = charBox(branch, BRANCH_EL[branch]   || '');
      const div = document.createElement('div');
      div.className = 'saju-pillar';
      div.innerHTML = '<div class="saju-pillar-label">' + label + '</div>'
        + '<div class="saju-pillar-chars">' + stemEl + branchEl + '</div>';
      container.appendChild(div);
    });
    setVisible('saju-bar', true);
  } catch(e) { console.error('사주 로드 오류', e); }
}

async function doFetch() {
  const year   = parseInt(document.getElementById('inp-year').value);
  const month  = parseInt(document.getElementById('inp-month').value);
  const day    = parseInt(document.getElementById('inp-day').value);
  const hour   = parseInt(document.getElementById('inp-hour').value) || 0;
  const minute = parseInt(document.getElementById('inp-minute').value) || 0;

  if (!year || !month || !day) {
    showStatus('연도, 월, 일을 입력해주세요.', true);
    return;
  }

  const fetchBtn = document.getElementById('btn-fetch');
  fetchBtn.disabled = true;
  showStatus('포국 계산 중…', false);
  hideResults();

  // URL: wonmyong 유지 / API: wonmyong → siga
  const apiType = currentType === 'wonmyong' ? 'siga' : currentType;
  history.replaceState(null, '', '?' + new URLSearchParams({year, month, day, hour, minute, type: currentType}).toString());
  const apiSp = new URLSearchParams({year, month, day, hour, minute, type: apiType});

  try {
    const res = await fetch('https://fortuna.kkdmb7.workers.dev/qimen?' + apiSp.toString());
    if (!res.ok) {
      const txt = await res.text().catch(() => '');
      throw new Error('HTTP ' + res.status + (txt ? ': ' + txt : ''));
    }
    const data = await res.json();
    hideStatus();
    renderResult(data);
  } catch (e) {
    showStatus('포국 계산 오류: ' + e.message, true);
    console.error(e);
  } finally {
    fetchBtn.disabled = false;
  }
}

function renderResult(data) {
  const meta = data.meta;

  // 사주 8자 (URL에 날짜 있을 때)
  const _y = parseInt(document.getElementById('inp-year').value);
  const _m = parseInt(document.getElementById('inp-month').value);
  const _d = parseInt(document.getElementById('inp-day').value);
  if (_y && _m && _d) {
    fetchSaju(_y, _m, _d,
      parseInt(document.getElementById('inp-hour').value)   || 0,
      parseInt(document.getElementById('inp-minute').value) || 0);
  }

  // 메타 정보
  const dunEl = document.getElementById('m-duntype');
  dunEl.textContent = meta.음양둔;
  dunEl.className   = 'meta-value ' + (meta.음양둔 === '양둔' ? 'yang' : 'eum');
  document.getElementById('m-jieqi').textContent = meta.절기;
  document.getElementById('m-won').textContent   = meta.원;
  document.getElementById('m-guk').textContent   = meta.국수 + '국';
  document.getElementById('m-ilju').textContent  = meta.일주;

  // 월주 / 년주 표시 (wolga/nyeonga 일 때)
  const ganzhiWrap  = document.getElementById('m-ganzhi-wrap');
  const ganzhiLabel = document.getElementById('m-ganzhi-label');
  const ganzhiVal   = document.getElementById('m-ganzhi');
  if (meta.월주) {
    ganzhiLabel.textContent = '월주';
    ganzhiVal.textContent   = meta.월주;
    ganzhiWrap.style.display = '';
  } else if (meta.년주) {
    ganzhiLabel.textContent = '년주';
    ganzhiVal.textContent   = meta.년주;
    ganzhiWrap.style.display = '';
  } else {
    ganzhiWrap.style.display = 'none';
  }

  setVisible('meta-bar', true);

  // 9궁 그리드
  const grid = document.getElementById('qm-grid');
  grid.innerHTML = '';
  LAKSHO.forEach(row => {
    row.forEach(n => {
      const palace = data.palaces[String(n)];
      const isZhifu = n === data.직부궁;
      grid.appendChild(buildCell(n, palace, isZhifu));
    });
  });
  setVisible('grid-wrap', true);

  // 최길 방향
  renderBestDir(data);

  // 직부 정보
  document.getElementById('zf-gong').textContent = data.직부궁 + '궁';
  document.getElementById('zf-star').textContent = data.직부성 || '-';
  document.getElementById('zf-door').textContent = data.직사문 || '-';
  setVisible('zhifu-bar', true);

  // 해석 카드
  renderInterp(data);

  hasResult = true;

  // 공유 카드용 데이터 저장
  _qimenData = data;
  var wrap = document.getElementById('qimenShareBtnWrap');
  wrap.style.display = 'flex';
}

function buildCell(n, p, isZhifu) {
  const cell = document.createElement('div');
  cell.className = 'palace' + (isZhifu ? ' zhifu' : '');

  // 궁 번호
  const numEl = document.createElement('div');
  numEl.className = 'palace-num';
  numEl.textContent = n + '궁';
  cell.appendChild(numEl);

  // 방위 배지 (우상단)
  const dirEl = document.createElement('div');
  dirEl.className = 'palace-dir';
  dirEl.textContent = GONG_DIR[n] || '';
  cell.appendChild(dirEl);

  // 직부 표시
  if (isZhifu) {
    const badge = document.createElement('div');
    badge.className = 'zhifu-badge';
    badge.textContent = '★直';
    cell.appendChild(badge);
  }

  // 구성 (Nine Stars)
  const starEl = document.createElement('div');
  starEl.className = 'palace-star';
  starEl.innerHTML = charBoxes(p.구성, STAR_EL[p.구성]);
  if (p.구성 && STAR_DESC[p.구성]) starEl.title = STAR_DESC[p.구성];
  cell.appendChild(starEl);

  // 팔신
  const shenEl = document.createElement('div');
  shenEl.className = 'palace-shen';
  shenEl.innerHTML = charBoxes(p.팔신, SHEN_EL[p.팔신]);
  if (p.팔신 && SHEN_DESC[p.팔신]) shenEl.title = SHEN_DESC[p.팔신];
  cell.appendChild(shenEl);

  // 지반 천간 — 오행 색상
  const stem = (p.지반 || '').trim();
  const ohaeng = STEM_OHAENG[stem[0]] || 'unknown';
  const stemEl = document.createElement('div');
  stemEl.className = 'palace-stem stem-' + ohaeng;
  stemEl.textContent = stem || '—';
  cell.appendChild(stemEl);

  // 팔문 (한자 박스 + 오행 색상)
  const doorEl = document.createElement('div');
  doorEl.className = 'palace-door';
  if (p.팔문) {
    const del = DOOR_EL[p.팔문];
    doorEl.innerHTML = charBoxes(p.팔문 + '門', del);
    if (DOOR_DESC[p.팔문]) doorEl.title = DOOR_DESC[p.팔문];
  }
  cell.appendChild(doorEl);

  return cell;
}

function renderBestDir(data) {
  const rows = document.getElementById('bestdir-rows');
  rows.innerHTML = '';

  // 生門/開門 길방
  ['生', '開'].forEach(door => {
    Object.entries(data.palaces).forEach(([n, p]) => {
      if (p.팔문 === door) {
        const chip = document.createElement('div');
        chip.className = 'bestdir-chip';
        chip.innerHTML = '<span class="bestdir-dir">' + GONG_DIR[parseInt(n)] + '</span>'
          + '<span class="bestdir-info">' + door + '門 · ' + (p.구성 || '') + '</span>';
        rows.appendChild(chip);
      }
    });
  });

  // 六合 역마방
  Object.entries(data.palaces).forEach(([n, p]) => {
    if (p.팔신 === '六合') {
      const chip = document.createElement('div');
      chip.className = 'bestdir-chip travel';
      chip.innerHTML = '<span class="bestdir-dir">' + GONG_DIR[parseInt(n)] + '</span>'
        + '<span class="bestdir-info">역마 · 六合</span>';
      rows.appendChild(chip);
    }
  });

  setVisible('bestdir-box', rows.children.length > 0);
}

function renderInterp(data) {
  const matched = (typeof checkGeokguk === 'function') ? checkGeokguk(data) : [];
  const rows    = document.getElementById('interp-rows');
  const summary = document.getElementById('interp-summary');
  rows.innerHTML = '';
  summary.textContent = '';

  // 최적 방향: 生門/開門 궁 방위
  const 길방 = [];
  ['生', '開'].forEach(door => {
    Object.entries(data.palaces).forEach(([n, p]) => {
      if (p.팔문 === door) 길방.push(GONG_DIR[parseInt(n)] + '(' + door + '門)');
    });
  });

  // 최적 시간대: 직사문 기준
  const doorTimeMap = {
    '生':'오전 5~7시(寅), 오전 11~13시(午)',
    '開':'오전 3~5시(丑), 오후 19~21시(戌)',
    '休':'오전 23~01시(子), 오전 1~3시(丑)',
    '景':'오전 11~13시(午), 오후 13~15시(未)',
  };
  const 최적시간 = doorTimeMap[data.직사문] || '生門·開門 배치 시간대';

  // 추천행동·주의사항 합산
  const 추천Set = new Set();
  const 주의Set = new Set();
  matched.forEach(g => {
    if (g.추천행동) g.추천행동.split(',').forEach(a => 추천Set.add(a.trim()));
    if (g.주의)     주의Set.add(g.주의);
  });

  // 격국 배지
  const 격국텍스트 = matched.length
    ? matched.map(g =>
        '<span class="interp-geok-badge badge-' + g.길흉 + '">' + g.길흉 + '</span>' + g.name
      ).join(' &nbsp;')
    : '매칭된 특수 격국 없음 — 평국(平局)';

  const rowData = [
    { key: '格局',      val: 격국텍스트, html: true },
    { key: '🧭 방향',   val: 길방.length ? 길방.join(' · ') : '해당 없음' },
    { key: '⏰ 시간',   val: 최적시간 },
    { key: '💼 행동',   val: 추천Set.size ? [...추천Set].join(', ') : '정상적인 일과 진행' },
    { key: '⚠️ 주의',  val: 주의Set.size ? [...주의Set].join(' / ') : '특이 사항 없음' },
  ];

  rowData.forEach(r => {
    const row = document.createElement('div');
    row.className = 'interp-row';
    const key = document.createElement('div');
    key.className = 'interp-key';
    key.textContent = r.key;
    const val = document.createElement('div');
    val.className = 'interp-val';
    if (r.html) val.innerHTML = r.val; else val.textContent = r.val;
    row.appendChild(key);
    row.appendChild(val);
    rows.appendChild(row);
  });

  // 한줄 요약
  const 직사문명 = {
    '生':'생기', '開':'왕성한 활동', '休':'안정', '景':'밝은 기운',
    '傷':'주의', '杜':'막힘', '驚':'긴장', '死':'침체'
  };
  summary.innerHTML = '<span style="font-size:13px;color:var(--muted);font-family:\'Noto Sans KR\',sans-serif;font-weight:700;letter-spacing:0.5px;">📝 요약&nbsp;&nbsp;</span>'
    + (matched.length ? matched[0].요약
      : '직사문 ' + (data.직사문 || '') + '門 — ' + (직사문명[data.직사문] || '보통') + '의 기운이 흐르는 날입니다.');

  setVisible('interp-wrap', true);
}

function _drawQimenCard(cb) {
  if (!_qimenData) { cb(null); return; }
  var data = _qimenData;
  var meta = data.meta || {};
  var palaces = data.palaces || {};

  var today = new Date(Date.now() + 9*3600000);
  var dateStr = today.getUTCFullYear()+'년 '+(today.getUTCMonth()+1)+'월 '+today.getUTCDate()+'일';
  var dunStr = (meta.음양둔 || '') + ' · ' + (meta.원 || '') + ' ' + (meta.국수 ? meta.국수+'국' : '');
  var jieqiStr = meta.절기 || '';
  var zhifuGong = data['직부궁'];

  // 최길방향 수집 (生門·開門·六合역마)
  var bestDirs = [];
  ['生','開'].forEach(function(door) {
    Object.entries(palaces).forEach(function(e) {
      var p = e[1];
      if (p && p.팔문 === door) bestDirs.push({ dir: GONG_DIR_LOCAL[parseInt(e[0])], door: door+'門', color: '#FFD700' });
    });
  });
  Object.entries(palaces).forEach(function(e) {
    var p = e[1];
    if (p && p.팔신 === '六合') bestDirs.push({ dir: GONG_DIR_LOCAL[parseInt(e[0])], door: '역마·六合', color: '#a07fd4' });
  });

  // 오행 색상
  var EL_C = { 목:'#00C853', 화:'#FF5252', 토:'#FFD740', 금:'#d4d4d4', 수:'#64b5f6' };
  var EL_B = { 목:'rgba(0,200,83,0.18)', 화:'rgba(255,82,82,0.18)', 토:'rgba(255,215,0,0.18)', 금:'rgba(212,212,212,0.12)', 수:'rgba(100,181,246,0.18)' };
  var STAR_EL2 = {'天蓬':'수','天芮':'토','天衝':'목','天冲':'목','天輔':'목','天禽':'토','天心':'금','天柱':'금','天任':'토','天英':'화'};
  var SHEN_EL2 = {'直符':'토','値符':'토','騰蛇':'화','太陰':'금','六合':'목','白虎':'금','玄武':'수','九地':'토','九天':'금'};
  var DOOR_EL2 = {'生':'목','傷':'목','杜':'목','景':'화','死':'토','開':'금','驚':'금','休':'수'};
  var DOOR_GOOD = {'生':true,'開':true,'休':true};

  var W = 1080, H = 1920;
  var canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  var ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;

  // 배경
  var bg = ctx.createLinearGradient(0, 0, W*0.3, H);
  bg.addColorStop(0, '#0a0a0f'); bg.addColorStop(0.55, '#12122a'); bg.addColorStop(1, '#0f1f3d');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // 별
  [[8,12],[20,35],[38,8],[55,22],[72,10],[85,28],[6,52],[18,68],[32,80],[50,60],[66,78],[82,48],[90,65],[14,90],[44,45],[78,35],[60,90],[25,15],[92,82],[48,30],[35,55],[15,42],[70,25],[5,75],[65,15],[30,68]].forEach(function(s) {
    var sz = ((s[0]*3+s[1])%3)+1.5;
    var op = 0.25+((s[0]+s[1])%5)*0.1;
    ctx.beginPath(); ctx.arc(s[0]/100*W, s[1]/100*H, sz, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,'+op+')'; ctx.fill();
  });

  ctx.textAlign = 'center';

  // ─── 헤더 ───
  var y = 110;
  ctx.font = '700 40px "Noto Sans KR", sans-serif';
  ctx.fillStyle = '#c9a84c';
  ctx.fillText('FORTUNA', W/2, y);

  y += 28;
  ctx.font = '400 26px "Noto Sans KR", sans-serif';
  ctx.fillStyle = 'rgba(201,168,76,0.65)';
  ctx.fillText('기문둔갑 포국반', W/2, y);

  y += 36;
  ctx.font = '400 28px "Noto Sans KR", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText(dateStr, W/2, y);

  y += 34;
  ctx.font = '400 24px "Noto Sans KR", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText(jieqiStr + ' · ' + dunStr, W/2, y);

  // 구분선
  y += 28;
  var drawLine = function(cy, w2, alpha) {
    var lg = ctx.createLinearGradient(W/2-w2, 0, W/2+w2, 0);
    lg.addColorStop(0,'transparent'); lg.addColorStop(0.5,'rgba(201,168,76,'+alpha+')'); lg.addColorStop(1,'transparent');
    ctx.strokeStyle=lg; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(W/2-w2, cy); ctx.lineTo(W/2+w2, cy); ctx.stroke();
  };
  drawLine(y, 200, 0.5);

  // ─── 9궁 그리드 ───
  y += 28;
  var gridTitle = '9궁 포국  ·  낙서 배치';
  ctx.font = '400 22px "Noto Sans KR", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillText(gridTitle, W/2, y);

  y += 20;
  var LAKSHO2 = [[4,9,2],[3,5,7],[8,1,6]];
  var pad = 36;
  var gridW = W - pad*2;
  var cellW = Math.floor(gridW / 3);
  var cellH = 200;
  var gridX = pad;
  var gridY = y;

  // 그리드 배경 + 테두리
  ctx.fillStyle = '#13131a';
  ctx.beginPath();
  ctx.roundRect(gridX, gridY, gridW, cellH*3, 16);
  ctx.fill();

  LAKSHO2.forEach(function(row, ri) {
    row.forEach(function(n, ci) {
      var cx = gridX + ci*cellW;
      var cy = gridY + ri*cellH;
      var p = palaces[String(n)] || {};
      var isZhifu = n === zhifuGong;

      // 직부궁 배경
      if (isZhifu) {
        ctx.fillStyle = 'rgba(123,94,167,0.12)';
        ctx.fillRect(cx, cy, cellW, cellH);
      }

      // 셀 테두리
      ctx.strokeStyle = '#2a2a3d'; ctx.lineWidth = 1;
      ctx.strokeRect(cx, cy, cellW, cellH);

      var midX = cx + cellW/2;

      // 궁번호 (좌상단)
      ctx.textAlign = 'left';
      ctx.font = '400 20px "Noto Sans KR", sans-serif';
      ctx.fillStyle = '#6b6b85';
      ctx.fillText(n+'궁', cx+14, cy+28);

      // 방위 (우상단)
      ctx.textAlign = 'right';
      ctx.font = '600 19px "Noto Sans KR", sans-serif';
      ctx.fillStyle = isZhifu ? '#c9a84c' : '#6b6b85';
      ctx.fillText(GONG_DIR_LOCAL[n]||'', cx+cellW-12, cy+28);

      // 직부 표시
      if (isZhifu) {
        ctx.textAlign = 'right';
        ctx.font = '700 18px "Noto Sans KR", sans-serif';
        ctx.fillStyle = '#c9a84c';
        ctx.fillText('★直', cx+cellW-12, cy+52);
      }

      ctx.textAlign = 'center';

      // 구성(九星) — 박스형
      if (p.구성) {
        var el = STAR_EL2[p.구성] || '토';
        var sc = EL_C[el]||'#aaa', sb = EL_B[el]||'rgba(255,255,255,0.08)';
        var starW = p.구성.length * 22 + 12;
        var starX = midX - starW/2, starY = cy + 46;
        ctx.fillStyle = sb;
        ctx.beginPath(); ctx.roundRect(starX, starY, starW, 30, 6); ctx.fill();
        ctx.strokeStyle = sc; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.roundRect(starX, starY, starW, 30, 6); ctx.stroke();
        ctx.font = '700 19px "Noto Serif KR", serif';
        ctx.fillStyle = sc;
        ctx.fillText(p.구성, midX, starY+21);
      }

      // 팔신 — 박스형
      if (p.팔신) {
        var el2 = SHEN_EL2[p.팔신]||'토';
        var sc2 = EL_C[el2]||'#aaa', sb2 = EL_B[el2]||'rgba(255,255,255,0.08)';
        var shenW = p.팔신.length * 22 + 12;
        var shenX = midX - shenW/2, shenY = cy + 83;
        ctx.fillStyle = sb2;
        ctx.beginPath(); ctx.roundRect(shenX, shenY, shenW, 30, 6); ctx.fill();
        ctx.strokeStyle = sc2; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.roundRect(shenX, shenY, shenW, 30, 6); ctx.stroke();
        ctx.font = '700 19px "Noto Serif KR", serif';
        ctx.fillStyle = sc2;
        ctx.fillText(p.팔신, midX, shenY+21);
      }

      // 지반 천간 — 큰 글씨
      if (p.지반) {
        var stem1 = p.지반[0] || '';
        var stemEl2 = STEM_OHAENG[stem1] || '토';
        var stemC = EL_C[stemEl2]||'#aaa', stemB = EL_B[stemEl2]||'rgba(255,255,255,0.08)';
        var stemW = 54, stemH2 = 54;
        var stemX = midX - stemW/2, stemY = cy + 118;
        ctx.fillStyle = stemB;
        ctx.beginPath(); ctx.roundRect(stemX, stemY, stemW, stemH2, 10); ctx.fill();
        ctx.strokeStyle = stemC; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.roundRect(stemX, stemY, stemW, stemH2, 10); ctx.stroke();
        ctx.font = '700 30px "Noto Serif KR", serif';
        ctx.fillStyle = stemC;
        ctx.fillText(p.지반, midX, stemY+38);
      }

      // 팔문 — 우하단 작게
      if (p.팔문) {
        var del2 = DOOR_EL2[p.팔문]||'토';
        var dc = EL_C[del2]||'#aaa';
        var isGood = DOOR_GOOD[p.팔문];
        ctx.font = (isGood ? '700' : '400') + ' 21px "Noto Serif KR", serif';
        ctx.fillStyle = isGood ? '#FFD700' : 'rgba(255,255,255,0.4)';
        ctx.textAlign = 'right';
        ctx.fillText(p.팔문+'門', cx+cellW-12, cy+cellH-14);
      }

      ctx.textAlign = 'center';
    });
  });

  // 그리드 외곽 테두리
  ctx.strokeStyle = '#2a2a3d'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(gridX, gridY, gridW, cellH*3, 16); ctx.stroke();

  // ─── 최길 방향 ───
  y = gridY + cellH*3 + 48;
  drawLine(y, 180, 0.3);

  y += 38;
  ctx.font = '700 30px "Noto Sans KR", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText('🧭 오늘의 최길 방향', W/2, y);

  y += 44;
  var chipW = 200, chipH = 72, chipGap = 16;
  var totalChipW = bestDirs.length * chipW + (bestDirs.length-1)*chipGap;
  var chipStartX = W/2 - totalChipW/2;

  if (bestDirs.length === 0) {
    ctx.font = '400 26px "Noto Sans KR", sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText('–', W/2, y+36);
  } else {
    bestDirs.forEach(function(bd, i) {
      var cx2 = chipStartX + i*(chipW+chipGap);
      // 칩 배경
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.beginPath(); ctx.roundRect(cx2, y, chipW, chipH, 12); ctx.fill();
      ctx.strokeStyle = bd.color === '#FFD700' ? 'rgba(255,215,0,0.35)' : 'rgba(160,127,212,0.4)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.roundRect(cx2, y, chipW, chipH, 12); ctx.stroke();
      // 방위 텍스트
      ctx.font = '700 28px "Noto Serif KR", serif';
      ctx.fillStyle = bd.color;
      ctx.textAlign = 'center';
      ctx.fillText(bd.dir, cx2+chipW/2, y+34);
      // 문 레이블
      ctx.font = '400 20px "Noto Sans KR", sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillText(bd.door, cx2+chipW/2, y+58);
    });
  }

  // ─── 하단 ───
  y = H - 110;
  drawLine(y, 150, 0.4);
  y += 42;
  ctx.font = '400 24px "Noto Sans KR", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillText('picolab.kr', W/2, y);

  cb(canvas);
}

function shareQimenKakao() {
  if (!_qimenData) return;
  var btn = document.querySelector('#qimenShareBtnWrap button');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 생성 중...'; }

  var pageUrl = 'https://picolab.kr?utm_source=share&utm_medium=kakao';

  _drawQimenCard(function(canvas) {
    if (btn) { btn.disabled = false; btn.textContent = '🧭 카카오톡 공유'; }
    if (!canvas) { _qimenShowToast('카드 생성 실패 😢'); return; }

    // URL 클립보드 복사
    try { navigator.clipboard && navigator.clipboard.writeText(pageUrl); } catch(e) {}

    canvas.toBlob(function(blob) {
      if (!blob) { _qimenShowToast('이미지 생성 실패 😢'); return; }
      var file = new File([blob], 'fortuna_qimen.png', { type: 'image/png' });
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: 'FORTUNA 기문둔갑' })
          .then(function() { _qimenShowToast('🔗 링크가 클립보드에 복사됐어요!'); })
          .catch(function() {});
      } else if (navigator.share) {
        navigator.share({ title: 'FORTUNA 기문둔갑', url: pageUrl })
          .catch(function() {});
        _qimenShowToast('🔗 링크가 클립보드에 복사됐어요!');
      } else {
        try { navigator.clipboard && navigator.clipboard.writeText(pageUrl); } catch(e) {}
        _qimenShowToast('🔗 링크가 클립보드에 복사됐어요!');
      }
    }, 'image/png');
  });
}

    { name: '申時', range: '15:00~17:00', repHour: 15 },
    { name: '酉時', range: '17:00~19:00', repHour: 17 },
    { name: '戌時', range: '19:00~21:00', repHour: 19 },
    { name: '亥時', range: '21:00~23:00', repHour: 21 },
  ];

  const DOOR_YUN = {
    '生': { grade: '대길', keyword: '계약·서명·창업 최적' },
    '開': { grade: '대길', keyword: '왕성한 활동·투자·확장' },
    '休': { grade: '길',   keyword: '안정·화해·양생 유리' },
    '景': { grade: '길',   keyword: '문서·공부·창작 유리' },
    '傷': { grade: '흉',   keyword: '이동·충돌 주의' },
    '杜': { grade: '흉',   keyword: '막힘·정체 조심' },
    '驚': { grade: '흉',   keyword: '긴장·놀람 주의' },
    '死': { grade: '대흉', keyword: '중요 결정 보류 권장' },
  };

  // 진태양시(TST) 계산 — 서울 기준 (lon 127.0°, KST meridian 135°)
  function getTSTShichenIdx() {
    var now = new Date();
    var kstH = now.getHours(), kstM = now.getMinutes();
    // 경도 보정: (127 - 135) / 15 * 60 = -32분
    var lonCorr = -32;
    // 균시차(Equation of Time) 근사
    var start = new Date(now.getFullYear(), 0, 0);
    var doy = Math.floor((now - start) / 86400000);
    var B = 2 * Math.PI * (doy - 81) / 365;
    var eot = 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
    var tstTotalMin = kstH * 60 + kstM + lonCorr + eot;
    if (tstTotalMin < 0) tstTotalMin += 1440;
    var tstH = Math.floor(tstTotalMin / 60) % 24;
    // 시진 인덱스
    if (tstH === 23) return 0;
    return Math.floor((tstH + 1) / 2);
  }

  async function loadHourlyYun() {
    var now = new Date();
    var y = now.getFullYear(), m = now.getMonth() + 1, d = now.getDate();
    var currentIdx = getTSTShichenIdx();
    var kstH = now.getHours();
    // 현재 KST 시간 기반 지난 시간대 판별용
    var kstIdx = (kstH === 23) ? 0 : Math.floor((kstH + 1) / 2);

    var results = await Promise.all(SHICHEN.map(function(shi) {
      var sp = new URLSearchParams({ year: y, month: m, day: d, hour: shi.repHour, minute: 0, type: 'siga' });
      return fetch('https://fortuna.kkdmb7.workers.dev/qimen?' + sp.toString())
        .then(function(r) { return r.ok ? r.json() : null; })
        .catch(function() { return null; });
    }));

    var list = document.getElementById('hourlyYunList');
    list.innerHTML = '';

    SHICHEN.forEach(function(shi, i) {
      var data = results[i];
      var isCurrent = (i === currentIdx);
      var isPast = (i !== 0 && i < kstIdx) || (kstIdx === 0 && i !== 0 && kstH >= 23);
      var door = data && data.직사문 ? data.직사문 : null;
      var yun = door && DOOR_YUN[door] ? DOOR_YUN[door] : { grade: '평', keyword: '정상적인 일과' };

      // 격국 보정: 특수 격국이면 길흉 업그레이드 가능
      if (data && typeof checkGeokguk === 'function') {
        var matched = checkGeokguk(data);
        if (matched.length > 0) {
          var g = matched[0];
          if (g.길흉 === '대길' || g.길흉 === '길') {
            yun = { grade: g.길흉, keyword: g.name.replace(/\(.*\)/, '').trim() + ' — ' + (g.요약 || yun.keyword).slice(0, 20) };
          } else if (g.길흉 === '대흉' || g.길흉 === '흉') {
            yun = { grade: g.길흉, keyword: g.name.replace(/\(.*\)/, '').trim() + ' — ' + (g.주의 || yun.keyword).slice(0, 20) };
          }
        }
      }

      var row = document.createElement('div');
      row.className = 'yun-row' + (isCurrent ? ' current-shi' : '') + (isPast && !isCurrent ? ' past-shi' : '');
      if (isCurrent) row.id = 'currentShiRow';
      row.innerHTML =
        '<div class="yun-shi">' + shi.name + '</div>' +
        '<div class="yun-range">' + shi.range + '</div>' +
        '<div class="yun-grade yun-grade-' + yun.grade + '">' + yun.grade + '</div>' +
        '<div class="yun-keyword">' + yun.keyword +
          (door ? ' <span style="font-size:11px;color:var(--muted);">(' + door + '門)</span>' : '') +
        '</div>' +
        (isCurrent ? '<div class="yun-current-badge">현재</div>' : '');
      list.appendChild(row);
    });

    // 현재 시간대로 스크롤
    var cur = document.getElementById('currentShiRow');
    if (cur) {
      setTimeout(function() {
        cur.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 300);
    }
  }

  loadHourlyYun();
})();
</script>
