<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리포트 — PICOLAB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0a0614;
  --surface: #110d1e;
  --surface2: #1a142b;
  --border: rgba(255,255,255,0.07);
  --text: #f0f0f5;
  --muted: #6b6b85;
  --gold: #d4af37;
  --golddim: rgba(201,168,76,0.3);
  --accent: #7b5ea7;
  --fn: 'Noto Sans KR', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--fn); min-height: 100vh; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 14px 20px;
  background: rgba(10,6,20,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
}
.nav-back {
  color: var(--muted); font-size: 20px; text-decoration: none; line-height: 1;
}
.nav-title { font-family: 'Noto Serif KR', serif; font-size: 15px; font-weight: 700; color: var(--gold); }

.wrap { max-width: 600px; margin: 0 auto; padding: 72px 16px 80px; }

/* ── 로딩 상태 ── */
#stateLoading { display: flex; flex-direction: column; align-items: center; padding: 60px 0; gap: 20px; }
.star-loader { position: relative; width: 60px; height: 60px; }
.star-loader::before {
  content: '✦';
  font-size: 32px; color: var(--gold);
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 0.3; transform: translate(-50%,-50%) scale(0.8); }
  50% { opacity: 1; transform: translate(-50%,-50%) scale(1.15); }
}
.loading-label { font-size: 14px; color: var(--muted); text-align: center; line-height: 1.7; }
.loading-label strong { color: var(--gold); display: block; margin-bottom: 4px; }

/* ── 섹션 카드 ── */
.report-header { text-align: center; margin-bottom: 28px; padding: 28px 0 0; }
.report-badge {
  display: inline-block;
  background: rgba(201,168,76,0.1);
  border: 1px solid var(--golddim);
  color: var(--gold);
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  padding: 4px 12px; border-radius: 20px; margin-bottom: 12px;
}
.report-title { font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.report-meta { font-size: 12px; color: var(--muted); }

.section-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  margin-bottom: 14px;
  overflow: hidden;
  animation: fadeUp 0.5s ease forwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.section-header {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 18px 0;
}
.section-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(201,168,76,0.12);
  border: 1px solid var(--golddim);
  font-size: 11px; font-weight: 700; color: var(--gold);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.section-name { font-size: 13px; font-weight: 700; color: var(--text); }
.section-body {
  padding: 12px 18px 18px;
  font-size: 14px; line-height: 1.85; color: rgba(240,240,245,0.88);
  white-space: pre-wrap;
}
.section-loading {
  padding: 20px 18px;
  display: flex; align-items: center; gap: 10px;
  color: var(--muted); font-size: 13px;
}
.dot-spin {
  width: 16px; height: 16px; border: 2px solid rgba(201,168,76,0.2);
  border-top-color: var(--gold); border-radius: 50%;
  animation: spin 0.8s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 에러/충전 모달 ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 500;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: var(--surface2);
  border-radius: 24px 24px 0 0;
  padding: 28px 24px 48px;
  width: 100%; max-width: 480px;
  text-align: center;
}
.modal-icon { font-size: 40px; margin-bottom: 12px; }
.modal-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
.modal-sub { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }
.modal-btn {
  display: block; width: 100%; padding: 14px;
  border: none; border-radius: 12px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: var(--fn); margin-bottom: 10px;
}
.modal-btn-primary { background: linear-gradient(135deg,#7b5ea7,#a07fd4); color: #fff; }
.modal-btn-cancel { background: var(--surface); color: var(--muted); font-size: 13px; }

/* ── 하단 액션 ── */
.report-actions {
  display: flex; flex-direction: column; gap: 10px;
  margin-top: 20px; padding-bottom: 20px;
}
.btn-action {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px; border-radius: 14px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  border: none; font-family: var(--fn);
}
.btn-regen {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
}
.btn-share {
  background: rgba(201,168,76,0.1);
  border: 1px solid var(--golddim);
  color: var(--gold);
}
.orb-note {
  font-size: 11px; color: var(--muted); text-align: center; margin-top: 6px;
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-back">←</a>
  <div class="nav-title" id="navTitle">리포트</div>
</nav>

<div class="wrap">

  <!-- 로딩 -->
  <div id="stateLoading">
    <div class="star-loader"></div>
    <div class="loading-label"><strong id="loadingTitle">준비 중...</strong><span id="loadingDesc">잠시만 기다려 주세요</span></div>
  </div>

  <!-- 리포트 본문 (숨김) -->
  <div id="stateReport" style="display:none;">
    <div class="report-header">
      <div class="report-badge" id="reportBadge">AI REPORT</div>
      <div class="report-title" id="reportTitle"></div>
      <div class="report-meta" id="reportMeta"></div>
    </div>
    <div id="sectionsWrap"></div>
    <div class="report-actions" id="reportActions" style="display:none;">
      <button class="btn-action btn-share" onclick="shareReport()">🔗 공유하기</button>
      <button class="btn-action btn-regen" onclick="regenReport()">🔄 다시 생성하기</button>
      <div class="orb-note" id="regenNote"></div>
    </div>
  </div>

</div>

<!-- 충전 모달 -->
<div id="orbModal" class="modal-overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal-sheet">
    <div class="modal-icon">💎</div>
    <div class="modal-title">Orb가 부족해요</div>
    <div class="modal-sub" id="orbModalSub">Orb를 충전하고 리포트를 받아보세요.</div>
    <button class="modal-btn modal-btn-primary" onclick="location.href='charge.html'">💎 충전하기</button>
    <button class="modal-btn modal-btn-cancel" onclick="document.getElementById('orbModal').classList.remove('open');history.back()">돌아가기</button>
  </div>
</div>

<script>
const SB_URL = 'https://ymghmfkqctckxxysxkvy.supabase.co';
const SB_KEY = 'sb_publishable_3-9zobXqx6Nv36LzmNMBpA_fohZqA5x';
const CHAT_API = 'https://fortuna-silk.vercel.app/api/chat';

const TYPE_CONFIG = {
  character: { title: '타고난 기질 리포트', orb: 500, emoji: '🔮', focus: '타고난 기질, 성격의 본질, 장단점, 삶의 방식' },
  money:     { title: '재물/사업 리포트',   orb: 700, emoji: '💰', focus: '재물운, 사업 적성, 투자 패턴, 돈과의 관계' },
  love:      { title: '연애/결혼 리포트',   orb: 700, emoji: '💕', focus: '연애 패턴, 이상형, 결혼운, 파트너십의 특성' },
  daeun:     { title: '대운 흐름 리포트',   orb: 1000, emoji: '📈', focus: '현재 대운의 의미, 앞으로의 대운 흐름, 인생 타이밍' },
  year:      { title: '올해 운세 리포트',   orb: 500, emoji: '✨', focus: '2026년 운세, 상반기/하반기 흐름, 월별 포인트, 주의사항' }
};

const SECTIONS = [
  { name: '핵심 요약',           chars: 300 },
  { name: '사주 기반 심층 분석', chars: 600 },
  { name: '베딕/낙샤트라 분석',  chars: 500 },
  { name: '자미두수 분석',       chars: 500 },
  { name: '종합 결론 + 실천 방향', chars: 400 }
];

let _sb = null;
let _user = null;
let _profile = null;
let _type = null;
let _config = null;
let _reportId = null;

function getSb() {
  if (!_sb) _sb = supabase.createClient(SB_URL, SB_KEY);
  return _sb;
}

function setLoading(title, desc) {
  document.getElementById('loadingTitle').textContent = title;
  document.getElementById('loadingDesc').textContent = desc;
}

function showState(state) {
  document.getElementById('stateLoading').style.display = state === 'loading' ? 'flex' : 'none';
  document.getElementById('stateReport').style.display  = state === 'report'  ? 'block' : 'none';
}

// ── 초기화 ──
(async function init() {
  // URL 파라미터
  const params = new URLSearchParams(location.search);
  _type = params.get('type');
  _config = TYPE_CONFIG[_type];
  if (!_config) { setLoading('잘못된 접근', '리포트 타입이 올바르지 않아요'); return; }

  document.getElementById('navTitle').textContent = _config.title;
  setLoading(_config.emoji + ' ' + _config.title, '로그인 확인 중...');

  // 로그인 확인
  try { _user = JSON.parse(localStorage.getItem('pico_user')); } catch(e) {}
  if (!_user || !_user.id) {
    location.href = 'index.html';
    return;
  }

  // 프로필 확인
  try { _profile = JSON.parse(localStorage.getItem('pico_profile')); } catch(e) {}
  if (!_profile || !_profile.year) {
    setLoading('프로필 필요', '사주 정보를 먼저 입력해주세요');
    setTimeout(() => location.href = 'index.html', 2000);
    return;
  }

  setLoading('기존 리포트 확인 중...', '');

  // 기존 리포트 조회
  const existing = await fetchExistingReport();
  if (existing) {
    renderReport(existing.content, existing.created_at, false);
    return;
  }

  // Orb 잔액 확인
  setLoading('Orb 잔액 확인 중...', '');
  const balance = await fetchOrbBalance();
  if (balance < _config.orb) {
    document.getElementById('orbModalSub').textContent =
      `이 리포트에는 ${_config.orb.toLocaleString()} Orb가 필요해요.\n현재 잔액: ${balance.toLocaleString()} Orb`;
    document.getElementById('orbModal').classList.add('open');
    document.getElementById('stateLoading').style.display = 'none';
    return;
  }

  // 리포트 생성
  await generateReport();
})();

// ── 기존 리포트 조회 ──
async function fetchExistingReport() {
  try {
    const sb = getSb();
    const { data } = await sb.from('reports')
      .select('*')
      .eq('user_id', _user.id)
      .eq('report_type', _type)
      .order('created_at', { ascending: false })
      .limit(1)
      .maybeSingle();
    return data || null;
  } catch(e) { return null; }
}

// ── Orb 잔액 조회 ──
async function fetchOrbBalance() {
  try {
    const sb = getSb();
    const { data } = await sb.from('orb_balance')
      .select('balance')
      .eq('user_id', _user.id)
      .maybeSingle();
    return (data && data.balance != null) ? data.balance : 0;
  } catch(e) { return 0; }
}

// ── 프로필 문자열 빌드 ──
function buildProfileStr() {
  const p = _profile;
  const gStr = p.gender === 'F' ? '여성' : '남성';
  const timeStr = (p.hour != null) ? `${p.hour}시 ${p.minute || 0}분` : '시간 모름';
  return `이름: ${p.name || '익명'} / 성별: ${gStr} / 생년월일: ${p.year}년 ${p.month}월 ${p.day}일 / 출생시간: ${timeStr}`;
}

// ── 섹션별 프롬프트 ──
function buildSectionPrompt(secIdx, prevSections) {
  const profileStr = buildProfileStr();
  const secName = SECTIONS[secIdx].name;
  const charLimit = SECTIONS[secIdx].chars;
  const focus = _config.focus;

  const prevText = prevSections.length > 0
    ? `\n[이전 섹션 요약]\n${prevSections.map((s,i) => `${i+1}. ${SECTIONS[i].name}: ${s.slice(0,100)}...`).join('\n')}\n`
    : '';

  const systemPrompt = `당신은 사주명리, 베딕점성술, 자미두수를 융합하는 동양철학 AI입니다.
내담자 정보: ${profileStr}
리포트 주제: ${_config.title} (${focus})
현재 작성 섹션: [${secName}]
${prevText}
규칙:
- 반드시 ${charLimit}자 내외로 작성
- 내담자의 생년월일로 사주 기둥을 계산하여 분석에 활용
- 현재 섹션 주제에 집중
- 전문 용어 사용 후 쉬운 말로 풀어쓰기
- **볼드** 적극 활용 (핵심 키워드 3~5개)
- 섹션 제목 없이 본문만 작성
- 마지막 문장은 희망적으로 마무리`;

  const userMsg = `[${secName}] 섹션을 작성해주세요. 주제: ${focus}`;

  return { systemPrompt, userMsg };
}

// ── 리포트 생성 ──
async function generateReport() {
  showState('report');
  document.getElementById('reportTitle').textContent = _config.title;
  document.getElementById('reportMeta').textContent = '생성 중...';

  // 섹션 카드 미리 생성 (로딩 상태)
  const wrap = document.getElementById('sectionsWrap');
  wrap.innerHTML = '';
  SECTIONS.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'section-card';
    card.id = `section-${i}`;
    card.innerHTML = `
      <div class="section-header">
        <div class="section-num">${i+1}</div>
        <div class="section-name">${s.name}</div>
      </div>
      <div class="section-loading" id="sloading-${i}">
        <div class="dot-spin"></div> 분석 중...
      </div>
      <div class="section-body" id="sbody-${i}" style="display:none;"></div>`;
    wrap.appendChild(card);
  });

  const results = [];
  let genOk = true;

  for (let i = 0; i < SECTIONS.length; i++) {
    const { systemPrompt, userMsg } = buildSectionPrompt(i, results);
    // 첫 섹션만 Orb 차감, 나머지는 skip
    const body = {
      user_id: _user.id,
      messages: [{ role: 'user', content: userMsg }],
      system_prompt: systemPrompt,
      mode: 'saju',
      max_tokens: 1500
    };
    if (i === 0) {
      body.orb_override = _config.orb;
    } else {
      body.skip_orb = true;
    }

    try {
      const res = await fetch(CHAT_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        const err = await res.json();
        if (err.error === 'orb_insufficient') {
          document.getElementById('orbModalSub').textContent = `Orb가 부족해요. 현재 잔액: ${(err.orb_balance||0).toLocaleString()} Orb`;
          document.getElementById('orbModal').classList.add('open');
          genOk = false;
          break;
        }
        throw new Error(err.error || 'API 오류');
      }
      const data = await res.json();
      const text = (data.reply || '').trim();
      results.push(text);

      // 섹션 표시
      document.getElementById(`sloading-${i}`).style.display = 'none';
      const bodyEl = document.getElementById(`sbody-${i}`);
      bodyEl.textContent = text;
      bodyEl.style.display = 'block';

    } catch(e) {
      document.getElementById(`sloading-${i}`).innerHTML = `<span style="color:#e05c6a;">생성 실패: ${e.message}</span>`;
      genOk = false;
      break;
    }
  }

  if (!genOk || results.length < SECTIONS.length) return;

  // Supabase 저장
  const now = new Date().toISOString();
  try {
    const sb = getSb();
    const { data } = await sb.from('reports').insert({
      user_id: _user.id,
      report_type: _type,
      content: results,
      orb_spent: _config.orb,
      created_at: now
    }).select().maybeSingle();
    if (data) _reportId = data.id;
  } catch(e) {}

  document.getElementById('reportMeta').textContent = `생성일: ${new Date().toLocaleDateString('ko-KR')}`;
  document.getElementById('reportBadge').textContent = _config.emoji + ' AI REPORT';
  document.getElementById('regenNote').textContent = `다시 생성 시 ${_config.orb.toLocaleString()} Orb 추가 차감`;
  document.getElementById('reportActions').style.display = 'flex';
}

// ── 기존 리포트 렌더 ──
function renderReport(sections, createdAt, isNew) {
  showState('report');
  document.getElementById('reportTitle').textContent = _config.title;
  document.getElementById('reportBadge').textContent = _config.emoji + ' AI REPORT';
  const dateStr = createdAt ? new Date(createdAt).toLocaleDateString('ko-KR') : '';
  document.getElementById('reportMeta').textContent = `생성일: ${dateStr}`;

  const wrap = document.getElementById('sectionsWrap');
  wrap.innerHTML = '';
  sections.forEach((text, i) => {
    const card = document.createElement('div');
    card.className = 'section-card';
    card.style.animationDelay = (i * 0.08) + 's';
    card.innerHTML = `
      <div class="section-header">
        <div class="section-num">${i+1}</div>
        <div class="section-name">${SECTIONS[i].name}</div>
      </div>
      <div class="section-body">${escHtml(text)}</div>`;
    wrap.appendChild(card);
  });

  document.getElementById('regenNote').textContent = `다시 생성 시 ${_config.orb.toLocaleString()} Orb 추가 차감`;
  document.getElementById('reportActions').style.display = 'flex';
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 다시 생성 ──
async function regenReport() {
  if (!confirm(`다시 생성하면 ${_config.orb.toLocaleString()} Orb가 추가 차감됩니다.\n계속하시겠어요?`)) return;

  // 기존 리포트 삭제
  try {
    const sb = getSb();
    await sb.from('reports').delete().eq('user_id', _user.id).eq('report_type', _type);
  } catch(e) {}

  // Orb 확인 후 재생성
  showState('loading');
  setLoading('Orb 잔액 확인 중...', '');
  const balance = await fetchOrbBalance();
  if (balance < _config.orb) {
    document.getElementById('orbModalSub').textContent =
      `이 리포트에는 ${_config.orb.toLocaleString()} Orb가 필요해요.\n현재 잔액: ${balance.toLocaleString()} Orb`;
    document.getElementById('orbModal').classList.add('open');
    document.getElementById('stateLoading').style.display = 'none';
    return;
  }
  await generateReport();
}

// ── 공유 ──
function shareReport() {
  const url = location.href;
  if (navigator.share) {
    navigator.share({ title: _config.title, text: `AI가 분석한 나의 ${_config.title}`, url });
  } else {
    navigator.clipboard && navigator.clipboard.writeText(url)
      .then(() => alert('링크가 복사됐어요!'));
  }
}
</script>

</body>
</html>
