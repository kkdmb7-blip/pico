<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리포트 — PICOLAB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0a0614;
  --surface: #110d1e;
  --surface2: #1a142b;
  --border: rgba(255,255,255,0.07);
  --text: #f0f0f5;
  --muted: #6b6b85;
  --gold: #d4af37;
  --golddim: rgba(201,168,76,0.3);
  --accent: #7b5ea7;
  --orb: #7ac4ff;
  --fn: 'Noto Sans KR', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--fn); min-height: 100vh; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 14px 20px;
  background: rgba(10,6,20,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
}
.nav-back { color: var(--muted); font-size: 20px; text-decoration: none; line-height: 1; cursor: pointer; }
.nav-title { font-family: 'Noto Serif KR', serif; font-size: 15px; font-weight: 700; color: var(--gold); }

.wrap { max-width: 600px; margin: 0 auto; padding: 72px 16px 80px; }

/* ── 로딩 상태 ── */
#stateLoading { display: flex; flex-direction: column; align-items: center; padding: 60px 0; gap: 20px; }
.star-loader { position: relative; width: 60px; height: 60px; }
.star-loader::before {
  content: '✦';
  font-size: 32px; color: var(--gold);
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 0.3; transform: translate(-50%,-50%) scale(0.8); }
  50% { opacity: 1; transform: translate(-50%,-50%) scale(1.15); }
}
.loading-label { font-size: 14px; color: var(--muted); text-align: center; line-height: 1.7; }
.loading-label strong { color: var(--gold); display: block; margin-bottom: 4px; }

/* ── 상품 소개 화면 ── */
#stateIntro { display: none; }
.intro-header { text-align: center; padding: 32px 0 24px; }
.intro-emoji { font-size: 48px; margin-bottom: 12px; }
.intro-title { font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 700; margin-bottom: 10px; }
.intro-desc { font-size: 13px; color: var(--muted); line-height: 1.7; }

.intro-section-list {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
}
.intro-section-label {
  font-size: 11px; font-weight: 700; color: var(--gold);
  letter-spacing: 0.08em; margin-bottom: 14px;
}
.intro-section-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.intro-section-item:last-child { border-bottom: none; }
.intro-section-num {
  width: 20px; height: 20px; border-radius: 50%;
  background: rgba(201,168,76,0.1);
  border: 1px solid var(--golddim);
  font-size: 10px; font-weight: 700; color: var(--gold);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  margin-top: 1px;
}
.intro-section-text { flex: 1; }
.intro-section-name { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 3px; }
.intro-section-desc { font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.5; }
.intro-section-detail { font-size: 11px; color: rgba(255,255,255,0.32); line-height: 1.55; margin-top: 4px; }

.intro-keyq { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 16px; margin-bottom: 16px; }
.intro-keyq-label { font-size: 11px; font-weight: 700; color: var(--gold); letter-spacing: 0.08em; margin-bottom: 12px; }
.intro-keyq-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 13px; color: rgba(240,240,245,0.82); line-height: 1.5;
}
.intro-keyq-item:last-child { border-bottom: none; }
.intro-keyq-dot { color: var(--gold); flex-shrink: 0; font-size: 9px; margin-top: 5px; }

.intro-full-desc {
  font-size: 14px; color: rgba(255,255,255,0.7);
  line-height: 1.7; margin: 8px 0 20px; text-align: center;
}
.intro-recommend {
  background: rgba(212,175,55,0.07); border: 1px solid rgba(212,175,55,0.2);
  border-radius: 12px; padding: 16px; margin: 0 0 20px;
}
.intro-recommend-label { font-size: 12px; color: #d4af37; margin-bottom: 12px; font-weight: 600; }
.intro-recommend-item {
  font-size: 13px; color: rgba(255,255,255,0.85);
  padding: 4px 0; display: flex; align-items: flex-start; gap: 8px;
}
.intro-check { color: #d4af37; font-weight: 700; flex-shrink: 0; }

.intro-preview-box {
  margin: 0 0 20px;
  border: 1px solid rgba(212,175,55,0.2); border-radius: 12px; overflow: hidden;
}
.intro-preview-label { font-size: 12px; color: #d4af37; padding: 12px 16px 8px; font-weight: 600; }
.intro-preview-inner { position: relative; max-height: 100px; overflow: hidden; }
.intro-preview-text {
  font-size: 13px; color: rgba(255,255,255,0.7);
  line-height: 1.7; padding: 0 16px 16px;
}
.intro-preview-fade {
  position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
  background: linear-gradient(transparent, #0d0d1a);
}
.intro-preview-lock {
  font-size: 11px; color: #d4af37; text-align: center;
  padding: 10px 16px 14px; opacity: 0.8;
}

.intro-faq { margin: 0 0 16px; }
.intro-faq-label { font-size: 12px; color: #d4af37; margin-bottom: 10px; font-weight: 600; }
.intro-faq-item { border-bottom: 1px solid rgba(255,255,255,0.06); }
.intro-faq-q {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; color: rgba(255,255,255,0.85);
  padding: 12px 0; cursor: pointer;
}
.intro-faq-arrow { color: #d4af37; font-size: 18px; transition: transform 0.2s; }
.intro-faq-item.open .intro-faq-arrow { transform: rotate(90deg); }
.intro-faq-a {
  font-size: 12px; color: rgba(255,255,255,0.55);
  line-height: 1.6; max-height: 0; overflow: hidden;
  transition: max-height 0.25s ease, padding 0.25s ease; padding: 0;
}
.intro-faq-item.open .intro-faq-a { max-height: 200px; padding-bottom: 12px; }

.intro-orb-box {
  background: rgba(122,196,255,0.06);
  border: 1px solid rgba(122,196,255,0.25);
  border-radius: 14px;
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.intro-orb-label { font-size: 12px; color: var(--muted); }
.intro-orb-cost { font-size: 18px; font-weight: 800; color: var(--orb); }

.btn-intro-gen {
  display: block; width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #7b5ea7, #a07fd4);
  border: none; border-radius: 14px;
  color: #fff; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: var(--fn);
  margin-bottom: 10px;
}
.btn-intro-back {
  display: block; width: 100%;
  padding: 13px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px;
  color: var(--muted); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: var(--fn);
}

/* ── 섹션 카드 ── */
.report-header { text-align: center; margin-bottom: 28px; padding: 28px 0 0; }
.report-badge {
  display: inline-block;
  background: rgba(201,168,76,0.1);
  border: 1px solid var(--golddim);
  color: var(--gold);
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  padding: 4px 12px; border-radius: 20px; margin-bottom: 12px;
}
.report-title { font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.report-meta { font-size: 12px; color: var(--muted); }

.section-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  margin-bottom: 14px;
  overflow: hidden;
  animation: fadeUp 0.5s ease forwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.section-header {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 18px 0;
}
.section-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(201,168,76,0.12);
  border: 1px solid var(--golddim);
  font-size: 11px; font-weight: 700; color: var(--gold);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.section-name { font-size: 13px; font-weight: 700; color: var(--text); }
.section-body {
  padding: 12px 18px 18px;
  font-size: 14px; line-height: 1.85; color: rgba(240,240,245,0.88);
}
.section-body h1,.section-body h2,.section-body h3 {
  font-family: 'Noto Serif KR', serif; margin: 12px 0 6px; color: var(--text);
}
.section-body strong { color: var(--gold); }
.section-body p { margin-bottom: 8px; }
.section-body ul,.section-body ol { padding-left: 20px; margin-bottom: 8px; }
.section-body li { margin-bottom: 4px; }
.section-loading {
  padding: 20px 18px;
  display: flex; align-items: center; gap: 10px;
  color: var(--muted); font-size: 13px;
}
.dot-spin {
  width: 16px; height: 16px; border: 2px solid rgba(201,168,76,0.2);
  border-top-color: var(--gold); border-radius: 50%;
  animation: spin 0.8s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 에러/충전 모달 ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 500;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: var(--surface2);
  border-radius: 24px 24px 0 0;
  padding: 28px 24px 48px;
  width: 100%; max-width: 480px;
  text-align: center;
}
.modal-icon { font-size: 40px; margin-bottom: 12px; }
.modal-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
.modal-sub { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }
.modal-btn {
  display: block; width: 100%; padding: 14px;
  border: none; border-radius: 12px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: var(--fn); margin-bottom: 10px;
}
.modal-btn-primary { background: linear-gradient(135deg,#7b5ea7,#a07fd4); color: #fff; }
.modal-btn-cancel { background: var(--surface); color: var(--muted); font-size: 13px; }

/* ── 하단 액션 ── */
.report-actions {
  display: flex; flex-direction: column; gap: 10px;
  margin-top: 20px; padding-bottom: 20px;
}
.btn-action {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px; border-radius: 14px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  border: none; font-family: var(--fn);
}
.btn-regen {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
}
.btn-share {
  background: rgba(201,168,76,0.1);
  border: 1px solid var(--golddim);
  color: var(--gold);
}
.orb-note {
  font-size: 11px; color: var(--muted); text-align: center; margin-top: 6px;
}

/* ── detailIntro ── */
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
#stateDetail { animation: fadeIn 0.2s ease; }
.detail-back {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--muted); cursor: pointer;
  background: none; border: none; font-family: var(--fn);
  padding: 0; margin-bottom: 20px;
}
.detail-back:hover { color: var(--gold); }
.detail-hero {
  text-align: center; margin-bottom: 24px;
}
.detail-icon { font-size: 40px; margin-bottom: 10px; }
.detail-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(201,168,76,0.1); border: 1px solid var(--golddim);
  color: var(--gold); font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
}
.detail-title { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.detail-subtitle { font-size: 13px; color: var(--muted); }
.detail-desc {
  font-size: 13px; color: rgba(240,240,245,0.8); line-height: 1.8;
  margin-bottom: 20px;
}
.detail-what {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px 16px; margin-bottom: 16px;
}
.detail-what-label {
  font-size: 11px; font-weight: 700; color: var(--gold);
  letter-spacing: 0.08em; margin-bottom: 12px;
}
.detail-what-item {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 13px; color: rgba(240,240,245,0.85);
  padding: 5px 0; border-bottom: 1px solid var(--border);
}
.detail-what-item:last-child { border-bottom: none; }
.detail-what-check { color: var(--gold); font-size: 12px; flex-shrink: 0; margin-top: 2px; }
.detail-preview-wrap {
  position: relative; margin-bottom: 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
}
.detail-preview-label {
  font-size: 11px; font-weight: 700; color: var(--gold);
  letter-spacing: 0.08em; padding: 14px 16px 8px;
}
.detail-preview-text {
  font-size: 13px; color: rgba(240,240,245,0.75); line-height: 1.85;
  padding: 0 16px 60px;
}
.detail-preview-fade {
  position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
  background: linear-gradient(to bottom, transparent, var(--surface));
  display: flex; align-items: flex-end; justify-content: center;
  padding-bottom: 12px;
}
.detail-preview-lock { font-size: 11px; color: var(--muted); }
.detail-orb-box {
  background: rgba(122,196,255,0.06); border: 1px solid rgba(122,196,255,0.25);
  border-radius: 14px; padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.detail-orb-info { font-size: 12px; color: var(--muted); }
.detail-orb-info strong { color: var(--orb); font-size: 16px; font-weight: 800; display: block; }
.detail-balance { font-size: 11px; color: var(--muted); margin-top: 2px; }
.detail-save-note { font-size: 11px; color: var(--muted); text-align: center; margin-bottom: 16px; }

/* ── 성향 체크 화면 ── */
#statePersonality { display: none; padding: 20px; max-width: 480px; margin: 0 auto; }
.pers-title { font-size: 18px; font-weight: 600; color: var(--gold); text-align: center; margin-bottom: 6px; }
.pers-subtitle { font-size: 13px; color: rgba(255,255,255,0.6); text-align: center; margin-bottom: 28px; }
.pers-q { margin-bottom: 20px; }
.pers-q-text { font-size: 14px; color: rgba(255,255,255,0.85); margin-bottom: 10px; font-weight: 500; }
.pers-btn {
  display: block; width: 100%; padding: 12px 16px; margin-bottom: 8px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.2);
  border-radius: 10px; color: rgba(255,255,255,0.8); font-size: 14px;
  cursor: pointer; text-align: left; transition: all 0.15s; font-family: var(--fn);
}
.pers-btn.selected { background: rgba(212,175,55,0.15); border-color: var(--gold); color: var(--gold); }
#btnStartAnalysis {
  width: 100%; padding: 16px; margin-top: 12px;
  background: var(--gold); color: #0a0a1a;
  border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: var(--fn);
}
#btnStartAnalysis:disabled { opacity: 0.3; cursor: not-allowed; }
.pers-back {
  display: block; width: 100%; padding: 13px; margin-top: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; color: var(--muted); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: var(--fn);
}
</style>
</head>
<body>

<nav>
  <a onclick="history.back()" class="nav-back">←</a>
  <div class="nav-title" id="navTitle">리포트</div>
</nav>

<div class="wrap">

  <!-- 로딩 -->
  <div id="stateLoading">
    <div class="star-loader"></div>
    <div class="loading-label"><strong id="loadingTitle">준비 중...</strong><span id="loadingDesc">잠시만 기다려 주세요</span></div>
  </div>

  <!-- 상품 소개 -->
  <div id="stateIntro">
    <div class="intro-header">
      <div class="intro-emoji" id="introEmoji"></div>
      <div class="intro-title" id="introTitle"></div>
      <div class="intro-desc" id="introDesc"></div>
    </div>
    <div class="intro-section-list">
      <div class="intro-section-label">포함 내용</div>
      <div id="introSections"></div>
    </div>
    <div class="intro-orb-box">
      <div class="intro-orb-label">리포트 비용</div>
      <div class="intro-orb-cost" id="introOrbCost"></div>
    </div>
    <button class="btn-intro-gen" id="btnGenerate">✦ 리포트 생성하기</button>
    <button class="btn-intro-back" onclick="history.back()">돌아가기</button>
  </div>

  <!-- 성향 체크 -->
  <div id="statePersonality">
    <div class="pers-title">조금 더 정확한 분석을 위해</div>
    <div class="pers-subtitle">4가지만 답해주세요</div>
    <div class="pers-q">
      <div class="pers-q-text">모임에 가면?</div>
      <button class="pers-btn" data-q="1" data-v="extrovert" onclick="selectPersonality(this)">먼저 말을 거는 편</button>
      <button class="pers-btn" data-q="1" data-v="introvert" onclick="selectPersonality(this)">말 걸어주길 기다림</button>
    </div>
    <div class="pers-q">
      <div class="pers-q-text">새로운 일을 시작할 때?</div>
      <button class="pers-btn" data-q="2" data-v="planner" onclick="selectPersonality(this)">계획 먼저 세움</button>
      <button class="pers-btn" data-q="2" data-v="spontaneous" onclick="selectPersonality(this)">일단 시작하고 봄</button>
    </div>
    <div class="pers-q">
      <div class="pers-q-text">결정을 내릴 때?</div>
      <button class="pers-btn" data-q="3" data-v="logical" onclick="selectPersonality(this)">논리적으로 따짐</button>
      <button class="pers-btn" data-q="3" data-v="intuitive" onclick="selectPersonality(this)">느낌/직감을 따름</button>
    </div>
    <div class="pers-q">
      <div class="pers-q-text">스트레스를 받으면?</div>
      <button class="pers-btn" data-q="4" data-v="social" onclick="selectPersonality(this)">사람 만나서 풀림</button>
      <button class="pers-btn" data-q="4" data-v="solitary" onclick="selectPersonality(this)">혼자만의 시간 필요</button>
    </div>
    <button id="btnStartAnalysis" disabled onclick="startCharacterGeneration()">분석 시작하기</button>
    <button class="pers-back" onclick="showState('intro')">돌아가기</button>
  </div>

  <!-- 섹션 상세 소개 -->
  <div id="stateDetail" style="display:none;">
    <button class="detail-back" onclick="hideDetail()">← 목록으로</button>
    <div class="detail-hero">
      <div class="detail-icon" id="detailIcon"></div>
      <div class="detail-badge"><span id="detailNum"></span></div>
      <div class="detail-title" id="detailTitle"></div>
      <div class="detail-subtitle" id="detailSubtitle"></div>
    </div>
    <p class="detail-desc" id="detailDesc"></p>
    <div class="detail-what">
      <div class="detail-what-label">이런 내용이 담겨있어요</div>
      <div id="detailWhatList"></div>
    </div>
    <div class="detail-preview-wrap">
      <div class="detail-preview-label">미리보기</div>
      <div class="detail-preview-text" id="detailPreview"></div>
      <div class="detail-preview-fade">
        <span class="detail-preview-lock">🔒 전체 내용은 리포트 생성 후 확인 가능합니다</span>
      </div>
    </div>
    <div class="detail-orb-box">
      <div class="detail-orb-info">
        리포트 비용
        <strong id="detailOrbCost"></strong>
      </div>
      <div class="detail-balance" id="detailBalance"></div>
    </div>
    <p class="detail-save-note">✦ 생성 후 영구 저장 · 언제든 다시 확인 가능</p>
    <button class="btn-intro-gen" id="detailBtnGen"></button>

function showToast(msg) {
  var t = document.getElementById('_reportToast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_reportToast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(123,94,167,0.95);color:#fff;padding:12px 22px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;pointer-events:none;transition:opacity .4s;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._tid);
  t._tid = setTimeout(function(){ t.style.opacity = '0'; }, 2800);
}

function setLoading(title, desc) {

}

  // # 헤더 → 굵은 금색 텍스트
  text = text.replace(/^#{1,3}\s+(.+)$/gm,
    '<div style="font-size:14px;font-weight:700;color:var(--gold);margin:12px 0 4px;">$1</div>');
  // **bold**
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--gold);">$1</strong>');
  // *italic*
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // 빈 줄 → 단락 구분
  text = text.replace(/\n{2,}/g, '</p><p>');
  // 단일 줄바꿈
  text = text.replace(/\n/g, '<br>');
  return '<p>' + text + '</p>';
}

// ── 전체 데이터 일괄 로드 ──
async function loadAllData(withZiwei, withAstro) {
  const p = _profile;
  const gender = p.gender === 'F' ? 'female' : 'male';
  const hour = (p.hour != null && p.hour !== 'unknown') ? parseInt(p.hour) : 12;
  const minute = parseInt(p.minute) || 0;
  const birthISO = `${p.year}-${String(p.month).padStart(2,'0')}-${String(p.day).padStart(2,'0')}T${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}:00`;
  const now = new Date();
  const loadCtrl = new AbortController();
  const loadTid = setTimeout(() => loadCtrl.abort(), 20000);
  const promises = [
    fetch(`${WORKER_BASE}/saju-test`, {signal:loadCtrl.signal,method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({birth:birthISO,gender,calendar:'solar'})}),
    fetch(`${WORKER_BASE}/saju-report?year=${p.year}&month=${p.month}&day=${p.day}&hour=${hour}&minute=${minute}&gender=${gender}&current_year=${now.getFullYear()}&current_month=${now.getMonth()+1}&current_day=${now.getDate()}`, {signal:loadCtrl.signal}),
    fetch(`${WORKER_BASE}/vedic?year=${p.year}&month=${p.month}&day=${p.day}&hour=${hour}&tz=9`, {signal:loadCtrl.signal})
  ];
  if (withZiwei) promises.push(fetch(`${WORKER_BASE}/ziwei?year=${p.year}&month=${p.month}&day=${p.day}&hour=${hour}&gender=${gender}`, {signal:loadCtrl.signal}));
  if (withAstro)  promises.push(fetch(`${WORKER_BASE}/astro?year=${p.year}&month=${p.month}&day=${p.day}&hour=${hour}&lat=37.5&lng=127.0`, {signal:loadCtrl.signal}));
  const results = await Promise.allSettled(promises);
  clearTimeout(loadTid);
  try { if (results[0].status==='fulfilled'&&results[0].value.ok) _sdFull = await results[0].value.json(); } catch(e){}
  try {
    if (results[1].status==='fulfilled'&&results[1].value.ok) {
      _rptFull = await results[1].value.json();
      _sajuData = _rptFull;
      _ilju = _rptFull['일주']||null; _singang = _rptFull['신강약']||null;
      _yongsin = _rptFull['용신']||null; _ohaeng = _rptFull['오행비율']||null;
      _geokguk = _rptFull['오행패턴'] ? (_rptFull['오행패턴'].type||null) : null;
      if (Array.isArray(_rptFull['대운분석'])) {
        _daeunList = _rptFull['대운분석'];
        const cur = _daeunList.find(d => { const r=(d.year_range||'').split(/[–\-]/); return new Date().getFullYear()>=parseInt(r[0])&&new Date().getFullYear()<=parseInt(r[1]); }) || _daeunList[0];
        _daeun = cur ? `${cur.ganjee||''}(${cur.year_range||''})` : null;
      }
      if (_rptFull['리포트']?.['올해운세']) { _sewunFull=_rptFull['리포트']['올해운세']; _sewun=_sewunFull['년도']||null; }
      _personality_db = _rptFull?.['리포트']?.['기본']?.['성격']||null;
    }
  } catch(e){}
  try {
    if (results[2].status==='fulfilled'&&results[2].value.ok) {
      const vd = await results[2].value.json();
      _vedicData = { nakshatra:vd.nakshatra||null, rashi:vd.moonSign||null, ascendant:vd.ascendant||null,
        dasha:vd.currentDasha?`${vd.currentDasha.planet||''} (${vd.currentDasha.end?new Date(vd.currentDasha.end).getFullYear()+'년까지':''})`:null,
        antardasha:vd.antardasha?(vd.antardasha.planet||null):null, planets:vd.planets||null };
    }
  } catch(e){}
  const zIdx = withZiwei ? 3 : -1;
  const aIdx = withAstro ? (withZiwei ? 4 : 3) : -1;
  try { if (zIdx>=0&&results[zIdx]?.status==='fulfilled'&&results[zIdx].value.ok) _ziweiData=await results[zIdx].value.json(); } catch(e){}
  try { if (aIdx>=0&&results[aIdx]?.status==='fulfilled'&&results[aIdx].value.ok) _astroData=await results[aIdx].value.json(); } catch(e){}
}

// ── 생성 시작 (소개 화면 → 실제 흐름) ──
async function startGeneration() {
  showState('loading');
  setLoading('사주 정보 불러오는 중...', '');

  // 사주+베딕 병렬 조회 (이미 init에서 로드됐으면 skip)
  if (!_sdFull && !_rptFull) {
    const withZiwei = (_type === 'daeun' || _type === 'year');
    const withAstro  = (_type === 'love');
    await loadAllData(withZiwei, withAstro);
  }

  setLoading('기존 리포트 확인 중...', '');
  const existing = await fetchExistingReport();
  if (existing) {
    renderReport(existing.content, existing.created_at);
    return;
  }

  setLoading('Orb 잔액 확인 중...', '');
  const balance = await fetchOrbBalance();
  if (balance < _config.orb) {
    document.getElementById('orbModalSub').textContent =
      `이 리포트에는 ${_config.orb.toLocaleString()} Orb가 필요해요.\n현재 잔액: ${balance.toLocaleString()} Orb`;
    document.getElementById('orbModal').classList.add('open');
    document.getElementById('stateLoading').style.display = 'none';
    return;
  }

  await generateReport();
}

// ── 기존 리포트 조회 ──
function getProfileKey() {
  const p = _profile;
  if (!p) return '';
  return `${p.year}-${p.month}-${p.day}-${p.hour || 0}-${p.gender}`;
}

async function fetchExistingReport() {
  try {
    const sb = getSb();
    const { data } = await sb.from('reports')
      .select('*')
      .eq('user_id', _user.id)
      .eq('report_type', _type)
      .order('created_at', { ascending: false })
      .limit(1)
      .maybeSingle();
    if (!data) return null;
    // month 타입은 이번 달 생성분만 유효
    if (_type === 'month') {
      const reportDate = data.created_at ? new Date(data.created_at) : null;
      if (reportDate) {
        const now2 = new Date();
        if (reportDate.getFullYear() !== now2.getFullYear() || reportDate.getMonth() !== now2.getMonth()) return null;
      }
    }
    // 프로필 키 불일치 시 무효 처리 (다른 프로필로 생성된 캐시 방지)
    const sectionCount = (TYPE_SECTIONS[_type] || TYPE_SECTIONS.character).length;
    const storedKey = Array.isArray(data.content) ? data.content[sectionCount] : null;
    if (!storedKey || storedKey !== getProfileKey()) return null;
    return data;
  } catch(e) { return null; }
}

// ── Orb 잔액 조회 ──
async function fetchOrbBalance() {
  try {
    const sb = getSb();
    const { data } = await sb.from('orb_balance')
      .select('balance')
      .eq('user_id', _user.id)
      .maybeSingle();
    return (data && data.balance != null) ? data.balance : 0;
  } catch(e) { return 0; }
}

// ── 리포트 생성 (타입별 분기) ──
async function generateReport() {
  if (_type === 'money')  { await generateMoneyReport();  return; }
  if (_type === 'love')   { await generateLoveReport();   return; }
  if (_type === 'daeun')  { await generateDaeunReport();  return; }
  if (_type === 'year')   { await generateYearReport();   return; }
  if (_type === 'month')  { await generateMonthReport();  return; }
  // fallback
  showState('report');
  document.getElementById('reportTitle').textContent = _config.title;
  document.getElementById('reportMeta').textContent = '지원되지 않는 타입입니다.';
}

// ── 기존 리포트 렌더 ──
function renderReport(sections, createdAt) {
  showState('report');
  document.getElementById('reportTitle').textContent = _config.title;
  document.getElementById('reportBadge').textContent = _config.emoji + ' AI REPORT';
  document.getElementById('reportMeta').textContent = `생성일: ${createdAt ? new Date(createdAt).toLocaleDateString('ko-KR') : ''}`;

  const wrap = document.getElementById('sectionsWrap');
  wrap.innerHTML = '';
  const _sectionCount = (TYPE_SECTIONS[_type] || TYPE_SECTIONS.character).length;
  sections.slice(0, _sectionCount).forEach((text, i) => {
    const card = document.createElement('div');
    card.className = 'section-card';
    card.style.animationDelay = (i * 0.08) + 's';
    card.innerHTML = `
      <div class="section-header">
        <div class="section-num">${i+1}</div>
        <div class="section-name">${(TYPE_SECTIONS[_type] || TYPE_SECTIONS.character)[i]?.name || ''}</div>
      </div>
      <div class="section-body">${renderMarkdown(text)}</div>`;
    wrap.appendChild(card);
  });

  document.getElementById('regenNote').textContent = `다시 생성 시 ${_config.orb.toLocaleString()} Orb 추가 차감`;
  document.getElementById('reportActions').style.display = 'flex';
}

// ── 다시 생성 ──
async function regenReport() {
  if (!confirm(`다시 생성하면 ${_config.orb.toLocaleString()} Orb가 추가 차감됩니다.\n계속하시겠어요?`)) return;
  try {
    const sb = getSb();
    await sb.from('reports').delete().eq('user_id', _user.id).eq('report_type', _type);
  } catch(e) {}

  showState('loading');
  setLoading('Orb 잔액 확인 중...', '');
  const balance = await fetchOrbBalance();
  if (balance < _config.orb) {
    document.getElementById('orbModalSub').textContent =
      `이 리포트에는 ${_config.orb.toLocaleString()} Orb가 필요해요.\n현재 잔액: ${balance.toLocaleString()} Orb`;
    document.getElementById('orbModal').classList.add('open');
    document.getElementById('stateLoading').style.display = 'none';
    return;
  }
  await generateReport();
}

// ── 성향 선택 ──
function selectPersonality(btn) {
  const q = btn.getAttribute('data-q');
  document.querySelectorAll(`.pers-btn[data-q="${q}"]`).forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const keyMap = { '1': 'social', '2': 'planning', '3': 'decision', '4': 'stress' };
  _personality[keyMap[q]] = btn.getAttribute('data-v');
  const allAnswered = ['social','planning','decision','stress'].every(k => _personality[k]);
  document.getElementById('btnStartAnalysis').disabled = !allAnswered;
}

// ── character 생성 시작 (Orb 확인 후 generateCharacterReport) ──
async function startCharacterGeneration() {
  showState('loading');
  setLoading('사주 정보 불러오는 중...', '');
  if (!_sdFull && !_rptFull) await loadAllData(false, false);

  setLoading('기존 리포트 확인 중...', '');
  const existing = await fetchExistingReport();
  if (existing) { renderReport(existing.content, existing.created_at); return; }

  setLoading('Orb 잔액 확인 중...', '');
  const balance = await fetchOrbBalance();
  if (balance < _config.orb) {
    document.getElementById('orbModalSub').textContent =

    document.getElementById('orbModal').classList.add('open');
    document.getElementById('stateLoading').style.display = 'none';
    return;
  }
  await generateCharacterReport();
}

// ── 응답을 섹션 배열에 나눠 표시 ──
async function streamToSections(prompt, secIndices, theoryName, ysFinal, wg, isFirst) {
  const controller = new AbortController();
  const tid = setTimeout(() => controller.abort(), 65000);
  try {
    const sysPrompt = `당신은 ${theoryName || '억부지전'} 기반 사주 분석가입니다.
절대 규칙:
- #헤더 금지, 표 금지
- **볼드**는 핵심 단어에만 3~5개
- 톤: 따뜻하고 정확한 친구 같은 전문가
- 없는 오행을 "있다"고 쓰면 안 됨
- 용신(${ysFinal || ''})을 기신/불리로 쓰면 안 됨
- 요청한 섹션 구성대로 번호를 붙여 작성${wg || ''}`;

    const res = await fetch(CHAT_API, {
      signal: controller.signal,
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        user_id: _user.id,
        messages: [{role: 'user', content: prompt}],
        system_prompt: sysPrompt,
        mode: 'saju', max_tokens: 2000,
        skip_orb: true
      })
    });
    clearTimeout(tid);
    if (!res.ok) throw new Error('API 오류');
    const data = await res.json();
    const text = (data.reply || '').trim();

    // 번호 기준 분할 시도
    const parts = splitIntoSections(text, secIndices.length);
    secIndices.forEach((secIdx, i) => {
      document.getElementById(`sloading-${secIdx}`).style.display = 'none';
      const body = document.getElementById(`sbody-${secIdx}`);
      body.innerHTML = renderMarkdown(parts[i] || (i === 0 ? text : ''));
      body.style.display = 'block';
    });
  } catch(e) {
    clearTimeout(tid);
    secIndices.forEach(i => {
      const el = document.getElementById(`sloading-${i}`);
      if (el) el.innerHTML = `<span style="color:#e05c6a;">${e.name === 'AbortError' ? '시간 초과 — 다시 시도해주세요' : '생성 실패'}</span>`;
    });
  }
}

function splitIntoSections(text, count) {
  // "1." "2." 등 번호 기준 분할
  const regex = /(?:^|\n)\s*\d+\.\s+/g;
  const matches = [...text.matchAll(regex)];
  if (matches.length >= count) {
    return Array.from({length: count}, (_, i) => {
      const start = matches[i].index + matches[i][0].length;
      const end = i + 1 < matches.length ? matches[i+1].index : text.length;
      return text.slice(start, end).trim();
    });
  }
  // ① ② ③ 기준 분할 시도
  const regex2 = /(?:^|\n)\s*[①②③④⑤]\s*/g;
  const matches2 = [...text.matchAll(regex2)];
  if (matches2.length >= count) {
    return Array.from({length: count}, (_, i) => {
      const start = matches2[i].index + matches2[i][0].length;
      const end = i + 1 < matches2.length ? matches2[i+1].index : text.length;
      return text.slice(start, end).trim();
    });
  }
  // 분할 실패 시 전체를 첫 섹션에, 나머지 빈 문자열
  return [text, ...Array(count - 1).fill('')];
}

// ── 공유 ──
function shareReport() {
  const url = location.href;
  if (navigator.share) {
    navigator.share({ title: _config.title, text: `AI가 분석한 나의 ${_config.title}`, url });
  } else {
    navigator.clipboard && navigator.clipboard.writeText(url)
      .then(() => alert('링크가 복사됐어요!'));
  }
}
