<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>리포트 — PICOLAB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0a0614;
  --surface: #110d1e;
  --surface2: #1a142b;
  --border: rgba(255,255,255,0.07);
  --text: #f0f0f5;
  --muted: #6b6b85;
  --gold: #d4af37;
  --golddim: rgba(201,168,76,0.3);
  --accent: #7b5ea7;
  --orb: #7ac4ff;
  --fn: 'Noto Sans KR', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--fn); min-height: 100vh; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 14px 20px;
  background: rgba(10,6,20,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
}
.nav-back { color: var(--muted); font-size: 20px; text-decoration: none; line-height: 1; cursor: pointer; }
.nav-title { font-family: 'Noto Serif KR', serif; font-size: 15px; font-weight: 700; color: var(--gold); }

.wrap { max-width: 600px; margin: 0 auto; padding: 72px 16px 80px; }

/* ── 로딩 상태 ── */
#stateLoading { display: flex; flex-direction: column; align-items: center; padding: 60px 0; gap: 20px; }
.star-loader { position: relative; width: 60px; height: 60px; }
.star-loader::before {
  content: '✦';
  font-size: 32px; color: var(--gold);
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 0.3; transform: translate(-50%,-50%) scale(0.8); }
  50% { opacity: 1; transform: translate(-50%,-50%) scale(1.15); }
}
.loading-label { font-size: 14px; color: var(--muted); text-align: center; line-height: 1.7; }
.loading-label strong { color: var(--gold); display: block; margin-bottom: 4px; }

/* ── 상품 소개 화면 ── */
#stateIntro { display: none; }
.intro-header { text-align: center; padding: 32px 0 24px; }
.intro-emoji { font-size: 48px; margin-bottom: 12px; }
.intro-title { font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 700; margin-bottom: 10px; }
.intro-desc { font-size: 13px; color: var(--muted); line-height: 1.7; }

.intro-section-list {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
}
.intro-section-label {
  font-size: 11px; font-weight: 700; color: var(--gold);
  letter-spacing: 0.08em; margin-bottom: 14px;
}
.intro-section-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.intro-section-item:last-child { border-bottom: none; }
.intro-section-num {
  width: 20px; height: 20px; border-radius: 50%;
  background: rgba(201,168,76,0.1);
  border: 1px solid var(--golddim);
  font-size: 10px; font-weight: 700; color: var(--gold);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  margin-top: 1px;
}
.intro-section-text { flex: 1; }
.intro-section-name { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 3px; }
.intro-section-desc { font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.5; }
.intro-section-detail { font-size: 11px; color: rgba(255,255,255,0.32); line-height: 1.55; margin-top: 4px; }

.intro-keyq { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 16px; margin-bottom: 16px; }
.intro-keyq-label { font-size: 11px; font-weight: 700; color: var(--gold); letter-spacing: 0.08em; margin-bottom: 12px; }
.intro-keyq-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 13px; color: rgba(240,240,245,0.82); line-height: 1.5;
}
.intro-keyq-item:last-child { border-bottom: none; }
.intro-keyq-dot { color: var(--gold); flex-shrink: 0; font-size: 9px; margin-top: 5px; }

.intro-full-desc {
  font-size: 14px; color: rgba(255,255,255,0.7);
  line-height: 1.7; margin: 8px 0 20px; text-align: center;
}
.intro-recommend {
  background: rgba(212,175,55,0.07); border: 1px solid rgba(212,175,55,0.2);
  border-radius: 12px; padding: 16px; margin: 0 0 20px;
}
.intro-recommend-label { font-size: 12px; color: #d4af37; margin-bottom: 12px; font-weight: 600; }
.intro-recommend-item {
  font-size: 13px; color: rgba(255,255,255,0.85);
  padding: 4px 0; display: flex; align-items: flex-start; gap: 8px;
}
.intro-check { color: #d4af37; font-weight: 700; flex-shrink: 0; }

.intro-preview-box {
  margin: 0 0 20px;
  border: 1px solid rgba(212,175,55,0.2); border-radius: 12px; overflow: hidden;
}
.intro-preview-label { font-size: 12px; color: #d4af37; padding: 12px 16px 8px; font-weight: 600; }
.intro-preview-inner { position: relative; max-height: 100px; overflow: hidden; }
.intro-preview-text {
  font-size: 13px; color: rgba(255,255,255,0.7);
  line-height: 1.7; padding: 0 16px 16px;
}
.intro-preview-fade {
  position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
  background: linear-gradient(transparent, #0d0d1a);
}
.intro-preview-lock {
  font-size: 11px; color: #d4af37; text-align: center;
  padding: 10px 16px 14px; opacity: 0.8;
}

.intro-faq { margin: 0 0 16px; }
.intro-faq-label { font-size: 12px; color: #d4af37; margin-bottom: 10px; font-weight: 600; }
.intro-faq-item { border-bottom: 1px solid rgba(255,255,255,0.06); }
.intro-faq-q {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; color: rgba(255,255,255,0.85);
  padding: 12px 0; cursor: pointer;
}
.intro-faq-arrow { color: #d4af37; font-size: 18px; transition: transform 0.2s; }
.intro-faq-item.open .intro-faq-arrow { transform: rotate(90deg); }
.intro-faq-a {
  font-size: 12px; color: rgba(255,255,255,0.55);
  line-height: 1.6; max-height: 0; overflow: hidden;
  transition: max-height 0.25s ease, padding 0.25s ease; padding: 0;
}
.intro-faq-item.open .intro-faq-a { max-height: 200px; padding-bottom: 12px; }

.intro-orb-box {
  background: rgba(122,196,255,0.06);
  border: 1px solid rgba(122,196,255,0.25);
  border-radius: 14px;
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.intro-orb-label { font-size: 12px; color: var(--muted); }
.intro-orb-cost { font-size: 18px; font-weight: 800; color: var(--orb); }

.btn-intro-gen {
  display: block; width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #7b5ea7, #a07fd4);
  border: none; border-radius: 14px;
  color: #fff; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: var(--fn);
  margin-bottom: 10px;
}
.btn-intro-back {
  display: block; width: 100%;
  padding: 13px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px;
  color: var(--muted); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: var(--fn);
}

/* ── 섹션 카드 ── */
.report-header { text-align: center; margin-bottom: 28px; padding: 28px 0 0; }
.report-badge {
  display: inline-block;
  background: rgba(201,168,76,0.1);
  border: 1px solid var(--golddim);
  color: var(--gold);
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  padding: 4px 12px; border-radius: 20px; margin-bottom: 12px;
}
.report-title { font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.report-meta { font-size: 12px; color: var(--muted); }

.section-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  margin-bottom: 14px;
  overflow: hidden;
  animation: fadeUp 0.5s ease forwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.section-header {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 18px 0;
}
.section-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(201,168,76,0.12);
  border: 1px solid var(--golddim);
  font-size: 11px; font-weight: 700; color: var(--gold);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.section-name { font-size: 13px; font-weight: 700; color: var(--text); }
.section-body {
  padding: 12px 18px 18px;
  font-size: 14px; line-height: 1.85; color: rgba(240,240,245,0.88);
}
.section-body h1,.section-body h2,.section-body h3 {
  font-family: 'Noto Serif KR', serif; margin: 12px 0 6px; color: var(--text);
}
.section-body strong { color: var(--gold); }
.section-body p { margin-bottom: 8px; }
.section-body ul,.section-body ol { padding-left: 20px; margin-bottom: 8px; }
.section-body li { margin-bottom: 4px; }
.section-loading {
  padding: 20px 18px;
  display: flex; align-items: center; gap: 10px;
  color: var(--muted); font-size: 13px;
}
.dot-spin {
  width: 16px; height: 16px; border: 2px solid rgba(201,168,76,0.2);
  border-top-color: var(--gold); border-radius: 50%;
  animation: spin 0.8s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 에러/충전 모달 ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 500;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: var(--surface2);
  border-radius: 24px 24px 0 0;
  padding: 28px 24px 48px;
  width: 100%; max-width: 480px;
  text-align: center;
}
.modal-icon { font-size: 40px; margin-bottom: 12px; }
.modal-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
.modal-sub { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }
.modal-btn {
  display: block; width: 100%; padding: 14px;
  border: none; border-radius: 12px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: var(--fn); margin-bottom: 10px;
}
.modal-btn-primary { background: linear-gradient(135deg,#7b5ea7,#a07fd4); color: #fff; }
.modal-btn-cancel { background: var(--surface); color: var(--muted); font-size: 13px; }

/* ── 하단 액션 ── */
.report-actions {
  display: flex; flex-direction: column; gap: 10px;
  margin-top: 20px; padding-bottom: 20px;
}
.btn-action {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px; border-radius: 14px;
  font-size: 14px; font-weight: 700; cursor: pointer;
  border: none; font-family: var(--fn);
}
.btn-regen {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
}
.btn-share {
  background: rgba(201,168,76,0.1);
  border: 1px solid var(--golddim);
  color: var(--gold);
}
.orb-note {
  font-size: 11px; color: var(--muted); text-align: center; margin-top: 6px;
}

/* ── detailIntro ── */
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
#stateDetail { animation: fadeIn 0.2s ease; }
.detail-back {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--muted); cursor: pointer;
  background: none; border: none; font-family: var(--fn);
  padding: 0; margin-bottom: 20px;
}
.detail-back:hover { color: var(--gold); }
.detail-hero {
  text-align: center; margin-bottom: 24px;
}
.detail-icon { font-size: 40px; margin-bottom: 10px; }
.detail-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(201,168,76,0.1); border: 1px solid var(--golddim);
  color: var(--gold); font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
}
.detail-title { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.detail-subtitle { font-size: 13px; color: var(--muted); }
.detail-desc {
  font-size: 13px; color: rgba(240,240,245,0.8); line-height: 1.8;
  margin-bottom: 20px;
}
.detail-what {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px 16px; margin-bottom: 16px;
}
.detail-what-label {
  font-size: 11px; font-weight: 700; color: var(--gold);
  letter-spacing: 0.08em; margin-bottom: 12px;
}
.detail-what-item {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 13px; color: rgba(240,240,245,0.85);
  padding: 5px 0; border-bottom: 1px solid var(--border);
}
.detail-what-item:last-child { border-bottom: none; }
.detail-what-check { color: var(--gold); font-size: 12px; flex-shrink: 0; margin-top: 2px; }
.detail-preview-wrap {
  position: relative; margin-bottom: 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
}
.detail-preview-label {
  font-size: 11px; font-weight: 700; color: var(--gold);
  letter-spacing: 0.08em; padding: 14px 16px 8px;
}
.detail-preview-text {
  font-size: 13px; color: rgba(240,240,245,0.75); line-height: 1.85;
  padding: 0 16px 60px;
}
.detail-preview-fade {
  position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
  background: linear-gradient(to bottom, transparent, var(--surface));
  display: flex; align-items: flex-end; justify-content: center;
  padding-bottom: 12px;
}
.detail-preview-lock { font-size: 11px; color: var(--muted); }
.detail-orb-box {
  background: rgba(122,196,255,0.06); border: 1px solid rgba(122,196,255,0.25);
  border-radius: 14px; padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.detail-orb-info { font-size: 12px; color: var(--muted); }
.detail-orb-info strong { color: var(--orb); font-size: 16px; font-weight: 800; display: block; }
.detail-balance { font-size: 11px; color: var(--muted); margin-top: 2px; }
.detail-save-note { font-size: 11px; color: var(--muted); text-align: center; margin-bottom: 16px; }

/* ── 성향 체크 화면 ── */
#statePersonality { display: none; padding: 20px; max-width: 480px; margin: 0 auto; }
.pers-title { font-size: 18px; font-weight: 600; color: var(--gold); text-align: center; margin-bottom: 6px; }
.pers-subtitle { font-size: 13px; color: rgba(255,255,255,0.6); text-align: center; margin-bottom: 28px; }
.pers-q { margin-bottom: 20px; }
.pers-q-text { font-size: 14px; color: rgba(255,255,255,0.85); margin-bottom: 10px; font-weight: 500; }
.pers-btn {
  display: block; width: 100%; padding: 12px 16px; margin-bottom: 8px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.2);
  border-radius: 10px; color: rgba(255,255,255,0.8); font-size: 14px;
  cursor: pointer; text-align: left; transition: all 0.15s; font-family: var(--fn);
}
.pers-btn.selected { background: rgba(212,175,55,0.15); border-color: var(--gold); color: var(--gold); }
#btnStartAnalysis {
  width: 100%; padding: 16px; margin-top: 12px;
  background: var(--gold); color: #0a0a1a;
  border: none; border-radius: 12px; font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: var(--fn);
}
#btnStartAnalysis:disabled { opacity: 0.3; cursor: not-allowed; }
.pers-back {
  display: block; width: 100%; padding: 13px; margin-top: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; color: var(--muted); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: var(--fn);
}
</style>
</head>
<body>

<nav>
  <a onclick="history.back()" class="nav-back">←</a>
  <div class="nav-title" id="navTitle">리포트</div>
</nav>

<div class="wrap">

  <!-- 로딩 -->
  <div id="stateLoading">
    <div class="star-loader"></div>
    <div class="loading-label"><strong id="loadingTitle">준비 중...</strong><span id="loadingDesc">잠시만 기다려 주세요</span></div>
  </div>

  <!-- 상품 소개 -->
  <div id="stateIntro">
    <div class="intro-header">
      <div class="intro-emoji" id="introEmoji"></div>
      <div class="intro-title" id="introTitle"></div>
      <div class="intro-desc" id="introDesc"></div>
    </div>
    <div class="intro-section-list">
      <div class="intro-section-label">포함 내용</div>
      <div id="introSections"></div>
    </div>
    <div class="intro-orb-box">
      <div class="intro-orb-label">리포트 비용</div>
      <div class="intro-orb-cost" id="introOrbCost"></div>
    </div>
    <button class="btn-intro-gen" id="btnGenerate">✦ 리포트 생성하기</button>
    <button class="btn-intro-back" onclick="history.back()">돌아가기</button>
  </div>

  <!-- 성향 체크 -->
  <div id="statePersonality">
    <div class="pers-title">조금 더 정확한 분석을 위해</div>
    <div class="pers-subtitle">4가지만 답해주세요</div>
    <div class="pers-q">
      <div class="pers-q-text">모임에 가면?</div>
      <button class="pers-btn" data-q="1" data-v="extrovert" onclick="selectPersonality(this)">먼저 말을 거는 편</button>
      <button class="pers-btn" data-q="1" data-v="introvert" onclick="selectPersonality(this)">말 걸어주길 기다림</button>
    </div>
    <div class="pers-q">
      <div class="pers-q-text">새로운 일을 시작할 때?</div>
      <button class="pers-btn" data-q="2" data-v="planner" onclick="selectPersonality(this)">계획 먼저 세움</button>
      <button class="pers-btn" data-q="2" data-v="spontaneous" onclick="selectPersonality(this)">일단 시작하고 봄</button>
    </div>
    <div class="pers-q">
      <div class="pers-q-text">결정을 내릴 때?</div>
      <button class="pers-btn" data-q="3" data-v="logical" onclick="selectPersonality(this)">논리적으로 따짐</button>
      <button class="pers-btn" data-q="3" data-v="intuitive" onclick="selectPersonality(this)">느낌/직감을 따름</button>
    </div>
    <div class="pers-q">
      <div class="pers-q-text">스트레스를 받으면?</div>
      <button class="pers-btn" data-q="4" data-v="social" onclick="selectPersonality(this)">사람 만나서 풀림</button>
      <button class="pers-btn" data-q="4" data-v="solitary" onclick="selectPersonality(this)">혼자만의 시간 필요</button>
    </div>
    <button id="btnStartAnalysis" disabled onclick="startCharacterGeneration()">분석 시작하기</button>
    <button class="pers-back" onclick="showState('intro')">돌아가기</button>
  </div>

  <!-- 섹션 상세 소개 -->
  <div id="stateDetail" style="display:none;">
    <button class="detail-back" onclick="hideDetail()">← 목록으로</button>
    <div class="detail-hero">
      <div class="detail-icon" id="detailIcon"></div>
      <div class="detail-badge"><span id="detailNum"></span></div>
      <div class="detail-title" id="detailTitle"></div>
      <div class="detail-subtitle" id="detailSubtitle"></div>
    </div>
    <p class="detail-desc" id="detailDesc"></p>
    <div class="detail-what">
      <div class="detail-what-label">이런 내용이 담겨있어요</div>
      <div id="detailWhatList"></div>
    </div>
    <div class="detail-preview-wrap">
      <div class="detail-preview-label">미리보기</div>
      <div class="detail-preview-text" id="detailPreview"></div>
      <div class="detail-preview-fade">
        <span class="detail-preview-lock">🔒 전체 내용은 리포트 생성 후 확인 가능합니다</span>
      </div>
    </div>
    <div class="detail-orb-box">
      <div class="detail-orb-info">
        리포트 비용
        <strong id="detailOrbCost"></strong>
      </div>
      <div class="detail-balance" id="detailBalance"></div>

function renderMarkdown(text) {
  // # 헤더 → 굵은 금색 텍스트
  text = text.replace(/^#{1,3}\s+(.+)$/gm,
    '<div style="font-size:14px;font-weight:700;color:var(--gold);margin:12px 0 4px;">$1</div>');
  // **bold**
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--gold);">$1</strong>');
  // *italic*
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // 빈 줄 → 단락 구분
  text = text.replace(/\n{2,}/g, '</p><p>');
  // 단일 줄바꿈
  text = text.replace(/\n/g, '<br>');
  return '<p>' + text + '</p>';
}

async function loadSajuData() {
  try {
    const p = _profile;
    const gender = p.gender === 'F' ? 'female' : 'male';
    const hour = (p.hour != null && p.hour !== 'unknown') ? p.hour : 12;
    const minute = p.minute || 0;
    const now = new Date();
    const url = `${WORKER_BASE}/saju-report?year=${p.year}&month=${p.month}&day=${p.day}&hour=${hour}&minute=${minute}&gender=${gender}&current_year=${now.getFullYear()}&current_month=${now.getMonth()+1}&current_day=${now.getDate()}`;
    const res = await fetch(url);
    if (!res.ok) return;
    const data = await res.json();
    console.log('[loadSajuData] API 응답:', data);
    _sajuData = data;
    _ilju     = data['일주'] || null;
    _singang  = data['신강약'] || null;
    _yongsin  = data['용신'] || null;
    _ohaeng   = data['오행비율'] || null;
    _geokguk  = data['오행패턴'] ? (data['오행패턴'].type || null) : null;
    // 대운 정보 (대운분석 배열에서 현재 대운 추출)
    if (data['대운분석'] && Array.isArray(data['대운분석'])) {
      const now2 = new Date();
      const cur = data['대운분석'].find(d => {
        const range = (d.year_range || '').split(/[–\-]/);
        return now2.getFullYear() >= parseInt(range[0]) && now2.getFullYear() <= parseInt(range[1]);
      }) || data['대운분석'][0];
      _daeun = cur ? `${cur.ganjee || ''}(${cur.year_range || ''})` : null;
    }
    // 세운: 올해운세 필드
    if (data['리포트'] && data['리포트']['올해운세']) {
      _sewun = data['리포트']['올해운세']['년도'] || null;
    }
    // 팔자 (사주원국 pillars)
    _palju = null; // saju-report는 pillars를 직접 반환하지 않으므로 일주로 대체
  } catch(e) { /* API 실패 시 null 유지 */ }
}

async function loadExtraData(withZiwei, withAstro) {
  const p = _profile;
  const gender = p.gender === 'F' ? 'female' : 'male';
  const hour = (p.hour != null && p.hour !== 'unknown') ? parseInt(p.hour) : 12;
  const promises = [];
  const flags = [];
  if (withZiwei) { promises.push(fetch(`${WORKER_BASE}/ziwei?year=${p.year}&month=${p.month}&day=${p.day}&hour=${hour}&gender=${gender}`)); flags.push('ziwei'); }
  if (withAstro)  { promises.push(fetch(`${WORKER_BASE}/astro?year=${p.year}&month=${p.month}&day=${p.day}&hour=${hour}&lat=37.5&lng=127.0`)); flags.push('astro'); }
  const results = await Promise.allSettled(promises);
  for (let i = 0; i < flags.length; i++) {
    try {
      if (results[i].status==='fulfilled' && results[i].value.ok) {
        const data = await results[i].value.json();
        if (flags[i] === 'ziwei') _ziweiData = data;
        if (flags[i] === 'astro') _astroData = data;
      }
    } catch(e) {}
  }
}

  return `\n【백호대살 — ${_baekhoData.해당일주}】\n${_baekhoData.설명}
(백호대살의 강렬한 에너지를 분석 주제에 맞게 자연스럽게 반영할 것)\n`;
}

function buildDaeunTransitionBlock() {
  if (!_daeunTransitionData || !_daeunTransitionData.전환기여부) return '';
  const lines = _daeunTransitionData.전환목록.map(t =>
    `${t.이전대운} → ${t.새대운} (전환시점: ${t.전환시점}년, 현재차이: ${t.현재차이>0?'+':''}${t.현재차이}년)\n${t.설명}`
  );
  return `\n【대운 전환기 감지】\n${lines.join('\n')}
(대운 전환기의 혼란·변동 가능성을 분석에 반드시 반영할 것. 단정적 예언은 금지)\n`;
}

function buildHaphwaBlock() {
  if (!_haphwaData || !_haphwaData.합화검증) return '';
  const items = _haphwaData.합화검증;
  const lines = items.map(h => `[${h.유형}] ${h.관계} → 합화오행:${h.합화오행} / 월지:${h.월지}(${h.월지오행}) → ${h.성립여부 ? '합화 성립' : '합화 미성립'}\n  ${h.설명}`);
  return `\n【합화(合化) 성립 검증】\n${lines.join('\n')}
(합이 있더라도 합화 미성립이면 실질적 변환이 없음을 분석에 반영할 것)\n`;
}

function buildTenGodsDistBlock() {
  if (!_tenGodsDistData) return '';
  const d = _tenGodsDistData;
  let lines = [`균형도: ${d.균형도}`];
  if (d.과다 && d.과다.length) lines.push(...d.과다.map(g => `${g.그룹} 과다(${g.개수}개): ${g.설명}`));
  if (d.결핍 && d.결핍.length) lines.push(...d.결핍.map(g => `${g.그룹} 결핍: ${g.설명}`));
  return `\n【십성 분포 분석】\n${lines.join('\n')}
(십성 편중·결핍 패턴을 분석에 반영할 것. 과다한 십성은 성향의 극단화, 결핍은 보완 필요 영역)\n`;
}

function buildGeokgukValidBlock() {
  if (!_geokgukValidData) return '';
  const d = _geokgukValidData;
  let lines = [`기본격국: ${d.기본격국} → 최종: ${d.최종격국}`];
  if (d.보정사항 && d.보정사항.length) lines.push(...d.보정사항.map(s => '⚠ ' + s));
  return `\n【격국 정밀 검증】\n${lines.join('\n')}
(격국 보정사항이 있으면 기본 격국 대신 최종격국 기준으로 분석할 것)\n`;
}

function buildSewunInterBlock() {
  if (!_sewunInterData || !_sewunInterData.상호작용 || !_sewunInterData.상호작용.length) return '';
  const d = _sewunInterData;
  const lines = d.상호작용.map(i => `[${i.유형}] 세운(${i.세운지지||i.세운천간})↔${i.사주위치}(${i.사주지지||i.사주천간})${i.궁의미?' — 궁:'+i.궁의미:''}`);
  return `\n【${d.세운} 세운 합충형파해】\n${d.요약}\n${lines.join('\n')}
(세운과 사주 간 상호작용을 올해 운세·흐름 분석에 반드시 반영할 것)\n`;
}

function buildJijangganBlock() {
  if (!_jijangganData || !_jijangganData.투출요약 || !_jijangganData.투출요약.length) return '';
  return `\n【지장간 투출 현황】\n${_jijangganData.투출요약.join('\n')}
(투출된 천간은 표면에 드러나 실질적 영향력을 가짐. 투출되지 않은 지장간은 잠재력에 머묾)\n`;
}

function buildRootStrengthBlock() {
  if (!_rootStrengthData || !_rootStrengthData.천간별분석) return '';
  const dayAnalysis = _rootStrengthData.천간별분석.find(s => s.위치 === '일간');
  if (!dayAnalysis) return '';
  const rootLines = dayAnalysis.통근처.length
    ? dayAnalysis.통근처.map(r => `${r.위치}(${r.지지}) ${r.유형} — ${r.관계} 강도${r.강도}`).join(', ')
    : '없음(무근)';
  return `\n【일간 통근·생왕 분석】\n일간: ${dayAnalysis.천간}(${dayAnalysis.오행}) | 통근강도: ${dayAnalysis.통근강도} | ${dayAnalysis.판정} | ${dayAnalysis.생왕여부}
통근처: ${rootLines}
(통근이 강하면 자기 뜻대로 할 힘이 있고, 무근이면 환경에 끌려다닐 수 있음)\n`;
}

function buildYongshinRevalidBlock() {
  if (!_yongshinRevalidData) return '';
  const d = _yongshinRevalidData;
  const lines = d.검증결과 || [];
  const validStr = d.유효 === true ? '억부 원칙 부합' : d.유효 === false ? '⚠ 억부 원칙 불일치 가능' : '검증 불가';
  return `\n【용신 재검증】${d.용신}(${d.용신오행||''}) — ${validStr}\n${lines.join('\n')}
(용신 재검증 결과를 분석의 방향성 설정에 참고할 것)\n`;
}

// Level 4 블록 빌더
function buildJapyeongjinjeonBlock() {
  if (!_japyeongjinjeonData) return '';
  const d = _japyeongjinjeonData;
  let s = `\n【자평진전 격국용신론】\n격국: ${d.격국} (${d.격국근거||''})\n`;
  if (d.특수격여부) s += `특수격: ${d.특수격} — 정격 체계 대신 적천수 적용\n`;
  s += `자평진전 규칙: ${d.자평진전규칙||''}\n격국 상태: ${d.격국상태||''}\n`;
  if (d.상신분석 && d.상신분석.length > 0) {
    s += '상신(相神): ' + d.상신분석.map(function(a){return a.상신+'(사주'+a.사주내개수+'개,'+(a.충족?'충족':'미충족')+')'}).join(', ') + '\n';
  }
  if (d.기신분석 && d.기신분석.length > 0) {
    s += '기신(忌神): ' + d.기신분석.map(function(a){return a.기신+'(사주'+a.사주내개수+'개,'+(a.활성?'활성⚠':'비활성')+')'}).join(', ') + '\n';
  }
  if (d.격국용신) s += `격국용신: ${d.격국용신.격국용신} — ${d.격국용신.근거}\n`;
  s += '(자평진전 격국용신론을 격국 해석과 용신 활용 방향에 반드시 반영할 것)\n';
  return s;
}
function buildCheonsuIlganBlock() {
  if (!_cheonsuIlganData) return '';
  const d = _cheonsuIlganData;
  let s = `\n【적천수 일간론】${d.일간}(${d.일간오행}) × ${d.계절}\n`;
  if (d.적천수원문) s += `원문: ${d.적천수원문}\n`;
  s += `환경: ${d.환경분석||''}\n핵심: ${d.핵심||''}\n주의: ${d.주의사항||''}\n`;
  s += `용신경향: ${d.용신경향||''}\n강약해석: ${d.강약해석||''}\n`;
  s += '(적천수 원문과 일간×계절 분석을 원국 해석의 근거로 활용할 것)\n';
  return s;
}
function buildJohuYongshinBlock() {
  if (!_johuYongshinData) return '';
  const d = _johuYongshinData;
  let s = `\n【궁통보감 조후용신】\n한난: ${d.한난}(${d.한난점수}) / 조습: ${d.조습}(${d.조습점수})\n`;
  s += `조후긴급도: ${d.조후긴급도}/10 — ${d.긴급설명||''}\n`;
  s += `조후용신: ${safeJoin(d.조후용신)} / 억부용신: ${d.억부용신||''}\n`;
  s += `일치여부: ${d.일치여부 ? '✓ 일치(최상)' : '✗ 불일치'}\n`;
  s += `우선순위: ${d.우선순위||''}\n`;
  if (d.월지기후) s += `월지기후: ${d.월지기후}\n`;
  s += '(조후용신 분석을 용신 활용 및 대운 해석에 반영. 긴급도 높으면 조후 우선)\n';

function buildDaeunSplitBlock() {
  if (!_daeunSplitData) return '';
  const d = _daeunSplitData;
  let s = `\n【대운 천간/지지 분리분석】\n현재대운: ${d.현재대운}(${d.대운기간}) ${d.구간}\n`;
  s += `천간: ${d.천간.글자}(${d.천간.오행}/${d.천간.십신}) 영향력${d.천간.영향력}\n`;
  s += `→ ${d.천간.평가}\n`;
  s += `지지: ${d.지지.글자}(${d.지지.오행}/${d.지지.십신}) 영향력${d.지지.영향력}\n`;
  s += `→ ${d.지지.평가}\n`;
  if (d.지지.지장간 && d.지지.지장간.length) {
    s += `지장간: ${d.지지.지장간.map(j => j.천간+'('+j.유형+'/'+j.십신+')').join(', ')}\n`;
  }
  if (d.전환설명) s += `전환: ${d.전환설명}\n`;
  s += `종합: ${d.종합등급}\n`;
  s += '(대운 전반5년은 천간, 후반5년은 지지 위주로 해석. 용신과의 관계를 대운 분석에 반영)\n';
  return s;
}

function buildSewunAdvancedBlock() {
  if (!_sewunAdvancedData) return '';
  const d = _sewunAdvancedData;
  let s = `\n【세운 확장분석 (삼합/방합/삼형)】\n세운: ${d.세운} 천간십신: ${d.세운천간십신}(${d.세운천간오행})\n`;
  if (d.확장상호작용 && d.확장상호작용.length) {
    d.확장상호작용.forEach(i => { s += `• ${i.유형}: ${i.설명}\n`; });
  }
  if (d.대운세운복합) s += `★ ${d.대운세운복합.유형}: ${d.대운세운복합.설명}\n`;
  s += `용신관계: ${d.세운용신관계}\n`;
  s += `종합: ${d.종합평가}\n`;
  s += '(세운의 삼합/방합/삼형은 특정 오행을 크게 강화/약화시키므로 올해 운세 해석에 필수 반영)\n';
  return s;
}

function buildMonthlyJeolgiBlock() {
  if (!_monthlyJeolgiData) return '';
  const d = _monthlyJeolgiData;
  let s = `\n【월운 절기 세분화】\n이달 월건: ${d.현재월건} 절기: ${d.절기}(${d.계절})\n`;
  s += `천간십신: ${d.천간십신} / 지지십신: ${d.지지십신}\n`;
  if (d.지장간 && d.지장간.length) {
    s += `월지 지장간: ${d.지장간.map(j => j.천간+'('+j.유형+'/'+j.십신+')').join(', ')}\n`;
  }
  if (d.월지상호작용 && d.월지상호작용.length) {
    d.월지상호작용.forEach(i => { s += `• ${i.유형}: ${i.설명}\n`; });
  }
  if (d.월간일간합) s += `★ ${d.월간일간합}\n`;
  s += `용신관계: ${d.월운용신관계}\n`;
  s += `요약: ${d.요약}\n`;
  s += '(월운은 실제 절기 경계 기준. 이달 운세/조언에 월건 십신과 합충을 반영)\n';
  return s;
}

function buildAccuracyLayerBlock() {
  return buildSamjaeBlock() + buildTwelveStarsBlock() + buildJeolgiBlock() + buildMoonPhaseBlock()
    + buildWonjinBlock() + buildGwimungwanBlock() + buildBaekhoBlock()
    + buildDaeunTransitionBlock() + buildHaphwaBlock()
    + buildTenGodsDistBlock() + buildGeokgukValidBlock() + buildSewunInterBlock()
    + buildJijangganBlock() + buildRootStrengthBlock() + buildYongshinRevalidBlock()
    + buildJapyeongjinjeonBlock() + buildCheonsuIlganBlock() + buildJohuYongshinBlock()
    + buildDaeunSplitBlock() + buildSewunAdvancedBlock() + buildMonthlyJeolgiBlock();
}

// ── 초기화 ──
(async function init() {
  const params = new URLSearchParams(location.search);
  _type = params.get('type');
  _config = TYPE_CONFIG[_type];
  if (!_config) { setLoading('잘못된 접근', '리포트 타입이 올바르지 않아요'); return; }

  document.getElementById('navTitle').textContent = _config.title;

  // 로그인 확인
  try { _user = JSON.parse(localStorage.getItem('pico_user')); } catch(e) {}
  if (!_user || !_user.id) { location.href = 'index.html'; return; }

  // 프로필 확인
  try { _profile = JSON.parse(localStorage.getItem('pico_profile')); } catch(e) {}
  if (!_profile || !_profile.year) {
    setLoading('프로필 필요', '사주 정보를 먼저 입력해주세요');
    setTimeout(() => location.href = 'index.html', 2000);
    return;
  }

  document.getElementById('btnGenerate').onclick = function() {
    if (_type === 'character') {
      showState('personality');
    } else {
      startGeneration();
    }
  };

  // 사주+베딕+필요한 외부 데이터 선제 로드 (stateIntro 표시하면서 백그라운드)
  const _bgWithZiwei = ['daeun','year','ziwei_full','triple','career_deep'].includes(_type);
  const _bgWithAstro  = ['love','astro_full','triple','career_deep'].includes(_type);
  loadAllData(_bgWithZiwei, _bgWithAstro).catch(() => {});

  renderIntro();
  showState('intro');
})();

function renderIntro() {
  const d = TYPE_DETAIL[_type];
  if (!d) return;

  document.getElementById('introEmoji').textContent = d.emoji;
  document.getElementById('introTitle').textContent = _config.title;
  document.getElementById('introDesc').textContent = d.subtitle;

  // 설명문
  let descEl = document.getElementById('introFullDesc');
  if (!descEl) {
    descEl = document.createElement('div');
    descEl.id = 'introFullDesc';
    descEl.className = 'intro-full-desc';
    document.querySelector('.intro-header').appendChild(descEl);
  }
  descEl.textContent = d.desc;

  // 이런 분께 추천
  let recEl = document.getElementById('introRecommend');
  if (!recEl) {
    recEl = document.createElement('div');
    recEl.id = 'introRecommend';
    recEl.className = 'intro-recommend';
    document.getElementById('stateIntro').insertBefore(
      recEl, document.querySelector('.intro-section-list')
    );
  }
  recEl.innerHTML = `<div class="intro-recommend-label">이런 분께 추천해요</div>` +
    d.recommend.map(r => `<div class="intro-recommend-item"><span class="intro-check">✓</span>${r}</div>`).join('');

  // 핵심 질문 (recommend 앞에 삽입)
  let kqEl = document.getElementById('introKeyQ');
  if (!kqEl) {
    kqEl = document.createElement('div');
    kqEl.id = 'introKeyQ';
    kqEl.className = 'intro-keyq';
    document.getElementById('stateIntro').insertBefore(kqEl, recEl);
  }
  if (d.keyQuestions && d.keyQuestions.length) {
    kqEl.innerHTML = `<div class="intro-keyq-label">이 리포트가 답해드려요</div>` +
      d.keyQuestions.map(q => `<div class="intro-keyq-item"><span class="intro-keyq-dot">▸</span><span>${q}</span></div>`).join('');
  }

  // 분석 엔진 배지 (keyQ 앞에 삽입)
  let engEl = document.getElementById('introEngines');
  if (!engEl) {
    engEl = document.createElement('div');
    engEl.id = 'introEngines';
    engEl.style.cssText = 'display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:18px;';
    document.getElementById('stateIntro').insertBefore(engEl, kqEl);
  }
  if (d.engines && d.engines.length) {
    engEl.innerHTML = '<span style="font-size:11px;color:var(--muted);flex-shrink:0;">분석 엔진</span>' +
      d.engines.map(e => `<span style="font-size:11px;font-weight:700;padding:3px 11px;border-radius:20px;background:rgba(123,94,167,0.14);border:1px solid rgba(123,94,167,0.28);color:#b09fd4;">${e}</span>`).join('');
  }

  // 섹션 목록 (sectionDesc + sectionDetail)
  const secWrap = document.getElementById('introSections');
  secWrap.innerHTML = '';
  const sections = TYPE_SECTIONS[_type] || TYPE_SECTIONS.character;
  sections.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'intro-section-item';
    el.innerHTML = `<div class="intro-section-num">${i+1}</div>
      <div class="intro-section-text">
        <div class="intro-section-name">${s.name}</div>
        <div class="intro-section-desc">${d.sectionDesc[i]}</div>
        ${d.sectionDetail && d.sectionDetail[i] ? `<div class="intro-section-detail">${d.sectionDetail[i]}</div>` : ''}
      </div>`;
    secWrap.appendChild(el);
  });

  // 샘플 미리보기
  let previewEl = document.getElementById('introPreview');
  if (!previewEl) {
    previewEl = document.createElement('div');
    previewEl.id = 'introPreview';
    previewEl.className = 'intro-preview-box';
    const orbBox = document.querySelector('.intro-orb-box');
    orbBox.parentNode.insertBefore(previewEl, orbBox);
  }
  previewEl.innerHTML = `<div class="intro-preview-label">미리보기</div>
    <div class="intro-preview-inner">
      <div class="intro-preview-text">${d.preview}</div>
      <div class="intro-preview-fade"></div>
    </div>
    <div class="intro-preview-lock">✦ 전체 내용은 리포트 생성 후 확인 가능합니다</div>`;

  // Orb 비용
  document.getElementById('introOrbCost').textContent = `${_config.orb.toLocaleString()} Orb`;

  // FAQ
  let faqEl = document.getElementById('introFaq');
  if (!faqEl) {
    faqEl = document.createElement('div');
    faqEl.id = 'introFaq';
    faqEl.className = 'intro-faq';

// ── 기존 리포트 조회 ──
function getProfileKey() {
  const p = _profile;
  if (!p) return '';
  return `${p.year}-${p.month}-${p.day}-${p.hour || 0}-${p.gender}-v${REPORT_VERSION}`;
}

async function fetchExistingReport() {
  try {
    const sb = getSb();
    const { data } = await sb.from('reports')
      .select('*')
      .eq('user_id', _user.id)
      .eq('report_type', _type)
      .order('created_at', { ascending: false })
      .limit(1)
      .maybeSingle();
    if (!data) return null;
    // month 타입은 이번 달 생성분만 유효
    if (_type === 'month') {
      const reportDate = data.created_at ? new Date(data.created_at) : null;
      if (reportDate) {
        const now2 = new Date();
        if (reportDate.getFullYear() !== now2.getFullYear() || reportDate.getMonth() !== now2.getMonth()) return null;
      }
    }
    // 프로필 키 불일치 시 무효 처리 (다른 프로필로 생성된 캐시 방지)
    const sectionCount = (TYPE_SECTIONS[_type] || TYPE_SECTIONS.character).length;
    const storedKey = Array.isArray(data.content) ? data.content[sectionCount] : null;
    if (!storedKey || storedKey !== getProfileKey()) return null;
    return data;
  } catch(e) { return null; }
}

// ── Orb 잔액 조회 ──
async function fetchOrbBalance() {
  try {
    const sb = getSb();
    const { data } = await sb.from('orb_balance')
      .select('balance')
      .eq('user_id', _user.id)
      .maybeSingle();
    return (data && data.balance != null) ? data.balance : 0;
  } catch(e) { return 0; }
}

// orb 부족 체크 (429 포함 모든 응답에서)
async function checkOrbResponse(r0) {
  try {
    const d0 = await r0.json();
    if (d0.error === 'orb_insufficient') {
      document.getElementById('orbModalSub').textContent = `Orb가 부족해요. 현재 잔액: ${(d0.orb_balance||0).toLocaleString()} Orb`;
      document.getElementById('orbModal').classList.add('open');
      return { insufficient: true, data: d0 };
    }
    return { insufficient: false, data: d0 };
  } catch(e) {
    return { insufficient: false, data: null };
  }
}

// ── 신규 리포트 공통: 섹션 카드 생성 + Orb 차감 ──
async function setupSectionsAndDeductOrb() {
  showState('report');
  document.getElementById('reportTitle').textContent = _config.title;
  document.getElementById('reportMeta').textContent = '생성 중...';
  const wrap = document.getElementById('sectionsWrap');
  wrap.innerHTML = '';
  (TYPE_SECTIONS[_type] || []).forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'section-card'; card.id = `section-${i}`;
    card.innerHTML = `<div class="section-header"><div class="section-num">${i+1}</div><div class="section-name">${s.name}</div></div><div class="section-loading" id="sloading-${i}"><div class="dot-spin"></div> 분석 중...</div><div class="section-body" id="sbody-${i}" style="display:none;"></div>`;
    wrap.appendChild(card);
  });
  // Orb 차감 (최소 호출로 deduct)
  try {
    const r0 = await fetch(CHAT_API, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ user_id:_user.id, orb_override:_config.orb,
        system_prompt:'사주 분석 준비 엔진. "READY"만 반환.',
        messages:[{role:'user', content:'준비'}]
      })
    });
    const chk0 = await checkOrbResponse(r0);
    if (chk0.insufficient) return false;
  } catch(e) { console.warn('[deductOrb] 실패:', e); }
  return true;
}

// ── 응답을 섹션 배열에 나눠 표시 ──
async function streamToSections(prompt, secIndices, theoryName, ysFinal, wg, isFirst) {
  const controller = new AbortController();
  const tid = setTimeout(() => controller.abort(), 65000);
  try {
    const sysPrompt = `당신은 ${theoryName || '억부지전'} 기반 사주 분석가입니다.
절대 규칙:
- #헤더 금지, 표 금지
- **볼드**는 핵심 단어에만 3~5개
- 톤: 따뜻하고 정확한 친구 같은 전문가
- 없는 오행을 "있다"고 쓰면 안 됨
- 용신(${ysFinal || ''})을 기신/불리로 쓰면 안 됨
- 요청한 섹션 구성대로 번호를 붙여 작성${wg || ''}`;

    const res = await fetch(CHAT_API, {
      signal: controller.signal,
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        user_id: _user.id,
        messages: [{role: 'user', content: prompt}],
        system_prompt: sysPrompt,
        mode: 'saju', max_tokens: 2000,
        skip_orb: true
      })
    });
    clearTimeout(tid);
    if (!res.ok) throw new Error('API 오류');
    const data = await res.json();
    const text = (data.reply || '').trim();

    // 번호 기준 분할 시도 (기대 섹션 번호 전달)
    const startNum = secIndices[0] + 1; // secIndices[0]=0 → 1번부터, [3] → 4번부터
    const parts = splitIntoSections(text, secIndices.length, startNum);
    secIndices.forEach((secIdx, i) => {
      document.getElementById(`sloading-${secIdx}`).style.display = 'none';
      const body = document.getElementById(`sbody-${secIdx}`);
      body.innerHTML = renderMarkdown(parts[i] || (i === 0 ? text : ''));
      body.style.display = 'block';
    });
  } catch(e) {
    clearTimeout(tid);
    secIndices.forEach(i => {
      const el = document.getElementById(`sloading-${i}`);
      if (el) el.innerHTML = `<span style="color:#e05c6a;">${e.name === 'AbortError' ? '시간 초과 — 다시 시도해주세요' : '생성 실패'}</span>`;
    });
  }
}

function splitIntoSections(text, count, startNum) {
  startNum = startNum || 1;
  // 전략1: 기대하는 섹션 번호(startNum ~ startNum+count-1)만 정확히 매칭
  const positions = [];
  for (let n = startNum; n < startNum + count; n++) {
    // "N." 이 줄 시작에 오는 패턴 (볼드 마크 허용)
    const re = new RegExp('(?:^|\\n)\\s*\\*{0,2}\\s*' + n + '\\.\\s', 'g');
    const ms = [...text.matchAll(re)];
    if (ms.length === 0) { positions.length = 0; break; }
    // 여러 매치가 있으면, 이전 섹션 위치 이후의 첫 매치 사용
    const prevEnd = positions.length > 0 ? positions[positions.length-1].idx + 1 : 0;
    const valid = ms.filter(m => m.index >= prevEnd);
    if (valid.length === 0) { positions.length = 0; break; }
    positions.push({ idx: valid[0].index, len: valid[0][0].length });
  }
  if (positions.length === count) {
    return positions.map((p, i) => {
      const start = p.idx + p.len;
      const end = i + 1 < positions.length ? positions[i+1].idx : text.length;
      return text.slice(start, end).trim();
    });
  }
  // 전략2: 아무 "N." 패턴이든 순서대로 count개 분할
  const regex = /(?:^|\n)\s*\d+\.\s+/g;
  const matches = [...text.matchAll(regex)];
  if (matches.length >= count) {
    return Array.from({length: count}, (_, i) => {
      const start = matches[i].index + matches[i][0].length;
      const end = i + 1 < matches.length ? matches[i+1].index : text.length;
      return text.slice(start, end).trim();
    });
  }
  // 전략3: ① ② ③ 기준
  const regex2 = /(?:^|\n)\s*[①②③④⑤]\s*/g;
  const matches2 = [...text.matchAll(regex2)];
  if (matches2.length >= count) {
    return Array.from({length: count}, (_, i) => {
      const start = matches2[i].index + matches2[i][0].length;
      const end = i + 1 < matches2.length ? matches2[i+1].index : text.length;
      return text.slice(start, end).trim();
    });
  }
  // 전략4: 빈줄 기준으로 단락 분할 시도
  const paragraphs = text.split(/\n{2,}/).filter(p => p.trim());
  if (paragraphs.length >= count) {
    const result = [];
    const perSection = Math.ceil(paragraphs.length / count);
    for (let i = 0; i < count; i++) {
      result.push(paragraphs.slice(i * perSection, (i+1) * perSection).join('\n\n').trim());
    }
    return result;
  }
  // 분할 실패: 전체를 첫 섹션에
  return [text, ...Array(count - 1).fill('')];
}

// ── 공유 ──
function shareReport() {
  const url = location.href;
  if (navigator.share) {
    navigator.share({ title: _config.title, text: `AI가 분석한 나의 ${_config.title}`, url });
  } else {
    navigator.clipboard && navigator.clipboard.writeText(url)
      .then(() => alert('링크가 복사됐어요!'));
  }
}
