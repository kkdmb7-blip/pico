<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f5efe4">
<title>오늘의 운세 점수 · PICO Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4" crossorigin="anonymous"></script>
<style>
:root {
  --bg: #f4ede0;
  --surface: #f9f1de;
  --surface2: #e8dcc0;
  --border: #9a8a60;
  --border-soft: rgba(60,40,20,0.22);
  --accent: #7a2418;
  --accent2: #2a1f1a;
  --text: #1a120a;
  --text2: #4a3a2a;
  --muted: #5a4830;
  --radius: 16px;
  --gold: #8a6a15;
  --gold-deep: #6a4f0c;
  --ink: #241a10;
  --green: #2f7a55;
  --blue: #355f9a;
  --red: #a33838;
  --shadow-soft: 0 1px 3px rgba(60,40,20,0.08), 0 6px 20px rgba(60,40,20,0.07);
  --shadow-lift: 0 3px 8px rgba(60,40,20,0.12), 0 14px 36px rgba(60,40,20,0.14);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif;
  min-height: 100vh;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0; opacity:0.35;
}

/* NAV */
nav {
  position:sticky; top:0; z-index:100;
  background: rgba(252,247,234,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-soft);
  padding: 0 24px; height: 64px;
  display:flex; align-items:center; justify-content:space-between;
}
.logo { display:flex; align-items:center; gap:8px; text-decoration:none; }
.logo img { height:56px; object-fit:contain; }
.logo-text { font-family:'Cinzel','Noto Serif KR',serif; font-weight:600; font-size:16px; letter-spacing:4px; color:var(--gold-deep); }
.nav-back {
  display:flex; align-items:center; gap:6px;
  color:var(--muted); font-size:13px; text-decoration:none;
  background:none; border:1px solid var(--border-soft); border-radius:8px;
  padding:6px 12px; cursor:pointer; font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif;
  transition:all 0.2s;
}
.nav-back:hover { color:var(--ink); border-color:var(--border); }

/* MAIN */
.main-wrap {
  max-width: 720px; margin: 0 auto;
  padding: 40px 20px 80px;
  position:relative; z-index:1;
}

/* HEADER */
.score-header {
  text-align:center; margin-bottom:36px;
}
.score-date {
  font-size:12px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; color:var(--gold-deep); margin-bottom:10px;
}
.score-title {
  font-family:'Pretendard Variable',Pretendard,'Noto Sans KR',sans-serif; font-size:clamp(22px,5vw,34px);
  font-weight:700; margin-bottom:6px; color:var(--ink);
}
.score-subtitle { font-size:13px; color:var(--muted); }

/* OVERALL RING */
.overall-wrap {
  display:flex; flex-direction:column; align-items:center;
  margin-bottom:36px; gap:12px;
}
.overall-ring {
  width:150px; height:150px; position:relative;
}
.overall-ring svg { transform:rotate(-90deg); }
.overall-ring-track { fill:none; stroke:var(--surface2); stroke-width:14; }
.overall-ring-fill  {
  fill:none; stroke-width:14; stroke-linecap:round;
  stroke-dasharray: 408; stroke-dashoffset: 408;
  transition: stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1);
}
.overall-center {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.overall-num {
  font-family:'Pretendard Variable',Pretendard,'Noto Sans KR',sans-serif; font-size:44px; font-weight:700; line-height:1;
  color:var(--gold-deep);
}
.overall-label { font-size:11px; color:var(--muted); margin-top:3px; letter-spacing:0.5px; }
.overall-summary {
  font-size:14px; color:var(--text2); text-align:center;
  line-height:1.65; max-width:480px;
}

/* DOMAIN CARDS */
.domain-grid {
  display:flex; flex-direction:column; gap:14px;
  margin-bottom:36px;
}
.domain-card {
  background:var(--surface);
  border:1px solid var(--border-soft);
  border-radius:18px; padding:22px 24px;
  display:flex; align-items:center; gap:20px;
  transition: border-color 0.3s, box-shadow 0.3s;
  position:relative; overflow:hidden;
  box-shadow: var(--shadow-soft);
}
.domain-card::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at left, rgba(154,122,38,0.08) 0%, transparent 60%);
  opacity:0; transition:opacity 0.3s;
}
.domain-card:hover { border-color:var(--gold); box-shadow: var(--shadow-lift); }
.domain-card:hover::before { opacity:1; }

.domain-emoji { font-size:32px; flex-shrink:0; color: var(--gold-deep); }
.domain-info  { flex:1; min-width:0; }
.domain-name  { font-size:14px; font-weight:600; margin-bottom:8px; color: var(--ink); }
.domain-gauge-wrap {
  position:relative; height:8px;
  background:var(--surface2); border-radius:100px;
  overflow:hidden;
}
.domain-gauge-fill {
  height:100%; border-radius:100px; width:0%;
  transition: width 1.2s cubic-bezier(.4,0,.2,1);
}
.domain-score-wrap {
  flex-shrink:0; text-align:right;
  display:flex; flex-direction:column; align-items:flex-end; gap:4px;
}
.domain-score-num {
  font-family:'Pretendard Variable',Pretendard,'Noto Sans KR',sans-serif;
  font-size:30px; font-weight:700; line-height:1;
}
.domain-score-tag {
  font-size:10px; font-weight:700; letter-spacing:0.5px;
  padding:2px 8px; border-radius:100px;
  background:rgba(80,55,30,0.06);
}

/* BREAKDOWN */
.breakdown-section { margin-bottom:32px; }
.breakdown-title {
  font-size:12px; font-weight:700; letter-spacing:1.5px;
  text-transform:uppercase; color:var(--gold-deep);
  margin-bottom:16px;
}
.breakdown-grid {
  display:grid; grid-template-columns:repeat(5,1fr); gap:10px;
}
.breakdown-card {
  background:var(--surface); border:1px solid var(--border-soft);
  border-radius:12px; padding:14px 10px 12px;
  text-align:center; min-width:0;
  box-shadow: var(--shadow-soft);
}
.breakdown-src  { font-size:10px; color:var(--muted); margin-bottom:8px; font-weight:600; letter-spacing:0.3px; }
.breakdown-mini-bars { display:flex; flex-direction:column; gap:4px; width:100%; }
.breakdown-mini-row  { display:flex; align-items:center; gap:5px; width:100%; min-width:0; }
.breakdown-mini-emoji { font-size:10px; flex-shrink:0; }
.breakdown-mini-track { flex:1; background:var(--surface2); height:4px; border-radius:100px; overflow:hidden; }
.breakdown-mini-fill  { display:block; height:4px; border-radius:100px; transition: width 0.8s cubic-bezier(.4,0,.2,1); }
.breakdown-mini-num   { font-size:9px; color:var(--muted); width:22px; text-align:right; flex-shrink:0; }

/* LOADING */
.loading-wrap {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:360px; gap:20px;
}
.loading-spinner {
  width:52px; height:52px;
  border:3px solid var(--surface2);
  border-top-color:var(--accent);
  border-radius:50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { color:var(--muted); font-size:14px; }
.loading-dots::after {
  content:'';
  animation: dots 1.4s steps(4) infinite;
}
@keyframes dots { 0%{content:'.'} 25%{content:'..'} 50%{content:'...'} 75%{content:''} }

/* NO PROFILE */
.no-profile {
  text-align:center; padding:60px 20px;
}
.no-profile-icon { font-size:56px; margin-bottom:20px; }
.no-profile h2 { font-family:'Noto Serif KR',serif; font-size:22px; margin-bottom:10px; color: var(--ink); }
.no-profile p  { font-size:14px; color:var(--muted); margin-bottom:28px; line-height:1.7; }
.btn-go {
  display:inline-block; padding:13px 32px;
  background:linear-gradient(135deg,#7a2418,#5a1810);
  color:#fff; border-radius:12px; text-decoration:none;
  font-size:14px; font-weight:700; font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif;
  transition:all 0.2s;
  box-shadow: var(--shadow-soft);
}
.btn-go:hover { transform:translateY(-2px); box-shadow: var(--shadow-lift); }

/* WEIGHT INFO */
.weight-row {
  display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
  margin-bottom:32px;
}
.weight-chip {
  background:var(--surface); border:1px solid var(--border-soft);
  border-radius:100px; padding:5px 12px; font-size:11px; color:var(--muted);
}
.weight-chip strong { color:var(--ink); }

/* FEEDBACK */
.feedback-box {
  text-align:center; padding:20px 24px;
  background:var(--surface); border:1px solid var(--border-soft);
  border-radius:16px; margin-top:8px;
  box-shadow: var(--shadow-soft);
}
.feedback-q { font-size:13px; color:var(--muted); margin-bottom:14px; }
.fb-btns { display:flex; gap:10px; justify-content:center; }
.btn-fb {
  padding:10px 22px; border-radius:10px; font-size:14px; font-weight:700;
  cursor:pointer; font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif; transition:all 0.2s; border:1px solid;
}
.btn-fb-yes { background:rgba(47,122,85,0.10); color:var(--green); border-color:rgba(47,122,85,0.45); }
.btn-fb-no  { background:rgba(163,56,56,0.10); color:var(--red); border-color:rgba(163,56,56,0.45); }
.btn-fb-yes:hover { background:rgba(47,122,85,0.18); }
.btn-fb-no:hover  { background:rgba(163,56,56,0.18); }
.login-nudge {
  display:none; text-align:center; padding:16px 24px;
  background:rgba(122,36,24,0.06); border:1px solid rgba(122,36,24,0.18);
  border-radius:12px; margin-top:10px;
}
.login-nudge p { font-size:13px; color:var(--muted); margin-bottom:10px; }
.toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--ink); color:#fff; border:1px solid var(--gold-deep);
  border-radius:12px; padding:11px 22px;
  font-size:14px; font-weight:600; opacity:0;
  transition:all 0.3s; z-index:9999; white-space:nowrap; pointer-events:none;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* 공유 버튼 */
.share-btn-wrap {
  display:flex; justify-content:center; margin-top:28px;
}
.btn-share-card {
  display:inline-flex; align-items:center; gap:8px;
  padding:13px 32px; border-radius:100px;
  background:linear-gradient(135deg,#7a2418,#5a1810);
  color:#fff; font-size:14px; font-weight:700;
  font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif;
  border:none; cursor:pointer; transition:all 0.2s;
  box-shadow: var(--shadow-soft);
}
.btn-share-card:hover { transform:translateY(-2px); box-shadow: var(--shadow-lift); }

/* 공유 카드 모달 */
#scoreShareModal {
  display:none; position:fixed; inset:0; z-index:9999;
  background:rgba(36,26,16,0.55); backdrop-filter:blur(6px);
  align-items:center; justify-content:center; flex-direction:column;
  padding:20px; box-sizing:border-box;
}
#scoreShareModal.open { display:flex; }
#scoreShareModal .ssm-close {
  position:absolute; top:16px; right:16px;
  background:rgba(252,247,234,0.92); border:1px solid var(--border); color:var(--ink);
  width:36px; height:36px; border-radius:50%; font-size:18px;
  cursor:pointer;
}
#scoreShareModal .ssm-preview {
  width:min(270px,72vw); aspect-ratio:9/16;
  border-radius:16px; overflow:hidden; box-shadow:0 8px 40px rgba(36,26,16,0.45);
  background:#fcf7ea;
}
#scoreShareModal .ssm-preview img { width:100%; height:100%; object-fit:cover; display:block; }
#scoreShareModal .ssm-loading { color:var(--gold-deep); font-size:13px; margin-top:14px; }
#scoreShareModal .ssm-actions {
  display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; justify-content:center;
}
#scoreShareModal .ssm-btn {
  padding:11px 18px; border-radius:22px; font-size:13px; font-weight:600;
  cursor:pointer; border:none; transition:all 0.2s;
}
#scoreShareModal .ssm-kakao { background:#fee500; color:#3c1e1e; }
#scoreShareModal .ssm-dl { background:linear-gradient(135deg,#7a2418,#5a1810); color:#fff; }
#scoreShareModal .ssm-link { background:rgba(252,247,234,0.95); color:var(--ink); border:1px solid var(--border); }
#scoreShareModal .ssm-x { background:rgba(252,247,234,0.6); color:var(--muted); border:1px solid var(--border-soft); font-size:12px; }

/* RESPONSIVE */
@media (max-width:600px) {
  .main-wrap { padding:28px 16px 60px; }
  .domain-card { padding:18px 16px; gap:14px; }
  .domain-emoji { font-size:26px; }
  .domain-score-num { font-size:26px; }
  .breakdown-grid { grid-template-columns:repeat(2,1fr); gap:8px; }
  .breakdown-grid .breakdown-card:last-child { grid-column:auto; }
}
</style>

<script>
const WORKER_BASE_S = 'https://fortuna.kkdmb7.workers.dev';

// URL 파라미터 파싱 (score.html?year=...&month=...&day=...&hour=...&gender=...)
function getProfileFromUrl() {
  const p = new URLSearchParams(window.location.search);
  const year = p.get('year'), month = p.get('month'), day = p.get('day');
  if (!year || !month || !day) return null;
  return {
    year:   parseInt(year),
    month:  parseInt(month),
    day:    parseInt(day),
    hour:   p.get('hour') || 'unknown',
    minute: parseInt(p.get('minute')) || 0,
    gender: p.get('gender') || 'male',
    name:   p.get('name') || null,
  };
}

// localStorage에서 프로필 가져오기
function getStoredProfile() {
  try {
    const p = JSON.parse(localStorage.getItem('pico_profile'));
    if (p && p.year && p.month && p.day) return p;
  } catch(e) {}
  return null;
}

// 점수 색상
function getColor(score) {
  if (score >= 80) return 'var(--gold)';
  if (score >= 60) return 'var(--green)';
  if (score >= 40) return 'var(--blue)';
  return 'var(--red)';
}
function getTag(score) {
  if (score >= 80) return '매우 좋음';
  if (score >= 65) return '좋음';
  if (score >= 50) return '보통';
  if (score >= 35) return '주의';
  return '어려움';
}

// 종합 링 애니메이션
function animateRing(score, color) {
  const el = document.getElementById('overallRingFill');
  const circumference = 2 * Math.PI * 65; // ≈ 408.4
  el.style.stroke = color;
  setTimeout(() => {
    el.style.strokeDashoffset = circumference * (1 - score / 100);
  }, 80);
}

// 숫자 카운트업 애니메이션
function animateCount(el, target, duration=1200) {
  const start = 0;
  const startTime = performance.now();
  function step(now) {
    const elapsed = now - startTime;
    const prog = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - prog, 3);
    el.textContent = Math.round(start + (target - start) * eased);
    if (prog < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// 게이지 바 애니메이션
function animateGauge(el, score, color, delay=0) {
  el.style.background = color;
  setTimeout(() => { el.style.width = score + '%'; }, delay);
}

// 도메인 카드 렌더링
function renderDomainCards(final) {
  const grid = document.getElementById('domainGrid');
  grid.innerHTML = '';
  SCORE_DOMAINS.forEach((d, i) => {
    const info  = SCORE_DOMAIN_INFO[d];
    const score = final[d];
    const color = getColor(score);
    const tag   = getTag(score);

    const card = document.createElement('div');
    card.className = 'domain-card';
    card.innerHTML = `
      <div class="domain-emoji">${info.emoji}</div>
      <div class="domain-info">
        <div class="domain-name">${info.label}</div>
        <div class="domain-gauge-wrap">
          <div class="domain-gauge-fill" id="gauge_${d}" style="background:${color};"></div>
        </div>
      </div>
      <div class="domain-score-wrap">
        <div class="domain-score-num" id="dnum_${d}" style="color:${color};">0</div>
        <div class="domain-score-tag" style="color:${color};">${tag}</div>
      </div>
    `;
    grid.appendChild(card);

    setTimeout(() => {
      animateCount(document.getElementById('dnum_' + d), score, 1100);
      animateGauge(document.getElementById('gauge_' + d), score, color, 50);
    }, i * 100);
  });
}

// 세부 분석 렌더링
function renderBreakdown(scores) {
  const srcs = [
    { key:'saju',  label:'사주', badge:'<i class="pi pi-temple"></i>️' },
    { key:'qimen', label:'기문', badge:'<i class="pi pi-globe"></i>️' },
    { key:'astro', label:'점성', badge:'<i class="pi pi-star"></i>' },
    { key:'vedic', label:'베딕', badge:'<i class="pi pi-om"></i>️' },
    { key:'ziwei', label:'자미', badge:'<i class="pi pi-ziwei"></i>' },
  ];
  const grid = document.getElementById('breakdownGrid');
  grid.innerHTML = '';
  srcs.forEach((src, si) => {
    const sc = scores[src.key] || {};
    const card = document.createElement('div');
    card.className = 'breakdown-card';
    const barsHtml = SCORE_DOMAINS.map(d => {
      const v = sc[d] || 50;
      const c = getColor(v);
      return `<div class="breakdown-mini-row">
        <span class="breakdown-mini-emoji">${SCORE_DOMAIN_INFO[d].emoji}</span>
        <div class="breakdown-mini-track">
          <div class="breakdown-mini-fill" data-val="${v}" data-color="${c}" style="width:0%;background:${c};"></div>
        </div>
        <span class="breakdown-mini-num">${v}</span>
      </div>`;
    }).join('');
    card.innerHTML = `
      <div class="breakdown-src">${src.badge} ${src.label}</div>
      <div class="breakdown-mini-bars">${barsHtml}</div>
    `;
    grid.appendChild(card);
    setTimeout(() => {
      card.querySelectorAll('.breakdown-mini-fill').forEach(el => {
        el.style.width = el.getAttribute('data-val') + '%';
      });
    }, si * 60 + 80);
  });
}

}

function showLoginNudge() {

}

async function sendFeedback(fb) {
  const today = _todayKST();
  const key = 'score_feedback_' + today;
  if (localStorage.getItem(key)) return;
  localStorage.setItem(key, fb);
  document.getElementById('feedbackBtns').innerHTML =
    '<div style="font-size:15px;color:var(--gold-deep)">소중한 피드백 감사해요 <i class="pi pi-star"></i></div>';
  showToast('소중한 피드백 감사해요 <i class="pi pi-star"></i>');
  const user = (() => { try { return JSON.parse(localStorage.getItem('pico_user')); } catch(e) { return null; } })();
  const uid = (user && user.id) ? user.id : ('anon_' + Math.random().toString(36).slice(2,10));
  try {
    await fetch('https://fortuna.kkdmb7.workers.dev/score-feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id: uid, date: today,
        score: _scoreResult ? _scoreResult.overall : 0,
        domain_scores: _scoreResult ? _scoreResult.final : {},
        feedback: fb,
        engines_used: ['saju','qimen','astro','vedic','ziwei']
      })
    });
  } catch(e) {}
}

function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast'; t.className = 'toast';
    document.body.appendChild(t);
  }
  t.innerHTML = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function _doShareCanvas(btn, text, pageUrl) {
  if (btn) { btn.disabled=false; btn.innerHTML='<i class="pi pi-coin"></i> 카카오톡 공유'; }
  document.getElementById('scoreShareModal').style.display = 'none';
  if (!_ssmCanvas) {
    if (navigator.share) { navigator.share({ title:'FORTUNA 운세점수', text:text, url:pageUrl }).catch(function(){}); }
    else { showToast('<i class="pi pi-notepad"></i> 링크 복사됨!'); }
    return;
  }
  _ssmCanvas.toBlob(function(blob) {
    if (!blob) { showToast('이미지 생성 실패'); return; }
    var file = new File([blob], 'fortuna_score.png', { type:'image/png' });
    if (navigator.canShare && navigator.canShare({ files:[file] })) {
      navigator.share({ files:[file], text:text, url:pageUrl }).catch(function(){});
    } else if (navigator.share) {
      navigator.share({ title:'FORTUNA 운세점수', text:text, url:pageUrl }).catch(function(){});
    } else {
      showToast('<i class="pi pi-notepad"></i> 링크 복사됨!');
    }
  }, 'image/png');
}

// 메인 실행
async function run() {
  const profile = getProfileFromUrl() || getStoredProfile();

  document.getElementById('loadingWrap').style.display   = 'none';
  document.getElementById('noProfileWrap').style.display = 'none';
  document.getElementById('resultWrap').style.display    = 'none';

  if (!profile) {
    document.getElementById('noProfileWrap').style.display = 'block';
    return;
  }

  document.getElementById('loadingWrap').style.display = 'flex';

  let result;
  try {
    result = await calcFortuneScore(profile);
  } catch(e) {
    console.error(e);
    document.getElementById('loadingWrap').style.display = 'none';
    document.getElementById('noProfileWrap').style.display = 'block';
    document.getElementById('noProfileWrap').querySelector('h2').textContent = '계산 중 오류가 발생했습니다';
    document.getElementById('noProfileWrap').querySelector('p').textContent = '잠시 후 다시 시도해주세요.';
    return;
  }

  document.getElementById('loadingWrap').style.display = 'none';
  document.getElementById('resultWrap').style.display  = 'block';

  _scoreResult = result;
  const { final, scores, overall, summary, today } = result;
  const overallColor = getColor(overall);

  // 헤더
  document.getElementById('scoreDateLabel').textContent = today + ' 운세 점수';
  if (profile.name) {
    document.getElementById('scoreTitle').textContent = profile.name + '님의 오늘의 운세 점수';
    document.getElementById('scoreProfileName').textContent = profile.name + ' 님의 오늘 운세';
  }

  // 종합
  document.getElementById('overallNum').style.color = overallColor;
  document.getElementById('overallLabel').textContent = getTag(overall);
  document.getElementById('overallSummary').innerHTML = summary;
  animateCount(document.getElementById('overallNum'), overall, 1400);
  animateRing(overall, overallColor);

  // 도메인 카드
  renderDomainCards(final);

  // 세부 분석
  renderBreakdown(scores);

  // 피드백 초기화 + 로그인 넛지
  initFeedback(today);
  showLoginNudge();

  // 공유 버튼 표시
  document.getElementById('shareBtnWrap').style.display = 'flex';
}
