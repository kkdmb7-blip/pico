<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 운세 점수 · PICO Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c28;
  --border: #2a2a3d;
  --accent: #7b5ea7;
  --accent2: #e8b86d;
  --text: #f0f0f5;
  --muted: #6b6b85;
  --radius: 16px;
  --gold: #e8b86d;
  --green: #4caf82;
  --blue: #5b8dee;
  --red: #e05c6a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:0; opacity:0.4;
}

/* NAV */
nav {
  position:sticky; top:0; z-index:100;
  background: rgba(10,10,15,0.88);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 64px;
  display:flex; align-items:center; justify-content:space-between;
}
.logo {
  font-family:'Noto Serif KR',serif; font-weight:700; font-size:20px;
  color:var(--text); text-decoration:none; display:flex; align-items:center; gap:5px;
}
.logo-dot { color:var(--accent2); font-size:10px; margin-bottom:2px; }
.nav-back {
  display:flex; align-items:center; gap:6px;
  color:var(--muted); font-size:13px; text-decoration:none;
  background:none; border:1px solid var(--border); border-radius:8px;
  padding:6px 12px; cursor:pointer; font-family:'Noto Sans KR',sans-serif;
  transition:all 0.2s;
}
.nav-back:hover { color:var(--text); border-color:var(--muted); }

/* MAIN */
.main-wrap {
  max-width: 480px; margin: 0 auto;
  padding: 40px 20px 80px;
  position:relative; z-index:1;
}

/* HEADER */
.score-header {
  text-align:center; margin-bottom:36px;
}
.score-date {
  font-size:12px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; color:var(--accent2); margin-bottom:10px;
}
.score-title {
  font-family:'Noto Serif KR',serif; font-size:clamp(22px,5vw,34px);
  font-weight:700; margin-bottom:6px;
}
.score-subtitle { font-size:13px; color:var(--muted); }

/* OVERALL RING */
.overall-wrap {
  display:flex; flex-direction:column; align-items:center;
  margin-bottom:36px; gap:12px;
}
.overall-ring {
  width:150px; height:150px; position:relative;
}
.overall-ring svg { transform:rotate(-90deg); }
.overall-ring-track { fill:none; stroke:var(--surface2); stroke-width:14; }
.overall-ring-fill  {
  fill:none; stroke-width:14; stroke-linecap:round;
  stroke-dasharray: 408; stroke-dashoffset: 408;
  transition: stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1);
}
.overall-center {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.overall-num {
  font-family:'Noto Serif KR',serif; font-size:40px; font-weight:700; line-height:1;
}
.overall-label { font-size:11px; color:var(--muted); margin-top:3px; letter-spacing:0.5px; }
.overall-summary {
  font-size:14px; color:var(--muted); text-align:center;
  line-height:1.65; max-width:480px;
}

/* DOMAIN CARDS */
.domain-grid {
  display:flex; flex-direction:column; gap:14px;
  margin-bottom:36px;
}
.domain-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px; padding:22px 24px;
  display:flex; align-items:center; gap:20px;
  transition: border-color 0.3s, box-shadow 0.3s;
  position:relative; overflow:hidden;
}
.domain-card::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at left, rgba(123,94,167,0.08) 0%, transparent 60%);
  opacity:0; transition:opacity 0.3s;
}
.domain-card:hover { border-color:var(--accent); box-shadow:0 6px 24px rgba(0,0,0,0.25); }
.domain-card:hover::before { opacity:1; }

.domain-emoji { font-size:32px; flex-shrink:0; }
.domain-info  { flex:1; min-width:0; }
.domain-name  { font-size:14px; font-weight:600; margin-bottom:8px; }
.domain-gauge-wrap {
  position:relative; height:8px;
  background:var(--surface2); border-radius:100px;
  overflow:hidden;
}
.domain-gauge-fill {
  height:100%; border-radius:100px; width:0%;
  transition: width 1.2s cubic-bezier(.4,0,.2,1);
}
.domain-score-wrap {
  flex-shrink:0; text-align:right;
  display:flex; flex-direction:column; align-items:flex-end; gap:4px;
}
.domain-score-num {
  font-family:'Noto Serif KR',serif;
  font-size:30px; font-weight:700; line-height:1;
}
.domain-score-tag {
  font-size:10px; font-weight:700; letter-spacing:0.5px;
  padding:2px 8px; border-radius:100px;
  background:rgba(255,255,255,0.06);
}

/* BREAKDOWN */
.breakdown-section { margin-bottom:32px; }
.breakdown-title {
  font-size:12px; font-weight:700; letter-spacing:1.5px;
  text-transform:uppercase; color:var(--accent2);
  margin-bottom:16px;
}
.breakdown-grid {
  display:grid; grid-template-columns:repeat(5,1fr); gap:10px;
}
.breakdown-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:14px 10px 12px;
  text-align:center; min-width:0;
}
.breakdown-src  { font-size:10px; color:var(--muted); margin-bottom:8px; font-weight:600; letter-spacing:0.3px; }
.breakdown-mini-bars { display:flex; flex-direction:column; gap:4px; width:100%; }
.breakdown-mini-row  { display:flex; align-items:center; gap:5px; width:100%; min-width:0; }
.breakdown-mini-emoji { font-size:10px; flex-shrink:0; }
.breakdown-mini-track { flex:1; background:var(--surface2); height:4px; border-radius:100px; overflow:hidden; }
.breakdown-mini-fill  { display:block; height:4px; border-radius:100px; transition: width 0.8s cubic-bezier(.4,0,.2,1); }
.breakdown-mini-num   { font-size:9px; color:var(--muted); width:22px; text-align:right; flex-shrink:0; }

/* LOADING */
.loading-wrap {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:360px; gap:20px;
}
.loading-spinner {
  width:52px; height:52px;
  border:3px solid var(--surface2);
  border-top-color:var(--accent);
  border-radius:50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { color:var(--muted); font-size:14px; }
.loading-dots::after {
  content:'';
  animation: dots 1.4s steps(4) infinite;
}
@keyframes dots { 0%{content:'.'} 25%{content:'..'} 50%{content:'...'} 75%{content:''} }

/* NO PROFILE */
.no-profile {
  text-align:center; padding:60px 20px;
}
.no-profile-icon { font-size:56px; margin-bottom:20px; }
.no-profile h2 { font-family:'Noto Serif KR',serif; font-size:22px; margin-bottom:10px; }
.no-profile p  { font-size:14px; color:var(--muted); margin-bottom:28px; line-height:1.7; }
.btn-go {
  display:inline-block; padding:13px 32px;
  background:linear-gradient(135deg,var(--accent),#a07fd4);
  color:#fff; border-radius:12px; text-decoration:none;
  font-size:14px; font-weight:700; font-family:'Noto Sans KR',sans-serif;
  transition:all 0.2s;
}
.btn-go:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(123,94,167,0.4); }

/* WEIGHT INFO */
.weight-row {
  display:flex; gap:8px; flex-wrap:wrap; justify-content:center;
  margin-bottom:32px;
}
.weight-chip {
  background:var(--surface); border:1px solid var(--border);
  border-radius:100px; padding:5px 12px; font-size:11px; color:var(--muted);
}
.weight-chip strong { color:var(--text); }

/* RESPONSIVE */
@media (max-width:600px) {
  .main-wrap { padding:28px 16px 60px; }
  .domain-card { padding:18px 16px; gap:14px; }
  .domain-emoji { font-size:26px; }
  .domain-score-num { font-size:26px; }
  .breakdown-grid { grid-template-columns:repeat(2,1fr); gap:8px; }
  .breakdown-grid .breakdown-card:last-child { grid-column:1/-1; max-width:calc(50% - 4px); margin:0 auto; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><span class="logo-dot">●</span>PICO Lab</a>
  <a href="index.html" class="nav-back">← 메인으로</a>
</nav>

<div class="main-wrap">

  <!-- 로딩 -->
  <div id="loadingWrap" class="loading-wrap" style="display:none;">
    <div class="loading-spinner"></div>
    <div class="loading-text">5대 운세 엔진 분석 중<span class="loading-dots"></span></div>
  </div>

  <!-- 프로필 없음 -->
  <div id="noProfileWrap" class="no-profile" style="display:none;">
    <div class="no-profile-icon">🔮</div>
    <h2>프로필이 필요합니다</h2>
    <p>오늘의 운세 점수를 계산하려면<br>생년월일을 먼저 등록해주세요.</p>
    <a href="index.html" class="btn-go">메인에서 설정하기</a>
  </div>

  <!-- 결과 -->
  <div id="resultWrap" style="display:none;">

    <!-- 헤더 -->
    <div class="score-header">
      <div class="score-date" id="scoreDateLabel"></div>
      <h1 class="score-title" id="scoreTitle">오늘의 운세 점수</h1>
      <p class="score-subtitle" id="scoreProfileName"></p>
    </div>

    <!-- 종합 링 -->
    <div class="overall-wrap">
      <div class="overall-ring">
        <svg width="150" height="150" viewBox="0 0 150 150">
          <circle class="overall-ring-track" cx="75" cy="75" r="65"/>
          <circle class="overall-ring-fill" id="overallRingFill" cx="75" cy="75" r="65"/>
        </svg>
        <div class="overall-center">
          <div class="overall-num" id="overallNum">–</div>
          <div class="overall-label" id="overallLabel">종합</div>
        </div>
      </div>
      <p class="overall-summary" id="overallSummary"></p>
    </div>

    <!-- 가중치 칩 -->
    <div class="weight-row">
      <div class="weight-chip">사주 <strong>30%</strong></div>
      <div class="weight-chip">기문 <strong>25%</strong></div>
      <div class="weight-chip">점성 <strong>20%</strong></div>
      <div class="weight-chip">베딕 <strong>15%</strong></div>
      <div class="weight-chip">자미 <strong>10%</strong></div>
    </div>

    <!-- 5개 도메인 카드 -->
    <div class="domain-grid" id="domainGrid"></div>

    <!-- 분야별 세부 분석 -->
    <div class="breakdown-section">
      <div class="breakdown-title">엔진별 세부 점수</div>
      <div class="breakdown-grid" id="breakdownGrid"></div>
    </div>

  </div><!-- /resultWrap -->
</div>

<script src="score.js?v=2"></script>
<script>
const WORKER_BASE_S = 'https://fortuna.kkdmb7.workers.dev';

// URL 파라미터 파싱 (score.html?year=...&month=...&day=...&hour=...&gender=...)
function getProfileFromUrl() {
  const p = new URLSearchParams(window.location.search);
  const year = p.get('year'), month = p.get('month'), day = p.get('day');
  if (!year || !month || !day) return null;
  return {
    year:   parseInt(year),
    month:  parseInt(month),
    day:    parseInt(day),
    hour:   p.get('hour') || 'unknown',
    minute: parseInt(p.get('minute')) || 0,
    gender: p.get('gender') || 'male',
    name:   p.get('name') || null,
  };
}

// localStorage에서 프로필 가져오기
function getStoredProfile() {
  try {
    const p = JSON.parse(localStorage.getItem('pico_profile'));
    if (p && p.year && p.month && p.day) return p;
  } catch(e) {}
  return null;
}

// 점수 색상
function getColor(score) {
  if (score >= 80) return 'var(--gold)';
  if (score >= 60) return 'var(--green)';
  if (score >= 40) return 'var(--blue)';
  return 'var(--red)';
}
function getTag(score) {
  if (score >= 80) return '매우 좋음';
  if (score >= 65) return '좋음';
  if (score >= 50) return '보통';
  if (score >= 35) return '주의';
  return '어려움';
}

// 종합 링 애니메이션
function animateRing(score, color) {
  const el = document.getElementById('overallRingFill');
  const circumference = 2 * Math.PI * 65; // ≈ 408.4
  el.style.stroke = color;
  setTimeout(() => {
    el.style.strokeDashoffset = circumference * (1 - score / 100);
  }, 80);
}

// 숫자 카운트업 애니메이션
function animateCount(el, target, duration=1200) {
  const start = 0;
  const startTime = performance.now();
  function step(now) {
    const elapsed = now - startTime;
    const prog = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - prog, 3);
    el.textContent = Math.round(start + (target - start) * eased);
    if (prog < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// 게이지 바 애니메이션
function animateGauge(el, score, color, delay=0) {
  el.style.background = color;
  setTimeout(() => { el.style.width = score + '%'; }, delay);
}

// 도메인 카드 렌더링
function renderDomainCards(final) {
  const grid = document.getElementById('domainGrid');
  grid.innerHTML = '';
  SCORE_DOMAINS.forEach((d, i) => {
    const info  = SCORE_DOMAIN_INFO[d];
    const score = final[d];
    const color = getColor(score);
    const tag   = getTag(score);

    const card = document.createElement('div');
    card.className = 'domain-card';
    card.innerHTML = `
      <div class="domain-emoji">${info.emoji}</div>
      <div class="domain-info">
        <div class="domain-name">${info.label}</div>
        <div class="domain-gauge-wrap">
          <div class="domain-gauge-fill" id="gauge_${d}" style="background:${color};"></div>
        </div>
      </div>
      <div class="domain-score-wrap">
        <div class="domain-score-num" id="dnum_${d}" style="color:${color};">0</div>
        <div class="domain-score-tag" style="color:${color};">${tag}</div>
      </div>
    `;
    grid.appendChild(card);

    setTimeout(() => {
      animateCount(document.getElementById('dnum_' + d), score, 1100);
      animateGauge(document.getElementById('gauge_' + d), score, color, 50);
    }, i * 100);
  });
}

// 세부 분석 렌더링
function renderBreakdown(scores) {
  const srcs = [
    { key:'saju',  label:'사주', badge:'🏛️' },
    { key:'qimen', label:'기문', badge:'🗺️' },
    { key:'astro', label:'점성', badge:'🌟' },
    { key:'vedic', label:'베딕', badge:'🕉️' },
    { key:'ziwei', label:'자미', badge:'⭐' },
  ];
  const grid = document.getElementById('breakdownGrid');
  grid.innerHTML = '';
  srcs.forEach((src, si) => {
    const sc = scores[src.key] || {};
    const card = document.createElement('div');
    card.className = 'breakdown-card';
    const barsHtml = SCORE_DOMAINS.map(d => {
      const v = sc[d] || 50;
      const c = getColor(v);
      return `<div class="breakdown-mini-row">
        <span class="breakdown-mini-emoji">${SCORE_DOMAIN_INFO[d].emoji}</span>
        <div class="breakdown-mini-track">
          <div class="breakdown-mini-fill" data-val="${v}" data-color="${c}" style="width:0%;background:${c};"></div>
        </div>
        <span class="breakdown-mini-num">${v}</span>
      </div>`;
    }).join('');
    card.innerHTML = `
      <div class="breakdown-src">${src.badge} ${src.label}</div>
      <div class="breakdown-mini-bars">${barsHtml}</div>
    `;
    grid.appendChild(card);
    setTimeout(() => {
      card.querySelectorAll('.breakdown-mini-fill').forEach(el => {
        el.style.width = el.getAttribute('data-val') + '%';
      });
    }, si * 60 + 80);
  });
}

// 메인 실행
async function run() {
  const profile = getProfileFromUrl() || getStoredProfile();

  document.getElementById('loadingWrap').style.display   = 'none';
  document.getElementById('noProfileWrap').style.display = 'none';
  document.getElementById('resultWrap').style.display    = 'none';

  if (!profile) {
    document.getElementById('noProfileWrap').style.display = 'block';
    return;
  }

  document.getElementById('loadingWrap').style.display = 'flex';

  let result;
  try {
    result = await calcFortuneScore(profile);
  } catch(e) {
    console.error(e);
    document.getElementById('loadingWrap').style.display = 'none';
    document.getElementById('noProfileWrap').style.display = 'block';
    document.getElementById('noProfileWrap').querySelector('h2').textContent = '계산 중 오류가 발생했습니다';
    document.getElementById('noProfileWrap').querySelector('p').textContent = '잠시 후 다시 시도해주세요.';
    return;
  }

  document.getElementById('loadingWrap').style.display = 'none';
  document.getElementById('resultWrap').style.display  = 'block';

  const { final, scores, overall, summary, today } = result;
  const overallColor = getColor(overall);

  // 헤더
  document.getElementById('scoreDateLabel').textContent = today + ' 운세 점수';
  if (profile.name) {
    document.getElementById('scoreTitle').textContent = profile.name + '님의 오늘의 운세 점수';
    document.getElementById('scoreProfileName').textContent = profile.name + ' 님의 오늘 운세';
  }

  // 종합
  document.getElementById('overallNum').style.color = overallColor;
  document.getElementById('overallLabel').textContent = getTag(overall);
  document.getElementById('overallSummary').innerHTML = summary;
  animateCount(document.getElementById('overallNum'), overall, 1400);
  animateRing(overall, overallColor);

  // 도메인 카드
  renderDomainCards(final);

  // 세부 분석
  renderBreakdown(scores);
}

run();
</script>
</body>
</html>
