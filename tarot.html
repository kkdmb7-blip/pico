<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>타로 카드 · FORTUNA</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d14;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --text: #e8e0f0;
    --text2: #c0b8d8;
    --text3: #6b6b85;
    --accent: #c9a84c;
    --accent2: #8b5cf6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,13,20,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-back {
    background: none; border: none; color: var(--text2);
    font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px;
    font-family: 'Noto Sans KR', sans-serif; padding: 6px 0;
  }
  .nav-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px; font-weight: 700; color: var(--accent);
  }

  /* MAIN */
  .wrap { max-width: 480px; margin: 0 auto; padding: 24px 18px 80px; }

  /* STEPS */
  .step { display: none; }
  .step.active { display: block; }

  /* STEP 1 — question */
  .step-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px; font-weight: 700;
    text-align: center; margin-bottom: 8px;
    color: var(--accent);
  }
  .step-sub {
    font-size: 13px; color: var(--text3);
    text-align: center; margin-bottom: 24px; line-height: 1.6;
  }
  .question-input {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; color: var(--text); font-size: 15px;
    resize: none; margin-bottom: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none; line-height: 1.6;
  }
  .question-input:focus { border-color: var(--accent2); }
  .draw-btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, #6a0dad, #c9a84c);
    border: none; border-radius: 12px;
    color: #fff; font-size: 16px; font-weight: 700;
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
    transition: opacity 0.2s, transform 0.15s;
  }
  .draw-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .draw-btn:not(:disabled):hover { opacity: 0.9; transform: translateY(-1px); }

  /* STEP 2 — select grid */
  .select-hint {
    font-size: 12px; color: var(--accent);
    text-align: center; margin-bottom: 14px;
  }
  .select-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px; padding: 4px;
    max-height: 55vh; overflow-y: auto;
    margin-bottom: 12px;
  }
  .sel-card {
    aspect-ratio: 2/3; border-radius: 6px;
    background: linear-gradient(135deg, #1a0a2e, #3a1a5a);
    border: 1px solid #3a2a5a;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 20px; transition: all 0.2s; position: relative;
  }
  .sel-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(201,168,76,0.3); }
  .sel-card.selected { border-color: var(--accent); background: linear-gradient(135deg,#2d1460,#4a2a6a); box-shadow: 0 0 16px rgba(201,168,76,0.4); }
  .sel-card.selected::after {
    content: attr(data-order);
    position: absolute; top: -6px; right: -6px;
    width: 18px; height: 18px;
    background: var(--accent); color: #000;
    border-radius: 50%; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .sel-card.disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
  .select-count { font-size: 12px; color: var(--text3); text-align: center; }

  /* STEP 3 — result */
  .cards-area { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
  .card-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .card-label { font-size: 11px; color: var(--text3); text-align: center; }
  .card-name { font-size: 12px; color: var(--text2); text-align: center; }
  .tarot-card { width: 80px; height: 140px; perspective: 600px; cursor: pointer; }
  .tarot-card-inner {
    width: 100%; height: 100%; position: relative;
    transform-style: preserve-3d; transition: transform 0.8s;
  }
  .tarot-card.flipped .tarot-card-inner { transform: rotateY(180deg); }
  .tarot-card-front, .tarot-card-back {
    position: absolute; inset: 0; backface-visibility: hidden;
    border-radius: 8px; overflow: hidden; border: 1px solid #3a2a5a;
  }
  .tarot-card-back { background: linear-gradient(135deg,#1a0a2e,#3a1a5a); display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .tarot-card-front { transform: rotateY(180deg); background: #1a0a2e; }
  .tarot-card-front img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .reversed-badge { font-size: 9px; color: #e07070; background: rgba(200,50,50,0.15); border: 1px solid rgba(200,50,50,0.3); border-radius: 4px; padding: 1px 5px; }

  /* fallback card */
  .fb { display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:6px;text-align:center; }
  .fb-sym { font-size:26px;margin-bottom:4px; }
  .fb-num { font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:2px; }
  .fb-name { font-size:9px;color:rgba(255,255,255,0.4);line-height:1.2; }

  /* AI Result */
  .result-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
    font-size: 15px; color: var(--text); line-height: 1.8;
    min-height: 60px;
  }
  .result-box.loading { color: var(--text3); font-style: italic; }

  /* Retry btn */
  .retry-btn {
    margin-top: 20px; width: 100%; padding: 13px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text3);
    font-size: 14px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s;
  }
  .retry-btn:hover { color: var(--text); border-color: var(--text3); }

  /* Login prompt */
  .login-notice {
    margin-top: 16px;
    background: rgba(139,92,246,0.08); border: 1px solid rgba(139,92,246,0.25);
    border-radius: 10px; padding: 12px 14px;
    font-size: 13px; color: var(--text3); text-align: center; line-height: 1.6;
  }
</style>
  <link rel="stylesheet" href="pico-icons.css">
</head>
<body>

<nav>
  <a href="/" style="display:flex;align-items:center;gap:8px;text-decoration:none"><img src="img/goddess.png" style="height:56px;object-fit:contain" alt="FORTUNA"><span style="font-family:'Noto Serif KR',serif;font-weight:700;font-size:15px;letter-spacing:2px;color:#e8b86d;">FORTUNA</span></a>
  <span class="nav-title">🃏 타로 카드</span>
  <div style="width:60px"></div>
</nav>

<div class="wrap">

  <!-- STEP 1: 질문 -->
  <div class="step active" id="step1">
    <div class="step-title">오늘 가장 궁금한 것을<br>마음속으로 떠올리세요</div>
    <p class="step-sub">카드를 고르기 전, 질문을 적어주세요<br>질문이 구체적일수록 정확한 해석이 나옵니다</p>
    <textarea class="question-input" id="tarotQuestion" rows="3"
      placeholder="예: 이 관계는 어떻게 될까요?" oninput="onQuestionInput()"></textarea>
    <button class="draw-btn" id="drawBtn" onclick="goSelect()" disabled><i class="pi pi-sparkle"></i> 카드 고르기</button>
  </div>

  <!-- STEP 2: 카드 선택 -->
  <div class="step" id="step2">
    <p class="select-hint">마음이 끌리는 카드 3장을 골라주세요</p>
    <div class="select-grid" id="selectGrid"></div>
    <p class="select-count" id="selectCount">0 / 3 선택됨</p>
  </div>

  <!-- STEP 3: 결과 -->
  <div class="step" id="step3">
    <div class="cards-area" id="cardsArea"></div>
    <div class="result-box loading" id="resultBox" style="display:none;"></div>
    <div class="login-notice" id="loginNotice" style="display:none;">
      <i class="pi pi-key"></i> 카카오 로그인 후 AI 타로 해석을 받을 수 있어요<br>
      <a href="../" style="color:var(--accent2);text-decoration:none;">picolab.kr에서 로그인하기 →</a>
    </div>
    <button class="retry-btn" onclick="restart()"><i class="pi pi-refresh"></i> 다시 뽑기</button>
  </div>

</div>

<script>
// ── UTILS ──
function showStep(n) {
  document.querySelectorAll('.step').forEach(function(el, i) {
    el.classList.toggle('active', i === n - 1);
  });
}
function onQuestionInput() {
  var q = document.getElementById('tarotQuestion').value.trim();
  document.getElementById('drawBtn').disabled = q.length === 0;
}
function restart() {
  document.getElementById('tarotQuestion').value = '';
  document.getElementById('drawBtn').disabled = true;
  document.getElementById('resultBox').style.display = 'none';
  document.getElementById('loginNotice').style.display = 'none';
  document.getElementById('cardsArea').innerHTML = '';
  showStep(1);
}

var _selectedCards = [];
var _drawnCards = [];

// ── STEP 1→2 ──
function goSelect() {
  var q = document.getElementById('tarotQuestion').value.trim();
  if (!q) return;
  var shuffled = TAROT_CARDS.slice().sort(function() { return Math.random() - 0.5; });
  var grid = document.getElementById('selectGrid');
  grid.innerHTML = '';
  _selectedCards = [];
  document.getElementById('selectCount').textContent = '0 / 3 선택됨';
  shuffled.forEach(function(card) {
    var div = document.createElement('div');
    div.className = 'sel-card';
    div.innerHTML = '<i class="pi pi-crystal"></i>';
    div.dataset.cardId = card.id;
    div.onclick = (function(el, c) { return function() { onSelectCard(el, c); }; })(div, card);
    grid.appendChild(div);
  });
  showStep(2);
}

function onSelectCard(el, card) {
  if (el.classList.contains('disabled')) return;
  if (el.classList.contains('selected')) {
    el.classList.remove('selected');
    delete el.dataset.order;
    _selectedCards = _selectedCards.filter(function(s) { return s.cardId !== card.id; });
    _selectedCards.forEach(function(s, idx) { s.el.dataset.order = idx + 1; });
  } else {
    if (_selectedCards.length >= 3) return;
    var order = _selectedCards.length + 1;
    el.classList.add('selected');
    el.dataset.order = order;
    _selectedCards.push({ cardId: card.id, card: card, el: el });
  }
  document.getElementById('selectCount').textContent = _selectedCards.length + ' / 3 선택됨';
  if (_selectedCards.length === 3) {
    document.querySelectorAll('.sel-card:not(.selected)').forEach(function(s) { s.classList.add('disabled'); });
    setTimeout(revealCards, 800);
  }
}

// ── STEP 2→3 ──
function toRoman(n) {
  var r = {0:'○',1:'I',2:'II',3:'III',4:'IV',5:'V',6:'VI',7:'VII',8:'VIII',9:'IX',10:'X',11:'XI',12:'XII',13:'XIII',14:'XIV',15:'XV',16:'XVI',17:'XVII',18:'XVIII',19:'XIX',20:'XX',21:'XXI'};
  return r[n] || '';
}
function makeFallback(card) {
  var cfg = { '메이저':{sym:'<i class="pi pi-sparkle"></i>'}, '완드':{sym:'<i class="pi pi-fire"></i>'}, '컵':{sym:'<i class="pi pi-wave"></i>'}, '검':{sym:'<i class="pi pi-bolt"></i>'}, '펜타클':{sym:'⭐'} };
  var cc = cfg[card.suit] || cfg['메이저'];
  var num = card.suit === '메이저' ? toRoman(card.number) : String(card.number);
  return '<div class="fb"><span class="fb-sym">' + cc.sym + '</span><span class="fb-num">' + num + '</span><span class="fb-name">' + card.name + '</span></div>';
}

function revealCards() {
  var labels = ['현재 상황', '핵심 원인', '앞으로의 흐름'];
  var cards = _selectedCards.map(function(s) { return s.card; });
  var reversals = cards.map(function() { return Math.random() < 0.3; });
  _drawnCards = cards.map(function(c, i) { return Object.assign({}, c, { reversed: reversals[i] }); });
  var area = document.getElementById('cardsArea');
  area.innerHTML = '';
  showStep(3);
  for (var i = 0; i < 3; i++) {
    var card = _drawnCards[i];
    var wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    var lbl = document.createElement('div'); lbl.className = 'card-label'; lbl.textContent = labels[i];
    wrap.appendChild(lbl);
    var cardEl = document.createElement('div'); cardEl.className = 'tarot-card';
    var inner = document.createElement('div'); inner.className = 'tarot-card-inner';
    var back = document.createElement('div'); back.className = 'tarot-card-back'; back.innerHTML = '<i class="pi pi-crystal"></i>';
    var front = document.createElement('div'); front.className = 'tarot-card-front';
    var img = new Image();
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
    if (card.reversed) img.style.transform = 'rotate(180deg)';
    img.src = card.imgUrl || '';
    img.onerror = (function(cc, f) { return function() { f.innerHTML = makeFallback(cc); }; })(card, front);
    front.appendChild(img);
    inner.appendChild(back); inner.appendChild(front); cardEl.appendChild(inner);
    (function(el, idx) {
      setTimeout(function() {
        el.classList.add('flipped');
        if (idx === 2) setTimeout(interpretWithAI, 400);
      }, 600 + idx * 400);
    })(cardEl, i);
    if (card.reversed) {
      var badge = document.createElement('div'); badge.className = 'reversed-badge'; badge.textContent = '역방향';
      wrap.appendChild(badge);
    } else {
      var nm = document.createElement('div'); nm.className = 'card-name'; nm.textContent = card.name;
      wrap.appendChild(nm);
    }
    wrap.insertBefore(cardEl, wrap.children[1]);
    area.appendChild(wrap);
  }
}

// ── AI 해석 ──
function renderMarkdown(str) {
  if (!str) return '';
  var s = String(str);
  s = s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong style="color:#e2d0ff;">$1</strong>');
  s = s.replace(/(^|\n)- ([^\n]+)/g, '$1<span style="display:inline-block;margin-left:4px;">• $2</span>');
  s = s.replace(/\n/g, '<br>');
  return s;
}

async function interpretWithAI() {
  var resultBox = document.getElementById('resultBox');
  var loginNotice = document.getElementById('loginNotice');
  var user = null;
  try { user = JSON.parse(localStorage.getItem('pico_user') || 'null'); } catch(e) {}
  if (!user || !user.id) {
    loginNotice.style.display = 'block';
    return;
  }
  resultBox.style.display = 'block';
  resultBox.className = 'result-box loading';
  var waitMsgs = ['<i class="pi pi-star"></i> 타로가 메시지를 읽는 중...','<i class="pi pi-sparkle"></i> 별자리와 연결 중...','<i class="pi pi-crystal"></i> 운명을 살펴보는 중...','<i class="pi pi-sparkle"></i> 해석하는 중...'];
  var msgIdx = 0;
  resultBox.innerHTML = waitMsgs[0];
  var waitTimer = setInterval(function() {
    msgIdx = (msgIdx + 1) % waitMsgs.length;
    resultBox.style.opacity = '0';
    setTimeout(function() { resultBox.innerHTML = waitMsgs[msgIdx]; resultBox.style.opacity = '1'; }, 300);
  }, 2500);
  var labels = ['현재 상황', '핵심 원인', '앞으로의 흐름'];
  var question = document.getElementById('tarotQuestion').value.trim();
  var cardLines = _drawnCards.map(function(card, i) {
    return '카드 ' + (i+1) + ' (' + labels[i] + '): ' + card.name + ' ' + (card.reversed ? '역방향' : '정방향');
  }).join('\n');
  var userMsg =
    '타로 카드 3장 해석입니다.\n\n' +
    cardLines + '\n\n' +
    (question ? '질문: ' + question + '\n\n' : '') +
    '아래 구조로 답해줘:\n\n' +
    '① 3장이 만드는 전체 흐름 1줄 (가장 중요한 메시지)\n\n' +
    '② 카드별 해석:\n' +
    '현재 상황(' + (_drawnCards[0]&&_drawnCards[0].name||'카드1') + '): 1~2줄\n' +
    '핵심 원인(' + (_drawnCards[1]&&_drawnCards[1].name||'카드2') + '): 1~2줄\n' +
    '앞으로의 흐름(' + (_drawnCards[2]&&_drawnCards[2].name||'카드3') + '): 1~2줄\n\n' +
    '③ 오늘 이것만 해보세요 — 한 줄 행동 제안\n\n' +
    '전체 300~450자. 마지막은 반드시 희망적으로. ## ### 헤더 절대 금지. ** 볼드는 핵심 키워드 3~5개 사용. 표/구분선 금지.';
  var systemMsg = '당신은 타로를 해석하는 운명 상담사입니다. 따뜻하고 구체적으로 답하되, 헤더(##,###)와 표는 절대 사용하지 않습니다. ** 볼드는 핵심 키워드에 3~5개만 사용하세요.';
  try {
    var res = await fetch('https://fortuna-silk.vercel.app/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: user.id, messages: [{ role: 'user', content: userMsg }], system_prompt: systemMsg })
    });
    clearInterval(waitTimer);
    if (!res.ok) {
      var errData = await res.json().catch(function(){ return {}; });
      if (errData.error === 'limit_exceeded') {
        resultBox.className = 'result-box';
        resultBox.innerHTML = '오늘 사용량을 모두 소진했어요. 내일 다시 시도해주세요.<br><a href="https://kkdmb7-blip.github.io/memox/" style="color:var(--accent2);">memox에서 충전하기 →</a>';
        return;
      }
      throw new Error('API ' + res.status);
    }
    var data = await res.json();
    var reply = data.reply || '';
    resultBox.style.opacity = '0';
    setTimeout(function() {
      resultBox.className = 'result-box';
      resultBox.innerHTML = renderMarkdown(reply) || '해석을 불러오지 못했어요.';
      resultBox.style.opacity = '1';
    }, 300);
  } catch(e) {
    clearInterval(waitTimer);
    resultBox.className = 'result-box';
    resultBox.textContent = '오류: ' + e.message;
  }
}
