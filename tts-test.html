<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Cloud TTS 테스트</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; color: #222; }
  h1 { font-size: 20px; margin-bottom: 24px; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #444; }
  input, select, textarea {
    width: 100%; box-sizing: border-box;
    padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px;
    font-size: 14px; background: #fff; color: #222; margin-bottom: 16px;
  }
  textarea { resize: vertical; min-height: 100px; }
  button {
    padding: 12px 28px; border: none; border-radius: 8px;
    background: #4285f4; color: #fff; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: background 0.15s;
  }
  button:hover { background: #2b6fdb; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  #status { margin-top: 16px; font-size: 13px; color: #555; min-height: 20px; }
  #status.error { color: #c00; }
  #audioWrap { margin-top: 20px; }
  audio { width: 100%; margin-top: 8px; }
  .section { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .voice-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 700; vertical-align: middle; margin-left: 4px; }
  .badge.neural2  { background: #e8f0fe; color: #1a73e8; }
  .badge.chirp    { background: #fce8e6; color: #c5221f; }
  .badge.gemini   { background: #e6f4ea; color: #137333; }
</style>
</head>
<body>

<h1>🔊 Google Cloud TTS 테스트</h1>

<!-- API 키 -->
<div class="section">
  <label>Google Cloud API 키</label>
  <input type="password" id="apiKey" placeholder="AIza..." autocomplete="off">
</div>

<!-- 텍스트 -->
<div class="section">
  <label>읽을 텍스트</label>
  <textarea id="text" placeholder="여기에 읽을 텍스트를 입력하세요.">안녕하세요. 포르투나 AI 운세 서비스입니다. 오늘도 좋은 하루 되세요.</textarea>
</div>

<!-- 목소리 선택 -->
<div class="section">
  <label>목소리 선택</label>
  <select id="voice">
    <optgroup label="Neural2 — 고품질 뉴럴 TTS">
      <option value="ko-KR-Neural2-A">ko-KR-Neural2-A (여성)</option>
      <option value="ko-KR-Neural2-B">ko-KR-Neural2-B (여성)</option>
      <option value="ko-KR-Neural2-C">ko-KR-Neural2-C (남성)</option>
    </optgroup>
    <optgroup label="Chirp HD — 초자연 음성">
      <option value="ko-KR-Chirp-HD-D">ko-KR-Chirp-HD-D (여성)</option>
      <option value="ko-KR-Chirp-HD-F">ko-KR-Chirp-HD-F (여성)</option>
      <option value="ko-KR-Chirp-HD-O">ko-KR-Chirp-HD-O (남성)</option>
    </optgroup>
    <optgroup label="Chirp3 HD — 최신 HD">
      <option value="ko-KR-Chirp3-HD-Achernar">ko-KR-Chirp3-HD-Achernar (여성)</option>
      <option value="ko-KR-Chirp3-HD-Aoede">ko-KR-Chirp3-HD-Aoede (여성)</option>
      <option value="ko-KR-Chirp3-HD-Charon">ko-KR-Chirp3-HD-Charon (남성)</option>
      <option value="ko-KR-Chirp3-HD-Fenrir">ko-KR-Chirp3-HD-Fenrir (남성)</option>
      <option value="ko-KR-Chirp3-HD-Kore">ko-KR-Chirp3-HD-Kore (여성)</option>
      <option value="ko-KR-Chirp3-HD-Leda">ko-KR-Chirp3-HD-Leda (여성)</option>
      <option value="ko-KR-Chirp3-HD-Orus">ko-KR-Chirp3-HD-Orus (남성)</option>
      <option value="ko-KR-Chirp3-HD-Puck">ko-KR-Chirp3-HD-Puck (남성)</option>
    </optgroup>
    <optgroup label="Standard — 기본">
      <option value="ko-KR-Standard-A">ko-KR-Standard-A (여성)</option>
      <option value="ko-KR-Standard-B">ko-KR-Standard-B (여성)</option>
      <option value="ko-KR-Standard-C">ko-KR-Standard-C (남성)</option>
      <option value="ko-KR-Standard-D">ko-KR-Standard-D (남성)</option>
    </optgroup>
  </select>

  <!-- 음성 파라미터 -->
  <div class="voice-group">
    <div>
      <label>말하기 속도 (0.25 ~ 4.0)</label>
      <input type="number" id="speed" value="1.0" min="0.25" max="4.0" step="0.05">
    </div>
    <div>
      <label>음높이 (-20 ~ 20 semitones)</label>
      <input type="number" id="pitch" value="0" min="-20" max="20" step="0.5">
    </div>
  </div>

  <label>오디오 인코딩</label>
  <select id="encoding">
    <option value="MP3">MP3</option>
    <option value="OGG_OPUS">OGG OPUS</option>
    <option value="LINEAR16">LINEAR16 (WAV)</option>
  </select>
</div>

<!-- 재생 버튼 -->
<button id="playBtn" onclick="synthesize()">▶ 재생</button>

<div id="status"></div>
<div id="audioWrap" style="display:none;">
  <label>결과 오디오</label>
  <audio id="audioPlayer" controls></audio>
</div>

<script>
// ── Google Cloud TTS 합성 요청 ──────────────────────────────────
// 줄 115: synthesize() — 폼 값 수집 → REST API 호출 → audio 재생
async function synthesize() {
  const apiKey  = document.getElementById('apiKey').value.trim();
  const text    = document.getElementById('text').value.trim();
  const voice   = document.getElementById('voice').value;
  const speed   = parseFloat(document.getElementById('speed').value) || 1.0;
  const pitch   = parseFloat(document.getElementById('pitch').value) || 0;
  const enc     = document.getElementById('encoding').value;
  const btn     = document.getElementById('playBtn');
  const status  = document.getElementById('status');
  const wrap    = document.getElementById('audioWrap');

  status.className = '';
  if (!apiKey) { status.textContent = '⚠️ API 키를 입력해주세요.'; status.className = 'error'; return; }
  if (!text)   { status.textContent = '⚠️ 텍스트를 입력해주세요.'; status.className = 'error'; return; }

  btn.disabled = true;
  btn.textContent = '⏳ 합성 중...';
  status.textContent = 'Google Cloud TTS 요청 중...';
  wrap.style.display = 'none';

  // 줄 136: 목소리 이름에서 언어 코드 추출 (ko-KR)
  const langCode = voice.split('-').slice(0, 2).join('-');

  // 줄 139: Chirp3 계열은 speed/pitch 파라미터 미지원
  const isChirp3 = voice.includes('Chirp3');

  const body = {
    input: { text: text },
    voice: {
      languageCode: langCode,
      name: voice,
    },
    audioConfig: {
      audioEncoding: enc,
      ...(isChirp3 ? {} : { speakingRate: speed, pitch: pitch }),
    },
  };

  try {
    // 줄 154: TTS REST API v1 엔드포인트
    const res = await fetch(
      'https://texttospeech.googleapis.com/v1/text:synthesize?key=' + encodeURIComponent(apiKey),
      { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
    );
    const data = await res.json();

    if (!res.ok) {
      // 줄 162: 에러 응답 처리
      const msg = (data.error && data.error.message) || JSON.stringify(data);
      throw new Error(msg);
    }

    if (!data.audioContent) throw new Error('audioContent 없음');

    // 줄 168: base64 → Blob → objectURL → audio 재생
    const mimeMap = { MP3: 'audio/mpeg', OGG_OPUS: 'audio/ogg', LINEAR16: 'audio/wav' };
    const mime    = mimeMap[enc] || 'audio/mpeg';
    const bytes   = Uint8Array.from(atob(data.audioContent), c => c.charCodeAt(0));
    const blob    = new Blob([bytes], { type: mime });
    const url     = URL.createObjectURL(blob);

    const player  = document.getElementById('audioPlayer');
    player.src    = url;
    wrap.style.display = 'block';
    player.play().catch(() => {});

    status.textContent = '✅ 합성 완료 — ' + voice + (isChirp3 ? ' (Chirp3: speed/pitch 미지원)' : '');

  } catch (e) {
    status.textContent = '❌ 오류: ' + e.message;
    status.className = 'error';
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ 재생';
  }
}

// 줄 190: Enter 키로도 재생
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) synthesize();
});
</script>

</body>
</html>
