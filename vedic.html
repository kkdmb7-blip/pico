<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베딕 점성술 · FORTUNA</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c28;
    --border:#2a2a3d; --accent:#7b5ea7; --accent2:#e8b86d;
    --text:#f0f0f5; --muted:#6b6b85; --radius:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4;}
  #starCanvas{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .star{position:absolute;background:#fff;border-radius:50%;opacity:0;animation:twinkle var(--dur,3s) ease-in-out infinite;animation-delay:var(--delay,0s);}
  @keyframes twinkle{0%,100%{opacity:0;transform:scale(.4)}50%{opacity:var(--max-op,.7);transform:scale(1)}}

  /* NAV */
  nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;}
  .logo{font-family:'Noto Serif KR',serif;font-weight:700;font-size:22px;letter-spacing:-.5px;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:5px;}
  .logo-dot{color:var(--accent2);font-size:10px;margin-bottom:2px;}
  .nav-btn{padding:8px 18px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,var(--accent),#a07fd4);color:#fff;border:none;font-family:'Noto Sans KR',sans-serif;text-decoration:none;transition:all .2s;white-space:nowrap;}
  .nav-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(123,94,167,.4);}

  /* MAIN */
  .main{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:40px 20px 80px;}
  .page-title{font-family:'Noto Serif KR',serif;font-size:clamp(26px,5vw,40px);font-weight:700;text-align:center;margin-bottom:6px;letter-spacing:-.5px;}
  .page-title em{font-style:normal;color:var(--accent2);}
  .page-sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:32px;}

  /* STATUS */
  .status-msg{text-align:center;padding:48px 24px;color:var(--muted);font-size:15px;display:none;}
  .status-msg.visible{display:block;}
  .status-msg.err{color:#FF1744;}
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* SECTION CARD */
  .section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;display:none;}
  .section-card.visible{display:block;}
  .section-label{font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;font-weight:600;margin-bottom:16px;}

  /* BIG 3 */
  .big3-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .big3-card{border-radius:12px;padding:16px 10px;display:flex;flex-direction:column;align-items:center;gap:7px;border:1.5px solid;text-align:center;}
  .big3-icon{font-size:22px;}
  .big3-role{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
  .big3-sym{font-size:26px;line-height:1;}
  .big3-sign{font-family:'Noto Serif KR',serif;font-size:15px;font-weight:700;line-height:1.3;}
  .big3-sub{font-size:11px;color:var(--muted);}

  /* PLANET TABLE */
  .planet-table{width:100%;border-collapse:collapse;}
  .planet-table th{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);}
  .planet-table td{padding:9px 10px;font-size:13px;border-bottom:1px solid rgba(42,42,61,.5);vertical-align:middle;}
  .planet-table tr:last-child td{border-bottom:none;}
  .planet-name{font-weight:600;}
  .sign-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:6px;font-size:12px;font-weight:700;border:1px solid;}
  .bindu-bar{display:inline-flex;gap:2px;align-items:center;}
  .bindu{width:7px;height:7px;border-radius:50%;}
  .bindu.on{background:var(--accent2);}
  .bindu.off{background:rgba(255,255,255,.1);}

  /* DASHA TIMELINE */
  .dasha-wrap{display:flex;flex-direction:column;gap:12px;}
  .dasha-row{padding:14px 18px;border-radius:12px;background:var(--surface2);}
  .dasha-tag{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .dasha-planet{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:700;color:var(--accent2);margin-bottom:4px;}
  .dasha-date{font-size:12px;color:var(--muted);}
  .dasha-remain{display:inline-block;margin-top:6px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;background:rgba(123,94,167,.15);color:var(--accent);border:1px solid rgba(123,94,167,.3);}
  .dasha-next{font-size:12px;color:var(--muted);padding:10px 14px;border-radius:8px;border:1px dashed var(--border);margin-top:4px;}

  /* YOGA LIST */
  .yoga-list{display:flex;flex-direction:column;gap:8px;}
  .yoga-row{padding:12px 16px;border-radius:10px;background:var(--surface2);display:flex;align-items:flex-start;gap:12px;}
  .yoga-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0;}
  .yoga-길{background:rgba(0,200,83,.12);color:#00C853;border:1px solid rgba(0,200,83,.25);}
  .yoga-흉{background:rgba(255,23,68,.12);color:#FF1744;border:1px solid rgba(255,23,68,.25);}
  .yoga-혼합{background:rgba(255,109,0,.12);color:#FF6D00;border:1px solid rgba(255,109,0,.25);}
  .yoga-강화{background:rgba(123,94,167,.15);color:var(--accent);border:1px solid rgba(123,94,167,.3);}
  .yoga-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;}
  .yoga-desc{font-size:12px;color:var(--muted);}

  /* INTERP TABS */
  .interp-tabs{display:flex;gap:0;margin-bottom:16px;background:var(--surface2);border-radius:10px;padding:4px;border:1px solid var(--border);width:fit-content;flex-wrap:wrap;}
  .interp-tab{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:600;background:transparent;color:var(--muted);transition:all .2s;white-space:nowrap;}
  .interp-tab.active{background:linear-gradient(135deg,var(--accent),#a07fd4);color:#fff;box-shadow:0 2px 8px rgba(123,94,167,.4);}
  .interp-tab:hover:not(.active){color:var(--text);}
  .interp-panel{display:none;}
  .interp-panel.active{display:block;}
  .interp-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .interp-sym{font-size:34px;line-height:1;width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1.5px solid;flex-shrink:0;}
  .interp-name{font-family:'Noto Serif KR',serif;font-size:19px;font-weight:700;margin-bottom:2px;}
  .interp-role{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
  .interp-text{font-size:14px;color:var(--text);line-height:1.85;}
  .dasha-interp{padding:16px;border-radius:12px;background:var(--surface2);border-left:3px solid var(--accent2);}
  .dasha-interp-title{font-size:16px;font-weight:700;color:var(--accent2);margin-bottom:8px;}
  .dasha-interp-text{font-size:14px;color:var(--text);line-height:1.8;}

  /* PAID / ACTION */
  .paid-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;opacity:.75;margin-bottom:12px;}
  .paid-left{display:flex;flex-direction:column;gap:4px;}
  .paid-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px;}
  .paid-desc{font-size:12px;color:var(--muted);}
  .btn-paid{display:inline-flex;flex-direction:column;align-items:center;padding:10px 20px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;white-space:nowrap;}
  .btn-memox{display:inline-flex;align-items:center;gap:8px;padding:13px 32px;border-radius:14px;background:linear-gradient(135deg,var(--accent2),#c9914a);color:#000;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;text-decoration:none;transition:all .2s;}
  .btn-memox:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(232,184,109,.35);}
  .action-row{display:none;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:8px;}
  .action-row.visible{display:flex;}

  /* ELEMENT COLORS */
  .el-화{color:#FF6B6B;border-color:rgba(255,107,107,.4);background:rgba(255,107,107,.07);}
  .el-지{color:#A8D5A2;border-color:rgba(168,213,162,.4);background:rgba(168,213,162,.07);}
  .el-풍{color:#FFE66D;border-color:rgba(255,230,109,.4);background:rgba(255,230,109,.07);}
  .el-수{color:#74B9FF;border-color:rgba(116,185,255,.4);background:rgba(116,185,255,.07);}

  @media(max-width:600px){
    .big3-grid{gap:8px;}
    .big3-sign{font-size:13px;}
    .big3-sym{font-size:20px;}
    .planet-table td,.planet-table th{padding:6px 5px;font-size:11px;white-space:nowrap;}
    .planet-table .col-d9{display:none;}
    .sign-chip{font-size:11px;padding:2px 5px;}
    .interp-tab{padding:6px 9px;font-size:11px;}
  }
</style>
</head>
<body>
<div id="starCanvas"></div>

<nav>
  <a href="/" class="logo"><span class="logo-dot">●</span>FORTUNA</a>
  <a href="https://kkdmb7-blip.github.io/memox/?mode=vedic" target="_blank" class="nav-btn">AI 베딕 상담</a>
</nav>

<div id="profile-bar-root"></div>
<script src="profile-bar.js"></script>

<main class="main">
  <h1 class="page-title">베딕 <em>점성술</em></h1>
  <p class="page-sub" id="page-sub">출생 시각 기준 사이드리얼 행성 배치 분석</p>

  <div class="status-msg" id="status"><span class="spinner"></span>베딕 차트 계산 중…</div>

  <!-- BIG 3 -->
  <div class="section-card" id="card-big3">
    <div class="section-label">핵심 3요소</div>
    <div class="big3-grid" id="big3-grid"></div>
  </div>

  <!-- PLANET TABLE -->
  <div class="section-card" id="card-planets">
    <div class="section-label">행성 배치 (사이드리얼)</div>
    <table class="planet-table">

  <!-- DASHA TIMELINE -->
  <div class="section-card" id="card-dasha">
    <div class="section-label">다샤 타임라인 (Vimshottari) <span style="font-size:9px;opacity:0.6;text-transform:none;font-weight:400;letter-spacing:0">· 어느 행성의 주기를 살고 있는지 보여줍니다</span></div>
    <div class="dasha-wrap" id="dasha-wrap"></div>
  </div>

  <!-- YOGAS -->
  <div class="section-card" id="card-yoga">
    <div class="section-label">요가 (Yogas) <span style="font-size:9px;opacity:0.6;text-transform:none;font-weight:400;letter-spacing:0">· 특수 행성 배치가 만들어내는 길흉 패턴</span></div>
    <div class="yoga-list" id="yoga-list"></div>

  <!-- INTERPRETATION -->
  <div class="section-card" id="card-interp">
    <div class="section-label">현대어 해석</div>

    <div id="panel-moon"  class="interp-panel active"></div>
    <div id="panel-nak"   class="interp-panel"></div>
    <div id="panel-dasha" class="interp-panel"></div>
  </div>

  <!-- PAID + ACTION -->
  <div class="section-card" id="card-action">
    <div class="paid-card">
      <div class="paid-left">
        <div class="paid-title">🔒 AI 심층 분석</div>
        <div class="paid-desc">낙샤트라 전체 해설 · 다샤 전략 · 카르마 분석 · 맞춤 운세 리포트</div>
      </div>
      <button class="btn-paid" onclick="alert('AI 심층 분석은 곧 오픈됩니다! 🔮')">
        🔒 AI 정밀 해석 받기 🔮<br>
        <span style="font-size:10px;font-weight:400;opacity:.7">질문권 1개 사용</span>
      </button>
    </div>
  </div>

  <div id="vedicShareBtnWrap" style="display:none;padding:20px 20px 32px;flex-direction:column;align-items:center;gap:10px;">
    <button id="vedicKakaoBtn" onclick="shareVedicKakao()" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 0;background:#fee500;color:#3c1e1e;border:none;border-radius:14px;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;width:100%;max-width:340px;letter-spacing:-0.3px;">🕉️ 카카오톡 공유</button>
    <a href="https://kkdmb7-blip.github.io/memox/?mode=vedic" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 0;background:linear-gradient(135deg,#7b5ea7,#a07fd4);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;width:100%;max-width:340px;text-decoration:none;letter-spacing:-0.3px;box-sizing:border-box;">✦ AI 베딕 상담하기</a>
  </div>
  <div class="action-row" id="action-row"></div>
</main>

<script>
// ── 데이터 ────────────────────────────────────────────────
const RASHI_SYM = {
  '양자리':'♈','황소자리':'♉','쌍둥이자리':'♊','게자리':'♋',
  '사자자리':'♌','처녀자리':'♍','천칭자리':'♎','전갈자리':'♏',

};

  '황소자리':'지','처녀자리':'지','염소자리':'지',
  '쌍둥이자리':'풍','천칭자리':'풍','물병자리':'풍',
  '게자리':'수','전갈자리':'수','물고기자리':'수'
};
const PLANET_ICON = { '태양':'☀️','달':'🌙','화성':'♂','수성':'☿','목성':'♃','금성':'♀','토성':'♄' };
const DASHA_ORDER = ['케투','금성','태양','달','화성','라후','목성','토성','수성'];
const DASHA_YEARS = { '케투':7,'금성':20,'태양':6,'달':10,'화성':7,'라후':18,'목성':16,'토성':19,'수성':17 };

// ── 달 라시 해석 ──────────────────────────────────────────
const MOON_INTERP = {
  '양자리':    '감정이 즉각적이고 강렬합니다. 빠르게 불붙고 빠르게 식는 열정형. 직관적 용기로 두려움 없이 행동합니다.',
  '황소자리':  '정서적 안정을 깊이 갈망합니다. 변화에 천천히 적응하며 꾸준하고 헌신적인 감정을 줍니다.',
  '쌍둥이자리':'감정이 다변하고 지적입니다. 대화와 소통으로 감정을 해소하며, 다양한 관계에서 활력을 얻습니다.',
  '게자리':    '감정이 풍부하고 직관력이 탁월합니다. 달이 자사인에 위치해 모성적 돌봄과 깊은 공감 능력이 있습니다.',
  '사자자리':  '따뜻하고 관대한 감정 표현. 인정과 사랑받을 때 충만함을 느끼며 주변을 밝게 만드는 힘이 있습니다.',

// ── 낙샤트라 해석 ─────────────────────────────────────────
const NAK_INTERP = {
  '아쉬위니':       '말의 신 아쉬위니 쿠마라의 별. 치유, 속도, 새로운 시작의 에너지. 개척자적 기질과 빠른 행동력이 특징입니다.',

// ── helpers ───────────────────────────────────────────────
function elCls(sign) { return 'el-' + (RASHI_EL[sign] || '풍'); }
function sym(sign)   { return RASHI_SYM[sign] || '✦'; }
function setVisible(id, v) { document.getElementById(id).classList.toggle('visible', v); }

function showTab(tab) {
  document.querySelectorAll('.interp-tab').forEach((b,i) => {
    b.classList.toggle('active', ['moon','nak','dasha'][i] === tab);
  });
  ['moon','nak','dasha'].forEach(t => {
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
  });
}

function remainText(endDate) {
  const ms = new Date(endDate) - Date.now();
  if (ms <= 0) return '종료됨';
  const days = Math.floor(ms / 86400000);
  if (days > 365) return Math.floor(days / 365) + '년 ' + Math.floor((days % 365) / 30) + '개월 남음';
  if (days > 30)  return Math.floor(days / 30) + '개월 남음';
  return days + '일 남음';
}

function nextDasha(currentPlanet) {
  const idx = DASHA_ORDER.indexOf(currentPlanet);
  if (idx < 0) return null;
  const next = DASHA_ORDER[(idx + 1) % 9];
  return { planet: next, years: DASHA_YEARS[next] };
}

function renderBig3(d) {
  const grid = document.getElementById('big3-grid');
  grid.innerHTML = '';
  const items = [
    { icon:'🌙', role:'달 라시',   sign: d.moonSign,   sub: '감정·직관' },
    { icon:'⭐', role:'낙샤트라',  sign: d.nakshatra,  sub: '파다 ' + (d.nakshatraPada || '') + ' · 달의 별자리' },
    { icon:'↑',  role:'상승궁(라그나)', sign: d.ascendant, sub: '외적 인상' },
  ];
  items.forEach(({ icon, role, sign, sub }) => {
    // nakshatra doesn't have a RASHI element
    const ec = RASHI_EL[sign] ? elCls(sign) : 'el-풍';
    const card = document.createElement('div');
    card.className = 'big3-card ' + ec;
    card.innerHTML =
      '<div class="big3-icon">' + icon + '</div>' +
      '<div class="big3-role">' + role + '</div>' +
      '<div class="big3-sym">' + (RASHI_SYM[sign] || '✦') + '</div>' +
      '<div class="big3-sign">' + sign + '</div>' +
      '<div class="big3-sub">' + sub + '</div>';
    grid.appendChild(card);
  });
}

function renderPlanets(d) {
  const tbody = document.getElementById('planet-tbody');
  tbody.innerHTML = '';
  const order = ['태양','달','화성','수성','목성','금성','토성'];
  order.forEach(name => {
    const p = (d.planets || []).find(x => x.name === name);
    if (!p) return;
    const ec = elCls(p.sign);
    const nav = d.navamsa && d.navamsa[name] ? d.navamsa[name] : '—';
    const avg = d.ashtakavarga && d.ashtakavarga[name] != null ? d.ashtakavarga[name] : null;
    const binduHtml = avg != null ?
      '<div class="bindu-bar">' + Array.from({length:8},(_,i)=>`<div class="bindu ${i<avg?'on':'off'}"></div>`).join('') + ' <span style="font-size:11px;color:var(--muted);margin-left:2px">' + avg + '</span></div>' : '—';
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td><span class="planet-name" title="' + (PLANET_ROLE_KO[name]||'') + '">' + (PLANET_ICON[name]||'') + ' ' + name + '</span></td>' +
      '<td><span class="sign-chip ' + ec + '">' + sym(p.sign) + ' ' + p.sign + '</span></td>' +
      '<td>' + (p.house != null ? p.house + '하우스' : '—') + '</td>' +
      '<td class="col-d9"><span class="sign-chip ' + elCls(nav) + '" style="opacity:.8">' + sym(nav) + ' ' + nav + '</span></td>' +
      '<td>' + binduHtml + '</td>';
    tbody.appendChild(tr);
  });
}

// ── FETCH ─────────────────────────────────────────────────
async function loadVedic(year, month, day, hour, gender) {
  const status = document.getElementById('status');
  status.className = 'status-msg visible';
  status.innerHTML = '<span class="spinner"></span>베딕 차트 계산 중…';

  const sp = new URLSearchParams({ year, month, day, hour, tz: 9, lat: 37.5665, lon: 126.978, gender });
  try {
    const res = await fetch('https://fortuna.kkdmb7.workers.dev/vedic?' + sp.toString());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    if (d.error) throw new Error(d.error);

    status.className = 'status-msg';
    renderBig3(d);
    setVisible('card-big3', true);
    renderPlanets(d);
    setVisible('card-planets', true);
    renderDasha(d);
    setVisible('card-dasha', true);
    renderYogas(d.yogas);
    setVisible('card-yoga', true);
    renderInterp(d);
    setVisible('card-interp', true);
    setVisible('card-action', true);

    window._vedicData = d;
    var wrap = document.getElementById('vedicShareBtnWrap');
    wrap.style.display = 'flex';
  } catch(e) {
    status.className = 'status-msg visible err';
    status.textContent = '차트 로드 오류: ' + e.message;
  }
}

  if (!t) {
    t = document.createElement('div'); t.id = '_vedicToast';
    t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(30,30,50,0.95);color:#e8e0f0;padding:11px 22px;border-radius:22px;font-size:13px;font-weight:600;z-index:9999;pointer-events:none;transition:opacity 0.4s;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._tid); t._tid = setTimeout(function(){ t.style.opacity='0'; }, 2500);
}

function _drawVedicCard(cb) {
  var d = window._vedicData;
  if (!d) { cb(null); return; }

  var today = new Date(Date.now() + 9*3600000);
  var dateStr = today.getUTCFullYear()+'년 '+(today.getUTCMonth()+1)+'월 '+today.getUTCDate()+'일';
  var RASHI_SYM2 = {'양자리':'♈','황소자리':'♉','쌍둥이자리':'♊','게자리':'♋','사자자리':'♌','처녀자리':'♍','천칭자리':'♎','전갈자리':'♏','사수자리':'♐','염소자리':'♑','물병자리':'♒','물고기자리':'♓'};
  var RASHI_EL2 = {'양자리':'화','사자자리':'화','사수자리':'화','황소자리':'지','처녀자리':'지','염소자리':'지','쌍둥이자리':'풍','천칭자리':'풍','물병자리':'풍','게자리':'수','전갈자리':'수','물고기자리':'수'};
  var EL_C2 = {'화':'#FF6B6B','지':'#A8D5A2','풍':'#FFE66D','수':'#74B9FF'};

  var W = 1080, H = 1920;
  var canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  var ctx = canvas.getContext('2d');

  var bg = ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#0d0a1a'); bg.addColorStop(0.5,'#1a0a2a'); bg.addColorStop(1,'#0a1020');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  [[8,12],[20,35],[38,8],[55,22],[72,10],[85,28],[6,52],[18,68],[32,80],[50,60],[66,78],[82,48],[90,65],[14,90],[44,45],[78,35],[60,90],[25,15],[92,82],[48,30],[35,55],[15,42],[70,25]].forEach(function(s){
    ctx.beginPath(); ctx.arc(s[0]/100*W, s[1]/100*H, ((s[0]*3+s[1])%3)+1.5, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,'+(0.25+((s[0]+s[1])%5)*0.1)+')'; ctx.fill();
  });

  ctx.textAlign='center';
  var drawLine=function(cy,w2,alpha){
    var lg=ctx.createLinearGradient(W/2-w2,0,W/2+w2,0);
    lg.addColorStop(0,'transparent'); lg.addColorStop(0.5,'rgba(168,213,162,'+alpha+')'); lg.addColorStop(1,'transparent');
    ctx.strokeStyle=lg; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(W/2-w2,cy); ctx.lineTo(W/2+w2,cy); ctx.stroke();
  };

  var y=120;
  ctx.font='700 40px "Noto Sans KR",sans-serif'; ctx.fillStyle='#A8D5A2';
  ctx.fillText('FORTUNA', W/2, y);
  y+=32; ctx.font='400 26px "Noto Sans KR",sans-serif'; ctx.fillStyle='rgba(168,213,162,0.65)';
  ctx.fillText('베딕 점성술 차트', W/2, y);
  y+=36; ctx.font='400 24px "Noto Sans KR",sans-serif'; ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.fillText(dateStr, W/2, y);
  y+=30; drawLine(y,180,0.5);

  // 빅3
  var big3=[
    {icon:'🌙', role:'달 라시', sign:d.moonSign},
    {icon:'⭐', role:'낙샤트라', sign:d.nakshatra},
    {icon:'↑',  role:'상승궁', sign:d.ascendant},
  ];
  y+=50;
  ctx.font='700 28px "Noto Sans KR",sans-serif'; ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText('🌙 달 · ⭐ 낙샤트라 · ↑ 상승궁', W/2, y);

  var cardW=280, cardH=220, cardGap=20;
  var totalW=big3.length*cardW+(big3.length-1)*cardGap;
  var cx0=W/2-totalW/2;
  y+=30;
  big3.forEach(function(c,i){
    var cx2=cx0+i*(cardW+cardGap);
    var elC3=EL_C2[RASHI_EL2[c.sign]]||'#A8D5A2';
    ctx.fillStyle='rgba(255,255,255,0.04)';
    ctx.beginPath(); ctx.roundRect(cx2,y,cardW,cardH,14); ctx.fill();
    ctx.strokeStyle='rgba(168,213,162,0.25)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(cx2,y,cardW,cardH,14); ctx.stroke();
    ctx.font='52px serif'; ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.fillText(c.icon, cx2+cardW/2, y+70);
    ctx.font='400 20px "Noto Sans KR",sans-serif'; ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.fillText(c.role, cx2+cardW/2, y+105);
    ctx.font='700 24px "Noto Sans KR",sans-serif'; ctx.fillStyle=elC3;
    ctx.fillText(c.sign||'–', cx2+cardW/2, y+145);
    ctx.font='400 28px serif'; ctx.fillStyle='rgba(255,255,255,0.2)';
    ctx.fillText(RASHI_SYM2[c.sign]||'', cx2+cardW/2, y+185);
  });
  ctx.textAlign='center';

  // 다샤
  y+=cardH+50; drawLine(y,180,0.3); y+=44;
  ctx.font='700 28px "Noto Sans KR",sans-serif'; ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText('🔮 현재 다샤 (행성 대운)', W/2, y); y+=44;

  if(d.dasha){
    var dashaItems=[];
    if(d.dasha.mahadasha) dashaItems.push({label:'마하다샤',val:d.dasha.mahadasha});
    if(d.dasha.antardasha) dashaItems.push({label:'안타르다샤',val:d.dasha.antardasha});
    dashaItems.forEach(function(item){
      ctx.textAlign='left'; ctx.font='400 22px "Noto Sans KR",sans-serif'; ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.fillText(item.label, W/2-200, y);
      ctx.textAlign='right'; ctx.font='700 24px "Noto Sans KR",sans-serif'; ctx.fillStyle='#A8D5A2';
      ctx.fillText(item.val, W/2+200, y);
      ctx.textAlign='center'; y+=44;
    });
  }

  // 행성
  y+=10; drawLine(y,180,0.3); y+=44;
  ctx.font='700 28px "Noto Sans KR",sans-serif'; ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText('🌟 주요 행성 배치', W/2, y); y+=40;
  var PNAME={'태양':'☀️','달':'🌙','수성':'☿','금성':'♀','화성':'♂','목성':'♃','토성':'♄'};
  (d.planets||[]).slice(0,7).forEach(function(p){
    var elC4=EL_C2[RASHI_EL2[p.sign]]||'rgba(255,255,255,0.6)';
    ctx.textAlign='left'; ctx.font='400 22px "Noto Sans KR",sans-serif'; ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.fillText((PNAME[p.name]||'')+(p.name||''), W/2-200, y);
    ctx.textAlign='right'; ctx.font='700 22px "Noto Sans KR",sans-serif'; ctx.fillStyle=elC4;
    ctx.fillText((RASHI_SYM2[p.sign]||'')+' '+(p.sign||''), W/2+200, y);
    ctx.textAlign='center'; y+=38;
  });

  y=H-110; drawLine(y,150,0.4);
  y+=42; ctx.font='400 24px "Noto Sans KR",sans-serif'; ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.fillText('picolab.kr', W/2, y);

  cb(canvas);
}

function shareVedicKakao() {
  var btn = document.getElementById('vedicKakaoBtn');
  if(btn){ btn.disabled=true; btn.textContent='⏳ 생성 중...'; }
  var pageUrl='https://picolab.kr?utm_source=share&utm_medium=kakao';
  try{ navigator.clipboard && navigator.clipboard.writeText(pageUrl); }catch(e){}
  _drawVedicCard(function(canvas){
    if(btn){ btn.disabled=false; btn.textContent='🕉️ 카카오톡 공유'; }
    if(!canvas){ _vedicShowToast('카드 생성 실패 😢'); return; }
    canvas.toBlob(function(blob){
      if(!blob){ _vedicShowToast('이미지 생성 실패'); return; }
      var file=new File([blob],'fortuna_vedic.png',{type:'image/png'});
      if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:'FORTUNA 베딕 점성술'})
          .then(function(){ _vedicShowToast('🔗 링크가 클립보드에 복사됐어요!'); }).catch(function(){});
      } else if(navigator.share){
        navigator.share({title:'FORTUNA 베딕 점성술',url:pageUrl}).catch(function(){});
        _vedicShowToast('🔗 링크가 클립보드에 복사됐어요!');
      } else {
        _vedicShowToast('🔗 링크가 클립보드에 복사됐어요!');
      }
    },'image/png');
  });
}
