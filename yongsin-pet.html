<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>용신 키우기 · FORTUNA</title>
<meta name="theme-color" content="#f4ede0">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="stylesheet" href="pico-icons.css">
<style>
:root {
  --bg: #f4ede0;
  --surface: #f9f1de;
  --surface2: #e8dcc0;
  --border: #c8b890;
  --ink: #1a120a;
  --text: #2a1e10;
  --text2: #4a3a2a;
  --muted: #5a4830;
  --gold: #8a6a15;
  --gold-deep: #6a4f0c;
  --accent: #7a2418;
  --fn: 'Pretendard Variable', Pretendard, -apple-system, 'Noto Sans KR', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  font-family: var(--fn);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* NAV */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(244,237,224,0.96);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(154,138,96,0.2);
  padding: 0 20px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-brand {
  display: flex; align-items: center; gap: 8px; text-decoration: none;
}
.nav-brand img {
  height: 40px; object-fit: contain;
  filter: drop-shadow(0 2px 6px rgba(60,30,10,0.35)) brightness(0.78);
}
.nav-brand span {
  font-family: 'Noto Serif KR', serif; font-size: 15px; font-weight: 700;
  letter-spacing: 2px; color: var(--gold-deep);
}
.nav-back {
  font-size: 13px; color: var(--muted); text-decoration: none;
  background: none; border: none; cursor: pointer; font-family: var(--fn);
}

.wrap { max-width: 480px; margin: 0 auto; padding: 24px 20px; }

/* HEADER */
.page-header {
  text-align: center; margin-bottom: 28px;
}
.page-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 22px; font-weight: 700;
  color: var(--ink); margin-bottom: 6px;
}
.page-sub { font-size: 13px; color: var(--muted); }

/* ELEMENT SELECTOR */
.element-tabs {
  display: flex; gap: 6px; justify-content: center;
  margin-bottom: 24px; flex-wrap: wrap;
}
.elem-btn {
  padding: 8px 16px; border-radius: 20px;
  font-size: 13px; font-weight: 700;
  border: 1.5px solid; cursor: pointer;
  transition: all 0.2s; font-family: var(--fn);
  background: var(--surface);
}
.elem-btn.wood  { color: #1a6630; border-color: #1a6630; }
.elem-btn.fire  { color: #8a1a1a; border-color: #8a1a1a; }
.elem-btn.earth { color: #6a4a10; border-color: #6a4a10; }
.elem-btn.metal { color: #3a3a3a; border-color: #3a3a3a; }
.elem-btn.water { color: #0d3a7a; border-color: #0d3a7a; }
.elem-btn.active.wood  { background: #1a6630; color: #fff; }
.elem-btn.active.fire  { background: #8a1a1a; color: #fff; }
.elem-btn.active.earth { background: #6a4a10; color: #fff; }
.elem-btn.active.metal { background: #3a3a3a; color: #fff; }
.elem-btn.active.water { background: #0d3a7a; color: #fff; }

/* PET CARD */
.pet-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 24px;
  padding: 28px 20px 20px;
  box-shadow: 0 4px 20px rgba(60,40,20,0.10);
  margin-bottom: 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.pet-card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, var(--pet-glow, rgba(138,106,21,0.08)) 0%, transparent 70%);
  pointer-events: none;
}

/* PET STAGE */
.pet-stage {
  width: 180px; height: 180px;
  margin: 0 auto 16px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}

/* ── 목(木) 나무정령 ── */
.pet-wood {
  width: 130px; height: 130px;
  position: relative;
  animation: wood-sway 3s ease-in-out infinite;
  transform-origin: bottom center;
}
@keyframes wood-sway {
  0%,100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}
.pet-wood .body {
  width: 80px; height: 90px;
  background: linear-gradient(160deg, #2a8a40 0%, #1a6630 60%, #145228 100%);
  border-radius: 50% 50% 40% 40% / 55% 55% 45% 45%;
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  box-shadow: 0 4px 12px rgba(26,102,48,0.3);
}
.pet-wood .body::after {
  content: '';
  position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
  width: 50px; height: 30px;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
}
.pet-wood .face {
  position: absolute; bottom: 44px; left: 50%; transform: translateX(-50%);
  width: 52px; z-index: 2;
}
.pet-wood .eye {
  width: 11px; height: 11px;
  background: #fff;
  border-radius: 50%;
  display: inline-block; margin: 0 5px;
  position: relative;
}
.pet-wood .eye::after {
  content: '';
  position: absolute; top: 2px; left: 2px;
  width: 7px; height: 7px;
  background: #1a3a10;
  border-radius: 50%;
}
.pet-wood .mouth {
  width: 20px; height: 8px;
  border-bottom: 2.5px solid rgba(255,255,255,0.7);
  border-radius: 0 0 10px 10px;
  margin: 4px auto 0;
}
.pet-wood .trunk {
  width: 18px; height: 24px;
  background: linear-gradient(180deg, #6a3a10 0%, #4a2808 100%);
  border-radius: 4px;
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
}
.pet-wood .leaf1, .pet-wood .leaf2, .pet-wood .leaf3 {
  position: absolute;
  width: 28px; height: 20px;
  background: linear-gradient(135deg, #3aaa50 0%, #1a7835 100%);
  border-radius: 50% 10% 50% 10%;
  box-shadow: 0 2px 6px rgba(26,102,48,0.2);
}
.pet-wood .leaf1 { top: 0; left: 20px; transform: rotate(-20deg); }
.pet-wood .leaf2 { top: 10px; right: 12px; transform: rotate(30deg); }
.pet-wood .leaf3 { top: -8px; left: 50%; transform: translateX(-50%) rotate(10deg); width: 32px; height: 22px; }
.pet-wood .sparkle { position: absolute; }
.pet-wood .sparkle::before, .pet-wood .sparkle::after {
  content: '✦'; font-size: 10px; color: #7aff88; opacity: 0;
  position: absolute;
  animation: sparkle-pop 2.5s ease-in-out infinite;
}
.pet-wood .sparkle::before { top: -10px; left: 5px; animation-delay: 0.3s; }
.pet-wood .sparkle::after  { top: 5px; right: -8px; animation-delay: 1.1s; }

/* ── 화(火) 불꽃령 ── */
.pet-fire {
  width: 110px; height: 140px;
  position: relative;
  animation: fire-pulse 1.8s ease-in-out infinite;
}
@keyframes fire-pulse {
  0%,100% { transform: scaleX(1) scaleY(1); }
  50% { transform: scaleX(1.04) scaleY(0.97); }
}
.pet-fire .flame-body {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 80px; height: 110px;
}
.pet-fire .flame-main {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 72px; height: 90px;
  background: linear-gradient(180deg, #ff9a00 0%, #e53935 50%, #b71c1c 100%);
  border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
  box-shadow: 0 0 20px rgba(229,57,53,0.5), 0 0 40px rgba(255,154,0,0.3);
}
.pet-fire .flame-inner {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  width: 44px; height: 60px;
  background: linear-gradient(180deg, #fff176 0%, #ffcc02 50%, #ff8f00 100%);
  border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
  opacity: 0.9;
}
.pet-fire .flame-tip {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 24px; height: 40px;
  background: linear-gradient(180deg, #fff 0%, #fff59d 100%);
  border-radius: 50% 50% 30% 30% / 70% 70% 30% 30%;
  opacity: 0.85;
  animation: flame-tip 1s ease-in-out infinite alternate;
}
@keyframes flame-tip {
  from { transform: translateX(-50%) rotate(-5deg); }
  to   { transform: translateX(-50%) rotate(5deg); }
}
.pet-fire .face {
  position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
  width: 50px; z-index: 3;
}
.pet-fire .eye {
  width: 10px; height: 10px;
  background: #fff;
  border-radius: 50%;
  display: inline-block; margin: 0 5px;
  position: relative;
}
.pet-fire .eye::after {
  content: '';
  position: absolute; top: 2px; left: 2px;
  width: 6px; height: 6px;
  background: #3a0a00;
  border-radius: 50%;
}
.pet-fire .mouth {
  width: 22px; height: 10px;
  border-bottom: 2.5px solid rgba(255,255,255,0.8);
  border-radius: 0 0 12px 12px;
  margin: 4px auto 0;
}
.pet-fire .ember {
  position: absolute; border-radius: 50%;
  animation: ember-float 2s ease-in-out infinite;
  opacity: 0;
}
.pet-fire .ember:nth-child(1) { width:5px;height:5px;background:#ffcc02;top:10px;left:15px;animation-delay:0s; }
.pet-fire .ember:nth-child(2) { width:4px;height:4px;background:#ff8f00;top:0;left:60%;animation-delay:0.6s; }
.pet-fire .ember:nth-child(3) { width:3px;height:3px;background:#ff5722;top:15px;right:10px;animation-delay:1.2s; }
@keyframes ember-float {
  0% { opacity:0; transform:translateY(0); }
  30% { opacity:1; }
  100% { opacity:0; transform:translateY(-30px) rotate(30deg); }
}

/* ── 토(土) 대지정령 ── */
.pet-earth {
  width: 120px; height: 110px;
  position: relative;
  animation: earth-bounce 2.4s ease-in-out infinite;
}
@keyframes earth-bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.pet-earth .body {
  width: 110px; height: 95px;
  background: linear-gradient(160deg, #a0724a 0%, #7a5230 60%, #5a3a1a 100%);
  border-radius: 55% 55% 50% 50% / 58% 58% 42% 42%;
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  box-shadow: 0 6px 18px rgba(90,58,26,0.35);
}
.pet-earth .body::before {
  content: '';
  position: absolute; top: 10px; left: 15px;
  width: 80px; height: 30px;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
}
.pet-earth .tummy {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  width: 62px; height: 42px;
  background: linear-gradient(160deg, #c89a6a 0%, #a07040 100%);
  border-radius: 50%;
}
.pet-earth .face {
  position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
  width: 56px; z-index: 2;
}
.pet-earth .eye {
  width: 13px; height: 13px;
  background: #fff;
  border-radius: 50%;
  display: inline-block; margin: 0 4px;
  position: relative;
}
.pet-earth .eye::after {
  content: '';
  position: absolute; top: 3px; left: 3px;
  width: 7px; height: 7px;
  background: #2a1a08;
  border-radius: 50%;
}
.pet-earth .blush {
  position: absolute; top: 3px;
  width: 10px; height: 6px;
  background: rgba(200,100,80,0.4);
  border-radius: 50%;
}
.pet-earth .blush.left { left: -6px; }
.pet-earth .blush.right { right: -6px; }
.pet-earth .mouth {
  width: 20px; height: 9px;
  border-bottom: 2.5px solid rgba(255,255,255,0.6);
  border-radius: 0 0 10px 10px;
  margin: 5px auto 0;
}
.pet-earth .pebble {
  position: absolute;
  width: 8px; height: 6px;
  background: rgba(160,120,60,0.5);
  border-radius: 50%;
  animation: pebble-orbit 4s linear infinite;
}
.pet-earth .pebble:nth-child(1) { animation-delay: 0s; }
.pet-earth .pebble:nth-child(2) { animation-delay: 1.3s; width:5px;height:4px; }
.pet-earth .pebble:nth-child(3) { animation-delay: 2.7s; width:6px;height:5px; }
@keyframes pebble-orbit {
  0%   { transform: rotate(0deg) translateX(58px) rotate(0deg); opacity:0.8; }
  100% { transform: rotate(360deg) translateX(58px) rotate(-360deg); opacity:0.8; }
}

/* ── 금(金) 금빛령 ── */
.pet-metal {
  width: 120px; height: 130px;
  position: relative;
  animation: metal-float 2.8s ease-in-out infinite;
}
@keyframes metal-float {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-8px) rotate(1deg); }
}
.pet-metal .crystal {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  width: 80px; height: 90px;
}
.pet-metal .crystal-body {
  width: 80px; height: 80px;
  background: linear-gradient(135deg, #e8e0d0 0%, #c8b890 30%, #a89060 60%, #888060 100%);
  clip-path: polygon(50% 0%, 95% 30%, 95% 70%, 50% 100%, 5% 70%, 5% 30%);
  position: absolute; bottom: 0;
  box-shadow: 0 0 20px rgba(200,184,144,0.5), inset 0 0 20px rgba(255,255,255,0.2);
  animation: crystal-shimmer 2s ease-in-out infinite alternate;
}
@keyframes crystal-shimmer {
  from { filter: brightness(1); }
  to   { filter: brightness(1.15); }
}
.pet-metal .crystal-shine {
  position: absolute; top: 8px; left: 22px;
  width: 22px; height: 35px;
  background: linear-gradient(160deg, rgba(255,255,255,0.7) 0%, transparent 80%);
  clip-path: polygon(50% 0%, 100% 40%, 50% 100%, 0% 40%);
}
.pet-metal .face {
  position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
  width: 50px; z-index: 3;
}
.pet-metal .eye {
  width: 10px; height: 10px;
  background: #fff;
  border-radius: 50%;
  display: inline-block; margin: 0 5px;
  position: relative;
  box-shadow: 0 0 4px rgba(200,184,144,0.6);
}
.pet-metal .eye::after {
  content: '';
  position: absolute; top: 2px; left: 2px;
  width: 6px; height: 6px;
  background: #1a1a2a;
  border-radius: 50%;
}
.pet-metal .mouth {
  width: 18px; height: 8px;
  border-bottom: 2px solid rgba(255,255,255,0.7);
  border-radius: 0 0 9px 9px;
  margin: 4px auto 0;
}
.pet-metal .sparkle {
  position: absolute;
  color: #e8d890;
  animation: star-spin 1.5s ease-in-out infinite;
  opacity: 0;
  font-size: 14px;
}
.pet-metal .sparkle:nth-child(1) { top: -5px; left: 10px; animation-delay: 0s; }
.pet-metal .sparkle:nth-child(2) { top: 15px; right: 5px; animation-delay: 0.5s; }
.pet-metal .sparkle:nth-child(3) { bottom: 25px; left: 0; animation-delay: 1s; }
@keyframes star-spin {
  0%,100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
  50% { opacity: 1; transform: scale(1) rotate(180deg); }
}

/* ── 수(水) 물방울령 ── */
.pet-water {
  width: 110px; height: 130px;
  position: relative;
  animation: water-wobble 2s ease-in-out infinite;
}
@keyframes water-wobble {
  0%,100% { transform: scaleX(1) scaleY(1); }
  25% { transform: scaleX(0.95) scaleY(1.04); }
  75% { transform: scaleX(1.04) scaleY(0.96); }
}
.pet-water .drop-body {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 88px; height: 110px;
  background: linear-gradient(160deg, #5ba8e0 0%, #1565c0 55%, #0d47a1 100%);
  border-radius: 50% 50% 40% 40% / 45% 45% 55% 55%;
  clip-path: polygon(50% 0%, 100% 50%, 85% 100%, 15% 100%, 0% 50%);
  box-shadow: 0 6px 20px rgba(21,101,192,0.4), inset 0 -4px 12px rgba(0,0,0,0.15);
}
.pet-water .drop-shine {
  position: absolute; top: 12px; left: 24px;
  width: 20px; height: 30px;
  background: linear-gradient(160deg, rgba(255,255,255,0.6) 0%, transparent 80%);
  border-radius: 50%;
}
.pet-water .drop-body2 {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 88px; height: 110px;
  background: linear-gradient(160deg, rgba(100,200,255,0.2) 0%, transparent 50%);
  border-radius: 50% 50% 40% 40% / 45% 45% 55% 55%;
  clip-path: polygon(50% 0%, 100% 50%, 85% 100%, 15% 100%, 0% 50%);
}
.pet-water .face {
  position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
  width: 52px; z-index: 3;
}
.pet-water .eye {
  width: 11px; height: 11px;
  background: #fff;
  border-radius: 50%;
  display: inline-block; margin: 0 5px;
  position: relative;
}
.pet-water .eye::after {
  content: '';
  position: absolute; top: 2px; left: 2px;
  width: 7px; height: 7px;
  background: #0d1a3a;
  border-radius: 50%;
}
.pet-water .mouth {
  width: 20px; height: 9px;
  border-bottom: 2.5px solid rgba(255,255,255,0.75);
  border-radius: 0 0 10px 10px;
  margin: 4px auto 0;
}
.pet-water .ripple {
  position: absolute; border: 1.5px solid rgba(100,180,255,0.5);
  border-radius: 50%; bottom: -8px; left: 50%; transform: translateX(-50%);
  animation: ripple-out 2s ease-out infinite;
  opacity: 0;
}
.pet-water .ripple:nth-child(1) { width:30px;height:10px; animation-delay:0s; }
.pet-water .ripple:nth-child(2) { width:50px;height:15px; animation-delay:0.5s; }
.pet-water .ripple:nth-child(3) { width:70px;height:20px; animation-delay:1s; }
@keyframes ripple-out {
  0% { opacity:0.7; transform:translateX(-50%) scale(0.8); }
  100% { opacity:0; transform:translateX(-50%) scale(1.3); }
}

/* sparkle keyframe (shared) */
@keyframes sparkle-pop {
  0%,100% { opacity:0; transform:scale(0.5); }
  50% { opacity:1; transform:scale(1.2); }
}

/* PET NAME & LEVEL */
.pet-name {
  font-family: 'Noto Serif KR', serif;
  font-size: 18px; font-weight: 700;
  color: var(--ink); margin-bottom: 2px;
}
.pet-level {
  font-size: 12px; color: var(--muted);
  margin-bottom: 14px;
}

/* STATUS BARS */
.status-bars { margin-bottom: 16px; }
.status-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px;
}
.status-label {
  font-size: 11px; font-weight: 700; color: var(--muted);
  width: 42px; flex-shrink: 0; white-space: nowrap;
}
.bar-bg {
  flex: 1; height: 8px; background: var(--surface2);
  border-radius: 4px; overflow: hidden;
}
.bar-fill {
  height: 100%; border-radius: 4px;
  transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
.bar-fill.hunger { background: linear-gradient(90deg, #e55a2b, #ff8a50); }
.bar-fill.happy  { background: linear-gradient(90deg, #1a8a40, #4caf50); }
.bar-fill.energy { background: linear-gradient(90deg, #1565c0, #42a5f5); }
.status-val {
  font-size: 11px; color: var(--muted); width: 28px; text-align: right;
}

/* MESSAGE BUBBLE */
.pet-message {
  background: rgba(138,106,21,0.08);
  border: 1px solid rgba(138,106,21,0.22);
  border-radius: 14px; padding: 10px 16px;
  font-size: 13px; color: var(--text2);
  line-height: 1.6; margin-bottom: 6px;
  min-height: 44px;
  transition: all 0.3s;
}

/* ACTION BUTTONS */
.action-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 20px;
}
.action-btn {
  padding: 14px 10px;
  border-radius: 14px;
  border: 1.5px solid;
  font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: var(--fn);
  transition: all 0.18s;
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
}
.action-btn .btn-icon { font-size: 22px; }
.action-btn .btn-desc { font-size: 10px; font-weight: 500; opacity: 0.75; letter-spacing: 0.02em; }
.action-btn:active { transform: scale(0.95); }
.btn-feed  { background: linear-gradient(135deg,#7a2418,#5a1810); color:#fcf7ea; border-color:#5a1810; box-shadow:0 2px 8px rgba(122,36,24,0.22); }
.btn-play  { background: linear-gradient(135deg,#1a6630,#145228); color:#fcf7ea; border-color:#145228; box-shadow:0 2px 8px rgba(26,102,48,0.22); }
.btn-sleep { background: linear-gradient(135deg,#1565c0,#0d47a1); color:#fcf7ea; border-color:#0d47a1; box-shadow:0 2px 8px rgba(21,101,192,0.22); }
.btn-orb   { background: linear-gradient(135deg,#8a6a15,#6a4f0c); color:#fcf7ea; border-color:#5a4008; box-shadow:0 2px 8px rgba(138,106,21,0.22); }

/* INFO CARD */
.info-card {
  background: var(--surface);
  border: 1px solid rgba(154,138,96,0.3);
  border-radius: 16px; padding: 16px 18px;
  margin-bottom: 16px;
}

// PNG 배경 제거 (flood fill 외곽 제거 + 내부 고립 픽셀 제거)
function removeBgAndApply(src, imgEl) {
  var tmp = new Image();
  tmp.crossOrigin = 'anonymous';
  tmp.onload = function() {
    var cv = document.createElement('canvas');
    var W = tmp.naturalWidth, H = tmp.naturalHeight;
    cv.width = W; cv.height = H;
    var ctx = cv.getContext('2d');
    ctx.drawImage(tmp, 0, 0);
    var data = ctx.getImageData(0, 0, W, H);
    var d = data.data;

    // 테두리 픽셀로 배경색 후보 2개 (체크보드 밝은색/어두운색) 수집
    var colorMap = {};
    function addSample(x,y){
      var i=(y*W+x)*4;
      if(d[i+3]<10) return;
      var key = (d[i]>>4)+','+(d[i+1]>>4)+','+(d[i+2]>>4);
      colorMap[key]=(colorMap[key]||{count:0,r:d[i],g:d[i+1],b:d[i+2]});
      colorMap[key].count++;
    }
    for(var x=0;x<W;x++){addSample(x,0);addSample(x,H-1);}
    for(var y=0;y<H;y++){addSample(0,y);addSample(W-1,y);}
    // 가장 많이 나온 색 2개를 배경색으로
    var sorted=Object.values(colorMap).sort(function(a,b){return b.count-a.count;});
    var bgColors=sorted.slice(0,2).map(function(c){return[c.r,c.g,c.b];});

    var thr=45;
    function isBg(i){
      return bgColors.some(function(bg){
        return Math.abs(d[i]-bg[0])<thr && Math.abs(d[i+1]-bg[1])<thr && Math.abs(d[i+2]-bg[2])<thr && d[i+3]>10;
      });
    }
    function transp(i){ d[i+3]=0; }

    // 1단계: flood fill — 테두리에서 연결된 배경 제거
    var visited=new Uint8Array(W*H);
    var queue=[];
    function tryAdd(x,y){
      if(x<0||x>=W||y<0||y>=H) return;
      var idx=y*W+x;
      if(visited[idx]) return;
      if(isBg(idx*4)){visited[idx]=1;queue.push(idx);}
    }
    for(var x=0;x<W;x++){tryAdd(x,0);tryAdd(x,H-1);}
    for(var y=0;y<H;y++){tryAdd(0,y);tryAdd(W-1,y);}
    var qi=0;
    while(qi<queue.length){
      var idx=queue[qi++];
      transp(idx*4);
      var cx=idx%W,cy=(idx/W)|0;
      tryAdd(cx-1,cy);tryAdd(cx+1,cy);tryAdd(cx,cy-1);tryAdd(cx,cy+1);
    }

    // 2단계: 남은 고립 배경 픽셀 제거 (주변 8방향이 모두 투명이거나 배경이면 제거) — 3회 반복
    for(var pass=0;pass<3;pass++){
      for(var y=1;y<H-1;y++){
        for(var x=1;x<W-1;x++){
          var i=(y*W+x)*4;
          if(!isBg(i)) continue;
          var nbTransp=0;
          for(var dy=-1;dy<=1;dy++) for(var dx=-1;dx<=1;dx++){
            if(dx===0&&dy===0) continue;
            var ni=((y+dy)*W+(x+dx))*4;
            if(d[ni+3]<10||isBg(ni)) nbTransp++;
          }
          if(nbTransp>=6) transp(i);
        }
      }
    }

    ctx.putImageData(data,0,0);
    imgEl.src=cv.toDataURL('image/png');
  };
  tmp.src=src;
}

function loadFromServer(cb) {
  var uid = getCurrentUserId();
  if (!uid) { cb(null); return; }
  fetch(SB_URL + '/rest/v1/reports?user_id=eq.' + encodeURIComponent(uid) + '&report_type=eq.pet_state&select=content,created_at&order=created_at.desc&limit=1', {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  }).then(function(r) { return r.json(); }).then(function(rows) {
    if (rows && rows[0] && rows[0].content && rows[0].content[0]) {
      try { cb(JSON.parse(rows[0].content[0])); } catch(e) { cb(null); }
    } else { cb(null); }
  }).catch(function() { cb(null); });
}

function _applyOfflineTime(s) {
  if (s.lastVisit) {
    var hours = (Date.now() - s.lastVisit) / 3600000;
    s.hunger = Math.max(0, s.hunger - hours * 5);
    s.happy  = Math.max(0, s.happy  - hours * 3);
    s.energy = Math.min(100, s.energy + (s.sleeping ? hours * 10 : 0));
  }
  return s;
}

// localStorage에서 불러오기
function loadState() {
  try {
    var saved = JSON.parse(localStorage.getItem('yongsin_pet'));
    if (saved) {
      if (saved.all) {
        allStates = saved.all || {};
        slotElements.slot1 = saved.element  || null;
        slotElements.slot2 = saved.element2 || null;
        // activeSlot 기준 원소 로드
        var el = slotElements[activeSlot] || slotElements.slot1;
        state.element = el;
        if (el && allStates[el]) {
          Object.assign(state, _applyOfflineTime(Object.assign({}, allStates[el])));
          state.element = el;
        }
      } else if (saved.element) {
        // 구형 포맷 → 마이그레이션
        var elState = Object.assign({}, saved);
        slotElements.slot1 = saved.element;
        state.element = saved.element;
        delete elState.element;
        allStates[state.element] = elState;
        Object.assign(state, _applyOfflineTime(Object.assign({}, elState)));
      }
    }
  } catch(e) {}

  try {
    var ys = localStorage.getItem('pico_yongsin') || localStorage.getItem('_yongsin_cached');
    if (!slotElements.slot1 && ys) {
      var map = { '목': 'wood', '화': 'fire', '토': 'earth', '금': 'metal', '수': 'water' };
      for (var k in map) if (ys.includes(k)) { slotElements.slot1 = map[k]; state.element = map[k]; break; }
    }
  } catch(e) {}
}

var _syncTimer;
function saveState() {
  state.lastVisit = Date.now();
  if (state.element) {
    var elState = Object.assign({}, state);
    delete elState.element;
    allStates[state.element] = elState;
  }
  try { localStorage.setItem('yongsin_pet', JSON.stringify({ all: allStates, element: slotElements.slot1, element2: slotElements.slot2 })); } catch(e) {}
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(syncToServer, 1000);
}

function selectElement(el) {
  // 다른 슬롯에서 이미 사용 중인 원소 방지
  var otherSlot = activeSlot === 'slot1' ? 'slot2' : 'slot1';
  if (slotElements[otherSlot] === el) {
    showToast('이미 다른 슬롯에서 키우고 있어요!');
    return;
  }
  // 현재 오행 상태 저장
  if (state.element) {
    state.lastVisit = Date.now();
    var curState = Object.assign({}, state);
    delete curState.element;
    allStates[state.element] = curState;
  }
  slotElements[activeSlot] = el;
  // 새 오행 상태 로드 (없으면 새로 시작)
  var fresh = getDefaultState();
  fresh.birthDate = new Date().toLocaleDateString('ko-KR');
  var newElState = allStates[el] ? _applyOfflineTime(Object.assign({}, allStates[el])) : fresh;
  Object.assign(state, getDefaultState(), newElState, { element: el });
  saveState();
  render();
  renderSlotTabs();
}

function switchSlot(slot) {
  if (slot === activeSlot) return;
  // 현재 슬롯 상태 저장
  if (state.element) {
    var curState = Object.assign({}, state);
    delete curState.element;
    allStates[state.element] = curState;
  }
  activeSlot = slot;
  var el = slotElements[slot];
  state.element = el || null;
  if (el && allStates[el]) {
    Object.assign(state, getDefaultState(), _applyOfflineTime(Object.assign({}, allStates[el])), { element: el });
  } else if (!el) {
    Object.assign(state, getDefaultState(), { element: null });
  }
  saveState();
  render();
  renderMission();
  renderSlotTabs();
}

function renderSlotTabs() {
  var ELEM_SHORT = { wood:'목(木)', fire:'화(火)', earth:'토(土)', metal:'금(金)', water:'수(水)' };
  var btn1 = document.getElementById('slotBtn1');
  var btn2 = document.getElementById('slotBtn2');
  if (!btn1 || !btn2) return;
  var lbl1 = '🔮 용신' + (slotElements.slot1 ? ' · ' + ELEM_SHORT[slotElements.slot1] : '');
  var lbl2 = '✨ 희신' + (slotElements.slot2 ? ' · ' + ELEM_SHORT[slotElements.slot2] : '');
  btn1.textContent = lbl1;
  btn2.textContent = lbl2;
  btn1.style.background = activeSlot === 'slot1' ? 'var(--gold)' : 'transparent';
  btn1.style.color      = activeSlot === 'slot1' ? '#1a1200'      : 'var(--muted)';
  btn2.style.background = activeSlot === 'slot2' ? 'var(--gold)' : 'transparent';
  btn2.style.color      = activeSlot === 'slot2' ? '#1a1200'      : 'var(--muted)';
}

function render() {
  if (!state.element) {
    var emptyMsg = activeSlot === 'slot1' ? '용신 원소를 선택해서 소환하세요!' : '희신 원소를 선택해서 소환하세요!';
    document.getElementById('petMessage').textContent = emptyMsg;
    ['wood','fire','earth','metal','water'].forEach(function(e) {
      document.getElementById('pet-' + e).style.display = 'none';
    });
    return;
  }
  var el = ELEMENTS[state.element];

  // 탭 강조
  document.querySelectorAll('.elem-btn').forEach(function(b) {
    b.classList.toggle('active', b.classList.contains(state.element));
  });

  // 캐릭터 표시
  ['wood','fire','earth','metal','water'].forEach(function(e) {
    document.getElementById('pet-' + e).style.display = (e === state.element) ? '' : 'none';
  });

  // 카드 배경
  document.getElementById('petCard').style.setProperty('--pet-glow', el.glow);

  // 배지
  var badge = document.getElementById('yongsinBadge');
  badge.textContent = '✦ 용신 ' + el.nameShort;
  badge.style.background = el.badge;
  badge.style.border = '1px solid ' + el.borderBadge;
  badge.style.color = el.color;

  // 이름·레벨
  var stageIdx = Math.min(Math.floor(state.level / 3), STAGES.length - 1);

  // 목(木) 이미지 단계별 교체
  if (state.element === 'wood') {
    var n = stageIdx + 1;
    var rbSrc = '/img/pet_wood_' + n + '_rb.png';
    var origSrc = '/img/pet_wood_' + n + '.png';
    var woodImg = document.getElementById('pet-wood-img');
    var hasRb = [1,5].indexOf(n) !== -1;
    var woodSrc = hasRb ? rbSrc : origSrc;
    if (woodImg.getAttribute('data-src') !== woodSrc) {
      woodImg.setAttribute('data-src', woodSrc);
      if (hasRb) {
        woodImg.src = woodSrc;
      } else {
        removeBgAndApply(woodSrc, woodImg);
      }
    }
  }

  // 화(火) 이미지 단계별 교체
  if (state.element === 'fire') {
    var fn = stageIdx + 1;
    var fireSrc = '/img/pet_fire_' + fn + '.png';
    var fireImg = document.getElementById('pet-fire-img');
    if (fireImg.getAttribute('data-src') !== fireSrc) {
      fireImg.setAttribute('data-src', fireSrc);
      removeBgAndApply(fireSrc, fireImg);
    }
  }

  // 토(土) 이미지 단계별 교체 (5단계 모두 있음)
  if (state.element === 'earth') {
    var en = stageIdx + 1;
    var earthSrc = '/img/pet_earth_' + en + '.png';
    var earthImg = document.getElementById('pet-earth-img');
    if (earthImg && earthImg.getAttribute('data-src') !== earthSrc) {
      earthImg.setAttribute('data-src', earthSrc);
      removeBgAndApply(earthSrc, earthImg);
    }
  }

  // 금(金) 이미지 단계별 교체 (2장: 1~2단계 각, 3~5단계는 2번 이미지)
  if (state.element === 'metal') {
    var mn = Math.min(stageIdx + 1, 2);
    var metalSrc = '/img/pet_metal_' + mn + '.png';
    var metalImg = document.getElementById('pet-metal-img');
    if (metalImg && metalImg.getAttribute('data-src') !== metalSrc) {
      metalImg.setAttribute('data-src', metalSrc);
      removeBgAndApply(metalSrc, metalImg);
    }
  }

  document.getElementById('petName').textContent = el.name;
  document.getElementById('petLevel').textContent = 'Lv.' + state.level + ' · ' + STAGES[stageIdx] + ' 단계';

  // EXP 바 색상
  document.getElementById('expFill').style.setProperty('--pet-color', el.color);
  document.getElementById('expFill').style.background = 'linear-gradient(90deg,' + el.color + ',' + el.color2 + ')';

  // 상태 바
  setBar('Hunger', state.hunger);
  setBar('Happy', state.happy);
  setBar('Energy', state.energy);

  // EXP
  var needed = expNeeded(state.level);
  document.getElementById('expFill').style.width = (state.exp / needed * 100) + '%';
  document.getElementById('expText').textContent = state.exp + ' / ' + needed;

  // 메시지
  var msg;
  if (state.sleeping) {
    var sleptMin = state.sleepStart ? Math.floor((Date.now() - state.sleepStart) / 60000) : 0;
    var pendingExp = Math.floor(Math.min(sleptMin / 60, 8) * 5);
    msg = 'Zzz... 수련 중 (' + sleptMin + '분 경과, EXP +' + pendingExp + ' 적립 중)';
    document.getElementById('zzzContainer').style.display = 'block';
    // 재우기 버튼 → 깨우기로
    var si = document.getElementById('sleepIcon'); if(si) si.textContent = '☀️';
    var sl = document.getElementById('sleepLabel'); if(sl) sl.textContent = '깨우기';
    var sd = document.getElementById('sleepDesc'); if(sd) sd.textContent = '깨우면 EXP 지급';
  } else {
    document.getElementById('zzzContainer').style.display = 'none';
    if (state.hunger < 30) msg = MESSAGES.hungry[Math.floor(Math.random()*MESSAGES.hungry.length)];
    else msg = MESSAGES[state.element][Math.floor(Math.random()*MESSAGES[state.element].length)];
    var si = document.getElementById('sleepIcon'); if(si) si.textContent = '🌙';
    var sl = document.getElementById('sleepLabel'); if(sl) sl.textContent = '재우기';
    var sd = document.getElementById('sleepDesc'); if(sd) sd.textContent = '수련 중 EXP 자동 적립';
  }
  document.getElementById('petMessage').textContent = msg;

  // 정보 카드
  document.getElementById('infoElem').textContent = el.name;
  document.getElementById('infoStage').textContent = STAGES[stageIdx];
  document.getElementById('infoFeedCount').textContent = state.feedCount + '회';
  document.getElementById('infoBirth').textContent = state.birthDate || '—';
}

function setBar(name, val) {
  val = Math.round(Math.max(0, Math.min(100, val)));
  document.getElementById('bar' + name).style.width = val + '%';
  document.getElementById('val' + name).textContent = val;
}

// ── 유틸 ──
function todayStr() { var d = new Date(Date.now() + 9*3600000); return d.toISOString().slice(0,10); }

function conditionMultiplier() {
  var avg = (state.hunger + state.happy + state.energy) / 3;
  if (state.hunger < 30) return 0.5;   // 배고프면 절반
  if (avg >= 80) return 1.5;           // 전체 컨디션 좋으면 1.5배
  return 1;
}

function gainExp(base) {
  // 컨디션 보정
  var mult = conditionMultiplier();
  // 크리티컬 10%
  var critical = Math.random() < 0.1;
  if (critical) mult *= 3;
  var amount = Math.round(base * mult);
  state.exp += amount;
  var needed = expNeeded(state.level);
  var msg = critical ? '💥 크리티컬! EXP +' + amount + '!' : null;
  if (state.exp >= needed) {
    state.exp -= needed;
    state.level++;
    showToast('🎉 레벨 업! Lv.' + state.level + '이 되었어요!');
  } else if (msg) {
    showToast(msg);
  }
}

// ── 쿨타임 ──
var COOLDOWNS = { feed: 4 * 3600 * 1000, orb: 8 * 3600 * 1000 };
function getCooldownLeft(type) {
  var cd = COOLDOWNS[type];
  if (!cd) return 0;
  var last = (state.cooldowns || {})[type] || 0;
  var left = cd - (Date.now() - last);
  return Math.max(0, left);
}
function fmtCooldown(ms) {
  var h = Math.floor(ms / 3600000);
  var m = Math.floor((ms % 3600000) / 60000);
  return h > 0 ? h + '시간 ' + m + '분' : m + '분';
}

// ── 일일 미션 ──
var DAILY_MISSIONS = [
  { id: 'feed',   icon: '🍚', label: '밥 3번 주기',    sub: '1회·2회·3회 채워주기', action: 'scroll:btn-feed' },
  { id: 'orb',    icon: '✦',  label: '특훈하기',        sub: '용신 기운 집중 수련',  action: 'scroll:btn-orb' },
  { id: 'saju',   icon: '🔮', label: '사주 확인하기',   sub: '오늘 오행 에너지 보기', action: '/saju.html' },
  { id: 'diary',  icon: '📔', label: '일기 쓰기',       sub: '하루 기록 + EXP +20',  action: '/diary.html' },
  { id: 'share',  icon: '📤', label: '공유하기',        sub: '친구에게 알리기',       action: 'share' },
];

function getMission() {
  var today = todayStr();
  if (!state.dailyMission || state.dailyMission.date !== today) {
    state.dailyMission = { date: today, feedCount: 0, orbCount: 0, bonusDone: false };
  }
  var m = state.dailyMission;
  if (m.orbCount === undefined) m.orbCount = 0;
  return m;
}

function isMissionDone(id) {
  var m = getMission();
  var today = todayStr();
  if (id === 'feed')   return m.feedCount >= 3;
  if (id === 'orb')    return m.orbCount >= 1;
  if (id === 'saju')   return localStorage.getItem('pet_mission_saju') === today;
  if (id === 'diary')  return localStorage.getItem('pet_mission_diary') === today;
  if (id === 'share')  return m.shareDone === today;
  return false;
}

function checkMission() {
  var m = getMission();
  if (m.bonusDone) return;
  var allDone = DAILY_MISSIONS.every(function(ms) { return isMissionDone(ms.id); });
  if (allDone) {
    m.bonusDone = true;
    gainExp(150);
    showToast('🏆 오늘 미션 전부 완료! EXP +150');
  }
}

function completeMissionNav(id) {
  var m = getMission();
  var today = todayStr();
  if (id === 'saju')   m.sajuDone   = today;
  if (id === 'diary')  m.diaryDone  = today;
  if (id === 'share')  m.shareDone  = today;
  checkMission();
  saveState();
}

// ── 길일 보너스 (오늘 운세 점수 연동) ──
function checkLuckyBonus() {
  var today = todayStr();
  if (state.luckyBonusDone === today) return;
  try {
    var score = parseInt(localStorage.getItem('pico_today_score') || '0', 10);
    if (score >= 80) {
      state.luckyBonusDone = today;
      state.exp += 50;
      showToast('🌟 길일 보너스! 오늘 운세 ' + score + '점 — EXP +50');
    }
  } catch(e) {}
}

// ── 사주/리포트 EXP 연동 (외부에서 호출) ──
window.petGainExpExternal = function(amount, msg) {
  try {
    var saved = JSON.parse(localStorage.getItem('yongsin_pet') || '{}');
    var el = saved.element || null;
    if (!el) return;
    var s = (saved.all && saved.all[el]) ? Object.assign({}, saved.all[el]) : {};
    s.exp = (s.exp || 0) + amount;
    var needed = (s.level || 1) * (s.level || 1) * 100;
    if (s.exp >= needed) { s.exp -= needed; s.level = (s.level || 1) + 1; }
    if (!saved.all) saved.all = {};
    saved.all[el] = s;
    localStorage.setItem('yongsin_pet', JSON.stringify(saved));
    if (window._refreshPetCard) window._refreshPetCard();
  } catch(e) {}
};

function doAction(type) {
  if (!state.element) { showToast('먼저 용신을 선택해주세요!'); return; }
  if (state.sleeping && type !== 'sleep') { showToast('자고 있어요... 먼저 깨워주세요 🌙'); return; }

  // 쿨타임 체크
  var cdLeft = getCooldownLeft(type);
  if (cdLeft > 0) {
    showToast('⏳ ' + fmtCooldown(cdLeft) + ' 후에 가능해요');
    return;
  }

  var m = getMission();

  if (type === 'feed') {
    state.hunger = Math.min(100, state.hunger + 25);
    state.happy  = Math.min(100, state.happy  + 5);
    state.feedCount++;
    m.feedCount++;
    if (!state.cooldowns) state.cooldowns = {};
    state.cooldowns.feed = Date.now();
    gainExp(5);
    if (!document.querySelector('#toast').textContent.includes('크리티컬'))
      showToast('냠냠! 맛있어요 🍚');
    bounce('pet-' + state.element);
  } else if (type === 'play') {
    // 하루 1회 제한
    var today = todayStr();
    if ((state.dailyMission || {}).playDate === today) {
      showToast('오늘 운세는 이미 확인했어요 ✨');
      return;
    }
    state.happy  = Math.min(100, state.happy  + 20);
    state.energy = Math.max(0,   state.energy - 10);
    m.playCount++;
    m.playDate = today;
    gainExp(8);
    bounce('pet-' + state.element);
    fetchAdvice();
  } else if (type === 'sleep') {
    if (!state.sleeping) {
      // 재우기: 수련 시작
      state.sleeping = true;
      state.sleepStart = Date.now();
      showToast('수련 시작! 자는 동안 EXP가 쌓여요 🌙');
    } else {
      // 깨우기: 잠든 시간만큼 EXP 지급 (시간당 5, 최대 8시간)
      var sleptMs = Date.now() - (state.sleepStart || Date.now());
      var sleptHours = Math.min(sleptMs / 3600000, 8);
      var earnedExp = Math.floor(sleptHours * 5);
      state.sleeping = false;
      state.sleepStart = null;
      state.energy = Math.min(100, state.energy + Math.round(sleptHours * 8));
      if (earnedExp > 0) {
        gainExp(earnedExp);
        if (!document.querySelector('#toast').textContent.includes('크리티컬'))
          showToast('☀️ ' + Math.round(sleptHours * 60) + '분 수련! EXP +' + earnedExp);
      } else {
        showToast('잠깐 쉬었어요 ☀️');
      }
    }
  } else if (type === 'orb') {
    state.happy  = Math.min(100, state.happy  + 30);
    state.hunger = Math.min(100, state.hunger + 10);
    state.energy = Math.min(100, state.energy + 20);
    if (!state.cooldowns) state.cooldowns = {};
    state.cooldowns.orb = Date.now();
    if (!state.dailyMission) state.dailyMission = {};
    state.dailyMission.orbCount = (state.dailyMission.orbCount || 0) + 1;
    gainExp(15);
    var orbMsgs = {
      wood: '🌿 초목의 기운을 흡수했어요! 성장 에너지 충전 완료!',
      fire: '🔥 화염 기운이 타올랐어요! 열정 에너지 충전 완료!',
      earth: '🪨 대지의 기운을 받았어요! 안정 에너지 충전 완료!',
      metal: '💎 금기(金氣)를 정련했어요! 집중 에너지 충전 완료!',
      water: '💧 수기(水氣)를 담았어요! 지혜 에너지 충전 완료!',
    };
    if (!document.querySelector('#toast').textContent.includes('크리티컬'))
      showToast('✦ ' + (orbMsgs[state.element] || '특훈 완료! 용신 기운이 올랐어요!'));
    specialTrainEffect('pet-' + state.element);
  }

  checkMission();
  saveState();
  render();
  renderMission();
}

    var sajuData = await sajuRes.json();
    var dayPillar = (sajuData.summary && sajuData.summary.pillars && sajuData.summary.pillars.day)
      ? sajuData.summary.pillars.day.stem + sajuData.summary.pillars.day.branch
      : '';

    dateEl.textContent = today.toLocaleDateString('ko-KR', {month:'long', day:'numeric', weekday:'short'});
    pillarEl.textContent = dayPillar ? '일진 ' + dayPillar + '일' : '오늘의 운세';

    // AI 조언
    var aiRes = await fetch('https://fortuna-silk.vercel.app/api/pet-advice', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ yongsin: yongsin, element: state.element, day_pillar: dayPillar, profile: profile })
    });
    var advice = await aiRes.json();

    textEl.textContent = advice.advice || '오늘도 용신 기운을 잘 활용해보세요!';
    keyEl.textContent  = advice.keyword ? '✦ ' + advice.keyword : '';
    luckyEl.textContent = advice.lucky ? '🍀 ' + advice.lucky : '';
  } catch(e) {
    textEl.textContent = '오늘 용신 기운을 충전했어요. 긍정적인 하루 보내세요! 🌟';
  }
}

function renderMission() {
  var m = getMission();
  var list = document.getElementById('missionList');
  var bEl = document.getElementById('missionBonus');
  if (bEl) bEl.textContent = m.bonusDone ? '✅ 완료!' : '';
  if (!list) return;

  var doneCount = DAILY_MISSIONS.filter(function(ms) { return isMissionDone(ms.id); }).length;

  list.innerHTML = DAILY_MISSIONS.map(function(ms) {
    var done = isMissionDone(ms.id);

    // 밥주기: 점 3개로 진행 표시
    var rightHtml;
    if (ms.id === 'feed') {
      if (done) {
        rightHtml = '<span style="font-size:12px;color:#2a8a40;font-weight:700;">✅ 완료</span>';
      } else {
        var fc = Math.min(m.feedCount || 0, 3);
        var dots = [0,1,2].map(function(i) {
          return '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;margin:0 2px;background:' + (i < fc ? '#c8a830' : 'rgba(200,168,48,0.2)') + ';border:1.5px solid rgba(200,168,48,0.5);"></span>';
        }).join('');
        rightHtml = '<span style="font-size:11px;color:var(--muted);">' + dots + '</span>';
      }
    } else {
      rightHtml = done
        ? '<span style="font-size:12px;color:#2a8a40;font-weight:700;">✅ 완료</span>'
        : '<span style="font-size:11px;color:var(--gold);font-weight:600;">이동 →</span>';
    }

    var clickable = !done && ms.action;
    var style = [
      'display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;',
      done ? 'background:rgba(42,138,64,0.08);border:1px solid rgba(42,138,64,0.2);' : 'background:var(--surface);border:1px solid var(--border);',
      clickable ? 'cursor:pointer;' : '',
    ].join('');

    var onclick = '';
    if (clickable) {
      if (ms.action === 'share') {
        onclick = ' onclick="doMissionShare()"';
      } else if (ms.action.indexOf('scroll:') === 0) {
        onclick = ' onclick="doMissionScroll(\'' + ms.action.slice(7) + '\')"';
      } else {
        onclick = ' onclick="doMissionNav(\'' + ms.id + '\',\'' + ms.action + '\')"';
      }
    }

    return '<div style="' + style + '"' + onclick + '>'
      + '<span style="font-size:20px;width:26px;text-align:center;flex-shrink:0;">' + ms.icon + '</span>'
      + '<div style="flex:1;min-width:0;">'
      + '<div style="font-size:13px;font-weight:600;color:' + (done ? 'var(--muted)' : 'var(--text)') + ';' + (done ? 'text-decoration:line-through;' : '') + '">' + ms.label + '</div>'
      + '<div style="font-size:11px;color:var(--muted);">' + ms.sub + '</div>'
      + '</div>'
      + '<div style="flex-shrink:0;">' + rightHtml + '</div>'
      + '</div>';
  }).join('');

  // 진행 요약
  var summaryEl = document.getElementById('missionSummary');
  if (summaryEl) summaryEl.textContent = doneCount + ' / ' + DAILY_MISSIONS.length + ' 완료';

  // 쿨타임 버튼 비활성화 표시
  ['feed','orb'].forEach(function(type) {
    var btn = document.querySelector('.btn-' + (type === 'feed' ? 'feed' : 'orb'));
    if (!btn) return;
    var left = getCooldownLeft(type);
    var desc = btn.querySelector('.btn-desc');
    if (!desc) return;
    if (left > 0) {
      desc.textContent = '⏳ ' + fmtCooldown(left) + ' 후';
      btn.style.opacity = '0.55';
    } else {
      desc.textContent = type === 'feed' ? '배고픔↑ EXP+5' : '전체↑ EXP+15';
      btn.style.opacity = '';
    }
  });
}

function doMissionNav(id, url) {
  // saju/diary: 완료는 실제 행동 후 해당 페이지에서 localStorage 플래그로 처리
  if (id !== 'saju' && id !== 'diary') completeMissionNav(id);
  renderMission();
  setTimeout(function() { window.location.href = url; }, 300);
}

function doMissionScroll(btnClass) {
  var btn = document.querySelector('.' + btnClass);
  if (!btn) return;
  btn.scrollIntoView({ behavior: 'smooth', block: 'center' });
  btn.style.transition = 'box-shadow 0.2s, transform 0.2s';
  btn.style.boxShadow = '0 0 0 3px #c8a830';
  btn.style.transform = 'scale(1.06)';
  setTimeout(function() {
    btn.style.boxShadow = '';
    btn.style.transform = '';
  }, 900);
}

function doMissionShare() {
  if (isMissionDone('share')) return; // 오늘 이미 완료
  var url = 'https://picolab.kr';
  var text = '🔮 피코랩에서 용신 다마고치 키우고 있어요!\n내 용신 오행을 캐릭터로 키워보세요 👇\n' + url;
  // 공유 즉시 완료 처리 (중복 방지)
  completeMissionNav('share');
  renderMission();
  if (navigator.share) {
    navigator.share({ title: '피코랩 용신 다마고치', text: text, url: url }).catch(function(){});
  } else {
    navigator.clipboard && navigator.clipboard.writeText(text).then(function() {
      showToast('📋 링크가 복사됐어요!');
    });
  }
}

function bounce(id) {
  var el = document.getElementById(id);
  if (!el) return;
  el.style.transition = 'transform 0.15s';
  el.style.transform = 'scale(1.18)';
  setTimeout(function() { el.style.transform = ''; }, 150);
}

function specialTrainEffect(id) {
  var el = document.getElementById(id);
  if (!el) return;

  // 번쩍 오버레이
  var flash = document.createElement('div');
  flash.style.cssText = 'position:absolute;inset:0;background:rgba(255,220,80,0.7);border-radius:inherit;pointer-events:none;z-index:10;transition:opacity 0.4s;';
  el.style.position = 'relative';
  el.appendChild(flash);
  setTimeout(function() { flash.style.opacity = '0'; }, 80);
  setTimeout(function() { if (flash.parentNode) flash.parentNode.removeChild(flash); }, 500);

  // 강한 스케일 애니메이션
  el.style.transition = 'transform 0.12s';
  el.style.transform = 'scale(1.35)';
  setTimeout(function() { el.style.transform = 'scale(0.92)'; el.style.transition = 'transform 0.1s'; }, 120);
  setTimeout(function() { el.style.transform = 'scale(1.12)'; el.style.transition = 'transform 0.1s'; }, 220);
  setTimeout(function() { el.style.transform = ''; el.style.transition = ''; }, 340);

  // 파티클
  var ELEM_PARTICLES = { wood:'🌿', fire:'✨', earth:'⭐', metal:'💫', water:'💧' };
  var emoji = ELEM_PARTICLES[state.element] || '✨';
  var rect = el.getBoundingClientRect();
  var cx = rect.left + rect.width / 2;
  var cy = rect.top + rect.height / 2;
  for (var i = 0; i < 10; i++) {
    (function(idx) {
      setTimeout(function() {
        var p = document.createElement('div');
        p.textContent = idx % 3 === 0 ? '✦' : emoji;
        var angle = (Math.random() * 360) * Math.PI / 180;
        var dist = 50 + Math.random() * 70;
        var tx = Math.cos(angle) * dist;
        var ty = Math.sin(angle) * dist - 30;
        var size = 13 + Math.random() * 10;
        var dur = (0.7 + Math.random() * 0.4).toFixed(2);
        p.style.cssText = 'position:fixed;left:' + cx + 'px;top:' + cy + 'px;font-size:' + size + 'px;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform ' + dur + 's cubic-bezier(0.2,0.8,0.4,1),opacity ' + dur + 's ease-out;opacity:1;';
        document.body.appendChild(p);
        requestAnimationFrame(function() { requestAnimationFrame(function() {
          p.style.transform = 'translate(calc(-50% + ' + tx + 'px),calc(-50% + ' + ty + 'px)) scale(0.5)';
          p.style.opacity = '0';
        }); });
        setTimeout(function() { if (p.parentNode) p.parentNode.removeChild(p); }, 1200);
      }, idx * 40);
    })(i);
  }
}

var _toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2200);
}

// 시간 경과 decay + 에너지 자동 회복 (화면 켜둘수록 에너지 충전)
setInterval(function() {
  if (!state.element || state.sleeping) return;
  state.hunger = Math.max(0,   state.hunger - 0.5);
  state.happy  = Math.max(0,   state.happy  - 0.3);
  state.energy = Math.min(100, state.energy + 0.4); // 화면 켜두면 30초마다 +0.4 (~시간당 +48)
  render();
  saveState();
}, 30000); // 30초마다

// 펫 페이지 방문 시 플로팅 펫 숨김 상태 초기화 (다시 돌아다니게)
try { localStorage.removeItem('yongsin_float_hidden'); localStorage.removeItem('yongsin_found_today'); } catch(e) {}

// 초기화: localStorage 먼저, 서버 데이터 있으면 덮어씀
loadState();
render();
renderMission();
renderSlotTabs();

// 서버에서 더 최신 데이터 로드 (현재 오행 레벨 기준 높은 쪽 우선)
loadFromServer(function(serverData) {
  if (!serverData) return;
  // 신형 포맷 (all 포함)
  var srvAll = serverData.all || null;
  var srvEl  = serverData.element || state.element;
  if (srvAll) {
    var srvElState = srvAll[state.element || srvEl];
    var localLv = state.level || 1;
    var srvLv   = srvElState ? (srvElState.level || 1) : 0;
    if (srvLv >= localLv) {
      allStates = Object.assign({}, srvAll);
      slotElements.slot1 = serverData.element  || srvEl;
      slotElements.slot2 = serverData.element2 || slotElements.slot2;
      var activeEl = slotElements[activeSlot] || slotElements.slot1;
      state.element = activeEl;
      if (state.element && allStates[state.element]) {
        Object.assign(state, _applyOfflineTime(Object.assign({}, allStates[state.element])));
        state.element = activeEl;
      }
      try { localStorage.setItem('yongsin_pet', JSON.stringify({ all: allStates, element: slotElements.slot1, element2: slotElements.slot2 })); } catch(e) {}
      render(); renderMission(); renderSlotTabs();
    } else { syncToServer(); }
  } else if (serverData.state) {
    // 구형 포맷
    var srv = serverData.state;
    var localLv = state.level || 1;
    var srvLv   = srv.level  || 1;
    if (srvLv >= localLv) {
      Object.assign(state, _applyOfflineTime(Object.assign({}, srv)));
      if (state.element) { var es = Object.assign({}, state); delete es.element; allStates[state.element] = es; }
      try { localStorage.setItem('yongsin_pet', JSON.stringify({ all: allStates, element: state.element })); } catch(e) {}
      render(); renderMission();
    } else { syncToServer(); }
  }
});

checkLuckyBonus();
if (state.element) {
  document.querySelectorAll('.elem-btn').forEach(function(b) {
    b.classList.toggle('active', b.classList.contains(state.element));
  });
}
setInterval(renderMission, 60000);

// 사주/일기 페이지 다녀온 후 미션 완료 감지
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') renderMission();
});
window.addEventListener('focus', function() { renderMission(); });
</script>
</body>
