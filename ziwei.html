<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>자미두수 명반 | 피코랩</title>
  <meta name="theme-color" content="#f5efe4">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css">
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #f4ede0;
      --surface: #f9f1de;
      --surface2: #e8dcc0;
      --border: #9a8a60;
      --border-soft: rgba(60,40,20,0.22);
      --accent: #7a2418;
      --accent2: #9a7a26;
      --gold: #8a6a15;
      --gold-deep: #6a4f0c;
      --purple: #8a6a3d;
      --text: #1a120a;
      --text2: #4a3a2a;
      --ink: #241a10;
      --muted: #5a4830;
      --shadow-soft: 0 1px 3px rgba(60,40,20,0.08), 0 6px 20px rgba(60,40,20,0.07);
      --shadow-lift: 0 3px 8px rgba(60,40,20,0.12), 0 14px 36px rgba(60,40,20,0.14);
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    /* 크림 배경 그라디언트 */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(122,36,24,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 70%, rgba(154,122,38,0.07) 0%, transparent 55%),
        radial-gradient(ellipse 40% 30% at 50% 90%, rgba(200,130,50,0.05) 0%, transparent 50%);
    }
    /* 노이즈 텍스처 */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
    }
    .star {
      position: fixed; border-radius: 50%; opacity: 0;
      background: rgba(122,36,24,0.6);
      animation: twinkle var(--dur, 3s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
      z-index: 0; pointer-events: none;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.4); }
      50% { opacity: var(--max-op, 0.8); transform: scale(1); }
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(244,237,224,0.88);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display:flex; align-items:center; gap:8px; text-decoration:none; }
    .logo img { height:40px; object-fit:contain; filter:drop-shadow(0 2px 6px rgba(60,30,10,0.35)) brightness(0.78); }
    .logo-text { font-family:'Noto Serif KR',serif; font-weight:700; font-size:15px; letter-spacing:2px; color:var(--accent); }
    .back-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text2); padding: 6px 14px; border-radius: 8px;
      font-size: 13px; cursor: pointer; text-decoration: none; transition: all .2s;
    }
    .back-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* MAIN */
    main { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 32px 16px 80px; }

    /* LOADING */
    #loading { text-align: center; padding: 80px 20px; color: var(--muted); }
    .loader {
      width: 52px; height: 52px; border-radius: 50%;
      border: 3px solid rgba(154,122,38,0.18);
      border-top-color: var(--accent);
      box-shadow: var(--shadow-soft);
      animation: spin 1s linear infinite; margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ERROR */
    #error { display: none; text-align: center; padding: 60px 20px; }
    .error-icon { font-size: 40px; margin-bottom: 12px; }
    .error-msg { color: var(--muted); font-size: 15px; }

    /* CONTENT */
    #content { display: none; }

    /* 헤더 히어로 */
    .hero {
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, #fcf7ea 0%, #f4ecd8 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 24px 32px;
      margin-bottom: 28px;
      text-align: center;
      box-shadow: var(--shadow-soft);
    }
    .hero::before {
      content: '';
      position: absolute; top: -60px; right: -60px;
      width: 200px; height: 200px; border-radius: 50%;
      background: radial-gradient(circle, rgba(154,122,38,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero::after {
      content: '';
      position: absolute; bottom: -40px; left: -40px;
      width: 160px; height: 160px; border-radius: 50%;
      background: radial-gradient(circle, rgba(122,36,24,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow {
      font-size: 11px; letter-spacing: 0.3em; color: var(--accent);
      font-weight: 700; margin-bottom: 6px; opacity: 0.85;
      text-transform: uppercase;
    }
    .hero-title {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(22px, 4vw, 30px); font-weight: 700;
      color: var(--ink); margin-bottom: 24px; line-height: 1.3;
    }
    .hero-title em { font-style: normal; color: var(--accent); }
    .hero-badges {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    }
    .hero-badge {
      background: rgba(252,247,234,0.7);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 20px;
      min-width: 110px; position: relative;
      transition: border-color .2s, transform .2s;
    }
    .hero-badge:hover { border-color: var(--accent); transform: translateY(-2px); }
    .hero-badge-label {
      font-size: 10px; color: var(--muted); margin-bottom: 8px;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .hero-badge-value {
      font-family: 'Noto Serif KR', serif;
      font-size: 22px; font-weight: 700;
      color: var(--accent);
    }

    /* 섹션 타이틀 */
    .section-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 15px; font-weight: 700;
      color: var(--accent); letter-spacing: 0.08em;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title::after {
      content: ''; flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(122,36,24,0.35), transparent);
    }

    /* 12궁 그리드 */
    .palace-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px; margin-bottom: 28px;
    }
    @media (max-width: 600px) { .palace-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; } }
    @media (max-width: 400px) { .palace-grid { grid-template-columns: repeat(2, 1fr); } }

    .palace-cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 8px;
      min-height: 124px; position: relative;
      transition: all .25s;
    }
    .palace-cell:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow-soft);
    }
    .palace-cell.is-self {
      border: 2px solid #8a6a15;
      background: linear-gradient(145deg, rgba(212,175,90,0.38) 0%, rgba(212,175,90,0.20) 100%);
      box-shadow: 0 4px 16px rgba(138,106,21,0.22);
    }
    .palace-cell.is-body {
      border: 2px solid #7a2418;
      background: linear-gradient(145deg, rgba(122,36,24,0.16) 0%, rgba(122,36,24,0.06) 100%);
      box-shadow: 0 4px 16px rgba(122,36,24,0.18);
    }
    .palace-cell.is-self.is-body {
      border: 2px solid #6a4aa0;
      background: linear-gradient(145deg, rgba(106,74,160,0.18), rgba(212,175,90,0.24));
      box-shadow: 0 4px 18px rgba(106,74,160,0.22);
    }
    .palace-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
    .palace-name {
      font-family: 'Noto Serif KR', serif;
      font-size: 12px; font-weight: 700; color: var(--ink);
    }
    .palace-badges { display: flex; gap: 3px; }
    .badge-self {
      font-size: 10px; color: var(--gold-deep);
      background: rgba(212,175,90,0.2); border: 1px solid rgba(154,122,38,0.3);
      border-radius: 4px; padding: 1px 5px; font-weight: 700;
    }
    .badge-body {
      font-size: 10px; color: #6a4a1e;
      background: rgba(138,106,61,0.2); border: 1px solid rgba(138,106,61,0.3);
      border-radius: 4px; padding: 1px 5px; font-weight: 700;
    }
    .palace-stem-branch {
      font-family: 'Noto Serif KR', serif;
      font-size: 11px; color: var(--muted); margin-bottom: 6px;
    }
    .palace-stars { display: flex; flex-wrap: wrap; gap: 3px; }
    .star-tag {
      font-size: 10px; padding: 2px 5px; border-radius: 5px;
      background: rgba(138,106,61,0.18);
      border: 1px solid rgba(138,106,61,0.40);
      color: #4a3a1e;
    }
    .star-tag.major {
      background: linear-gradient(135deg, #8a6a15, #6a4f0c);
      border: 1px solid #5a4008;
      color: #fcf7ea; font-weight: 700; font-size: 11px;
      box-shadow: 0 1px 3px rgba(138,106,21,0.35);
    }
    .palace-age {
      position: absolute; bottom: 6px; right: 8px;
      font-size: 9px; color: var(--muted);
    }

    /* 현재 운세 */
    .fortune-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 28px; }
    @media (max-width: 480px) { .fortune-row { grid-template-columns: 1fr; } }

    .fortune-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      position: relative; overflow: hidden;
      transition: border-color .2s, transform .2s;
      box-shadow: var(--shadow-soft);
    }
    .fortune-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .fortune-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--gold));
    }
    .fortune-card-label {
      font-size: 11px; color: var(--muted); letter-spacing: 0.1em;
      margin-bottom: 10px; text-transform: uppercase; font-weight: 600;
    }
    .fortune-card-value {
      font-family: 'Noto Serif KR', serif;
      font-size: 20px; font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .fortune-card-sub { font-size: 12px; color: var(--muted); }
    .fortune-card-stars { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px; }

    /* 해석 카드 */
    .interp-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 28px; }
    .interp-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 12px; padding: 16px 18px;
      display: flex; gap: 14px; align-items: flex-start;
      transition: border-color .2s, transform .2s;
      box-shadow: var(--shadow-soft);
    }
    .interp-card:hover { transform: translateX(3px); }
    .interp-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; color: var(--accent); }
    .interp-label { font-size: 11px; color: var(--accent); margin-bottom: 5px; font-weight: 600; letter-spacing: 0.05em; }
    .interp-text { font-size: 14px; color: var(--text2); line-height: 1.7; }

    /* 하단 버튼 */
    .action-row { display: flex; gap: 12px; flex-wrap: wrap; }
  </style>
  <link rel="stylesheet" href="pico-icons.css">
</head>

    s.style.cssText = [

    ].join(';');
    document.body.appendChild(s);
  }
})();

var p = new URLSearchParams(location.search);

// AI 상담 버튼 링크

if (!year || !month || !day) {

function render(d) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  // 핵심 정보
  document.getElementById('destinyMaster').textContent = d.destinyMaster || '—';
  document.getElementById('bodyMaster').textContent    = d.bodyMaster    || '—';
  document.getElementById('element').textContent       = d.element       || '—';

  // 12궁 그리드
  var grid = document.getElementById('palaceGrid');
  (d.palaces || []).forEach(function(pal) {
    var cell = document.createElement('div');
    cell.className = 'palace-cell' +
      (pal.isSelf ? ' is-self' : '') +
      (pal.isBody ? ' is-body' : '');

    var selfBadge = pal.isSelf ? '<span class="badge-self">★명</span>' : '';
    var bodyBadge = pal.isBody ? '<span class="badge-body">◎신</span>' : '';

    var majorHTML = (pal.majorStars || []).map(function(s) {
      return '<span class="star-tag major">' + s + '</span>';
    }).join('');
    var minorHTML = (pal.minorStars || []).slice(0, 3).map(function(s) {
      return '<span class="star-tag">' + s + '</span>';
    }).join('');

    cell.innerHTML =
      '<div class="palace-header">' +
        '<div class="palace-name">' + (pal.name || '') + '</div>' +
        '<div class="palace-badges">' + selfBadge + bodyBadge + '</div>' +
      '</div>' +
      '<div class="palace-stem-branch">' + (pal.heavenlyStem || '') + (pal.earthlyBranch || '') + '</div>' +
      '<div class="palace-stars">' + majorHTML + minorHTML + '</div>' +
      (pal.ageRange ? '<div class="palace-age">' + pal.ageRange + '</div>' : '');

    grid.appendChild(cell);
  });

  // 현재 대한
  var dec = d.currentDecade;
  if (dec) {
    document.getElementById('decadeName').textContent = dec.name || '—';
    document.getElementById('decadeAge').textContent  = dec.ageRange || '';
    var decStars = document.getElementById('decadeStars');
    (dec.stars || []).forEach(function(s) {
      var t = document.createElement('span');
      t.className = 'star-tag major'; t.textContent = s;
      decStars.appendChild(t);
    });
  }

  // 유년
  var yr = d.currentYear;
  if (yr) {
    document.getElementById('yearPalace').textContent = yr.palace || '—';
    document.getElementById('yearStem').textContent   =
      (yr.heavenlyStem || '') + (yr.earthlyBranch || '') + ' ' + (yr.year || '') + '년';
  }

  // 해석 카드
  var interps = document.getElementById('interpGrid');

  // 명궁 주성 해석
  var soul = d.soulPalace || (d.palaces || []).find(function(p) { return p.isSelf; });
  var soulStar = soul && soul.majorStars && soul.majorStars[0];
  var soulText = soulStar
    ? (SOUL_INTERP[soulStar] || soulStar + '이(가) 명궁에 위치. 강한 개성과 운명의 별.')
    : '명궁 정보를 확인 중입니다.';
  addInterp(interps, '☀️', '명궁 · ' + (soulStar || '주성'), soulText);

  // 대한 흐름 해석
  if (dec && dec.name) {
    addInterp(interps, '<i class="pi pi-wave"></i>', '현재 대한 흐름', decadeInterp(dec.name, dec.stars || []));
  }

  // 재백·관록·부처 요약
  var findPal = function(n) {
    return (d.palaces || []).find(function(p) { return p.name === n || p.name === n + '궁'; });
  };
  var jaebaek = findPal('재백궁') || findPal('재백');
  var gwanrok = findPal('관록궁') || findPal('관록');
  var bucheo  = findPal('부처궁') || findPal('부처');

  if (jaebaek) addInterp(interps, '<i class="pi pi-coin"></i>', '재백궁 (재물)', palaceInterp('재백궁', jaebaek.majorStars || []) || ((jaebaek.majorStars || []).join(', ') || '별 없음') + ' — 재물의 흐름을 주관합니다.');
  if (gwanrok) addInterp(interps, '<i class="pi pi-trophy"></i>', '관록궁 (직업)', palaceInterp('관록궁', gwanrok.majorStars || []) || ((gwanrok.majorStars || []).join(', ') || '별 없음') + ' — 사회적 성취와 직업의 방향.');
  if (bucheo)  addInterp(interps, '<i class="pi pi-heart"></i>', '부처궁 (인연)', palaceInterp('부처궁', bucheo.majorStars || [])  || ((bucheo.majorStars || []).join(', ')  || '별 없음') + ' — 이성 인연과 파트너십.');

  // 공유 버튼 표시
  window._ziweiData = d;
  var wrap = document.getElementById('ziweiShareBtnWrap');
  wrap.style.display = 'flex';
  document.getElementById('ziweiReportHook').style.display = 'block';
}

function _drawZiweiCard(cb) {
  var d = window._ziweiData;
  if (!d) { cb(null); return; }

  var today = new Date(Date.now()+9*3600000);
  var dateStr = today.getUTCFullYear()+'년 '+(today.getUTCMonth()+1)+'월 '+today.getUTCDate()+'일';
  var W=1080, PAD=60, H=1920;
  var canvas=document.createElement('canvas'); canvas.width=W; canvas.height=H;
  var ctx=canvas.getContext('2d');

  function fRR(x,y,w,h,r){ctx.beginPath();if(ctx.roundRect){ctx.roundRect(x,y,w,h,r);}else{ctx.rect(x,y,w,h);}ctx.fill();}
  function sRR(x,y,w,h,r){ctx.beginPath();if(ctx.roundRect){ctx.roundRect(x,y,w,h,r);}else{ctx.rect(x,y,w,h);}ctx.stroke();}
  function drawLine(cy,w2,al){var lg=ctx.createLinearGradient(W/2-w2,0,W/2+w2,0);lg.addColorStop(0,'transparent');lg.addColorStop(0.5,'rgba(154,122,38,'+al+')');lg.addColorStop(1,'transparent');ctx.strokeStyle=lg;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(W/2-w2,cy);ctx.lineTo(W/2+w2,cy);ctx.stroke();}
  function fillWrapped(text,cx,startY,maxW,lineH){
    var words=text.split(' ');var line='';var fy=startY;
    words.forEach(function(w){var t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){ctx.fillText(line,cx,fy);fy+=lineH;line=w;}else{line=t;}});
    if(line){ctx.fillText(line,cx,fy);fy+=lineH;}
    return fy;
  }

  // 배경 (ivory)
  var bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,'#fcf7ea');bg.addColorStop(0.4,'#f4ede0');bg.addColorStop(1,'#ede4cf');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  [{cx:0.2,cy:0.15,r:0.4,c:'122,36,24,0.05'},{cx:0.8,cy:0.6,r:0.5,c:'154,122,38,0.06'},{cx:0.5,cy:0.85,r:0.35,c:'200,130,50,0.04'}].forEach(function(n){
    var g=ctx.createRadialGradient(n.cx*W,n.cy*H,0,n.cx*W,n.cy*H,n.r*W);g.addColorStop(0,'rgba('+n.c+')');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  });
  [[8,12,2],[20,35,1.5],[38,8,2],[55,22,1],[72,10,2.5],[85,28,1.5],[6,52,1],[18,68,2],[32,80,1.5],[50,60,1],[66,78,2],[82,48,1],[90,65,1.5],[14,90,2],[44,45,1],[78,35,1.5],[60,90,1],[25,15,2],[92,82,1.5],[48,30,1],[35,55,1.5],[15,42,2],[70,25,1],[42,72,1.5],[88,40,1]].forEach(function(s){
    ctx.beginPath();ctx.arc(s[0]/100*W,s[1]/100*H,s[2],0,Math.PI*2);ctx.fillStyle='rgba(154,122,38,'+(0.10+((s[0]+s[1])%5)*0.05)+')';ctx.fill();
  });

  ctx.textAlign='center';
  var y=110;

  // 헤더
  ctx.font='bold 48px sans-serif';ctx.fillStyle='#7a2418';ctx.fillText('FORTUNA',W/2,y);y+=40;
  ctx.font='400 28px "Noto Sans KR",sans-serif';ctx.fillStyle='rgba(122,36,24,0.7)';ctx.fillText('자미두수 명반',W/2,y);y+=34;
  ctx.font='400 22px "Noto Sans KR",sans-serif';ctx.fillStyle='rgba(74,58,42,0.55)';ctx.fillText(dateStr,W/2,y);y+=26;
  drawLine(y,220,0.5);y+=44;

  // ── 명주성 히어로 카드 (SOUL_INTERP 포함)
  var destStar=d.destinyMaster||'—';
  var soulText=SOUL_INTERP[destStar]||'';
  var destCardH=soulText?320:180;
  var goldGrad=ctx.createLinearGradient(PAD,y,PAD,y+destCardH);
  goldGrad.addColorStop(0,'rgba(212,175,90,0.18)');goldGrad.addColorStop(1,'rgba(212,175,90,0.05)');
  ctx.fillStyle=goldGrad;fRR(PAD,y,W-PAD*2,destCardH,20);
  ctx.strokeStyle='rgba(154,122,38,0.5)';ctx.lineWidth=2;sRR(PAD,y,W-PAD*2,destCardH,20);
  ctx.font='600 22px "Noto Sans KR",sans-serif';ctx.fillStyle='rgba(74,58,42,0.65)';ctx.fillText('★ 명주성 (命主星)',W/2,y+46);
  ctx.font='700 64px "Noto Serif KR",serif';ctx.fillStyle='#7a2418';ctx.fillText(destStar,W/2,y+126);
  if(soulText){
    ctx.font='400 26px "Noto Sans KR",sans-serif';ctx.fillStyle='rgba(36,26,16,0.75)';
    fillWrapped(soulText,W/2,y+168,W-PAD*2-80,40);
  }
  y+=destCardH+32;

  // ── 신주성 + 오행국 2열
  var rowH=160,colW=(W-PAD*2-20)/2;
  [{label:'◎ 신주성 (身主星)',val:d.bodyMaster||'—'},{label:'오행국 (五行局)',val:d.element||'—'}].forEach(function(b,i){
    var bx=PAD+i*(colW+20);
    ctx.fillStyle='rgba(252,247,234,0.7)';fRR(bx,y,colW,rowH,16);
    ctx.strokeStyle='rgba(154,122,38,0.35)';ctx.lineWidth=1.5;sRR(bx,y,colW,rowH,16);
    ctx.font='400 20px "Noto Sans KR",sans-serif';ctx.fillStyle='rgba(74,58,42,0.6)';ctx.fillText(b.label,bx+colW/2,y+40);
    ctx.font='700 40px "Noto Serif KR",serif';ctx.fillStyle='#7a2418';ctx.fillText(b.val,bx+colW/2,y+110);
  });
  y+=rowH+36;

  // ── 현재 대한
  drawLine(y,220,0.4);y+=42;
  ctx.font='600 28px "Noto Sans KR",sans-serif';ctx.fillStyle='rgba(36,26,16,0.7)';ctx.fillText('🌊 현재 대한 大限',W/2,y);y+=40;
  var dec=d.currentDecade;
  if(dec){
    ctx.font='bold 52px "Noto Serif KR",serif';ctx.fillStyle='#7a2418';ctx.fillText(dec.name||'—',W/2,y);y+=44;
    ctx.font='400 24px "Noto Sans KR",sans-serif';ctx.fillStyle='rgba(74,58,42,0.6)';ctx.fillText(dec.ageRange||'',W/2,y);y+=44;
    var dStars=(dec.stars||[]).slice(0,5);
    if(dStars.length){
      var sW=140,sH=52,sGap=10,sx=W/2-((sW+sGap)*dStars.length-sGap)/2;
      dStars.forEach(function(s){
        ctx.fillStyle='rgba(212,175,90,0.18)';fRR(sx,y,sW,sH,10);
        ctx.strokeStyle='rgba(154,122,38,0.4)';ctx.lineWidth=1;sRR(sx,y,sW,sH,10);
        ctx.font='600 22px "Noto Serif KR",serif';ctx.fillStyle='#7a5e1c';ctx.fillText(s,sx+sW/2,y+34);
        sx+=sW+sGap;
      });
      y+=sH+16;
    }
  }

  // ── 유년
  var yr=d.currentYear;
  if(yr){
    drawLine(y,180,0.3);y+=36;
    ctx.font='600 24px "Noto Sans KR",sans-serif';ctx.fillStyle='rgba(36,26,16,0.65)';ctx.fillText('✨ 유년 流年',W/2,y);y+=34;
    ctx.font='700 32px "Noto Sans KR",sans-serif';ctx.fillStyle='#7a2418';
    ctx.fillText((yr.heavenlyStem||'')+(yr.earthlyBranch||'')+' '+(yr.year||'')+'년 · '+(yr.palace||''),W/2,y);
  }

  // 푸터
  var footerY=H-80;drawLine(footerY,150,0.4);
  ctx.font='400 24px "Noto Sans KR",sans-serif';ctx.fillStyle='rgba(74,58,42,0.45)';ctx.fillText('picolab.kr',W/2,footerY+42);

  cb(canvas);
}

  var modal = document.getElementById('ziweiShareModal');
  var preview = document.getElementById('ziweiPreviewArea');
  preview.innerHTML = '<div style="color:rgba(74,58,42,0.7);font-family:\'Noto Sans KR\',sans-serif;padding:40px 0;">카드 생성 중... <i class="pi pi-sparkle"></i></div>';
  modal.style.display = 'flex';
  _drawZiweiCard(function(canvas){
    if(btn){ btn.disabled=false; btn.textContent='⭐ 카카오톡 공유'; }
    if(!canvas){ preview.innerHTML='<div style="color:#c0392b;padding:20px;">카드 생성 실패 <i class="pi pi-sad"></i></div>'; return; }
    window._ziweiCanvas = canvas;
    var img = new Image(); img.src = canvas.toDataURL('image/png');
    img.style.cssText = 'width:100%;border-radius:12px;display:block;';
    preview.innerHTML = ''; preview.appendChild(img);
  });
}

function doZiweiShare() {
  var canvas = window._ziweiCanvas; if (!canvas) return;
  var pageUrl = 'https://picolab.kr?utm_source=share&utm_medium=kakao';
  var text = '🔮 FORTUNA 자미두수\n\n나도 확인해봐 👇';
  try { navigator.clipboard && navigator.clipboard.writeText(pageUrl); } catch(e) {}
  var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  canvas.toBlob(function(blob){
    var file=new File([blob],'fortuna_ziwei.png',{type:'image/png'});
    if(isMobile && navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:'FORTUNA 자미두수'}).catch(function(){});
    } else if(isMobile && navigator.share){
      navigator.share({title:'FORTUNA 자미두수',url:pageUrl}).catch(function(){});
    } else if (window.Kakao && Kakao.Share) {
      if (!Kakao.isInitialized()) { try { Kakao.init('2543c896dead8185e2edfa0976396f25'); } catch(e) {} }
      Kakao.Share.sendDefault({
        objectType: 'text',
        text: text,
        link: { mobileWebUrl: pageUrl, webUrl: pageUrl },
        buttons: [{ title: '무료로 확인하기', link: { mobileWebUrl: pageUrl, webUrl: pageUrl } }]
      });
    } else { _ziweiShowToast('<i class="pi pi-link"></i> 링크가 클립보드에 복사됐어요!'); }
  },'image/png');
}

function closeZiweiShareModal() {
  document.getElementById('ziweiShareModal').style.display = 'none';
}
</script>

<!-- 공유 카드 프리뷰 모달 -->
<div id="ziweiShareModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(40,25,15,0.55);backdrop-filter:blur(8px);align-items:flex-end;justify-content:center;padding:0;">
  <div style="background:#fcf7ea;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px 20px 40px;max-height:92vh;overflow-y:auto;position:relative;box-shadow:0 -8px 24px rgba(60,40,20,0.18);">
    <button onclick="closeZiweiShareModal()" style="position:absolute;top:14px;right:16px;background:none;border:none;color:rgba(74,58,42,0.55);font-size:22px;cursor:pointer;line-height:1;">✕</button>
    <div style="text-align:center;margin-bottom:14px;font-size:13px;color:rgba(74,58,42,0.7);font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif;">공유할 카드 미리보기</div>
    <div id="ziweiPreviewArea" style="text-align:center;min-height:120px;margin-bottom:16px;"></div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button onclick="doZiweiShare()" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 0;background:#fee500;color:#3c1e1e;border:none;border-radius:14px;font-size:15px;font-weight:700;font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif;cursor:pointer;width:100%;">⭐ 카카오톡으로 공유하기</button>
      <button onclick="closeZiweiShareModal()" style="display:flex;align-items:center;justify-content:center;padding:12px 0;background:#ede4cf;color:#4a3a2a;border:1px solid #c9bc9d;border-radius:14px;font-size:14px;font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif;cursor:pointer;width:100%;">닫기</button>
    </div>
  </div>
</div>
